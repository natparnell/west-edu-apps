<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeST Educational Apps</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: #faf7f2;
    color: #3d2e1f;
    min-height: 100vh;
    padding: 2rem;
  }

  header {
    max-width: 1400px;
    margin: 0 auto 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .header-left h1 {
    font-size: 1.5rem;
    font-weight: 800;
    color: #3d2e1f;
    letter-spacing: -0.02em;
  }

  .header-left p {
    font-size: 0.85rem;
    color: #8b7355;
    margin-top: 0.2rem;
  }

  .total-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: linear-gradient(135deg, #e07020, #c96830);
    color: white;
    font-size: 0.8rem;
    font-weight: 700;
    padding: 0.4rem 0.9rem;
    border-radius: 999px;
    white-space: nowrap;
  }

  .search-bar {
    max-width: 1400px;
    margin: 0 auto 1.5rem;
  }

  .search-bar input {
    width: 100%;
    padding: 0.65rem 1rem;
    font-family: inherit;
    font-size: 0.9rem;
    border: 1px solid #e8ddd0;
    border-radius: 8px;
    background: white;
    color: #3d2e1f;
    outline: none;
    transition: border-color 0.15s;
  }

  .search-bar input:focus {
    border-color: #e07020;
    box-shadow: 0 0 0 3px rgba(224,112,32,0.1);
  }

  .search-bar input::placeholder {
    color: #c9b9a5;
  }

  .no-results {
    text-align: center;
    color: #a0896e;
    font-size: 0.9rem;
    padding: 2rem;
    display: none;
  }

  .edu-subjects {
    max-width: 1400px;
    margin: 0 auto;
  }

  .subject-group {
    margin-bottom: 1.5rem;
  }

  .subject-heading {
    font-size: 0.85rem;
    font-weight: 700;
    color: #6b5744;
    margin-bottom: 0.6rem;
    padding-bottom: 0.4rem;
    border-bottom: 2px solid #e8ddd0;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
    user-select: none;
  }

  .subject-heading:hover {
    color: #e07020;
  }

  .subject-heading .collapse-arrow {
    margin-left: auto;
    font-size: 0.7rem;
    color: #c9c0b5;
    transition: transform 0.2s;
  }

  .subject-heading:hover .collapse-arrow {
    color: #e07020;
  }

  .subject-group.collapsed .collapse-arrow {
    transform: rotate(-90deg);
  }

  .subject-group.collapsed .subject-body {
    display: none;
  }

  .subject-heading .subject-icon {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    flex-shrink: 0;
  }

  .subject-heading .subject-count {
    font-weight: 400;
    color: #a0896e;
    font-size: 0.75rem;
  }

  .ks-group {
    margin-bottom: 1rem;
  }

  .ks-heading {
    font-size: 0.78rem;
    font-weight: 600;
    color: #8b7355;
    margin-bottom: 0.4rem;
    padding: 0.3rem 0.6rem;
    background: #f5f0e8;
    border-radius: 6px;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .ks-heading .ks-label {
    background: #e8ddd0;
    color: #6b5744;
    padding: 0.1rem 0.5rem;
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 700;
  }

  .ks-heading .ks-count {
    font-weight: 400;
    color: #a0896e;
    font-size: 0.7rem;
    margin-left: auto;
  }

  .ks-empty {
    padding: 0.75rem 1rem;
    color: #c9c0b5;
    font-size: 0.75rem;
    font-style: italic;
  }

  .app-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 0.75rem;
  }

  .app-card {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.75rem 1rem;
    background: white;
    border: 1px solid #e8ddd0;
    border-radius: 8px;
    text-decoration: none;
    color: #3d2e1f;
    transition: all 0.15s;
    cursor: pointer;
  }

  .app-card:hover {
    border-color: #e07020;
    box-shadow: 0 2px 8px rgba(224,112,32,0.1);
    transform: translateY(-1px);
  }

  .app-card .app-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
  }

  .app-card .app-info h3 {
    font-size: 0.82rem;
    font-weight: 600;
    color: #3d2e1f;
    margin-bottom: 0.1rem;
  }

  .app-card .app-info p {
    font-size: 0.72rem;
    color: #8b7355;
    line-height: 1.3;
  }

  .app-card .open-arrow {
    margin-left: auto;
    color: #c9c0b5;
    font-size: 0.9rem;
    flex-shrink: 0;
    transition: color 0.15s;
  }

  .app-card:hover .open-arrow {
    color: #e07020;
  }

  .app-card.hidden {
    display: none;
  }

  .subject-group.hidden {
    display: none;
  }

  .edu-note {
    text-align: center;
    color: #a0896e;
    font-size: 0.8rem;
    margin-top: 1.5rem;
    padding: 0.75rem;
    background: white;
    border-radius: 8px;
    border: 1px dashed #e0d5c5;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
  }

  footer {
    max-width: 1400px;
    margin: 2rem auto 0;
    text-align: center;
    font-size: 0.75rem;
    color: #c9b9a5;
  }

  .suggest-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    background: white;
    color: #6b5744;
    font-family: inherit;
    font-size: 0.8rem;
    font-weight: 600;
    padding: 0.4rem 0.9rem;
    border: 1.5px solid #e0d5c5;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .suggest-btn:hover {
    border-color: #e07020;
    color: #e07020;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    flex-wrap: wrap;
  }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .modal-overlay.open {
    display: flex;
  }

  .modal {
    background: #faf7f2;
    border-radius: 12px;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 16px 48px rgba(0,0,0,0.2);
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.1rem 1.25rem 0.75rem;
    border-bottom: 1px solid #e8ddd0;
  }

  .modal-header h2 {
    font-size: 1rem;
    font-weight: 700;
    color: #3d2e1f;
  }

  .modal-close {
    background: none;
    border: none;
    font-size: 1.3rem;
    color: #a0896e;
    cursor: pointer;
    padding: 0.2rem;
    line-height: 1;
  }

  .modal-close:hover { color: #e07020; }

  .modal-body {
    padding: 1.25rem;
  }

  .modal-body label {
    display: block;
    font-size: 0.78rem;
    font-weight: 600;
    color: #6b5744;
    margin-bottom: 0.3rem;
  }

  .modal-body input,
  .modal-body select,
  .modal-body textarea {
    width: 100%;
    font-family: inherit;
    font-size: 0.85rem;
    padding: 0.5rem 0.7rem;
    border: 1px solid #e0d5c5;
    border-radius: 6px;
    background: white;
    color: #3d2e1f;
    outline: none;
    margin-bottom: 0.9rem;
    transition: border-color 0.15s;
  }

  .modal-body input:focus,
  .modal-body select:focus,
  .modal-body textarea:focus {
    border-color: #e07020;
    box-shadow: 0 0 0 3px rgba(224,112,32,0.1);
  }

  .modal-body textarea {
    resize: vertical;
    min-height: 80px;
  }

  .modal-body .field-hint {
    font-size: 0.7rem;
    color: #a0896e;
    margin-top: -0.6rem;
    margin-bottom: 0.9rem;
  }

  .modal-footer {
    padding: 0 1.25rem 1.25rem;
    display: flex;
    gap: 0.6rem;
    justify-content: flex-end;
  }

  .modal-footer button {
    font-family: inherit;
    font-size: 0.82rem;
    font-weight: 600;
    padding: 0.5rem 1.2rem;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-cancel {
    background: #e8ddd0;
    color: #6b5744;
  }

  .btn-cancel:hover { background: #ddd0c0; }

  .btn-submit {
    background: #e07020;
    color: white;
  }

  .btn-submit:hover { background: #c96020; }

  .btn-submit:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .submit-success {
    text-align: center;
    padding: 2rem 1rem;
  }

  .submit-success .tick {
    font-size: 2.5rem;
    margin-bottom: 0.5rem;
  }

  .submit-success h3 {
    font-size: 1rem;
    color: #3d2e1f;
    margin-bottom: 0.3rem;
  }

  .submit-success p {
    font-size: 0.82rem;
    color: #8b7355;
  }

  @media (max-width: 500px) {
    body { padding: 1rem; }
    .app-cards { grid-template-columns: 1fr; }
    .header-left h1 { font-size: 1.2rem; }
  }
</style>
</head>
<body>

  <div class="header-left">

<div class="modal-overlay" id="suggestModal" onclick="if(event.target===this)closeSuggestionForm()">

<footer>WeST &mdash; Empowering all children and young people to impact positively on society.</footer>

function countGroupApps(group) {
  if (group.keystages) return group.keystages.reduce((n, ks) => n + ks.apps.length, 0);
  return group.apps.length;
}

function renderAppCards(apps, group) {
  let html = '';
  apps.forEach(app => {
    html += `<a class="app-card" href="apps/${app.file}" target="_blank" data-name="${app.name.toLowerCase()}" data-desc="${app.desc.toLowerCase()}">`;
    html += `<span class="app-icon" style="background:${group.bg};color:${group.color}">${group.icon}</span>`;
    html += `<span class="app-info"><h3>${app.name}</h3><p>${app.desc}</p></span>`;
    html += `<span class="open-arrow">&#8250;</span>`;
    html += '</a>';
  });
  return html;
}

function renderEduApps() {
  const container = document.getElementById('edu-apps');
  let html = '';
  eduApps.forEach(group => {
    const count = countGroupApps(group);
    html += `<div class="subject-group collapsed" data-subject="${group.subject}">`;
    html += `<div class="subject-heading" onclick="this.parentElement.classList.toggle('collapsed')">`;
    html += `<span class="subject-icon" style="background:${group.bg};color:${group.color}">${group.icon}</span>`;
    html += `${group.subject} <span class="subject-count">(${count})</span>`;
    html += `<span class="collapse-arrow">&#9660;</span>`;
    html += `</div>`;
    html += '<div class="subject-body">';

    if (group.keystages) {
      group.keystages.forEach(ks => {
        html += '<div class="ks-group">';
        html += `<div class="ks-heading"><span class="ks-label">${ks.label}</span><span class="ks-count">${ks.apps.length} app${ks.apps.length !== 1 ? 's' : ''}</span></div>`;
        if (ks.apps.length > 0) {
          html += '<div class="app-cards">';
          html += renderAppCards(ks.apps, group);
          html += '</div>';
        } else {
          html += '<div class="ks-empty">No apps yet — coming soon</div>';
        }
        html += '</div>';
      });
    } else {
      html += '<div class="app-cards">';
      html += renderAppCards(group.apps, group);
      html += '</div>';
    }

    html += '</div></div>';
  });
  container.innerHTML = html;
}

function filterApps(query) {
  const q = query.trim().toLowerCase();
  const noResults = document.getElementById('no-results');
  let anyVisible = false;

  document.querySelectorAll('.subject-group').forEach(group => {
    let groupVisible = false;
    group.querySelectorAll('.app-card').forEach(card => {
      const name = (card.dataset.name || card.querySelector('h3').textContent).toLowerCase();
      const desc = (card.dataset.desc || card.querySelector('p').textContent).toLowerCase();
      const match = !q || name.includes(q) || desc.includes(q);
      card.classList.toggle('hidden', !match);
      if (match) groupVisible = true;
    });
    group.classList.toggle('hidden', !groupVisible);
    if (groupVisible) {
      anyVisible = true;
      if (q) group.classList.remove('collapsed');
    }
  });

  if (!q) {
    document.querySelectorAll('.subject-group').forEach(g => g.classList.add('collapsed'));
  }

  noResults.style.display = anyVisible || !q ? 'none' : 'block';
}

(function checkSuggestParams() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('suggest') === '1') {
    openSuggestionForm();
    setTimeout(() => {
      if (params.has('title'))    document.getElementById('sg-title').value = params.get('title');
      if (params.has('desc'))     document.getElementById('sg-desc').value = params.get('desc');
      if (params.has('subject')) {
        const sel = document.getElementById('sg-subject');
        for (let i = 0; i < sel.options.length; i++) {
          if (sel.options[i].text === params.get('subject')) { sel.selectedIndex = i; break; }
        }
      }
      if (params.has('keystage')) {
        const sel = document.getElementById('sg-keystage');
        for (let i = 0; i < sel.options.length; i++) {
          if (sel.options[i].text === params.get('keystage')) { sel.selectedIndex = i; break; }
        }
      }
    }, 100);
  }
})();

function submitSuggestion() {
  const name = document.getElementById('sg-name').value.trim();
  const email = document.getElementById('sg-email').value.trim();
  const school = document.getElementById('sg-school').value.trim();
  const subject = document.getElementById('sg-subject').value;
  const keystage = document.getElementById('sg-keystage').value;
  const title = document.getElementById('sg-title').value.trim();
  const desc = document.getElementById('sg-desc').value.trim();

  if (!title) {
    document.getElementById('sg-title').style.borderColor = '#e04040';
    document.getElementById('sg-title').focus();
    return;
  }

  const btn = document.getElementById('sg-submit');
  btn.disabled = true;
  btn.textContent = 'Submitting\u2026';

  const showSuccess = () => {
    document.getElementById('suggestFormContent').innerHTML = `
      <div class="submit-success">
        <div class="tick">&#10003;</div>
        <h3>Thank you!</h3>
        <p>Your suggestion has been recorded.<br>We'll review it and may be in touch.</p>
      </div>
      <div class="modal-footer">
        <button class="btn-submit" onclick="closeSuggestionForm()">Close</button>
      </div>`;
  };

  const data = { name, email, school, subject, keystage, title, desc };

  if (window._firestoreSubmit) {
    window._firestoreSubmit(data).then(showSuccess).catch(err => {
      console.error('Firestore write failed:', err);
      btn.disabled = false;
      btn.textContent = 'Submit Suggestion';
      alert('Something went wrong. Please try again.');
    });
  } else {
    // Fallback to localStorage if Firebase hasn't loaded
    const suggestions = JSON.parse(localStorage.getItem('west-edu-suggestions') || '[]');
    suggestions.push({ ...data, date: new Date().toISOString() });
    localStorage.setItem('west-edu-suggestions', JSON.stringify(suggestions));
    setTimeout(showSuccess, 300);
  }
}
