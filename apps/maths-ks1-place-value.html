<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Place Value Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#faf7f2;color:#3d2e1f;min-height:100vh;display:flex;flex-direction:column;align-items:center}
.title-bar{width:100%;background:#2563eb;color:#fff;text-align:center;padding:16px;font-size:1.6rem;font-weight:800;letter-spacing:1px;box-shadow:0 2px 8px rgba(37,99,235,.3)}
.subtitle{font-size:.85rem;font-weight:400;opacity:.85;margin-top:4px}
.container{max-width:900px;width:100%;padding:20px}
.top-bar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:16px}
.score-box{background:#fff;border:2px solid #2563eb;border-radius:12px;padding:8px 18px;font-weight:700;font-size:1rem;color:#2563eb}
.mode-btns{display:flex;gap:8px}
.mode-btn{padding:8px 16px;border:2px solid #2563eb;border-radius:10px;background:#fff;color:#2563eb;font-family:'Inter',sans-serif;font-weight:600;cursor:pointer;transition:all .2s}
.mode-btn.active,.mode-btn:hover{background:#2563eb;color:#fff}
.instructions{background:#fff;border-radius:12px;padding:14px 20px;margin-bottom:16px;font-size:1.05rem;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06);min-height:50px;display:flex;align-items:center;justify-content:center;font-weight:600}
.main-area{display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
.block-tray{background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.07);flex:1;min-width:200px;max-width:260px}
.block-tray h3{text-align:center;margin-bottom:12px;color:#2563eb;font-size:1rem}
.tray-blocks{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;min-height:100px}
.block{cursor:grab;user-select:none;transition:transform .15s,box-shadow .15s;position:relative}
.block:hover{transform:scale(1.08);box-shadow:0 4px 12px rgba(37,99,235,.25)}
.block:active{cursor:grabbing}
.ten-block{width:28px;height:120px;background:linear-gradient(135deg,#2563eb,#1d4ed8);border-radius:6px;display:flex;flex-direction:column;justify-content:space-between;padding:3px}
.ten-block .seg{width:100%;height:9px;background:rgba(255,255,255,.25);border-radius:2px}
.one-block{width:28px;height:28px;background:linear-gradient(135deg,#60a5fa,#3b82f6);border-radius:5px;display:flex;align-items:center;justify-content:center}
.one-block-small{width:9px;height:9px;background:rgba(255,255,255,.3);border-radius:2px}
.place-value-chart{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.07);flex:2;min-width:340px}
.pv-header{display:flex;margin-bottom:10px}
.pv-header div{flex:1;text-align:center;font-weight:700;font-size:1.1rem;padding:8px;border-radius:8px}
.pv-header .tens-hdr{background:#e0e7ff;color:#1e40af;margin-right:4px}
.pv-header .ones-hdr{background:#dbeafe;color:#2563eb}
.pv-columns{display:flex;gap:8px;min-height:250px}
.pv-col{flex:1;border:3px dashed #cbd5e1;border-radius:12px;padding:10px;display:flex;flex-wrap:wrap;gap:6px;align-content:flex-start;justify-content:center;transition:border-color .2s,background .2s;min-height:200px}
.pv-col.drag-over{border-color:#2563eb;background:#eff6ff}
.number-display{text-align:center;margin-top:16px;font-size:2.8rem;font-weight:800;color:#2563eb;background:#eff6ff;border-radius:14px;padding:12px;letter-spacing:4px}
.number-display .digit{display:inline-block;min-width:40px}
.answer-area{text-align:center;margin-top:16px}
.answer-input{font-family:'Inter',sans-serif;font-size:2rem;font-weight:700;text-align:center;width:120px;padding:10px;border:3px solid #cbd5e1;border-radius:12px;color:#2563eb;outline:none;transition:border-color .2s}
.answer-input:focus{border-color:#2563eb}
.check-btn,.new-btn{font-family:'Inter',sans-serif;padding:10px 24px;border:none;border-radius:10px;font-weight:700;font-size:1rem;cursor:pointer;transition:all .2s;margin:8px 4px}
.check-btn{background:#2563eb;color:#fff}
.check-btn:hover{background:#1d4ed8}
.new-btn{background:#f59e0b;color:#fff}
.new-btn:hover{background:#d97706}
.feedback{text-align:center;margin-top:12px;font-size:1.2rem;font-weight:700;min-height:30px;transition:opacity .3s}
.feedback.correct{color:#16a34a}
.feedback.wrong{color:#dc2626}
.exchange-animation{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1000}
.exchange-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border:4px solid #2563eb;border-radius:20px;padding:30px;text-align:center;z-index:1001;box-shadow:0 8px 32px rgba(0,0,0,.2);animation:popIn .4s ease}
@keyframes popIn{from{transform:translate(-50%,-50%) scale(.5);opacity:0}to{transform:translate(-50%,-50%) scale(1);opacity:1}}
.exchange-popup h3{color:#2563eb;margin-bottom:16px;font-size:1.3rem}
.exchange-visual{display:flex;align-items:center;justify-content:center;gap:16px;margin:16px 0}
.exchange-visual .arrow{font-size:2rem;color:#f59e0b;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
.block-in-chart{animation:dropIn .3s ease}
@keyframes dropIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.ghost{position:fixed;pointer-events:none;z-index:999;opacity:.8}
@media(max-width:640px){.main-area{flex-direction:column}.block-tray{max-width:100%}.pv-columns{min-height:180px}.number-display{font-size:2rem}}
</style>
</head>
<body>
<div class="title-bar">Place Value Explorer<div class="subtitle">Tens and Ones - Numbers 0 to 99</div></div>
<div class="container">
  <div class="top-bar">
    <div class="score-box">Score: <span id="score">0</span> / <span id="total">0</span></div>
    <div class="mode-btns">
      <button class="mode-btn active" onclick="setMode('show')">Show Me</button>
      <button class="mode-btn" onclick="setMode('what')">What Number?</button>
      <button class="mode-btn" onclick="setMode('free')">Free Play</button>
    </div>
  </div>
  <div class="instructions" id="instructions">Drag tens rods and ones cubes onto the chart!</div>
  <div class="main-area">
    <div class="block-tray" id="tray">
      <h3>Blocks</h3>
      <div class="tray-blocks" id="tensTray">
        <div style="width:100%;text-align:center;font-weight:600;font-size:.85rem;color:#64748b;margin-bottom:4px">Tens</div>
      </div>
      <div class="tray-blocks" id="onesTray" style="margin-top:12px">
        <div style="width:100%;text-align:center;font-weight:600;font-size:.85rem;color:#64748b;margin-bottom:4px">Ones</div>
      </div>
    </div>
    <div class="place-value-chart">
      <div class="pv-header"><div class="tens-hdr">Tens</div><div class="ones-hdr">Ones</div></div>
      <div class="pv-columns">
        <div class="pv-col" id="tensCol" data-type="ten"></div>
        <div class="pv-col" id="onesCol" data-type="one"></div>
      </div>
      <div class="number-display" id="numberDisplay">
        <span class="digit" id="tensDigit">0</span><span class="digit" id="onesDigit">0</span>
      </div>
      <div class="answer-area" id="answerArea" style="display:none">
        <input type="number" class="answer-input" id="answerInput" min="0" max="99" placeholder="?">
        <br>
        <button class="check-btn" onclick="checkAnswer()">Check!</button>
      </div>
      <div style="text-align:center;margin-top:12px">
        <button class="check-btn" id="checkBuildBtn" style="display:none" onclick="checkBuild()">Check My Answer!</button>
        <button class="new-btn" onclick="newQuestion()">New Question</button>
        <button class="new-btn" onclick="clearChart()" style="background:#94a3b8">Clear</button>
      </div>
      <div class="feedback" id="feedback"></div>
    </div>
  </div>
</div>

<script>
let mode='show',score=0,total=0,targetNumber=null,dragData=null,ghostEl=null;
const tensCol=document.getElementById('tensCol'),onesCol=document.getElementById('onesCol');
const tensDigit=document.getElementById('tensDigit'),onesDigit=document.getElementById('onesDigit');
const feedback=document.getElementById('feedback'),instructions=document.getElementById('instructions');
const answerArea=document.getElementById('answerArea'),answerInput=document.getElementById('answerInput');
const checkBuildBtn=document.getElementById('checkBuildBtn');

function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-btn').forEach((b,i)=>{
    b.classList.toggle('active',(['show','what','free'])[i]===m);
  });
  clearChart();
  feedback.textContent='';
  if(m==='free'){
    instructions.textContent='Free play! Drag blocks onto the chart to explore numbers.';
    answerArea.style.display='none';
    checkBuildBtn.style.display='none';
    targetNumber=null;
  } else {
    newQuestion();
  }
}

function newQuestion(){
  clearChart();
  feedback.textContent='';
  if(mode==='show'){
    targetNumber=Math.floor(Math.random()*100);
    instructions.textContent=`Build the number ${targetNumber} using blocks!`;
    answerArea.style.display='none';
    checkBuildBtn.style.display='inline-block';
  } else if(mode==='what'){
    targetNumber=Math.floor(Math.random()*100);
    let t=Math.floor(targetNumber/10),o=targetNumber%10;
    for(let i=0;i<t;i++) addBlockToCol(tensCol,'ten',false);
    for(let i=0;i<o;i++) addBlockToCol(onesCol,'one',false);
    updateDisplay();
    document.getElementById('numberDisplay').style.visibility='hidden';
    instructions.textContent='How many is this? Count the blocks and type the number!';
    answerArea.style.display='block';
    checkBuildBtn.style.display='none';
    answerInput.value='';
    answerInput.focus();
  }
}

function createTenBlock(){
  const d=document.createElement('div');
  d.className='block ten-block';
  d.setAttribute('data-type','ten');
  for(let i=0;i<10;i++){const s=document.createElement('div');s.className='seg';d.appendChild(s);}
  return d;
}
function createOneBlock(){
  const d=document.createElement('div');
  d.className='block one-block';
  d.setAttribute('data-type','one');
  const s=document.createElement('div');s.className='one-block-small';d.appendChild(s);
  return d;
}

function populateTray(){
  const tt=document.getElementById('tensTray'),ot=document.getElementById('onesTray');
  tt.innerHTML='<div style="width:100%;text-align:center;font-weight:600;font-size:.85rem;color:#64748b;margin-bottom:4px">Tens</div>';
  ot.innerHTML='<div style="width:100%;text-align:center;font-weight:600;font-size:.85rem;color:#64748b;margin-bottom:4px">Ones</div>';
  for(let i=0;i<9;i++){const b=createTenBlock();setupDrag(b,'ten');tt.appendChild(b);}
  for(let i=0;i<20;i++){const b=createOneBlock();setupDrag(b,'one');ot.appendChild(b);}
}

function setupDrag(el,type){
  el.addEventListener('mousedown',e=>startDrag(e,el,type));
  el.addEventListener('touchstart',e=>startDrag(e,el,type),{passive:false});
}

function startDrag(e,el,type){
  e.preventDefault();
  const r=el.getBoundingClientRect();
  const isFromChart=el.parentElement===tensCol||el.parentElement===onesCol;
  dragData={type,source:isFromChart?'chart':'tray',el:isFromChart?el:null,offX:0,offY:0};
  ghostEl=el.cloneNode(true);
  ghostEl.className+=' ghost';
  ghostEl.style.width=r.width+'px';
  ghostEl.style.height=r.height+'px';
  const cx=e.clientX||e.touches[0].clientX, cy=e.clientY||e.touches[0].clientY;
  ghostEl.style.left=(cx-r.width/2)+'px';
  ghostEl.style.top=(cy-r.height/2)+'px';
  document.body.appendChild(ghostEl);
  document.addEventListener('mousemove',onDragMove);
  document.addEventListener('mouseup',onDragEnd);
  document.addEventListener('touchmove',onDragMove,{passive:false});
  document.addEventListener('touchend',onDragEnd);
}

function onDragMove(e){
  if(!ghostEl)return;
  e.preventDefault();
  const cx=e.clientX||e.touches[0].clientX, cy=e.clientY||e.touches[0].clientY;
  ghostEl.style.left=(cx-parseInt(ghostEl.style.width)/2)+'px';
  ghostEl.style.top=(cy-parseInt(ghostEl.style.height)/2)+'px';
  [tensCol,onesCol].forEach(c=>{
    const r=c.getBoundingClientRect();
    c.classList.toggle('drag-over',cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom);
  });
}

function onDragEnd(e){
  document.removeEventListener('mousemove',onDragMove);
  document.removeEventListener('mouseup',onDragEnd);
  document.removeEventListener('touchmove',onDragMove);
  document.removeEventListener('touchend',onDragEnd);
  const cx=e.clientX||e.changedTouches[0].clientX, cy=e.clientY||e.changedTouches[0].clientY;
  [tensCol,onesCol].forEach(c=>c.classList.remove('drag-over'));
  let dropped=false;
  [tensCol,onesCol].forEach(col=>{
    const r=col.getBoundingClientRect();
    if(cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom){
      const colType=col.dataset.type;
      if(dragData.type===colType||(dragData.type==='ten'&&colType==='ten')||(dragData.type==='one'&&colType==='one')){
        if(dragData.source==='chart'&&dragData.el){
          // moving within chart, do nothing special
        } else {
          addBlockToCol(col,dragData.type,true);
        }
        dropped=true;
      } else if(dragData.type==='ten'&&colType==='one'){
        // drop ten in ones - do nothing, wrong column
      } else if(dragData.type==='one'&&colType==='ten'){
        // can't put one in tens
      }
    }
  });
  // check if dropped outside chart - remove from chart if dragged from chart
  if(!dropped&&dragData.source==='chart'&&dragData.el){
    dragData.el.remove();
    updateDisplay();
    checkExchange();
  }
  if(ghostEl){ghostEl.remove();ghostEl=null;}
  dragData=null;
}

function addBlockToCol(col,type,animate){
  const currentCount=col.querySelectorAll('.block').length;
  if(type==='ten'&&col===tensCol&&currentCount>=9)return;
  if(type==='one'&&col===onesCol&&currentCount>=19)return;
  const b=type==='ten'?createTenBlock():createOneBlock();
  if(animate)b.classList.add('block-in-chart');
  setupDrag(b,type);
  // double-click to remove
  b.addEventListener('dblclick',()=>{b.remove();updateDisplay();checkExchange();});
  col.appendChild(b);
  updateDisplay();
  checkExchange();
}

function updateDisplay(){
  const t=tensCol.querySelectorAll('.block').length;
  const o=onesCol.querySelectorAll('.block').length;
  tensDigit.textContent=t;
  onesDigit.textContent=o;
}

function checkExchange(){
  const onesCount=onesCol.querySelectorAll('.block').length;
  if(onesCount>=10){
    // animate exchange
    setTimeout(()=>showExchange(),300);
  }
}

function showExchange(){
  const ones=onesCol.querySelectorAll('.block');
  if(ones.length<10)return;
  // remove 10 ones
  for(let i=0;i<10;i++) ones[i].remove();
  // add 1 ten
  addBlockToCol(tensCol,'ten',true);
  updateDisplay();
  // show popup
  const popup=document.createElement('div');
  popup.className='exchange-popup';
  popup.innerHTML=`<h3>Exchange!</h3><div class="exchange-visual"><div style="display:flex;gap:3px">${Array(10).fill('<div style="width:20px;height:20px;background:#60a5fa;border-radius:4px"></div>').join('')}</div><span class="arrow">\u27A1</span><div style="width:22px;height:90px;background:linear-gradient(135deg,#2563eb,#1d4ed8);border-radius:5px"></div></div><p style="font-weight:600;color:#3d2e1f">10 ones = 1 ten!</p>`;
  document.body.appendChild(popup);
  setTimeout(()=>popup.remove(),2200);
}

function getCurrentNumber(){
  return tensCol.querySelectorAll('.block').length*10+onesCol.querySelectorAll('.block').length;
}

function checkBuild(){
  total++;
  const n=getCurrentNumber();
  if(n===targetNumber){
    score++;
    feedback.className='feedback correct';
    feedback.textContent=`Brilliant! ${targetNumber} is ${Math.floor(targetNumber/10)} tens and ${targetNumber%10} ones!`;
  } else {
    feedback.className='feedback wrong';
    feedback.textContent=`Not quite! You made ${n}. The answer is ${targetNumber}.`;
  }
  document.getElementById('score').textContent=score;
  document.getElementById('total').textContent=total;
  checkBuildBtn.style.display='none';
}

function checkAnswer(){
  total++;
  const v=parseInt(answerInput.value);
  if(v===targetNumber){
    score++;
    feedback.className='feedback correct';
    feedback.textContent=`Well done! It is ${targetNumber}!`;
  } else {
    feedback.className='feedback wrong';
    feedback.textContent=`Not quite! The answer is ${targetNumber}.`;
  }
  document.getElementById('score').textContent=score;
  document.getElementById('total').textContent=total;
  document.getElementById('numberDisplay').style.visibility='visible';
}

function clearChart(){
  tensCol.innerHTML='';
  onesCol.innerHTML='';
  updateDisplay();
  document.getElementById('numberDisplay').style.visibility='visible';
  feedback.textContent='';
}

populateTray();
setMode('show');
newQuestion();
</script>
</body>
</html>
