<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Bonds to 10</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #faf7f2;
  color: #3d2e1f;
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  user-select: none;
  -webkit-user-select: none;
  overflow-x: hidden;
}

/* Title bar */
.title-bar {
  width: 100%;
  background: #e07020;
  color: #fff;
  text-align: center;
  padding: 16px 20px;
  font-size: 1.6rem;
  font-weight: 800;
  letter-spacing: 0.5px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.12);
}

.instructions {
  font-size: 1.15rem;
  font-weight: 600;
  text-align: center;
  margin: 14px 12px 6px;
  line-height: 1.4;
}

/* Controls */
.controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  flex-wrap: wrap;
  margin: 8px 10px 10px;
}
.score-badge {
  background: #3d2e1f;
  color: #fff;
  font-weight: 700;
  font-size: 1rem;
  padding: 8px 18px;
  border-radius: 30px;
}
.btn {
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  border: none;
  border-radius: 14px;
  padding: 10px 22px;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 3px 8px rgba(0,0,0,0.13);
}
.btn:active { transform: scale(0.95); }
.btn-level {
  background: #e07020;
  color: #fff;
}
.btn-reset {
  background: #fff;
  color: #e07020;
  border: 2.5px solid #e07020;
}

.round-info {
  font-size: 0.95rem;
  font-weight: 600;
  color: #9a7b5a;
  margin-bottom: 6px;
}

/* Number sentence */
.number-sentence {
  font-size: 1.6rem;
  font-weight: 800;
  text-align: center;
  margin: 8px 0 14px;
  min-height: 2em;
  color: #3d2e1f;
}
.number-sentence .blank {
  display: inline-block;
  width: 46px;
  height: 46px;
  line-height: 46px;
  background: #ffecd6;
  border: 3px dashed #e07020;
  border-radius: 12px;
  vertical-align: middle;
  text-align: center;
  color: #e07020;
  font-size: 1.5rem;
}
.number-sentence .filled {
  background: #e07020;
  color: #fff;
  border-style: solid;
}

/* Ten-frame */
.ten-frame-wrap {
  display: flex;
  justify-content: center;
  margin: 0 0 18px;
}
.ten-frame {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  grid-template-rows: repeat(2, 1fr);
  gap: 8px;
  background: #fff;
  border: 4px solid #3d2e1f;
  border-radius: 18px;
  padding: 14px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
}
.cell {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: 3px solid #d4c8b8;
  background: #faf7f2;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.35s, border-color 0.35s, transform 0.35s;
  cursor: pointer;
  position: relative;
}
.cell.filled-dot {
  background: #e07020;
  border-color: #c85e15;
  cursor: default;
}
.cell.answer-dot {
  background: #6b4ead;
  border-color: #5a3e96;
  cursor: default;
  animation: popIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.cell.tap-target:hover {
  border-color: #e07020;
  transform: scale(1.08);
}
.cell.tap-target:active {
  transform: scale(0.95);
}

@keyframes popIn {
  0% { transform: scale(0); }
  100% { transform: scale(1); }
}

/* Answer options */
.options-label {
  font-size: 1rem;
  font-weight: 600;
  text-align: center;
  color: #9a7b5a;
  margin-bottom: 6px;
}
.options {
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 16px;
  padding: 0 10px;
}
.option-btn {
  font-family: 'Inter', sans-serif;
  width: 58px;
  height: 58px;
  border-radius: 16px;
  border: 3px solid #d4c8b8;
  background: #fff;
  font-size: 1.5rem;
  font-weight: 800;
  color: #3d2e1f;
  cursor: pointer;
  transition: transform 0.15s, border-color 0.2s, background 0.2s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.07);
}
.option-btn:hover {
  border-color: #e07020;
}
.option-btn:active {
  transform: scale(0.92);
}
.option-btn.correct-pick {
  background: #3bb54a;
  border-color: #2e9a3c;
  color: #fff;
}
.option-btn.wrong-pick {
  background: #e04040;
  border-color: #c03030;
  color: #fff;
  animation: shake 0.4s ease;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(3px); }
}

/* Celebration overlay */
.celebration {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 200;
  overflow: hidden;
}
.star {
  position: absolute;
  font-size: 2rem;
  animation: starFall linear forwards;
  opacity: 0;
}
@keyframes starFall {
  0% { opacity: 1; transform: translateY(-40px) rotate(0deg) scale(0.5); }
  50% { opacity: 1; transform: translateY(45vh) rotate(180deg) scale(1.2); }
  100% { opacity: 0; transform: translateY(95vh) rotate(360deg) scale(0.6); }
}

/* Feedback toast */
.feedback {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  font-size: 2.4rem;
  font-weight: 800;
  padding: 18px 36px;
  border-radius: 22px;
  color: #fff;
  z-index: 300;
  pointer-events: none;
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
  opacity: 0;
}
.feedback.show { transform: translate(-50%,-50%) scale(1); opacity: 1; }
.feedback.good { background: #3bb54a; }
.feedback.bad { background: #e04040; }

/* Responsive */
@media (max-width: 500px) {
  .title-bar { font-size: 1.25rem; padding: 13px 14px; }
  .cell { width: 48px; height: 48px; }
  .ten-frame { gap: 5px; padding: 10px; }
  .option-btn { width: 50px; height: 50px; font-size: 1.3rem; border-radius: 14px; }
  .number-sentence { font-size: 1.3rem; }
  .feedback { font-size: 1.7rem; padding: 14px 26px; }
  .instructions { font-size: 1rem; }
}
</style>
</head>
<body>

<div class="title-bar">Number Bonds to 10</div>

<p class="instructions" id="instructions">How many more to make <strong id="targetLabel">5</strong>?</p>

<div class="controls">
  <span class="score-badge" id="scoreBadge">Score: 0 / 0</span>
  <button class="btn btn-level" id="levelBtn" onclick="toggleLevel()">Level: Bonds to 5</button>
  <button class="btn btn-reset" onclick="newGame()">New Game</button>
</div>

<div class="round-info" id="roundInfo">Round 1 of 10</div>

<div class="number-sentence" id="numberSentence"></div>

<div class="ten-frame-wrap">
  <div class="ten-frame" id="tenFrame"></div>
</div>

<p class="options-label">Tap your answer:</p>
<div class="options" id="options"></div>

<div class="celebration" id="celebration"></div>
<div class="feedback" id="feedback"></div>

<script>
let target = 5; // 5 or 10
let given = 0;
let answer = 0;
let score = 0, total = 0, round = 0;
const TOTAL_ROUNDS = 10;
let answered = false;
let filledByTap = 0;

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function buildFrame() {
  const frame = document.getElementById('tenFrame');
  frame.innerHTML = '';
  const cells = target; // 5 or 10
  // For bonds to 5, show a 1x5 grid; for 10, 2x5
  if (target === 5) {
    frame.style.gridTemplateColumns = 'repeat(5, 1fr)';
    frame.style.gridTemplateRows = '1fr';
  } else {
    frame.style.gridTemplateColumns = 'repeat(5, 1fr)';
    frame.style.gridTemplateRows = 'repeat(2, 1fr)';
  }

  for (let i = 0; i < cells; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.dataset.index = i;
    if (i < given) {
      cell.classList.add('filled-dot');
    } else {
      cell.classList.add('tap-target');
      cell.addEventListener('click', () => tapCell(cell, i));
    }
    frame.appendChild(cell);
  }
}

function tapCell(cell, idx) {
  if (answered) return;
  if (cell.classList.contains('answer-dot')) return;
  if (cell.classList.contains('filled-dot')) return;

  cell.classList.remove('tap-target');
  cell.classList.add('answer-dot');
  filledByTap++;

  if (filledByTap === answer) {
    submitAnswer(answer);
  }
}

function buildOptions() {
  const wrap = document.getElementById('options');
  wrap.innerHTML = '';
  // Create options: correct answer + distractors
  const choices = new Set();
  choices.add(answer);
  while (choices.size < Math.min(target === 5 ? 4 : 5, target + 1)) {
    choices.add(randInt(0, target));
  }
  const arr = Array.from(choices).sort((a, b) => a - b);
  arr.forEach(n => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = n;
    btn.addEventListener('click', () => pickOption(btn, n));
    wrap.appendChild(btn);
  });
}

function pickOption(btn, value) {
  if (answered) return;
  submitAnswer(value, btn);
}

function submitAnswer(value, btn) {
  if (answered) return;
  answered = true;
  total++;

  const isCorrect = value === answer;
  if (isCorrect) score++;

  document.getElementById('scoreBadge').textContent = 'Score: ' + score + ' / ' + total;

  if (btn) {
    btn.classList.add(isCorrect ? 'correct-pick' : 'wrong-pick');
  }

  if (isCorrect) {
    // Fill remaining cells with animation
    animateRemainingCells();
    updateSentenceFilled();
    showFeedback(true);
    celebrate();
  } else {
    showFeedback(false);
    // Reset tapped cells
    resetTappedCells();
  }

  setTimeout(() => {
    if (round < TOTAL_ROUNDS) {
      generateRound();
    } else {
      showFinalScore();
    }
  }, isCorrect ? 1800 : 1300);
}

function animateRemainingCells() {
  const cells = document.querySelectorAll('#tenFrame .cell');
  let delay = 0;
  cells.forEach((cell, i) => {
    if (i >= given && !cell.classList.contains('answer-dot')) {
      delay += 80;
      setTimeout(() => {
        cell.classList.remove('tap-target');
        cell.classList.add('answer-dot');
      }, delay);
    }
  });
}

function resetTappedCells() {
  filledByTap = 0;
  const cells = document.querySelectorAll('#tenFrame .cell.answer-dot');
  cells.forEach(cell => {
    cell.classList.remove('answer-dot');
    cell.classList.add('tap-target');
  });
}

function updateSentence() {
  const el = document.getElementById('numberSentence');
  el.innerHTML = given + ' + <span class="blank">?</span> = ' + target;
}

function updateSentenceFilled() {
  const el = document.getElementById('numberSentence');
  el.innerHTML = given + ' + <span class="blank filled">' + answer + '</span> = ' + target;
}

function generateRound() {
  answered = false;
  filledByTap = 0;
  round++;
  document.getElementById('roundInfo').textContent = 'Round ' + round + ' of ' + TOTAL_ROUNDS;

  given = randInt(0, target);
  answer = target - given;

  buildFrame();
  buildOptions();
  updateSentence();
}

function showFeedback(correct) {
  const fb = document.getElementById('feedback');
  fb.textContent = correct ? 'Brilliant!' : 'Not quite!';
  fb.className = 'feedback ' + (correct ? 'good' : 'bad') + ' show';
  setTimeout(() => { fb.className = 'feedback'; }, 1100);
}

function showFinalScore() {
  const fb = document.getElementById('feedback');
  fb.textContent = score + ' out of ' + TOTAL_ROUNDS + '!';
  fb.className = 'feedback good show';
  document.getElementById('roundInfo').textContent = 'All done! Great job!';
  setTimeout(() => { fb.className = 'feedback'; }, 2500);
}

function celebrate() {
  const container = document.getElementById('celebration');
  container.innerHTML = '';
  const pieces = ['🌟','⭐','🌈','✨','💫','🎉'];
  for (let i = 0; i < 18; i++) {
    const star = document.createElement('span');
    star.className = 'star';
    star.textContent = pieces[randInt(0, pieces.length - 1)];
    star.style.left = randInt(5, 90) + '%';
    star.style.animationDuration = (1.2 + Math.random() * 1) + 's';
    star.style.animationDelay = (Math.random() * 0.5) + 's';
    star.style.fontSize = (1.4 + Math.random() * 1.4) + 'rem';
    container.appendChild(star);
  }
  setTimeout(() => { container.innerHTML = ''; }, 2500);
}

function toggleLevel() {
  target = target === 5 ? 10 : 5;
  document.getElementById('levelBtn').textContent = 'Level: Bonds to ' + target;
  document.getElementById('targetLabel').textContent = target;
  document.getElementById('instructions').innerHTML = 'How many more to make <strong>' + target + '</strong>?';
  newGame();
}

function newGame() {
  score = 0;
  total = 0;
  round = 0;
  document.getElementById('scoreBadge').textContent = 'Score: 0 / 0';
  generateRound();
}

newGame();
</script>
</body>
</html>
