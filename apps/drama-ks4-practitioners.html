<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Theatre Practitioners Explorer | GCSE Drama</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream: #FFF8F0;
  --cream-dark: #F5EDE0;
  --brown-light: #D4A574;
  --brown: #8B6914;
  --brown-dark: #5C4A1E;
  --orange: #E8783A;
  --orange-light: #F4A460;
  --orange-dark: #C45A20;
  --terracotta: #CC6B49;
  --warm-gray: #6B5B4F;
  --text: #3A2E22;
  --text-light: #7A6B5F;
  --white: #FFFFFF;
  --shadow: 0 2px 12px rgba(90,60,20,0.10);
  --shadow-lg: 0 8px 32px rgba(90,60,20,0.15);
  --radius: 12px;
  --radius-sm: 8px;
  --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
}

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--cream);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

/* Header */
.app-header {
  background: linear-gradient(135deg, var(--brown-dark) 0%, var(--brown) 50%, var(--orange-dark) 100%);
  color: var(--white);
  padding: 2rem 1.5rem 1.5rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.app-header::before {
  content: '';
  position: absolute;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5 L35 20 L50 20 L38 30 L42 45 L30 36 L18 45 L22 30 L10 20 L25 20Z' fill='rgba(255,255,255,0.03)'/%3E%3C/svg%3E") repeat;
}
.app-header h1 {
  font-size: clamp(1.5rem, 4vw, 2.2rem);
  font-weight: 800;
  position: relative;
  letter-spacing: -0.5px;
}
.app-header h1 .icon { font-size: 1.1em; margin-right: 0.3em; }
.app-header p {
  font-size: 0.95rem;
  opacity: 0.9;
  margin-top: 0.4rem;
  position: relative;
  font-weight: 300;
}

/* Navigation tabs */
.nav-bar {
  display: flex;
  justify-content: center;
  gap: 0.5rem;
  padding: 1rem 1.5rem;
  background: var(--white);
  border-bottom: 1px solid var(--cream-dark);
  flex-wrap: wrap;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow);
}
.nav-btn {
  padding: 0.6rem 1.3rem;
  border: 2px solid var(--cream-dark);
  background: var(--white);
  border-radius: 50px;
  font-family: inherit;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-light);
  cursor: pointer;
  transition: var(--transition);
}
.nav-btn:hover {
  border-color: var(--orange-light);
  color: var(--orange);
}
.nav-btn.active {
  background: var(--orange);
  border-color: var(--orange);
  color: var(--white);
}

/* Main content */
.main-content {
  max-width: 1200px;
  margin: 0 auto;
  padding: 1.5rem;
}

.view { display: none; }
.view.active { display: block; }

/* Practitioner Cards */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 1.25rem;
}

.card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  transition: var(--transition);
  border: 1px solid var(--cream-dark);
}
.card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }

.card-header {
  padding: 1.25rem 1.5rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 1rem;
  user-select: none;
}
.card-avatar {
  width: 56px; height: 56px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  font-weight: 800;
  color: var(--white);
  flex-shrink: 0;
}
.card-header-text { flex: 1; min-width: 0; }
.card-header-text h3 { font-size: 1.1rem; font-weight: 700; }
.card-header-text .era {
  font-size: 0.8rem;
  color: var(--text-light);
  font-weight: 500;
}
.card-toggle {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--cream);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
  flex-shrink: 0;
}
.card-toggle svg {
  width: 16px; height: 16px;
  transition: var(--transition);
  stroke: var(--text-light);
}
.card.expanded .card-toggle svg { transform: rotate(180deg); }
.card.expanded .card-toggle { background: var(--orange); }
.card.expanded .card-toggle svg { stroke: var(--white); }

.card-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.5s cubic-bezier(0.4,0,0.2,1);
}
.card.expanded .card-body { max-height: 2000px; }

.card-content { padding: 0 1.5rem 1.5rem; }

.section-label {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-light);
  margin: 1.1rem 0 0.5rem;
}
.section-label:first-child { margin-top: 0; }

.philosophy {
  font-size: 0.9rem;
  line-height: 1.7;
  color: var(--warm-gray);
  padding: 0.8rem 1rem;
  background: var(--cream);
  border-radius: var(--radius-sm);
  border-left: 3px solid var(--orange-light);
}

.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
}
.tag {
  padding: 0.35rem 0.75rem;
  border-radius: 50px;
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: var(--transition);
}
.tag:hover { transform: scale(1.05); }

.productions-list {
  list-style: none;
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
}
.productions-list li {
  font-size: 0.85rem;
  padding: 0.3rem 0.7rem;
  background: var(--cream);
  border-radius: var(--radius-sm);
  font-style: italic;
  color: var(--warm-gray);
}

.student-tips {
  font-size: 0.88rem;
  line-height: 1.7;
  color: var(--warm-gray);
}
.student-tips li {
  margin-bottom: 0.4rem;
  padding-left: 0.3rem;
}

/* Tag tooltip */
.tag-tooltip {
  display: none;
  position: fixed;
  background: var(--brown-dark);
  color: var(--white);
  padding: 0.6rem 1rem;
  border-radius: var(--radius-sm);
  font-size: 0.82rem;
  max-width: 280px;
  z-index: 999;
  line-height: 1.5;
  box-shadow: var(--shadow-lg);
  pointer-events: none;
}
.tag-tooltip.show { display: block; }

/* Compare Mode */
.compare-instructions {
  text-align: center;
  padding: 1.5rem;
  color: var(--text-light);
  font-size: 0.95rem;
}
.compare-selectors {
  display: flex;
  justify-content: center;
  gap: 1rem;
  flex-wrap: wrap;
  margin-bottom: 1.5rem;
}
.compare-select {
  padding: 0.7rem 1.2rem;
  border: 2px solid var(--cream-dark);
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 0.9rem;
  font-weight: 500;
  background: var(--white);
  color: var(--text);
  cursor: pointer;
  min-width: 200px;
}
.compare-select:focus { outline: none; border-color: var(--orange); }

.compare-table-wrap {
  overflow-x: auto;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}
.compare-table {
  width: 100%;
  border-collapse: collapse;
  background: var(--white);
  min-width: 600px;
}
.compare-table th, .compare-table td {
  padding: 1rem 1.25rem;
  text-align: left;
  border-bottom: 1px solid var(--cream-dark);
  font-size: 0.88rem;
  vertical-align: top;
}
.compare-table th {
  background: var(--cream);
  font-weight: 700;
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-light);
  width: 18%;
}
.compare-table td { width: 41%; line-height: 1.7; }
.compare-table .col-a { background: rgba(232,120,58,0.04); }
.compare-table .col-b { background: rgba(139,105,20,0.04); }
.compare-table .name-row th,
.compare-table .name-row td {
  font-size: 1.05rem;
  font-weight: 700;
  padding: 1.2rem 1.25rem;
  border-bottom: 2px solid var(--orange-light);
}
.similarity-row td {
  background: rgba(244,164,96,0.08) !important;
  font-style: italic;
  color: var(--warm-gray);
}

/* Quiz Mode */
.quiz-controls {
  display: flex;
  justify-content: center;
  gap: 0.75rem;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
}
.quiz-btn {
  padding: 0.6rem 1.3rem;
  border: 2px solid var(--cream-dark);
  background: var(--white);
  border-radius: 50px;
  font-family: inherit;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-light);
  cursor: pointer;
  transition: var(--transition);
}
.quiz-btn:hover { border-color: var(--orange-light); color: var(--orange); }
.quiz-btn.active { background: var(--orange); border-color: var(--orange); color: var(--white); }

.quiz-progress {
  text-align: center;
  margin-bottom: 1rem;
}
.progress-bar-track {
  width: 100%;
  max-width: 500px;
  height: 8px;
  background: var(--cream-dark);
  border-radius: 50px;
  margin: 0.5rem auto;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--orange), var(--orange-light));
  border-radius: 50px;
  transition: width 0.4s ease;
}
.progress-text {
  font-size: 0.82rem;
  color: var(--text-light);
  font-weight: 500;
}

.quiz-card {
  max-width: 700px;
  margin: 0 auto;
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 2rem;
}
.quiz-question {
  font-size: 1.1rem;
  font-weight: 600;
  margin-bottom: 1.5rem;
  line-height: 1.6;
}
.quiz-options { display: flex; flex-direction: column; gap: 0.6rem; }
.quiz-option {
  padding: 0.9rem 1.2rem;
  border: 2px solid var(--cream-dark);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-family: inherit;
  font-size: 0.92rem;
  text-align: left;
  background: var(--white);
  transition: var(--transition);
  display: flex;
  align-items: center;
  gap: 0.8rem;
  line-height: 1.5;
}
.quiz-option:hover:not(.disabled) {
  border-color: var(--orange-light);
  background: rgba(232,120,58,0.04);
}
.quiz-option .letter {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: var(--cream);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 0.82rem;
  flex-shrink: 0;
  color: var(--text-light);
}
.quiz-option.correct {
  border-color: #4CAF50;
  background: rgba(76,175,80,0.08);
}
.quiz-option.correct .letter { background: #4CAF50; color: #fff; }
.quiz-option.incorrect {
  border-color: #E53935;
  background: rgba(229,57,53,0.06);
}
.quiz-option.incorrect .letter { background: #E53935; color: #fff; }
.quiz-option.disabled { cursor: default; opacity: 0.7; }
.quiz-option.disabled.correct { opacity: 1; }

.quiz-feedback {
  margin-top: 1.2rem;
  padding: 1rem 1.2rem;
  border-radius: var(--radius-sm);
  font-size: 0.9rem;
  line-height: 1.6;
  display: none;
}
.quiz-feedback.show { display: block; }
.quiz-feedback.correct-fb { background: rgba(76,175,80,0.08); border-left: 3px solid #4CAF50; }
.quiz-feedback.incorrect-fb { background: rgba(229,57,53,0.06); border-left: 3px solid #E53935; }

.quiz-nav {
  display: flex;
  justify-content: center;
  margin-top: 1.5rem;
  gap: 0.75rem;
}
.quiz-nav-btn {
  padding: 0.65rem 1.5rem;
  border: none;
  border-radius: 50px;
  font-family: inherit;
  font-size: 0.88rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
}
.quiz-nav-btn.primary { background: var(--orange); color: var(--white); }
.quiz-nav-btn.primary:hover { background: var(--orange-dark); }
.quiz-nav-btn.secondary { background: var(--cream); color: var(--text); }
.quiz-nav-btn.secondary:hover { background: var(--cream-dark); }

/* Score screen */
.score-screen {
  text-align: center;
  max-width: 500px;
  margin: 0 auto;
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 2.5rem 2rem;
}
.score-circle {
  width: 140px; height: 140px;
  border-radius: 50%;
  margin: 0 auto 1.5rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 2.2rem;
  color: var(--white);
}
.score-circle .label { font-size: 0.75rem; font-weight: 600; opacity: 0.9; }
.score-msg { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem; }
.score-detail { font-size: 0.9rem; color: var(--text-light); margin-bottom: 1.5rem; }

/* Responsive */
@media (max-width: 600px) {
  .cards-grid { grid-template-columns: 1fr; }
  .compare-selectors { flex-direction: column; align-items: center; }
  .quiz-card { padding: 1.25rem; }
  .main-content { padding: 1rem; }
}
</style>
</head>
<body>

<header class="app-header">
  <h1><span class="icon">&#127917;</span> Theatre Practitioners Explorer</h1>
  <p>GCSE Drama &mdash; Interactive Study Guide</p>
</header>

<nav class="nav-bar">
  <button class="nav-btn active" onclick="switchView('explore')">Explore</button>
  <button class="nav-btn" onclick="switchView('compare')">Compare</button>
  <button class="nav-btn" onclick="switchView('quiz')">Quiz</button>
</nav>

<main class="main-content">
  <!-- EXPLORE VIEW -->
  <div id="view-explore" class="view active">
    <div class="cards-grid" id="cards-grid"></div>
  </div>

  <!-- COMPARE VIEW -->
  <div id="view-compare" class="view">
    <p class="compare-instructions">Select two practitioners to compare their approaches side by side.</p>
    <div class="compare-selectors">
      <select class="compare-select" id="compare-a" onchange="renderCompare()">
        <option value="">-- Practitioner A --</option>
      </select>
      <select class="compare-select" id="compare-b" onchange="renderCompare()">
        <option value="">-- Practitioner B --</option>
      </select>
    </div>
    <div id="compare-result"></div>
  </div>

  <!-- QUIZ VIEW -->
  <div id="view-quiz" class="view">
    <div class="quiz-controls" id="quiz-controls"></div>
    <div id="quiz-area"></div>
  </div>
</main>

<div class="tag-tooltip" id="tag-tooltip"></div>

<script>
// ── DATA ──
const practitioners = [
  {
    id: 'stanislavski',
    name: 'Konstantin Stanislavski',
    shortName: 'Stanislavski',
    dates: '1863 – 1938',
    era: 'Late 19th / Early 20th Century',
    color: '#8B6914',
    philosophy: 'Stanislavski believed that actors must fully inhabit the emotional life of their characters to create truthful performances. He developed a systematic approach to acting that emphasised emotional memory, objectives, and the \"magic if\" to achieve psychological realism. His methods formed the foundation of modern naturalistic acting and remain the most widely taught approach worldwide.',
    techniques: [
      { name: 'Emotional Memory', desc: 'Drawing on personal experiences to generate genuine emotion on stage.' },
      { name: 'The Magic If', desc: 'Asking \"What would I do if I were in this situation?\" to connect to the character.' },
      { name: 'Given Circumstances', desc: 'Analysing the who, what, where, when, and why of a scene to ground the performance.' },
      { name: 'Objectives & Super-Objective', desc: 'Identifying what the character wants in each scene and across the whole play.' },
      { name: 'Units & Actions', desc: 'Breaking a scene into smaller sections, each with a clear action verb.' },
      { name: 'Subtext', desc: 'Exploring the hidden meaning behind the lines — what the character truly thinks but does not say.' },
      { name: 'Through-line of Action', desc: 'Maintaining a continuous logical thread of motivation from start to finish.' }
    ],
    productions: ['The Seagull', 'Three Sisters', 'The Cherry Orchard', 'Uncle Vanya'],
    tips: [
      'Create a detailed character profile covering background, relationships, and motivations.',
      'Use hot-seating in rehearsal — stay in character while classmates ask questions.',
      'Identify your character\'s objective in every scene and play clear action verbs.',
      'Rehearse with "the magic if" — genuinely consider how you would react in the given circumstances.',
      'Focus on naturalistic movement and vocal delivery; avoid theatrical exaggeration.'
    ],
    compareTraits: {
      audience: 'Fourth wall maintained. Audience observes as if watching real life.',
      style: 'Naturalism / Realism',
      emotion: 'Actors feel genuine emotion; emotional truth is paramount.',
      staging: 'Realistic sets, costumes, and lighting to create a believable world.',
      purpose: 'To reveal universal human truths through believable characters.'
    }
  },
  {
    id: 'brecht',
    name: 'Bertolt Brecht',
    shortName: 'Brecht',
    dates: '1898 – 1956',
    era: '20th Century (Weimar / Post-War)',
    color: '#C45A20',
    philosophy: 'Brecht rejected emotional immersion in favour of \"Verfremdungseffekt\" (the alienation effect), aiming to keep audiences thinking critically rather than simply feeling. He believed theatre should be a vehicle for social and political change, encouraging spectators to question the world around them. His Epic Theatre used episodic structure, direct address, and visible stagecraft to remind audiences they were watching a constructed performance.',
    techniques: [
      { name: 'Verfremdungseffekt', desc: 'The alienation or distancing effect — techniques that prevent the audience from losing themselves in the story.' },
      { name: 'Direct Address', desc: 'Actors speak directly to the audience, breaking the fourth wall.' },
      { name: 'Placards & Projection', desc: 'Signs, titles, or projected text that announce scenes or convey a political message.' },
      { name: 'Multi-roling', desc: 'One actor plays several characters, preventing the audience from identifying too closely with any one role.' },
      { name: 'Gestus', desc: 'A clear physical gesture or attitude that reveals a character\'s social position and purpose.' },
      { name: 'Song & Narration', desc: 'Songs interrupt the action to comment on events, preventing emotional immersion.' },
      { name: 'Episodic Structure', desc: 'Scenes are self-contained episodes rather than a continuous plot, so audiences can reflect between them.' }
    ],
    productions: ['The Threepenny Opera', 'Mother Courage and Her Children', 'The Caucasian Chalk Circle', 'The Resistible Rise of Arturo Ui'],
    tips: [
      'Break the fourth wall — address the audience directly to deliver a message or narrate events.',
      'Use placards or projected text to introduce scenes or state themes explicitly.',
      'Play multiple roles with quick, visible costume changes to prevent emotional attachment.',
      'Adopt a clear gestus for each character — a signature physical attitude showing their social role.',
      'Incorporate songs or narration that comment on the action rather than advance the plot.'
    ],
    compareTraits: {
      audience: 'Fourth wall broken. Audience kept critically aware they are watching a performance.',
      style: 'Epic Theatre / Political Theatre',
      emotion: 'Emotion is deliberately disrupted; audience should think, not just feel.',
      staging: 'Exposed lighting rigs, minimal sets, visible scene changes. Nothing is hidden.',
      purpose: 'To provoke social and political awareness and inspire change.'
    }
  },
  {
    id: 'artaud',
    name: 'Antonin Artaud',
    shortName: 'Artaud',
    dates: '1896 – 1948',
    era: '20th Century (Surrealist era)',
    color: '#7B2D26',
    philosophy: 'Artaud envisioned a \"Theatre of Cruelty\" that would overwhelm the senses and assault the audience with primal, ritualistic spectacle. He wanted to bypass rational thought entirely and reach audiences on a visceral, almost subconscious level through sound, movement, light, and extreme imagery. For Artaud, theatre should be a transformative, almost dangerous experience — not polite entertainment.',
    techniques: [
      { name: 'Sensory Assault', desc: 'Using intense sound, light, and imagery to overwhelm the audience\'s senses.' },
      { name: 'Ritual & Ceremony', desc: 'Drawing on ancient rituals, chanting, and repetition to create a trance-like atmosphere.' },
      { name: 'Non-verbal Communication', desc: 'Prioritising screams, groans, physical gesture, and movement over scripted dialogue.' },
      { name: 'Audience in the Action', desc: 'Removing the traditional stage — surrounding the audience or performing amongst them.' },
      { name: 'Symbolic Use of Space', desc: 'Using the entire performance space, including above, below, and around the audience.' },
      { name: 'Cruelty & Shock', desc: 'Confronting the audience with disturbing or taboo subjects to provoke a genuine emotional response.' }
    ],
    productions: ['The Cenci', 'Les Cenzi (staged reading)', 'Theatre of Cruelty season at the Alfred Jarry Theatre'],
    tips: [
      'Use extreme physicality — exaggerated movement, contorted bodies, and expressive gestures.',
      'Experiment with non-verbal sound: chanting, repetitive rhythms, sudden screams, whispered text.',
      'Use lighting dramatically — harsh spotlights, strobes, or near-total darkness to unsettle the audience.',
      'Break the audience–performer barrier: perform in the round or move through the audience space.',
      'Focus on atmosphere and sensory impact rather than telling a conventional story.'
    ],
    compareTraits: {
      audience: 'No barrier. Audience surrounded by or immersed in the performance.',
      style: 'Theatre of Cruelty / Surrealist',
      emotion: 'Raw, visceral, overwhelming emotion forced upon the audience.',
      staging: 'Immersive, non-traditional spaces. Extreme lighting and sound.',
      purpose: 'To shock, transform, and awaken audiences on a primal level.'
    }
  },
  {
    id: 'berkoff',
    name: 'Steven Berkoff',
    shortName: 'Berkoff',
    dates: '1937 – present',
    era: 'Late 20th / 21st Century',
    color: '#4A5568',
    philosophy: 'Berkoff fuses heightened physicality with stylised language to create a \"Total Theatre\" that strips away realistic clutter and places the actor\'s body at the centre of the performance. His work draws on mime, exaggerated movement, and rhythmic speech to create bold, often aggressive theatrical images. Berkoff challenges comfortable, middle-class theatre, aiming for raw energy and visual poetry on a bare stage.',
    techniques: [
      { name: 'Exaggerated Physicality', desc: 'Actors use their bodies in extreme, stylised ways — slow motion, sharp angles, and abstract movement.' },
      { name: 'Mime & Gesture', desc: 'Physical storytelling through mime to create environments, objects, and journeys without props.' },
      { name: 'Choral Movement', desc: 'The ensemble moves in unison or choreographed sequences to create visual impact.' },

// ── APP STATE ──
let currentView = 'explore';
let quizState = { filter: 'all', current: 0, score: 0, answered: [], questions: [], finished: false };

// ── EXPLORE VIEW ──
function renderCards() {
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = practitioners.map(p => `
    <div class="card" id="card-${p.id}" onclick="toggleCard('${p.id}')">
      <div class="card-header">
        <div class="card-avatar" style="background:${p.color}">${p.shortName.charAt(0)}</div>
        <div class="card-header-text">
          <h3>${p.name}</h3>
          <span class="era">${p.dates} &middot; ${p.era}</span>
        </div>
        <div class="card-toggle">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div class="card-body">
        <div class="card-content">
          <div class="section-label">Core Philosophy</div>
          <div class="philosophy">${p.philosophy}</div>

          <div class="section-label">Key Techniques</div>
          <div class="tags">
            ${p.techniques.map(t => `<span class="tag" style="background:${p.color}18;color:${p.color};border:1px solid ${p.color}30" onmouseenter="showTooltip(event,'${escAttr(t.desc)}')" onmouseleave="hideTooltip()" onclick="event.stopPropagation()">${t.name}</span>`).join('')}
          </div>

          <div class="section-label">Example Productions</div>
          <ul class="productions-list">
            ${p.productions.map(pr => `<li>${pr}</li>`).join('')}
          </ul>

          <div class="section-label">Applying to Student Performances</div>
          <ul class="student-tips">
            ${p.tips.map(t => `<li>${t}</li>`).join('')}
          </ul>
        </div>
      </div>
    </div>
  `).join('');
}

function escAttr(s) { return s.replace(/'/g, '&#39;').replace(/"/g, '&quot;'); }

function toggleCard(id) {
  const card = document.getElementById('card-' + id);
  card.classList.toggle('expanded');
}

// ── TOOLTIP ──
function showTooltip(e, text) {
  const tip = document.getElementById('tag-tooltip');
  tip.innerHTML = text;
  tip.classList.add('show');
  const rect = e.target.getBoundingClientRect();
  let left = rect.left;
  let top = rect.bottom + 8;
  if (left + 280 > window.innerWidth) left = window.innerWidth - 290;
  if (top + 100 > window.innerHeight) top = rect.top - tip.offsetHeight - 8;
  tip.style.left = left + 'px';
  tip.style.top = top + 'px';
}
function hideTooltip() { document.getElementById('tag-tooltip').classList.remove('show'); }

// ── COMPARE VIEW ──
function populateCompareSelectors() {
  ['compare-a', 'compare-b'].forEach(id => {
    const sel = document.getElementById(id);
    sel.innerHTML = '<option value="">-- Select Practitioner --</option>' +
      practitioners.map(p => `<option value="${p.id}">${p.shortName}</option>`).join('');
  });
}

function renderCompare() {
  const aId = document.getElementById('compare-a').value;
  const bId = document.getElementById('compare-b').value;
  const result = document.getElementById('compare-result');

  if (!aId || !bId) { result.innerHTML = ''; return; }
  if (aId === bId) { result.innerHTML = '<p class="compare-instructions">Please select two different practitioners.</p>'; return; }

  const a = practitioners.find(p => p.id === aId);
  const b = practitioners.find(p => p.id === bId);
  const simKey = [aId, bId].sort().join('-');
  const sim = similarities[simKey] || '';

  const categories = [
    { label: 'Style', key: 'style' },
    { label: 'Audience Relationship', key: 'audience' },
    { label: 'Emotion', key: 'emotion' },
    { label: 'Staging', key: 'staging' },
    { label: 'Purpose', key: 'purpose' }
  ];

  result.innerHTML = `
    <div class="compare-table-wrap">
      <table class="compare-table">
        <tr class="name-row">
          <th>Category</th>
          <td class="col-a" style="border-top:3px solid ${a.color}">${a.shortName}</td>
          <td class="col-b" style="border-top:3px solid ${b.color}">${b.shortName}</td>
        </tr>
        <tr>
          <th>Era</th>
          <td class="col-a">${a.dates}<br><em>${a.era}</em></td>
          <td class="col-b">${b.dates}<br><em>${b.era}</em></td>
        </tr>
        ${categories.map(c => `
          <tr>
            <th>${c.label}</th>
            <td class="col-a">${a.compareTraits[c.key]}</td>
            <td class="col-b">${b.compareTraits[c.key]}</td>
          </tr>
        `).join('')}
        <tr>
          <th>Key Techniques</th>
          <td class="col-a">${a.techniques.map(t => t.name).join(', ')}</td>
          <td class="col-b">${b.techniques.map(t => t.name).join(', ')}</td>
        </tr>
        ${sim ? `
          <tr class="similarity-row">
            <th>Similarities</th>
            <td colspan="2">${sim}</td>
          </tr>
        ` : ''}
      </table>
    </div>
  `;
}

// ── QUIZ VIEW ──
function initQuiz(filter) {
  quizState.filter = filter || 'all';
  quizState.current = 0;
  quizState.score = 0;
  quizState.answered = [];
  quizState.finished = false;

  let pool = filter === 'all' ? [...quizQuestions] : quizQuestions.filter(q => q.practitioner === filter);
  // Shuffle
  for (let i = pool.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [pool[i], pool[j]] = [pool[j], pool[i]]; }
  quizState.questions = pool;
  quizState.answered = new Array(pool.length).fill(null);
  renderQuizControls();
  renderQuizQuestion();
}

function renderQuizControls() {
  const controls = document.getElementById('quiz-controls');
  const filters = [{ id: 'all', label: 'All Practitioners' }, ...practitioners.map(p => ({ id: p.id, label: p.shortName }))];
  controls.innerHTML = filters.map(f =>
    `<button class="quiz-btn${quizState.filter === f.id ? ' active' : ''}" onclick="initQuiz('${f.id}')">${f.label}</button>`
  ).join('');
}

function renderQuizQuestion() {
  const area = document.getElementById('quiz-area');
  const qs = quizState.questions;

  if (quizState.finished || qs.length === 0) {
    renderScoreScreen();
    return;
  }

  const q = qs[quizState.current];
  const answered = quizState.answered[quizState.current];
  const letters = ['A', 'B', 'C', 'D'];

  area.innerHTML = `
    <div class="quiz-progress">
      <div class="progress-text">Question ${quizState.current + 1} of ${qs.length}</div>
      <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${((quizState.current) / qs.length) * 100}%"></div></div>
    </div>
    <div class="quiz-card">
      <div class="quiz-question">${q.q}</div>
      <div class="quiz-options">
        ${q.options.map((opt, i) => {
          let cls = 'quiz-option';
          if (answered !== null) {
            cls += ' disabled';
            if (i === q.answer) cls += ' correct';
            else if (i === answered && answered !== q.answer) cls += ' incorrect';
          }
          return `<button class="${cls}" onclick="answerQuiz(${i})" ${answered !== null ? 'disabled' : ''}>
            <span class="letter">${letters[i]}</span>
            <span>${opt}</span>
          </button>`;
        }).join('')}
      </div>
      <div class="quiz-feedback${answered !== null ? ' show' : ''} ${answered !== null ? (answered === q.answer ? 'correct-fb' : 'incorrect-fb') : ''}">
        ${answered !== null ? (answered === q.answer ? '<strong>Correct!</strong> ' : '<strong>Not quite.</strong> ') + q.explanation : ''}
      </div>
      <div class="quiz-nav">
        ${quizState.current > 0 ? '<button class="quiz-nav-btn secondary" onclick="quizPrev()">Previous</button>' : ''}
        ${answered !== null ? (quizState.current < qs.length - 1 ?
          '<button class="quiz-nav-btn primary" onclick="quizNext()">Next Question</button>' :
          '<button class="quiz-nav-btn primary" onclick="quizFinish()">See Results</button>') : ''}
      </div>
    </div>
  `;
}

function answerQuiz(i) {
  if (quizState.answered[quizState.current] !== null) return;
  quizState.answered[quizState.current] = i;
  if (i === quizState.questions[quizState.current].answer) quizState.score++;
  renderQuizQuestion();
}

function quizNext() {
  if (quizState.current < quizState.questions.length - 1) {
    quizState.current++;
    renderQuizQuestion();
  }
}
function quizPrev() {
  if (quizState.current > 0) {
    quizState.current--;
    renderQuizQuestion();
  }
}
function quizFinish() {
  quizState.finished = true;
  renderScoreScreen();
}

function renderScoreScreen() {
  const area = document.getElementById('quiz-area');
  const total = quizState.questions.length;
  const score = quizState.score;
  const pct = total > 0 ? Math.round((score / total) * 100) : 0;

  let bg, msg;
  if (pct >= 80) { bg = 'linear-gradient(135deg, #4CAF50, #66BB6A)'; msg = 'Excellent work! You really know your practitioners.'; }
  else if (pct >= 60) { bg = 'linear-gradient(135deg, #FF9800, #FFB74D)'; msg = 'Good effort! Review the areas you missed and try again.'; }
  else { bg = 'linear-gradient(135deg, #E53935, #EF5350)'; msg = 'Keep studying! Use the Explore tab to revise, then retake the quiz.'; }

  area.innerHTML = `
    <div class="score-screen">
      <div class="score-circle" style="background:${bg}">
        ${pct}%
        <span class="label">${score}/${total}</span>
      </div>
      <div class="score-msg">${msg}</div>
      <div class="score-detail">You answered ${score} out of ${total} questions correctly.</div>
      <button class="quiz-nav-btn primary" onclick="initQuiz('${quizState.filter}')" style="margin-right:0.5rem">Retake Quiz</button>
      <button class="quiz-nav-btn secondary" onclick="switchView('explore')">Back to Explore</button>
    </div>
  `;
}

// ── NAVIGATION ──
function switchView(view) {
  currentView = view;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach((btn, i) => {
    btn.classList.toggle('active', ['explore', 'compare', 'quiz'][i] === view);
  });
  if (view === 'quiz' && quizState.questions.length === 0) initQuiz('all');
}

// ── INIT ──
renderCards();
populateCompareSelectors();
renderQuizControls();
</script>
