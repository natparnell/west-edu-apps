<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reason and Explain</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', sans-serif;
  background: #faf7f2;
  color: #3d2e1f;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  user-select: none;
  -webkit-user-select: none;
  overflow-x: hidden;
}
.title-bar {
  background: #e07020;
  color: #fff;
  text-align: center;
  padding: 16px 20px;
  font-size: 28px;
  font-weight: 800;
  letter-spacing: 0.5px;
  box-shadow: 0 3px 10px rgba(224,112,32,0.3);
  position: relative;
  z-index: 10;
}
.instructions {
  text-align: center;
  font-size: 18px;
  font-weight: 600;
  padding: 12px 16px;
  color: #5a4630;
  background: #fff4e8;
  border-bottom: 2px solid #f0dcc4;
}
.progress-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 10px 20px;
  background: #fff;
  border-bottom: 2px solid #f0dcc4;
}
.progress-bar span { font-weight: 700; font-size: 18px; }
.progress-dots { display: flex; gap: 8px; }
.progress-dot {
  width: 20px; height: 20px;
  border-radius: 50%;
  background: #e8ddd0;
  transition: background 0.3s;
}
.progress-dot.done { background: #4caf50; }
.progress-dot.current { background: #e07020; animation: pulse-dot 1s infinite; }
@keyframes pulse-dot { 0%,100% { transform: scale(1); } 50% { transform: scale(1.3); } }
.container { max-width: 700px; width: 100%; margin: 0 auto; padding: 16px; flex: 1; }
.score-bar {
  display: flex; justify-content: center; gap: 20px; margin-bottom: 16px; flex-wrap: wrap;
}
.score-box {
  background: #fff;
  border: 2px solid #e07020;
  border-radius: 12px;
  padding: 8px 18px;
  font-weight: 700;
  font-size: 1rem;
  color: #e07020;
}
.cat-btns { display: flex; gap: 8px; justify-content: center; margin-bottom: 16px; flex-wrap: wrap; }
.cat-btn {
  padding: 8px 14px;
  border: 3px solid #e07020;
  border-radius: 12px;
  background: #fff;
  color: #e07020;
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.2s;
}
.cat-btn.active, .cat-btn:hover { background: #e07020; color: #fff; }
.statement-card {
  background: #fff;
  border-radius: 20px;
  padding: 32px 24px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  text-align: center;
  margin-bottom: 20px;
}
.statement-text {
  font-size: 1.6rem;
  font-weight: 800;
  line-height: 1.5;
  color: #3d2e1f;
  margin-bottom: 4px;
}
.statement-category {
  font-size: 0.8rem;
  font-weight: 600;
  color: #999;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.tf-btns {
  display: flex; gap: 16px; justify-content: center; margin-bottom: 20px;
}
.tf-btn {
  flex: 1;
  max-width: 200px;
  padding: 18px 24px;
  border: 4px solid transparent;
  border-radius: 16px;
  font-family: 'Inter', sans-serif;
  font-weight: 800;
  font-size: 1.4rem;
  cursor: pointer;
  transition: all 0.2s;
  min-height: 64px;
}
.tf-btn.true-btn {
  background: #e8f5e9;
  color: #2e7d32;
  border-color: #4caf50;
}
.tf-btn.true-btn:hover { background: #c8e6c9; }
.tf-btn.true-btn.selected { background: #4caf50; color: #fff; }
.tf-btn.true-btn.correct-highlight { background: #4caf50; color: #fff; border-color: #2e7d32; }
.tf-btn.false-btn {
  background: #ffebee;
  color: #c62828;
  border-color: #ef5350;
}
.tf-btn.false-btn:hover { background: #ffcdd2; }
.tf-btn.false-btn.selected { background: #ef5350; color: #fff; }
.tf-btn.false-btn.correct-highlight { background: #ef5350; color: #fff; border-color: #c62828; }
.tf-btn:disabled { cursor: default; opacity: 0.6; }
.tf-btn:disabled:hover { background: inherit; }
.tf-feedback {
  text-align: center;
  font-size: 1.1rem;
  font-weight: 700;
  min-height: 28px;
  margin-bottom: 12px;
}
.tf-feedback.correct { color: #4caf50; }
.tf-feedback.wrong { color: #dc2626; }

.reason-area { margin-bottom: 20px; }
.reason-label {
  text-align: center;
  font-size: 1rem;
  font-weight: 700;
  color: #e07020;
  margin-bottom: 12px;
}
.reason-cards { display: flex; flex-direction: column; gap: 10px; }
.reason-card {
  background: #fff;
  border: 3px solid #e8ddd0;
  border-radius: 14px;
  padding: 16px 20px;
  font-size: 1.05rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  min-height: 52px;
  display: flex;
  align-items: center;
}
.reason-card:hover { border-color: #e07020; background: #fff4e8; }
.reason-card.selected { border-color: #e07020; background: #e07020; color: #fff; }
.reason-card.correct-card { border-color: #4caf50; background: #e8f5e9; color: #2e7d32; }
.reason-card.wrong-card { border-color: #ef5350; background: #ffebee; color: #c62828; }
.reason-card:disabled, .reason-card.disabled { pointer-events: none; }
.reason-feedback {
  text-align: center;
  font-size: 1.1rem;
  font-weight: 700;
  min-height: 28px;
  margin-top: 10px;
}
.reason-feedback.correct { color: #4caf50; }
.reason-feedback.wrong { color: #dc2626; }

.proof-panel {
  background: #fff;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  margin-bottom: 16px;
  text-align: center;
  border: 3px solid #e8ddd0;
}
.proof-title {
  font-size: 0.85rem;
  font-weight: 700;
  color: #e07020;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
}
.proof-visual {
  min-height: 60px;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.block-row {
  display: flex;
  gap: 4px;
  align-items: center;
  justify-content: center;
  margin: 4px 0;
}
.block {
  width: 28px; height: 28px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 0.7rem; color: #fff;
  animation: popBlock 0.3s ease;
}
.block.orange { background: #e07020; }
.block.green { background: #4caf50; }
.block.blue { background: #2563eb; }
.block.red { background: #ef5350; }
.block.grey { background: #bbb; }
@keyframes popBlock { from { transform: scale(0); } to { transform: scale(1); } }
.proof-text {
  font-size: 1rem;
  font-weight: 600;
  color: #5a4630;
  margin-top: 8px;
}
.number-line {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  margin: 8px auto;
  max-width: 100%;
  overflow-x: auto;
  padding: 8px 0;
}
.nl-tick {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 28px;
}
.nl-mark {
  width: 2px; height: 16px;
  background: #3d2e1f;
}
.nl-num {
  font-size: 0.7rem;
  font-weight: 700;
  margin-top: 2px;
  color: #3d2e1f;
}
.nl-num.highlight { color: #e07020; font-size: 0.85rem; }
.nl-line {
  width: 28px; height: 3px;
  background: #3d2e1f;
  margin-bottom: 14px;
}
.nl-line.hl { background: #e07020; height: 5px; }

.next-btn {
  display: block;
  margin: 0 auto;
  padding: 14px 36px;
  border: none;
  border-radius: 14px;
  background: #e07020;
  color: #fff;
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: 1.1rem;
  cursor: pointer;
  transition: all 0.2s;
  min-height: 48px;
}
.next-btn:hover { background: #c55e18; }
.celebration {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 100;
}
.confetti {
  position: absolute;
  width: 10px; height: 10px;
  border-radius: 2px;
  animation: confettiFall 1.2s ease-out forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}
.summary-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
}
.summary-card {
  background: #fff;
  border-radius: 24px;
  padding: 36px 32px;
  max-width: 420px;
  width: 90%;
  text-align: center;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  animation: popIn 0.4s ease;
}
@keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.summary-card h2 { font-size: 1.6rem; color: #e07020; margin-bottom: 8px; }
.summary-score { font-size: 3rem; font-weight: 800; color: #3d2e1f; margin: 12px 0; }
.summary-breakdown { font-size: 0.95rem; font-weight: 600; color: #5a4630; margin-bottom: 8px; }
.stars { font-size: 2.5rem; margin: 12px 0; }
.star { color: #e8ddd0; transition: color 0.3s; }
.star.filled { color: #f59e0b; }
.play-again-btn {
  padding: 14px 36px;
  border: none;
  border-radius: 14px;
  background: #e07020;
  color: #fff;
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: 1.1rem;
  cursor: pointer;
  margin-top: 16px;
  transition: all 0.2s;
}
.play-again-btn:hover { background: #c55e18; }
.hidden { display: none !important; }
@media(max-width: 500px) {
  .statement-text { font-size: 1.3rem; }
  .tf-btn { font-size: 1.2rem; padding: 14px 16px; }
  .reason-card { font-size: 0.95rem; padding: 12px 14px; }
}
</style>
</head>
<body>
<div class="title-bar">Reason and Explain</div>
<div class="instructions">Is the statement true or false? Then pick the best reason why!</div>
<div class="progress-bar">
  <span>Question <span id="qNum">1</span>/10</span>
  <div class="progress-dots" id="dots"></div>
  <span style="margin-left:12px;">Score: <span id="scoreDisplay">0</span>/20</span>
</div>

<div class="container" id="gameArea">
  <div class="cat-btns" id="catBtns">
    <button class="cat-btn active" data-cat="all" onclick="setCat('all')">All</button>
    <button class="cat-btn" data-cat="place" onclick="setCat('place')">Place Value</button>
    <button class="cat-btn" data-cat="calc" onclick="setCat('calc')">Calculations</button>
    <button class="cat-btn" data-cat="prop" onclick="setCat('prop')">Properties</button>
    <button class="cat-btn" data-cat="comm" onclick="setCat('comm')">Commutativity</button>
  </div>

  <div class="statement-card" id="statementCard">
    <div class="statement-category" id="statCat"></div>
    <div class="statement-text" id="statText"></div>
  </div>

  <div class="tf-btns" id="tfBtns">
    <button class="tf-btn true-btn" id="trueBtn" onclick="answerTF(true)">True</button>
    <button class="tf-btn false-btn" id="falseBtn" onclick="answerTF(false)">False</button>
  </div>
  <div class="tf-feedback" id="tfFeedback"></div>

  <div class="reason-area hidden" id="reasonArea">
    <div class="reason-label">Now pick the best reason why:</div>
    <div class="reason-cards" id="reasonCards"></div>
    <div class="reason-feedback" id="reasonFeedback"></div>
  </div>

  <div class="proof-panel hidden" id="proofPanel">
    <div class="proof-title">Visual Proof</div>
    <div class="proof-visual" id="proofVisual"></div>
    <div class="proof-text" id="proofText"></div>
  </div>

  <button class="next-btn hidden" id="nextBtn" onclick="nextQuestion()">Next Question</button>
</div>

<div class="summary-overlay hidden" id="summaryOverlay">
  <div class="summary-card">
    <h2>Round Complete!</h2>
    <div class="summary-score"><span id="finalScore">0</span> / 20</div>
    <div class="summary-breakdown" id="summaryBreakdown"></div>
    <div class="stars" id="starsEl"></div>
    <div id="summaryMsg" style="font-weight:600;margin-top:8px;"></div>
    <button class="play-again-btn" onclick="startRound()">Play Again</button>
  </div>
</div>

<script>
const STATEMENTS = [
  // Place value (8)
  { cat:'place', text:'52 has 5 tens and 2 ones', answer:true,
    correctReason:'Because 5 in the tens column means 50, and 2 in the ones column means 2',
    wrongReasons:['Because 52 is bigger than 25','Because 5 plus 2 equals 7'],
    proof:{ type:'blocks', desc:'5 tens rods and 2 ones cubes make 52', tens:5, ones:2 }},
  { cat:'place', text:'The 3 in 31 is worth 3', answer:false,
    correctReason:'Because the 3 is in the tens column, so it is worth 30',
    wrongReasons:['Because 31 is an odd number','Because 3 is less than 10'],
    proof:{ type:'blocks', desc:'The 3 in 31 means 3 tens, which is 30', tens:3, ones:1 }},
  { cat:'place', text:'67 is made of 60 and 7', answer:true,
    correctReason:'Because 6 tens is 60, and 7 ones is 7, and 60 + 7 = 67',
    wrongReasons:['Because 67 is an odd number','Because 6 + 7 = 13'],
    proof:{ type:'blocks', desc:'6 tens (60) plus 7 ones (7) equals 67', tens:6, ones:7 }},
  { cat:'place', text:'In the number 48, the 8 is worth 80', answer:false,
    correctReason:'Because 8 is in the ones column, so it is worth 8, not 80',
    wrongReasons:['Because 48 is less than 80','Because 8 is an even number'],
    proof:{ type:'blocks', desc:'The 8 in 48 is in the ones column and is worth 8', tens:4, ones:8 }},
  { cat:'place', text:'73 is greater than 37', answer:true,
    correctReason:'Because 73 has 7 tens (70) but 37 only has 3 tens (30)',
    wrongReasons:['Because 7 is bigger than 3','Because both have 3 and 7 in them'],
    proof:{ type:'compare', desc:'73 = 7 tens + 3 ones, 37 = 3 tens + 7 ones. 7 tens is more.', a:73, b:37 }},
  { cat:'place', text:'15 is bigger than 51', answer:false,
    correctReason:'Because 51 has 5 tens (50) and 15 only has 1 ten (10)',
    wrongReasons:['Because 5 comes before 1','Because they have the same digits'],
    proof:{ type:'compare', desc:'15 = 1 ten + 5 ones (15). 51 = 5 tens + 1 one (51). 51 is bigger.', a:15, b:51 }},
  { cat:'place', text:'90 has 9 tens and 0 ones', answer:true,
    correctReason:'Because the 9 is in the tens place making 90, and there are no ones',
    wrongReasons:['Because 90 is close to 100','Because 9 times 0 is 0'],
    proof:{ type:'blocks', desc:'9 tens rods and no ones cubes make 90', tens:9, ones:0 }},
  { cat:'place', text:'In 84, the 4 is worth more than the 8', answer:false,
    correctReason:'Because the 8 is worth 80 (8 tens) but the 4 is only worth 4 (4 ones)',
    wrongReasons:['Because 84 is an even number','Because 4 is half of 8'],
    proof:{ type:'blocks', desc:'8 in the tens column = 80. 4 in the ones column = 4. 80 is much more.', tens:8, ones:4 }},

  // Calculation facts (8)
  { cat:'calc', text:'Double 6 is 12', answer:true,
    correctReason:'Because 6 + 6 = 12',
    wrongReasons:['Because 6 is an even number','Because 12 comes after 6'],
    proof:{ type:'addition', desc:'6 + 6 = 12', a:6, b:6 }},
  { cat:'calc', text:'10 - 7 = 4', answer:false,
    correctReason:'Because 10 - 7 = 3, not 4',
    wrongReasons:['Because 7 is odd and 4 is even','Because 10 is a big number'],
    proof:{ type:'subtraction', desc:'Start at 10, take away 7: you have 3 left', a:10, b:7 }},
  { cat:'calc', text:'Half of 16 is 8', answer:true,
    correctReason:'Because 8 + 8 = 16, so half of 16 is 8',
    wrongReasons:['Because 16 is an even number','Because 8 is less than 16'],
    proof:{ type:'addition', desc:'8 + 8 = 16, so half of 16 is 8', a:8, b:8 }},
  { cat:'calc', text:'15 + 5 = 25', answer:false,
    correctReason:'Because 15 + 5 = 20, not 25',
    wrongReasons:['Because 25 is too big','Because 5 is an odd number'],
    proof:{ type:'numberline', desc:'Count on 5 from 15: 16, 17, 18, 19, 20', start:15, jump:5 }},
  { cat:'calc', text:'20 - 8 = 12', answer:true,
    correctReason:'Because if you take 8 away from 20 you are left with 12',
    wrongReasons:['Because 20 is a round number','Because 8 + 2 = 10'],
    proof:{ type:'subtraction', desc:'Start at 20, take away 8: you have 12 left', a:20, b:8 }},
  { cat:'calc', text:'Double 9 is 19', answer:false,
    correctReason:'Because 9 + 9 = 18, not 19',
    wrongReasons:['Because 19 is odd','Because 9 is a single digit'],
    proof:{ type:'addition', desc:'9 + 9 = 18, so double 9 is 18', a:9, b:9 }},
  { cat:'calc', text:'50 + 30 = 80', answer:true,
    correctReason:'Because 5 tens plus 3 tens equals 8 tens, which is 80',
    wrongReasons:['Because 50 and 30 are both round numbers','Because 80 is even'],
    proof:{ type:'blocks', desc:'5 tens + 3 tens = 8 tens = 80', tens:8, ones:0 }},
  { cat:'calc', text:'100 - 40 = 50', answer:false,
    correctReason:'Because 100 - 40 = 60, not 50',
    wrongReasons:['Because 100 is a round number','Because 40 is less than 50'],
    proof:{ type:'numberline', desc:'100 take away 40 is 60', start:60, jump:40 }},

  // Properties (8)
  { cat:'prop', text:'All squares are rectangles', answer:true,
    correctReason:'Because a square has 4 right angles and 4 sides, which is what rectangles have too',
    wrongReasons:['Because squares and rectangles look the same','Because both have straight lines'],
    proof:{ type:'text', desc:'A rectangle has 4 sides and 4 right angles. A square also has 4 sides and 4 right angles, so every square is a rectangle.' }},
  { cat:'prop', text:'7 is an even number', answer:false,
    correctReason:'Because 7 cannot be split into 2 equal groups, so it is odd',
    wrongReasons:['Because 7 is a big number','Because 7 comes after 6'],
    proof:{ type:'parity', desc:'7 dots: 3 pairs and 1 left over, so 7 is odd', n:7 }},
  { cat:'prop', text:'All numbers ending in 0 are even', answer:true,
    correctReason:'Because numbers ending in 0 can always be split into 2 equal groups',
    wrongReasons:['Because 0 means nothing','Because 10 is the first two-digit number'],
    proof:{ type:'text', desc:'10, 20, 30, 40... all divide into 2 equal groups. Any number ending in 0 is even.' }},
  { cat:'prop', text:'All numbers ending in 2 are even', answer:true,
    correctReason:'Because any number ending in 2 can be split into 2 equal groups',
    wrongReasons:['Because 2 is a small number','Because 2 comes after 1'],
    proof:{ type:'parity', desc:'12: 6 pairs. 22: 11 pairs. Numbers ending in 2 are always even.', n:12 }},
  { cat:'prop', text:'A triangle has 4 sides', answer:false,
    correctReason:'Because "tri" means 3, so a triangle always has exactly 3 sides',
    wrongReasons:['Because triangles are small shapes','Because 4 is more than 3'],
    proof:{ type:'text', desc:'A triangle has exactly 3 sides and 3 corners. A shape with 4 sides is a quadrilateral.' }},
  { cat:'prop', text:'25 is an odd number', answer:true,
    correctReason:'Because 25 ends in 5, and all numbers ending in 5 are odd',
    wrongReasons:['Because 25 is quite big','Because 2 + 5 = 7'],
    proof:{ type:'parity', desc:'25 dots: 12 pairs and 1 left over, so 25 is odd', n:25 }},
  { cat:'prop', text:'A circle has 1 side', answer:false,
    correctReason:'Because a circle has no straight sides; it has a curved edge',
    wrongReasons:['Because circles are round','Because 1 is an odd number'],
    proof:{ type:'text', desc:'A circle has 0 straight sides. It has one continuous curved edge, but we count straight sides in geometry.' }},
  { cat:'prop', text:'14 is an even number', answer:true,
    correctReason:'Because 14 ends in 4, and numbers ending in 0, 2, 4, 6, or 8 are even',
    wrongReasons:['Because 14 is a two-digit number','Because 1 + 4 = 5'],
    proof:{ type:'parity', desc:'14 dots: 7 pairs exactly, so 14 is even', n:14 }},

  // Commutativity (8)
  { cat:'comm', text:'3 + 4 = 4 + 3', answer:true,
    correctReason:'Because both sides equal 7; you can add numbers in any order',
    wrongReasons:['Because 3 is smaller than 4','Because they are both odd numbers'],
    proof:{ type:'commAdd', desc:'3 + 4 = 7 and 4 + 3 = 7. Swapping the order does not change the total.', a:3, b:4 }},
  { cat:'comm', text:'5 + 3 = 3 + 5', answer:true,
    correctReason:'Because addition works in any order, and both equal 8',
    wrongReasons:['Because 5 is bigger than 3','Because 5 and 3 are odd'],
    proof:{ type:'commAdd', desc:'5 + 3 = 8 and 3 + 5 = 8. The order does not matter for addition.', a:5, b:3 }},
  { cat:'comm', text:'8 - 3 = 3 - 8', answer:false,
    correctReason:'Because subtraction does not work in any order; 8 - 3 = 5 but 3 - 8 is not possible with whole numbers',
    wrongReasons:['Because 8 is even and 3 is odd','Because 3 is too small'],
    proof:{ type:'commSub', desc:'8 - 3 = 5, but you cannot take 8 away from 3 (you would need negative numbers).', a:8, b:3 }},
  { cat:'comm', text:'7 + 2 = 2 + 7', answer:true,
    correctReason:'Because you can add in any order and both sides equal 9',
    wrongReasons:['Because 7 is bigger than 2','Because 9 is an odd number'],
    proof:{ type:'commAdd', desc:'7 + 2 = 9 and 2 + 7 = 9. Addition is commutative.', a:7, b:2 }},
  { cat:'comm', text:'10 - 6 = 6 - 10', answer:false,
    correctReason:'Because subtraction cannot be swapped around; 10 - 6 = 4 but 6 - 10 is not possible here',
    wrongReasons:['Because 10 is a round number','Because 6 is even'],
    proof:{ type:'commSub', desc:'10 - 6 = 4, but you cannot take 10 from 6 with the numbers KS1 children use.', a:10, b:6 }},
  { cat:'comm', text:'6 + 4 = 4 + 6', answer:true,
    correctReason:'Because both equal 10; addition can be done in any order',
    wrongReasons:['Because 6 and 4 are even','Because 10 is a round number'],
    proof:{ type:'commAdd', desc:'6 + 4 = 10 and 4 + 6 = 10. Order does not matter.', a:6, b:4 }},
  { cat:'comm', text:'9 + 1 = 1 + 9', answer:true,
    correctReason:'Because both sides make 10; you can swap the numbers when adding',
    wrongReasons:['Because 1 is the smallest number','Because 9 is close to 10'],
    proof:{ type:'commAdd', desc:'9 + 1 = 10 and 1 + 9 = 10. Addition works both ways.', a:9, b:1 }},
  { cat:'comm', text:'12 - 5 = 5 - 12', answer:false,
    correctReason:'Because you cannot swap numbers in subtraction; 12 - 5 = 7 but 5 - 12 does not work with counting numbers',
    wrongReasons:['Because 12 has two digits','Because 5 is odd'],
    proof:{ type:'commSub', desc:'12 - 5 = 7, but you cannot take 12 away from 5.', a:12, b:5 }}
];

function shuffle(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

let category='all', qIndex=0, score=0, tfPoints=0, reasonPoints=0;
let questions=[], current=null, tfAnswered=false, reasonAnswered=false;
const TOTAL=10;

function setCat(cat) {
  category = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat===cat));
  startRound();
}

function buildDots() {
  const d = document.getElementById('dots');
  d.innerHTML = '';
  for(let i=0;i<TOTAL;i++) {
    const dot = document.createElement('div');
    dot.className = 'progress-dot';
    d.appendChild(dot);
  }
}

function updateDots() {
  document.querySelectorAll('.progress-dot').forEach((d,i) => {
    d.className = 'progress-dot';
    if(i < qIndex) d.classList.add('done');
    else if(i === qIndex) d.classList.add('current');
  });
  document.getElementById('qNum').textContent = Math.min(qIndex+1, TOTAL);
  document.getElementById('scoreDisplay').textContent = score;
}

function startRound() {
  document.getElementById('summaryOverlay').classList.add('hidden');
  score = 0; tfPoints = 0; reasonPoints = 0; qIndex = 0;
  const pool = category==='all' ? STATEMENTS : STATEMENTS.filter(s=>s.cat===category);
  const indices = shuffle([...Array(pool.length).keys()]).slice(0, TOTAL);
  questions = indices.map(i => pool[i]);
  buildDots();
  loadQuestion();
}

function loadQuestion() {
  if(qIndex >= TOTAL) { showSummary(); return; }
  updateDots();
  tfAnswered = false;
  reasonAnswered = false;
  current = questions[qIndex];

  const catLabels = { place:'Place Value', calc:'Calculation Facts', prop:'Properties', comm:'Commutativity' };
  document.getElementById('statCat').textContent = catLabels[current.cat] || '';
  document.getElementById('statText').textContent = current.text;

  // Reset buttons
  const tb = document.getElementById('trueBtn');
  const fb = document.getElementById('falseBtn');
  tb.disabled = false; fb.disabled = false;
  tb.className = 'tf-btn true-btn';
  fb.className = 'tf-btn false-btn';
  document.getElementById('tfFeedback').textContent = '';
  document.getElementById('tfFeedback').className = 'tf-feedback';

  document.getElementById('reasonArea').classList.add('hidden');
  document.getElementById('proofPanel').classList.add('hidden');
  document.getElementById('nextBtn').classList.add('hidden');
  document.getElementById('reasonFeedback').textContent = '';

  document.getElementById('catBtns').style.display = qIndex===0?'flex':'none';
}

function answerTF(ans) {
  if(tfAnswered) return;
  tfAnswered = true;

  const tb = document.getElementById('trueBtn');
  const fb = document.getElementById('falseBtn');
  tb.disabled = true; fb.disabled = true;

  const correct = ans === current.answer;
  if(ans) tb.classList.add('selected'); else fb.classList.add('selected');

  const tfFb = document.getElementById('tfFeedback');
  if(correct) {
    tfFb.textContent = 'Correct! That statement is ' + (current.answer?'TRUE':'FALSE') + '.';
    tfFb.className = 'tf-feedback correct';
    score++; tfPoints++;
    // Highlight the correct button
    if(current.answer) tb.classList.add('correct-highlight'); else fb.classList.add('correct-highlight');
    // Show reason cards
    setTimeout(() => showReasons(), 500);
  } else {
    tfFb.textContent = 'Not quite. The answer is ' + (current.answer?'TRUE':'FALSE') + '.';
    tfFb.className = 'tf-feedback wrong';
    if(current.answer) tb.classList.add('correct-highlight'); else fb.classList.add('correct-highlight');
    // Show proof and skip reason for wrong TF answer
    setTimeout(() => {
      showProof();
      document.getElementById('nextBtn').classList.remove('hidden');
    }, 600);
  }
  updateDots();
}

function showReasons() {
  const area = document.getElementById('reasonArea');
  area.classList.remove('hidden');
  const container = document.getElementById('reasonCards');
  container.innerHTML = '';

  const reasons = shuffle([
    { text: current.correctReason, correct: true },
    { text: current.wrongReasons[0], correct: false },
    { text: current.wrongReasons[1], correct: false }
  ]);

  reasons.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'reason-card';
    card.textContent = r.text;
    card.onclick = () => pickReason(card, r.correct, container);
    container.appendChild(card);
  });
}

function pickReason(card, isCorrect, container) {
  if(reasonAnswered) return;
  reasonAnswered = true;

  container.querySelectorAll('.reason-card').forEach(c => c.classList.add('disabled'));

  const rfb = document.getElementById('reasonFeedback');

  if(isCorrect) {
    card.classList.add('correct-card');
    rfb.textContent = 'Excellent reasoning! +1 bonus point!';
    rfb.className = 'reason-feedback correct';
    score++; reasonPoints++;
    celebrate();
  } else {
    card.classList.add('wrong-card');
    // Highlight correct
    container.querySelectorAll('.reason-card').forEach(c => {
      if(!c.classList.contains('wrong-card')) {
        // Check if it's the correct one
        if(c.textContent === current.correctReason) c.classList.add('correct-card');
      }
    });
    rfb.textContent = 'Not quite. The green one shows the best reason.';
    rfb.className = 'reason-feedback wrong';
  }
  updateDots();

  setTimeout(() => {
    showProof();
    document.getElementById('nextBtn').classList.remove('hidden');
  }, 500);
}

function showProof() {
  const panel = document.getElementById('proofPanel');
  panel.classList.remove('hidden');
  const visual = document.getElementById('proofVisual');
  const text = document.getElementById('proofText');
  visual.innerHTML = '';
  text.textContent = current.proof.desc;

  const p = current.proof;

  if(p.type === 'blocks') {
    // Show tens and ones blocks
    let html = '<div style="display:flex;flex-direction:column;gap:6px;align-items:center;">';
    if(p.tens > 0) {
      html += '<div class="block-row">';
      for(let i=0;i<p.tens;i++) html += `<div class="block orange" style="width:48px;animation-delay:${i*0.1}s">10</div>`;
      html += '</div>';
    }
    if(p.ones > 0) {
      html += '<div class="block-row">';
      for(let i=0;i<p.ones;i++) html += `<div class="block blue" style="animation-delay:${(p.tens+i)*0.1}s">${1}</div>`;
      html += '</div>';
    }
    html += `<div style="font-weight:800;font-size:1.3rem;color:#e07020;margin-top:4px;">${p.tens*10+p.ones}</div>`;
    html += '</div>';
    visual.innerHTML = html;
  } else if(p.type === 'compare') {
    let html = '<div style="display:flex;gap:30px;align-items:center;">';
    html += `<div style="text-align:center;"><div style="font-size:2rem;font-weight:800;color:#e07020;">${p.a}</div><div class="block-row" style="margin-top:4px;">`;
    const aTens = Math.floor(p.a/10), aOnes = p.a%10;
    for(let i=0;i<aTens;i++) html += '<div class="block orange">10</div>';
    for(let i=0;i<aOnes;i++) html += '<div class="block blue">1</div>';
    html += '</div></div>';
    html += `<div style="font-size:2rem;font-weight:800;">${p.a > p.b ? '>' : '<'}</div>`;
    html += `<div style="text-align:center;"><div style="font-size:2rem;font-weight:800;color:#e07020;">${p.b}</div><div class="block-row" style="margin-top:4px;">`;
    const bTens = Math.floor(p.b/10), bOnes = p.b%10;
    for(let i=0;i<bTens;i++) html += '<div class="block orange">10</div>';
    for(let i=0;i<bOnes;i++) html += '<div class="block blue">1</div>';
    html += '</div></div></div>';
    visual.innerHTML = html;
  } else if(p.type === 'addition') {
    let html = '<div class="block-row">';
    for(let i=0;i<p.a;i++) html += `<div class="block orange" style="animation-delay:${i*0.08}s">${i+1}</div>`;
    html += '<div style="font-size:1.5rem;font-weight:800;margin:0 6px;">+</div>';
    for(let i=0;i<p.b;i++) html += `<div class="block green" style="animation-delay:${(p.a+i)*0.08}s">${i+1}</div>`;
    html += `<div style="font-size:1.5rem;font-weight:800;margin:0 6px;">= ${p.a+p.b}</div>`;
    html += '</div>';
    visual.innerHTML = html;
  } else if(p.type === 'subtraction') {
    let html = '<div class="block-row" style="flex-wrap:wrap;">';
    for(let i=0;i<p.a;i++) {
      const removed = i >= (p.a - p.b);
      html += `<div class="block ${removed?'grey':'orange'}" style="animation-delay:${i*0.06}s;${removed?'opacity:0.35;text-decoration:line-through;':''}">${i+1}</div>`;
    }
    html += `<div style="font-size:1.2rem;font-weight:800;margin:0 8px;width:100%;text-align:center;margin-top:6px;">${p.a} - ${p.b} = ${p.a-p.b}</div>`;
    html += '</div>';
    visual.innerHTML = html;
  } else if(p.type === 'numberline') {
    const s = p.start, j = p.jump;
    const end = s + j;
    const lo = Math.max(0, s - 2), hi = end + 2;
    let html = '<div class="number-line">';
    for(let n=lo;n<=hi;n++) {
      const isHL = n >= s && n <= end;
      html += `<div class="nl-tick"><div class="nl-mark" style="${isHL?'background:#e07020;height:20px;':''}"></div>`;
      html += `<div class="nl-num ${isHL?'highlight':''}">${n}</div></div>`;
      if(n<hi) html += `<div class="nl-line ${isHL && n>=s && n<end?'hl':''}"></div>`;
    }
    html += '</div>';
    visual.innerHTML = html;
  } else if(p.type === 'parity') {
    const n = Math.min(p.n, 30);
    const pairs = Math.floor(n/2);
    const leftover = n%2;
    let html = '<div style="display:flex;flex-direction:column;gap:4px;align-items:center;">';
    for(let i=0;i<pairs;i++) {
      html += `<div class="block-row"><div class="block orange" style="animation-delay:${i*0.06}s"></div><div class="block green" style="animation-delay:${i*0.06+0.03}s"></div></div>`;
    }
    if(leftover) html += `<div class="block-row"><div class="block red" style="animation-delay:${pairs*0.06}s">!</div></div>`;
    html += `<div style="font-weight:700;margin-top:4px;">${pairs} pair${pairs!==1?'s':''} ${leftover?'and 1 left over = ODD':'exactly = EVEN'}</div>`;
    html += '</div>';
    visual.innerHTML = html;
  } else if(p.type === 'commAdd') {
    let html = '<div style="display:flex;flex-direction:column;gap:8px;align-items:center;">';
    html += '<div class="block-row">';
    for(let i=0;i<p.a;i++) html += `<div class="block orange" style="animation-delay:${i*0.06}s"></div>`;
    html += '<div style="font-weight:800;margin:0 4px;">+</div>';
    for(let i=0;i<p.b;i++) html += `<div class="block green" style="animation-delay:${(p.a+i)*0.06}s"></div>`;
    html += `<div style="font-weight:800;margin:0 4px;">= ${p.a+p.b}</div></div>`;
    html += '<div class="block-row">';
    for(let i=0;i<p.b;i++) html += `<div class="block green" style="animation-delay:${i*0.06}s"></div>`;
    html += '<div style="font-weight:800;margin:0 4px;">+</div>';
    for(let i=0;i<p.a;i++) html += `<div class="block orange" style="animation-delay:${(p.b+i)*0.06}s"></div>`;
    html += `<div style="font-weight:800;margin:0 4px;">= ${p.a+p.b}</div></div>`;
    html += '<div style="font-weight:700;margin-top:4px;">Same total both ways!</div>';
    html += '</div>';
    visual.innerHTML = html;
  } else if(p.type === 'commSub') {
    let html = '<div style="display:flex;flex-direction:column;gap:8px;align-items:center;">';
    html += `<div style="font-weight:700;">${p.a} - ${p.b} = ${p.a-p.b} &#10004;</div>`;
    html += '<div class="block-row">';
    for(let i=0;i<p.a;i++) {
      const gone = i >= (p.a-p.b);
      html += `<div class="block ${gone?'grey':'orange'}" style="animation-delay:${i*0.05}s;${gone?'opacity:0.35;':''}"></div>`;
    }
    html += '</div>';
    html += `<div style="font-weight:700;color:#dc2626;margin-top:4px;">${p.b} - ${p.a} = ? &#10008; Not possible!</div>`;
    html += '<div class="block-row">';
    for(let i=0;i<p.b;i++) html += `<div class="block green" style="animation-delay:${i*0.05}s"></div>`;
    html += `<div style="font-weight:700;color:#dc2626;margin:0 6px;">Cannot take ${p.a} from ${p.b}</div>`;
    html += '</div></div>';
    visual.innerHTML = html;
  } else {
    // text only
    visual.innerHTML = '';
  }
}

function nextQuestion() {
  qIndex++;
  loadQuestion();
}

function celebrate() {
  const overlay = document.createElement('div');
  overlay.className = 'celebration';
  document.body.appendChild(overlay);
  const colors = ['#e07020','#4caf50','#2563eb','#f59e0b','#e91e63'];
  for(let i=0;i<30;i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random()*100+'%';
    c.style.top = '-10px';
    c.style.background = colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDelay = Math.random()*0.5+'s';
    c.style.width = (6+Math.random()*8)+'px';
    c.style.height = (6+Math.random()*8)+'px';
    overlay.appendChild(c);
  }
  setTimeout(() => overlay.remove(), 1500);
}

function showSummary() {
  updateDots();
  const pct = score/20;
  const starCount = pct>=0.85?3:pct>=0.6?2:pct>=0.3?1:0;
  const msg = starCount===3?'Brilliant reasoning!':starCount===2?'Great thinking!':starCount===1?'Good effort!':'Keep practising!';

  document.getElementById('finalScore').textContent = score;
  document.getElementById('summaryBreakdown').textContent = `True/False: ${tfPoints}/10  |  Reasons: ${reasonPoints}/10`;
  document.getElementById('summaryMsg').textContent = msg;
  document.getElementById('starsEl').innerHTML = [1,2,3].map(i=>`<span class="star ${i<=starCount?'filled':''}">\u2605</span>`).join('');
  document.getElementById('summaryOverlay').classList.remove('hidden');
}

startRound();
</script>
