<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clock Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#faf7f2;color:#3d2e1f;min-height:100vh;display:flex;flex-direction:column;align-items:center}
.title-bar{width:100%;background:#2563eb;color:#fff;text-align:center;padding:16px;font-size:1.6rem;font-weight:800;letter-spacing:1px;box-shadow:0 2px 8px rgba(37,99,235,.3)}
.subtitle{font-size:.85rem;font-weight:400;opacity:.85;margin-top:4px}
.container{max-width:800px;width:100%;padding:20px}
.top-bar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:16px}
.score-box{background:#fff;border:2px solid #2563eb;border-radius:12px;padding:8px 18px;font-weight:700;font-size:1rem;color:#2563eb}
.level-btns{display:flex;gap:6px;flex-wrap:wrap}
.level-btn{padding:6px 12px;border:2px solid #2563eb;border-radius:8px;background:#fff;color:#2563eb;font-family:'Inter',sans-serif;font-weight:600;font-size:.85rem;cursor:pointer;transition:all .2s}
.level-btn.active,.level-btn:hover{background:#2563eb;color:#fff}
.instructions{background:#fff;border-radius:12px;padding:14px 20px;margin-bottom:20px;font-size:1.1rem;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06);font-weight:600;min-height:52px;display:flex;align-items:center;justify-content:center}
.clock-area{display:flex;gap:30px;justify-content:center;align-items:center;flex-wrap:wrap;margin-bottom:20px}
.clock-container{position:relative;width:320px;height:320px}
svg.clock{width:100%;height:100%;filter:drop-shadow(0 4px 12px rgba(0,0,0,.1))}
.clock-face{fill:#fff;stroke:#3d2e1f;stroke-width:3}
.clock-number{font-family:'Inter',sans-serif;font-weight:700;font-size:22px;fill:#3d2e1f;text-anchor:middle;dominant-baseline:central;user-select:none}
.tick-major{stroke:#3d2e1f;stroke-width:2.5}
.tick-minor{stroke:#cbd5e1;stroke-width:1.2}
.hand-hour{stroke:#3d2e1f;stroke-width:7;stroke-linecap:round;cursor:pointer;transition:filter .15s}
.hand-hour:hover{filter:drop-shadow(0 0 6px rgba(61,46,31,.4))}
.hand-minute{stroke:#2563eb;stroke-width:5;stroke-linecap:round;cursor:pointer;transition:filter .15s}
.hand-minute:hover{filter:drop-shadow(0 0 6px rgba(37,99,235,.5))}
.hand-cap{fill:#3d2e1f}
.highlight-arc{fill:rgba(37,99,235,.08);stroke:none}
.digital-display{background:#1e293b;color:#5eead4;border-radius:16px;padding:20px 30px;font-size:3rem;font-weight:800;font-family:'Inter',monospace;letter-spacing:4px;box-shadow:0 4px 16px rgba(0,0,0,.15);text-align:center;min-width:180px}
.digital-label{font-size:.75rem;color:#94a3b8;font-weight:600;letter-spacing:2px;margin-bottom:6px}
.btn-row{text-align:center;margin-bottom:12px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.check-btn,.new-btn{font-family:'Inter',sans-serif;padding:10px 24px;border:none;border-radius:10px;font-weight:700;font-size:1rem;cursor:pointer;transition:all .2s}
.check-btn{background:#2563eb;color:#fff}
.check-btn:hover{background:#1d4ed8}
.new-btn{background:#f59e0b;color:#fff}
.new-btn:hover{background:#d97706}
.feedback{text-align:center;font-size:1.2rem;font-weight:700;min-height:32px;transition:opacity .3s}
.feedback.correct{color:#16a34a}
.feedback.wrong{color:#dc2626}
.time-words{background:#fff;border-radius:12px;padding:12px;text-align:center;font-size:1.1rem;font-weight:600;color:#2563eb;box-shadow:0 1px 4px rgba(0,0,0,.06);min-width:180px}
@media(max-width:640px){.clock-container{width:260px;height:260px}.digital-display{font-size:2.2rem;padding:14px 20px}.clock-number{font-size:18px}}
</style>
</head>
<body>
<div class="title-bar">Clock Explorer<div class="subtitle">Learn to Tell the Time</div></div>
<div class="container">
  <div class="top-bar">
    <div class="score-box">Score: <span id="score">0</span> / <span id="total">0</span></div>
    <div class="level-btns">
      <button class="level-btn" data-level="0" onclick="setLevel(0)">Free Play</button>
      <button class="level-btn active" data-level="1" onclick="setLevel(1)">O'clock</button>
      <button class="level-btn" data-level="2" onclick="setLevel(2)">Half past</button>
      <button class="level-btn" data-level="3" onclick="setLevel(3)">Quarter</button>
      <button class="level-btn" data-level="4" onclick="setLevel(4)">5 minutes</button>
    </div>
  </div>
  <div class="instructions" id="instructions">Set the clock to the time shown!</div>
  <div class="clock-area">
    <div class="clock-container">
      <svg class="clock" viewBox="0 0 320 320" id="clockSvg">
        <circle class="clock-face" cx="160" cy="160" r="150"/>
        <path class="highlight-arc" id="highlightArc" d=""/>
        <!-- ticks -->
        <g id="ticks"></g>
        <!-- numbers -->
        <g id="numbers"></g>
        <!-- hands -->
        <line class="hand-hour" id="hourHand" x1="160" y1="160" x2="160" y2="85"/>
        <line class="hand-minute" id="minuteHand" x1="160" y1="160" x2="160" y2="50"/>
        <!-- invisible overlay to capture all drag events -->
        <circle id="dragZone" cx="160" cy="160" r="150" fill="transparent" style="cursor:pointer"/>
        <circle class="hand-cap" cx="160" cy="160" r="8"/>
      </svg>
    </div>
    <div style="display:flex;flex-direction:column;gap:16px;align-items:center">
      <div class="digital-display"><div class="digital-label">DIGITAL TIME</div><span id="digitalTime">12:00</span></div>
      <div class="time-words" id="timeWords">Twelve o'clock</div>
    </div>
  </div>
  <div class="btn-row">
    <button class="check-btn" onclick="checkTime()">Check!</button>
    <button class="new-btn" onclick="newQuestion()">New Question</button>
  </div>
  <div class="feedback" id="feedback"></div>
</div>

<script>
const cx=160,cy=160,R=150;
let level=1,score=0,totalQ=0,targetH=12,targetM=0;
let currentH=12,currentM=0;
let dragging=null;

// build ticks & numbers
(function(){
  const tg=document.getElementById('ticks'),ng=document.getElementById('numbers');
  for(let i=0;i<60;i++){
    const a=(i*6-90)*Math.PI/180;
    const isMajor=i%5===0;
    const r1=R-(isMajor?18:10),r2=R-4;
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',cx+r1*Math.cos(a));
    line.setAttribute('y1',cy+r1*Math.sin(a));
    line.setAttribute('x2',cx+r2*Math.cos(a));
    line.setAttribute('y2',cy+r2*Math.sin(a));
    line.setAttribute('class',isMajor?'tick-major':'tick-minor');
    tg.appendChild(line);
  }
  for(let i=1;i<=12;i++){
    const a=(i*30-90)*Math.PI/180;
    const nr=R-35;
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',cx+nr*Math.cos(a));
    t.setAttribute('y',cy+nr*Math.sin(a));
    t.setAttribute('class','clock-number');
    t.textContent=i;
    ng.appendChild(t);
  }
})();

function updateHands(){
  const mAngle=currentM*6-90;
  const hAngle=(currentH%12)*30+currentM*0.5-90;
  const mr=mAngle*Math.PI/180, hr=hAngle*Math.PI/180;
  const mh=document.getElementById('minuteHand'),hh=document.getElementById('hourHand');
  const mx=cx+100*Math.cos(mr),my=cy+100*Math.sin(mr);
  const hx=cx+65*Math.cos(hr),hy=cy+65*Math.sin(hr);
  mh.setAttribute('x2',mx); mh.setAttribute('y2',my);
  hh.setAttribute('x2',hx); hh.setAttribute('y2',hy);
  // digital
  const dh=currentH===0?12:(currentH>12?currentH-12:currentH);
  document.getElementById('digitalTime').textContent=String(dh).padStart(2,'0')+':'+String(currentM).padStart(2,'0');
  document.getElementById('timeWords').textContent=timeToWords(currentH,currentM);
}

function timeToWords(h,m){
  const nums=['twelve','one','two','three','four','five','six','seven','eight','nine','ten','eleven','twelve'];
  const hr=h%12;
  const nextHr=(hr+1)%12;
  if(m===0) return capitalize(nums[hr])+' o\u2019clock';
  if(m===15) return 'Quarter past '+nums[hr];
  if(m===30) return 'Half past '+nums[hr];
  if(m===45) return 'Quarter to '+nums[nextHr];
  if(m<30) return m+' minutes past '+nums[hr];
  return (60-m)+' minutes to '+nums[nextHr];
}
function capitalize(s){return s.charAt(0).toUpperCase()+s.slice(1);}

// drag hands
const svg=document.getElementById('clockSvg');
function getAngle(e){
  const rect=svg.getBoundingClientRect();
  const sx=rect.width/320,sy=rect.height/320;
  const px=(e.clientX||e.touches[0].clientX)-rect.left;
  const py=(e.clientY||e.touches[0].clientY)-rect.top;
  const x=px/sx-cx,y=py/sy-cy;
  let a=Math.atan2(y,x)*180/Math.PI+90;
  if(a<0)a+=360;
  return a;
}

function pickHand(e){
  e.preventDefault();
  const rect=svg.getBoundingClientRect();
  const sx=rect.width/320,sy=rect.height/320;
  const ex=(e.clientX||e.touches[0].clientX)-rect.left;
  const ey=(e.clientY||e.touches[0].clientY)-rect.top;
  const px=ex/sx, py=ey/sy;
  // get endpoints of each hand
  const hh=document.getElementById('hourHand');
  const mh=document.getElementById('minuteHand');
  const hx=parseFloat(hh.getAttribute('x2')), hy=parseFloat(hh.getAttribute('y2'));
  const mx=parseFloat(mh.getAttribute('x2')), my=parseFloat(mh.getAttribute('y2'));
  // distance from click to each hand's tip
  const dh=Math.hypot(px-hx,py-hy);
  const dm=Math.hypot(px-mx,py-my);
  // also check distance to midpoint of each hand
  const dhm=Math.hypot(px-(cx+hx)/2, py-(cy+hy)/2);
  const dmm=Math.hypot(px-(cx+mx)/2, py-(cy+my)/2);
  const hourDist=Math.min(dh,dhm);
  const minDist=Math.min(dm,dmm);
  // if hands overlap (tips within 20px), prefer hour hand
  const handsOverlap=Math.hypot(hx-mx,hy-my)<20;
  if(handsOverlap){
    // hour hand is shorter, so if click is closer to centre, it's hour hand
    const clickR=Math.hypot(px-cx,py-cy);
    dragging=clickR<85?'hour':'minute';
  } else {
    dragging=hourDist<minDist?'hour':'minute';
  }
}
document.getElementById('dragZone').addEventListener('mousedown',pickHand);
document.getElementById('dragZone').addEventListener('touchstart',pickHand,{passive:false});

function onMove(e){
  if(!dragging)return;
  e.preventDefault();
  const a=getAngle(e);
  if(dragging==='minute'){
    let m=Math.round(a/6)%60;
    m=Math.round(m/5)*5; if(m===60)m=0;
    // detect if we crossed 12 to adjust hour
    let oldM=currentM;
    currentM=m;
    if(oldM>=45&&m<15) currentH=(currentH+1)%12||12;
    else if(oldM<15&&m>=45) currentH=((currentH-1)+12)%12||12;
  } else {
    let h=Math.round(a/30)%12;
    if(h===0)h=12;
    currentH=h;
  }
  updateHands();
  updateHighlight();
}
function onUp(){dragging=null;}
document.addEventListener('mousemove',onMove);
document.addEventListener('mouseup',onUp);
document.addEventListener('touchmove',onMove,{passive:false});
document.addEventListener('touchend',onUp);

function updateHighlight(){
  // highlight the arc from 12 to minute hand position
  if(currentM===0){document.getElementById('highlightArc').setAttribute('d','');return;}
  const startA=-90;
  const endA=currentM*6-90;
  const sr=startA*Math.PI/180,er=endA*Math.PI/180;
  const r=120;
  const largeArc=currentM>30?1:0;
  const x1=cx+r*Math.cos(sr),y1=cy+r*Math.sin(sr);
  const x2=cx+r*Math.cos(er),y2=cy+r*Math.sin(er);
  document.getElementById('highlightArc').setAttribute('d',
    `M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${largeArc} 1 ${x2},${y2} Z`);
}

function setLevel(l){
  level=l;
  document.querySelectorAll('.level-btn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.level)===l));
  const isFree=l===0;
  document.querySelector('.check-btn').style.display=isFree?'none':'';
  document.querySelector('.new-btn').style.display=isFree?'none':'';
  document.querySelector('.score-box').style.display=isFree?'none':'';
  if(isFree){
    instructions.textContent='Drag either hand to explore the clock freely';
    feedback.textContent='';
    currentH=12;currentM=0;
    updateHands();updateHighlight();
  } else {
    document.querySelector('.score-box').style.display='';
    newQuestion();
  }
}

function generateTarget(){
  targetH=Math.floor(Math.random()*12)+1;
  if(level===1) targetM=0;
  else if(level===2) targetM=[0,30][Math.floor(Math.random()*2)];
  else if(level===3) targetM=[0,15,30,45][Math.floor(Math.random()*4)];
  else targetM=Math.floor(Math.random()*12)*5;
}

function newQuestion(){
  generateTarget();
  const words=timeToWords(targetH,targetM);
  instructions.textContent=`Set the clock to: ${words}`;
  feedback.textContent='';
  // reset hands to 12
  currentH=12;currentM=0;
  updateHands();
  updateHighlight();
}

function checkTime(){
  totalQ++;
  const hMatch=(currentH%12)===(targetH%12);
  const mMatch=currentM===targetM;
  if(hMatch&&mMatch){
    score++;
    feedback.className='feedback correct';
    feedback.textContent='Well done! That\u2019s correct!';
  } else {
    feedback.className='feedback wrong';
    const w=timeToWords(targetH,targetM);
    feedback.textContent=`Not quite! The answer is ${w}.`;
    // show correct position
    currentH=targetH;currentM=targetM;
    updateHands();updateHighlight();
  }
  document.getElementById('score').textContent=score;
  document.getElementById('total').textContent=totalQ;
}

updateHands();
newQuestion();
</script>
</body>
</html>
