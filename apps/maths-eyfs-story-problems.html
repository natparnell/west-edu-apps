<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Story Problems | EYFS Maths</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', sans-serif;
  background: #faf7f2;
  color: #3d2e1f;
  min-height: 100vh;
  user-select: none;
  -webkit-user-select: none;
  overflow-x: hidden;
}

.title-bar {
  background: #e07020;
  color: #fff;
  text-align: center;
  padding: 18px 16px;
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.5px;
}

.instructions-bar {
  background: #fff4e8;
  color: #5a4630;
  text-align: center;
  padding: 12px 16px;
  font-size: 16px;
  font-weight: 600;
  line-height: 1.4;
}

.container {
  max-width: 700px;
  margin: 0 auto;
  padding: 20px 16px 40px;
}

/* Progress dots */
.progress-dots {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-bottom: 24px;
}
.dot {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #e8ddd0;
  transition: background 0.3s, transform 0.3s;
}
.dot.done { background: #4caf50; }
.dot.current { background: #e07020; animation: pulse 1.2s infinite; }
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.35); }
}

/* Story card */
.story-card {
  background: #fff;
  border-radius: 20px;
  padding: 28px 24px;
  margin-bottom: 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  text-align: center;
}
.story-scene {
  font-size: 40px;
  margin-bottom: 16px;
  line-height: 1.4;
  letter-spacing: 2px;
}
.story-text {
  font-size: 20px;
  font-weight: 600;
  line-height: 1.5;
  color: #3d2e1f;
}
.story-text .highlight {
  color: #e07020;
  font-weight: 800;
}
.story-text .hint-word {
  background: #fff4e8;
  border-radius: 4px;
  padding: 0 4px;
}

/* Help button */
.help-row {
  text-align: center;
  margin-bottom: 20px;
}
.help-btn {
  background: #fff4e8;
  border: 2px solid #e07020;
  border-radius: 12px;
  padding: 10px 24px;
  font-family: 'Inter', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: #e07020;
  cursor: pointer;
  min-height: 48px;
  transition: all 0.2s;
}
.help-btn:hover { background: #e07020; color: #fff; }
.help-btn.used { opacity: 0.5; pointer-events: none; }

/* Answer choices */
.choices {
  display: flex;
  justify-content: center;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 24px;
}
.choice-card {
  background: #fff;
  border: 3px solid #e8ddd0;
  border-radius: 18px;
  padding: 20px 16px;
  min-width: 120px;
  min-height: 100px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  gap: 8px;
}
.choice-card:hover { border-color: #e07020; transform: translateY(-2px); }
.choice-card:active { transform: scale(0.96); }
.choice-card .choice-emoji {
  font-size: 32px;
  line-height: 1.2;
  letter-spacing: 2px;
  text-align: center;
}
.choice-card .choice-count {
  font-size: 22px;
  font-weight: 800;
  color: #5a4630;
}
.choice-card.correct {
  border-color: #4caf50;
  background: #e8f5e9;
  animation: bounceCorrect 0.6s;
}
.choice-card.wrong {
  border-color: #e74c3c;
  animation: shake 0.5s;
}
@keyframes bounceCorrect {
  0% { transform: scale(1); }
  30% { transform: scale(1.15); }
  50% { transform: scale(0.95); }
  70% { transform: scale(1.05); }
  100% { transform: scale(1); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-6px); }
  80% { transform: translateX(6px); }
}

/* Feedback */
.feedback {
  text-align: center;
  font-size: 24px;
  font-weight: 800;
  min-height: 40px;
  margin-bottom: 16px;
  transition: opacity 0.3s;
}
.feedback.correct-msg { color: #4caf50; }
.feedback.wrong-msg { color: #e74c3c; }

/* Celebration overlay */
.celebration {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 100;
}
.confetti {
  position: absolute;
  width: 10px;
  height: 10px;
  border-radius: 2px;
  animation: confettiFall 1.5s forwards;
}
@keyframes confettiFall {
  0% { opacity: 1; transform: translateY(0) rotate(0deg); }
  100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
}

/* Score screen */
.score-screen {
  text-align: center;
  padding: 40px 20px;
}
.score-screen h2 {
  font-size: 32px;
  font-weight: 800;
  color: #e07020;
  margin-bottom: 12px;
}
.score-screen .score-number {
  font-size: 64px;
  font-weight: 800;
  color: #4caf50;
  margin: 20px 0;
}
.score-screen .score-label {
  font-size: 20px;
  color: #5a4630;
  margin-bottom: 30px;
}
.new-game-btn {
  background: #e07020;
  color: #fff;
  border: none;
  border-radius: 16px;
  padding: 16px 40px;
  font-family: 'Inter', sans-serif;
  font-size: 20px;
  font-weight: 700;
  cursor: pointer;
  min-height: 56px;
  transition: background 0.2s;
}
.new-game-btn:hover { background: #c55e15; }

.hidden { display: none !important; }
</style>
</head>
<body>

<div class="title-bar">Story Problems</div>
<div class="instructions-bar">Read the story and tap the picture that shows the answer!</div>

<div class="container">
  <div class="progress-dots" id="progressDots"></div>

  <div id="gameArea">
    <div class="story-card" id="storyCard">
      <div class="story-scene" id="storyScene"></div>
      <div class="story-text" id="storyText"></div>
    </div>
    <div class="help-row">
      <button class="help-btn" id="helpBtn" onclick="showHint()">Help me</button>
    </div>
    <div class="feedback" id="feedback"></div>
    <div class="choices" id="choices"></div>
  </div>

  <div id="scoreScreen" class="score-screen hidden"></div>
</div>

<div class="celebration" id="celebration"></div>

<script>
const QUESTIONS_PER_ROUND = 8;

// Problem bank: each returns { text, scene, answer, emoji, hintWords, choiceValues }
// hintWords: words to highlight when hint is used (key action words)
function makeProblems() {
  const problems = [];

  // --- ADDITION (combining) ---
  problems.push(() => {
    const a = rand(1,4), b = rand(1,4);
    return {
      text: `Sam has <span class="highlight">${a}</span> \ud83c\udf4e apple${s(a)} and finds <span class="highlight">${b}</span> more. How many apples altogether?`,
      scene: '\ud83c\udf4e'.repeat(a) + ' + ' + '\ud83c\udf4e'.repeat(b),
      answer: a + b,
      emoji: '\ud83c\udf4e',
      hintWords: ['altogether'],
      type: 'add'
    };
  });
  problems.push(() => {
    const a = rand(1,5), b = rand(1,4);
    return {
      text: `There are <span class="highlight">${a}</span> \ud83e\udd86 duck${s(a)} in the pond. <span class="highlight">${b}</span> more join them. How many ducks now?`,
      scene: '\ud83e\udd86'.repeat(a) + '  \ud83c\udf0a  ' + '\ud83e\udd86'.repeat(b),
      answer: a + b,
      emoji: '\ud83e\udd86',
      hintWords: ['more', 'join'],
      type: 'add'
    };
  });
  problems.push(() => {
    const a = rand(2,5), b = rand(1,3);
    return {
      text: `Mia picks <span class="highlight">${a}</span> \ud83c\udf3b flower${s(a)}. Then she picks <span class="highlight">${b}</span> more. How many flowers does she have?`,
      scene: '\ud83c\udf3b'.repeat(a) + ' + ' + '\ud83c\udf3b'.repeat(b),
      answer: a + b,
      emoji: '\ud83c\udf3b',
      hintWords: ['more', 'have'],
      type: 'add'
    };
  });
  problems.push(() => {
    const a = rand(1,4), b = rand(1,3);
    return {
      text: `<span class="highlight">${a}</span> \ud83d\udc31 cat${s(a)} are sleeping. <span class="highlight">${b}</span> more arrive. How many cats in total?`,
      scene: '\ud83d\udc31'.repeat(a) + '  \ud83d\udca4  ' + '\ud83d\udc31'.repeat(b),
      answer: a + b,
      emoji: '\ud83d\udc31',
      hintWords: ['total', 'more'],
      type: 'add'
    };
  });
  problems.push(() => {
    const a = rand(2,5), b = rand(1,4);
    return {
      text: `There are <span class="highlight">${a}</span> \u2b50 star${s(a)} in the sky. <span class="highlight">${b}</span> more appear. How many stars now?`,
      scene: '\u2b50'.repeat(a) + '  \ud83c\udf19  ' + '\u2b50'.repeat(b),
      answer: a + b,
      emoji: '\u2b50',
      hintWords: ['more', 'appear'],
      type: 'add'
    };
  });

  // --- SUBTRACTION (taking away) ---
  problems.push(() => {
    const total = rand(3,7), take = rand(1, total - 1);
    return {
      text: `Sam has <span class="highlight">${total}</span> \ud83c\udf4e apple${s(total)}. He eats <span class="highlight">${take}</span>. How many are left?`,
      scene: '\ud83c\udf4e'.repeat(total),
      answer: total - take,
      emoji: '\ud83c\udf4e',
      hintWords: ['eats', 'left'],
      type: 'sub'
    };
  });
  problems.push(() => {
    const total = rand(4,8), take = rand(1, total - 1);
    return {
      text: `There are <span class="highlight">${total}</span> \ud83c\udf88 balloon${s(total)}. <span class="highlight">${take}</span> pop! How many are left?`,
      scene: '\ud83c\udf88'.repeat(total),
      answer: total - take,
      emoji: '\ud83c\udf88',
      hintWords: ['pop', 'left'],
      type: 'sub'
    };
  });
  problems.push(() => {
    const total = rand(3,6), take = rand(1, total - 1);
    return {
      text: `<span class="highlight">${total}</span> \ud83d\udc26 bird${s(total)} sit on a branch. <span class="highlight">${take}</span> fly away. How many are left?`,
      scene: '\ud83d\udc26'.repeat(total) + '  \ud83c\udf33',
      answer: total - take,
      emoji: '\ud83d\udc26',
      hintWords: ['fly away', 'left'],
      type: 'sub'
    };
  });
  problems.push(() => {
    const total = rand(4,7), take = rand(1, total - 1);
    return {
      text: `Lily has <span class="highlight">${total}</span> \ud83c\udf6a biscuit${s(total)}. She gives away <span class="highlight">${take}</span>. How many does she have left?`,
      scene: '\ud83c\udf6a'.repeat(total),
      answer: total - take,
      emoji: '\ud83c\udf6a',
      hintWords: ['gives away', 'left'],
      type: 'sub'
    };
  });
  problems.push(() => {
    const total = rand(3,6), take = rand(1, total - 1);
    return {
      text: `There are <span class="highlight">${total}</span> \ud83d\udc1f fish in a tank. <span class="highlight">${take}</span> swim away. How many are left?`,
      scene: '\ud83d\udc1f'.repeat(total) + '  \ud83c\udf0a',
      answer: total - take,
      emoji: '\ud83d\udc1f',
      hintWords: ['swim away', 'left'],
      type: 'sub'
    };
  });

  // --- SHARING ---
  problems.push(() => {
    const groups = 2, each = rand(1,4);
    const total = groups * each;
    return {
      text: `<span class="highlight">${total}</span> \ud83c\udf53 strawberr${total===1?'y':'ies'} are shared equally between <span class="highlight">${groups}</span> children. How many does each child get?`,
      scene: '\ud83c\udf53'.repeat(total) + '  \u27a1\ufe0f  \ud83d\udc67 \ud83d\udc66',
      answer: each,
      emoji: '\ud83c\udf53',
      hintWords: ['shared equally', 'each'],
      type: 'share'
    };
  });
  problems.push(() => {
    const groups = 2, each = rand(1,3);
    const total = groups * each;
    return {
      text: `Mum shares <span class="highlight">${total}</span> \ud83c\udf69 pancake${s(total)} equally between <span class="highlight">${groups}</span> plates. How many on each plate?`,
      scene: '\ud83c\udf69'.repeat(total) + '  \u27a1\ufe0f  \ud83c\udf7d\ufe0f \ud83c\udf7d\ufe0f',
      answer: each,
      emoji: '\ud83c\udf69',
      hintWords: ['equally', 'each'],
      type: 'share'
    };
  });
  problems.push(() => {
    const groups = 2, each = rand(2,5);
    const total = groups * each;
    return {
      text: `<span class="highlight">${total}</span> \ud83e\uddc1 sock${s(total)} are sorted into <span class="highlight">${groups}</span> equal piles. How many in each pile?`,
      scene: '\ud83e\uddc1'.repeat(total),
      answer: each,
      emoji: '\ud83e\uddc1',
      hintWords: ['equal', 'each'],
      type: 'share'
    };
  });

  // --- COMPARING (more than) ---
  problems.push(() => {
    const a = rand(2,5), b = rand(1, a - 1);
    return {
      text: `Tom has <span class="highlight">${a}</span> \ud83d\ude97 car${s(a)}. Ella has <span class="highlight">${b}</span>. How many more does Tom have?`,
      scene: '\ud83d\udc66 ' + '\ud83d\ude97'.repeat(a) + '  \ud83d\udc67 ' + '\ud83d\ude97'.repeat(b),
      answer: a - b,
      emoji: '\ud83d\ude97',
      hintWords: ['more'],
      type: 'compare'
    };
  });
  problems.push(() => {
    const a = rand(3,7), b = rand(1, a - 1);
    return {
      text: `There are <span class="highlight">${a}</span> \ud83d\udd35 blue beads and <span class="highlight">${b}</span> \ud83d\udd34 red beads. How many more blue beads are there?`,
      scene: '\ud83d\udd35'.repeat(a) + '  ' + '\ud83d\udd34'.repeat(b),
      answer: a - b,
      emoji: '\ud83d\udd35',
      hintWords: ['more'],
      type: 'compare'
    };
  });
  problems.push(() => {
    const a = rand(3,6), b = rand(1, a - 1);
    return {
      text: `Amy has <span class="highlight">${a}</span> \ud83c\udf1f sticker${s(a)}. Ben has <span class="highlight">${b}</span>. How many more does Amy have than Ben?`,
      scene: '\ud83d\udc67 ' + '\ud83c\udf1f'.repeat(a) + '  \ud83d\udc66 ' + '\ud83c\udf1f'.repeat(b),
      answer: a - b,
      emoji: '\ud83c\udf1f',
      hintWords: ['more', 'than'],
      type: 'compare'
    };
  });

  // --- More addition ---
  problems.push(() => {
    const a = rand(2,5), b = rand(1,3);
    return {
      text: `<span class="highlight">${a}</span> \ud83d\udc1b ladybird${s(a)} are on a leaf. <span class="highlight">${b}</span> more land. How many altogether?`,
      scene: '\ud83c\udf3f ' + '\ud83d\udc1b'.repeat(a) + ' + ' + '\ud83d\udc1b'.repeat(b),
      answer: a + b,
      emoji: '\ud83d\udc1b',
      hintWords: ['more', 'altogether'],
      type: 'add'
    };
  });
  problems.push(() => {
    const a = rand(1,4), b = rand(1,4);
    return {
      text: `There are <span class="highlight">${a}</span> \ud83e\udde9 red block${s(a)} and <span class="highlight">${b}</span> \ud83e\udde9 blue block${s(b)}. How many blocks in total?`,
      scene: '\ud83d\udfe5'.repeat(a) + '  ' + '\ud83d\udfe6'.repeat(b),
      answer: a + b,
      emoji: '\ud83e\udde9',
      hintWords: ['total', 'and'],
      type: 'add'
    };
  });

  // --- More subtraction ---
  problems.push(() => {
    const total = rand(4,8), take = rand(1, total - 1);
    return {
      text: `<span class="highlight">${total}</span> \ud83e\udd8b butterfl${total===1?'y':'ies'} are in the garden. <span class="highlight">${take}</span> flutter away. How many stay?`,
      scene: '\ud83e\udd8b'.repeat(total) + '  \ud83c\udf3a',
      answer: total - take,
      emoji: '\ud83e\udd8b',
      hintWords: ['flutter away', 'stay'],
      type: 'sub'
    };
  });
  problems.push(() => {
    const total = rand(3,6), take = rand(1, total - 1);
    return {
      text: `Jake has <span class="highlight">${total}</span> \ud83c\udfb2 dice. He loses <span class="highlight">${take}</span>. How many are left?`,
      scene: '\ud83c\udfb2'.repeat(total),
      answer: total - take,
      emoji: '\ud83c\udfb2',
      hintWords: ['loses', 'left'],
      type: 'sub'
    };
  });

  // --- More comparing ---
  problems.push(() => {
    const a = rand(3,7), b = rand(1, a - 1);
    return {
      text: `One tree has <span class="highlight">${a}</span> \ud83c\udf4e apple${s(a)}. Another has <span class="highlight">${b}</span>. How many more apples on the first tree?`,
      scene: '\ud83c\udf33 ' + '\ud83c\udf4e'.repeat(a) + '  \ud83c\udf33 ' + '\ud83c\udf4e'.repeat(b),
      answer: a - b,
      emoji: '\ud83c\udf4e',
      hintWords: ['more'],
      type: 'compare'
    };
  });

  return problems;
}

function s(n) { return n === 1 ? '' : 's'; }
function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let currentQuestion = 0;
let score = 0;
let answered = false;
let hintUsed = false;
let roundProblems = [];
let currentProblem = null;

function pickRoundProblems() {
  const generators = makeProblems();
  const shuffled = shuffle(generators);
  const selected = [];
  for (let i = 0; i < QUESTIONS_PER_ROUND && i < shuffled.length; i++) {
    selected.push(shuffled[i]());
  }
  return selected;
}

function generateChoices(answer, emoji) {
  const choices = new Set([answer]);
  // Add nearby values
  const candidates = [];
  for (let v = Math.max(0, answer - 3); v <= answer + 3; v++) {
    if (v !== answer && v >= 0 && v <= 10) candidates.push(v);
  }
  const shuffledCandidates = shuffle(candidates);
  for (const c of shuffledCandidates) {
    if (choices.size >= 3) break;
    choices.add(c);
  }
  // Ensure we have 3
  while (choices.size < 3) {
    choices.add(rand(0, 10));
  }
  return shuffle([...choices]);
}

function displayQuestion() {
  answered = false;
  hintUsed = false;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('helpBtn').classList.remove('used');

  currentProblem = roundProblems[currentQuestion];
  const p = currentProblem;

  document.getElementById('storyScene').textContent = p.scene;
  document.getElementById('storyText').innerHTML = p.text;

  const choiceValues = generateChoices(p.answer, p.emoji);
  const choicesEl = document.getElementById('choices');
  let html = '';
  choiceValues.forEach((val, i) => {
    const emojis = val === 0 ? 'None' : p.emoji.repeat(val);
    html += `<div class="choice-card" data-value="${val}" onclick="handleChoice(${val}, this)">
      <div class="choice-emoji">${emojis}</div>
      <div class="choice-count">${val}</div>
    </div>`;
  });
  choicesEl.innerHTML = html;

  updateDots();
}

function showHint() {
  if (hintUsed) return;
  hintUsed = true;
  document.getElementById('helpBtn').classList.add('used');

  const p = currentProblem;
  let html = p.text;
  // Wrap hint words
  for (const word of p.hintWords) {
    const regex = new RegExp(`(${word})`, 'gi');
    html = html.replace(regex, '<span class="hint-word">$1</span>');
  }
  document.getElementById('storyText').innerHTML = html;
}

function handleChoice(value, el) {
  if (answered) return;
  const fb = document.getElementById('feedback');

  if (value === currentProblem.answer) {
    answered = true;
    score++;
    el.classList.add('correct');
    fb.textContent = 'Well done!';
    fb.className = 'feedback correct-msg';
    showCelebration();
    setTimeout(nextQuestion, 1200);
  } else {
    el.classList.add('wrong');
    fb.textContent = 'Try again!';
    fb.className = 'feedback wrong-msg';
    setTimeout(() => {
      el.classList.remove('wrong');
      el.style.opacity = '0.4';
      el.style.pointerEvents = 'none';
    }, 500);
  }
}

function nextQuestion() {
  currentQuestion++;
  if (currentQuestion >= QUESTIONS_PER_ROUND) {
    showScore();
  } else {
    displayQuestion();
  }
}

function updateDots() {
  const dotsEl = document.getElementById('progressDots');
  let html = '';
  for (let i = 0; i < QUESTIONS_PER_ROUND; i++) {
    let cls = 'dot';
    if (i < currentQuestion) cls += ' done';
    else if (i === currentQuestion) cls += ' current';
    html += `<div class="${cls}"></div>`;
  }
  dotsEl.innerHTML = html;
}

function showCelebration() {
  const cel = document.getElementById('celebration');
  cel.innerHTML = '';
  const colors = ['#e74c3c','#3498db','#27ae60','#f1c40f','#9b59b6','#e07020'];
  for (let i = 0; i < 30; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + '%';
    c.style.top = '-10px';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDelay = (Math.random() * 0.5) + 's';
    c.style.width = rand(6, 12) + 'px';
    c.style.height = rand(6, 12) + 'px';
    cel.appendChild(c);
  }
  setTimeout(() => { cel.innerHTML = ''; }, 2000);
}

function showScore() {
  document.getElementById('gameArea').classList.add('hidden');
  document.getElementById('progressDots').classList.add('hidden');
  const screen = document.getElementById('scoreScreen');
  screen.classList.remove('hidden');

  let msg = '';
  if (score === QUESTIONS_PER_ROUND) msg = 'Perfect score! You are a superstar!';
  else if (score >= 6) msg = 'Brilliant work!';
  else if (score >= 4) msg = 'Good effort! Keep practising!';
  else msg = 'Nice try! Have another go!';

  screen.innerHTML = `
    <h2>Round Complete!</h2>
    <div class="score-number">${score}/${QUESTIONS_PER_ROUND}</div>
    <div class="score-label">${msg}</div>
    <button class="new-game-btn" onclick="startGame()">New Game</button>
  `;
  showCelebration();
}

function startGame() {
  currentQuestion = 0;
  score = 0;
  answered = false;
  roundProblems = pickRoundProblems();
  document.getElementById('gameArea').classList.remove('hidden');
  document.getElementById('progressDots').classList.remove('hidden');
  document.getElementById('scoreScreen').classList.add('hidden');
  displayQuestion();
}

startGame();
</script>
</body>
</html>
