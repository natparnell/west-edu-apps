<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pattern Maker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: #faf7f2;
    color: #3d2e1f;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    user-select: none;
    -webkit-user-select: none;
    overflow-x: hidden;
  }

  .title-bar {
    background: #e07020;
    color: #fff;
    text-align: center;
    padding: 16px 20px;
    font-size: 28px;
    font-weight: 800;
    box-shadow: 0 3px 10px rgba(224,112,32,0.3);
    position: relative;
    z-index: 10;
  }

  .instructions {
    text-align: center;
    font-size: 20px;
    font-weight: 600;
    padding: 12px 16px;
    color: #5a4630;
    background: #fff4e8;
    border-bottom: 2px solid #f0dcc4;
  }

  .progress-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 10px 20px;
    background: #fff;
    border-bottom: 2px solid #f0dcc4;
    flex-wrap: wrap;
  }
  .level-badge {
    background: #e07020;
    color: #fff;
    padding: 4px 16px;
    border-radius: 20px;
    font-weight: 700;
    font-size: 16px;
  }
  .score-text { font-weight: 700; font-size: 18px; }
  .progress-dots { display: flex; gap: 8px; }
  .progress-dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #e8ddd0;
    transition: background 0.3s;
  }
  .progress-dot.done { background: #4caf50; }
  .progress-dot.current { background: #e07020; animation: pulse-dot 1s infinite; }
  @keyframes pulse-dot { 0%,100% { transform: scale(1); } 50% { transform: scale(1.3); } }

  .game-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    gap: 24px;
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
  }

  /* Necklace / train pattern display */
  .pattern-label {
    font-size: 18px;
    font-weight: 700;
    color: #8a7560;
  }

  .pattern-track {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 6px;
    padding: 20px 24px;
    background: #fff;
    border-radius: 20px;
    border: 3px solid #f0dcc4;
    width: 100%;
    min-height: 100px;
    position: relative;
  }

  /* Thread/string behind beads */
  .pattern-track::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 24px;
    right: 24px;
    height: 4px;
    background: #d4c4b0;
    border-radius: 2px;
    z-index: 0;
  }

  .bead {
    width: 64px;
    height: 64px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: 800;
    position: relative;
    z-index: 1;
    transition: transform 0.3s, opacity 0.3s;
    border: 3px solid rgba(0,0,0,0.12);
  }
  .bead.empty {
    background: #f5efe6;
    border: 4px dashed #d4c4b0;
    font-size: 28px;
    color: #c4b4a0;
  }
  .bead.correct-fill {
    animation: bead-pop 0.5s ease;
  }
  @keyframes bead-pop {
    0% { transform: scale(0.5); opacity: 0; }
    60% { transform: scale(1.2); }
    100% { transform: scale(1); opacity: 1; }
  }

  /* Choices */
  .choices-label {
    font-size: 18px;
    font-weight: 700;
    color: #5a4630;
  }

  .choices-area {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 14px;
  }

  .choice-btn {
    width: 90px;
    height: 90px;
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 38px;
    font-weight: 800;
    cursor: pointer;
    border: 4px solid #e8ddd0;
    background: #fff;
    transition: transform 0.15s, border-color 0.2s, box-shadow 0.2s;
    position: relative;
  }
  .choice-btn:hover { transform: scale(1.08); box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
  .choice-btn:active { transform: scale(0.95); }
  .choice-btn.selected {
    border-color: #e07020;
    box-shadow: 0 0 16px rgba(224,112,32,0.35);
  }
  .choice-btn.wrong {
    border-color: #e53935;
    animation: shake 0.4s ease;
    background: #fde8e7;
  }
  .choice-btn.right {
    border-color: #4caf50;
    background: #e8f5e9;
  }

  @keyframes shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-8px); } 40% { transform: translateX(8px); } 60% { transform: translateX(-5px); } 80% { transform: translateX(5px); } }

  .btn {
    display: inline-block;
    padding: 14px 32px;
    font-size: 20px;
    font-weight: 700;
    font-family: 'Inter', sans-serif;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn:hover { transform: scale(1.05); }
  .btn:active { transform: scale(0.96); }
  .btn-primary { background: #e07020; color: #fff; box-shadow: 0 4px 12px rgba(224,112,32,0.35); }
  .btn-secondary { background: #fff; color: #e07020; border: 3px solid #e07020; }

  .bottom-bar {
    display: flex;
    justify-content: center;
    gap: 14px;
    padding: 16px;
    background: #fff;
    border-top: 2px solid #f0dcc4;
  }

  .celebration {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(250,247,242,0.92);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }
  .celebration.active { display: flex; }
  .celebration .big-text {
    font-size: 44px;
    font-weight: 800;
    color: #e07020;
    animation: pop 0.6s ease;
  }
  .celebration .big-emoji {
    font-size: 60px;
    animation: spin-stars 1.2s ease;
  }
  @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.4); } 100% { transform: scale(1); } }
  @keyframes spin-stars { 0% { transform: scale(0) rotate(-180deg); opacity: 0; } 60% { transform: scale(1.3) rotate(10deg); opacity: 1; } 100% { transform: scale(1) rotate(0); } }

  .confetti-piece {
    position: fixed;
    width: 12px; height: 12px;
    border-radius: 3px;
    z-index: 101;
    animation: confetti-fall 2.5s ease forwards;
    pointer-events: none;
  }
  @keyframes confetti-fall {
    0% { opacity: 1; transform: translateY(0) rotate(0deg); }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
  }

  .game-complete {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(250,247,242,0.95);
    z-index: 200;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }
  .game-complete.active { display: flex; }
  .game-complete .trophy { font-size: 80px; animation: pop 0.8s ease; }
  .game-complete .score-text { font-size: 32px; font-weight: 800; color: #e07020; }
  .game-complete .msg { font-size: 22px; font-weight: 600; color: #5a4630; text-align: center; }

  @media (max-width: 500px) {
    .title-bar { font-size: 22px; padding: 12px 16px; }
    .instructions { font-size: 17px; }
    .bead { width: 50px; height: 50px; font-size: 24px; }
    .choice-btn { width: 74px; height: 74px; font-size: 30px; }
  }
</style>
</head>
<body>

<div class="title-bar">Pattern Maker</div>
<div class="instructions" id="instructions">What comes next in the pattern?</div>

<div class="progress-bar">
  <span class="level-badge" id="levelBadge">Level 1</span>
  <span class="score-text" id="scoreText">Score: 0</span>
  <div class="progress-dots" id="progressDots"></div>
</div>

<div class="game-area">
  <div class="pattern-label">Complete the necklace!</div>
  <div class="pattern-track" id="patternTrack"></div>

  <div class="choices-label" id="choicesLabel">Tap the next bead:</div>
  <div class="choices-area" id="choicesArea"></div>
</div>

<div class="bottom-bar">
  <button class="btn btn-secondary" onclick="newGame()">New Game</button>
</div>

<div class="celebration" id="celebration">
  <div class="big-emoji" id="celebEmoji"></div>
  <div class="big-text" id="celebText"></div>
</div>

<div class="game-complete" id="gameComplete">
  <div class="trophy">🏆</div>
  <div class="score-text" id="finalScore"></div>
  <div class="msg">You're a pattern superstar!</div>
  <button class="btn btn-primary" onclick="newGame()" style="margin-top:10px;">Play Again</button>
</div>

<script>
const BEAD_TYPES = [
  { emoji: '🔴', bg: '#e53935', label: 'Red' },
  { emoji: '🔵', bg: '#1e88e5', label: 'Blue' },
  { emoji: '🟢', bg: '#43a047', label: 'Green' },
  { emoji: '🟡', bg: '#fdd835', label: 'Yellow' },
  { emoji: '🟣', bg: '#8e24aa', label: 'Purple' },
  { emoji: '🟠', bg: '#e07020', label: 'Orange' },
  { emoji: '⭐', bg: '#fdd835', label: 'Star' },
  { emoji: '💎', bg: '#00acc1', label: 'Diamond' },
  { emoji: '💖', bg: '#e91e63', label: 'Heart' },
  { emoji: '🌸', bg: '#f48fb1', label: 'Flower' },
];

const TOTAL_ROUNDS = 10;
const PATTERN_CONFIGS = [
  // Level 1-3: AB patterns
  { type: 'AB', repeat: 3, blanks: 1 },
  { type: 'AB', repeat: 3, blanks: 2 },
  { type: 'AB', repeat: 4, blanks: 2 },
  // Level 4-6: ABB patterns
  { type: 'ABB', repeat: 2, blanks: 1 },
  { type: 'ABB', repeat: 2, blanks: 2 },
  { type: 'ABB', repeat: 3, blanks: 2 },
  // Level 7-8: ABC patterns
  { type: 'ABC', repeat: 2, blanks: 1 },
  { type: 'ABC', repeat: 2, blanks: 2 },
  // Level 9-10: AABB patterns
  { type: 'AABB', repeat: 2, blanks: 2 },
  { type: 'AABB', repeat: 2, blanks: 3 },
];

let currentRound = 0;
let score = 0;
let patternSequence = [];
let fullSequence = [];
let blanksToFill = [];
let currentBlankIndex = 0;
let locked = false;

function randomInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = randomInt(0, i); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }

function pickDistinct(arr, n) {
  const shuffled = shuffle([...arr]);
  return shuffled.slice(0, n);
}

function buildProgressDots() {
  const el = document.getElementById('progressDots');
  el.innerHTML = '';
  for (let i = 0; i < TOTAL_ROUNDS; i++) {
    const dot = document.createElement('div');
    dot.className = 'progress-dot' + (i < currentRound ? ' done' : '') + (i === currentRound ? ' current' : '');
    el.appendChild(dot);
  }
}

function startRound() {
  if (currentRound >= TOTAL_ROUNDS) {
    showGameComplete();
    return;
  }

  locked = false;
  currentBlankIndex = 0;

  const config = PATTERN_CONFIGS[Math.min(currentRound, PATTERN_CONFIGS.length - 1)];
  const patternType = config.type;
  const distinctCount = new Set(patternType.split('')).size;
  const beads = pickDistinct(BEAD_TYPES, Math.max(distinctCount + 2, 4)); // extras for wrong choices
  const patternBeads = beads.slice(0, distinctCount);

  // Map letters to beads
  const letterMap = {};
  const letters = [...new Set(patternType.split(''))];
  letters.forEach((l, i) => { letterMap[l] = patternBeads[i]; });

  // Build one unit
  const unit = patternType.split('').map(l => letterMap[l]);

  // Build full sequence
  fullSequence = [];
  for (let r = 0; r < config.repeat; r++) {
    fullSequence.push(...unit);
  }
  // Add partial next to have blanks at end
  const extra = unit.slice(0, config.blanks);
  fullSequence.push(...extra);

  // Blanks are the last N items
  const totalLen = fullSequence.length;
  blanksToFill = [];
  for (let i = totalLen - config.blanks; i < totalLen; i++) {
    blanksToFill.push(i);
  }

  document.getElementById('levelBadge').textContent = `Level ${currentRound + 1}`;
  document.getElementById('scoreText').textContent = `Score: ${score}`;
  document.getElementById('instructions').textContent = 'What comes next in the pattern?';
  buildProgressDots();

  renderPattern();
  renderChoices(beads, patternBeads);
}

function renderPattern() {
  const track = document.getElementById('patternTrack');
  track.innerHTML = '';

  fullSequence.forEach((bead, i) => {
    const el = document.createElement('div');
    el.className = 'bead';
    el.dataset.index = i;

    if (blanksToFill.includes(i) && blanksToFill.indexOf(i) >= currentBlankIndex) {
      // Blank slot
      el.classList.add('empty');
      el.textContent = '?';
      el.style.background = '#f5efe6';
    } else {
      // Filled
      el.textContent = bead.emoji;
      el.style.background = bead.bg + '22';
      if (blanksToFill.includes(i)) {
        el.classList.add('correct-fill');
      }
    }

    // Stagger entrance for first render
    el.style.opacity = '0';
    setTimeout(() => {
      el.style.opacity = '1';
    }, i * 50);

    track.appendChild(el);
  });
}

function renderChoices(allBeads, patternBeads) {
  const area = document.getElementById('choicesArea');
  area.innerHTML = '';

  // Include all pattern beads + some extras, shuffled
  const choiceSet = [...patternBeads];
  const extras = allBeads.filter(b => !patternBeads.includes(b));
  // Add 1-2 extra wrong choices
  const extraCount = Math.min(2, extras.length);
  for (let i = 0; i < extraCount; i++) {
    choiceSet.push(extras[i]);
  }
  shuffle(choiceSet);

  choiceSet.forEach(bead => {
    const btn = document.createElement('div');
    btn.className = 'choice-btn';
    btn.textContent = bead.emoji;
    btn.style.background = bead.bg + '15';
    btn.addEventListener('click', () => handleChoice(btn, bead));
    area.appendChild(btn);
  });
}

function handleChoice(btn, bead) {
  if (locked) return;

  const targetIndex = blanksToFill[currentBlankIndex];
  const correctBead = fullSequence[targetIndex];

  if (bead === correctBead) {
    btn.classList.add('right');
    score++;
    document.getElementById('scoreText').textContent = `Score: ${score}`;
    currentBlankIndex++;
    renderPattern();

    setTimeout(() => {
      btn.classList.remove('right');
    }, 300);

    if (currentBlankIndex >= blanksToFill.length) {
      locked = true;
      setTimeout(celebrateRound, 500);
    }
  } else {
    btn.classList.add('wrong');
    setTimeout(() => btn.classList.remove('wrong'), 500);
  }
}

const praises = ['Amazing!', 'Great job!', 'Well done!', 'Fantastic!', 'Super!', 'Brilliant!', 'Perfect!'];
const emojis = ['🌟', '🎉', '💖', '⭐', '🎊', '✨', '🌈'];

function celebrateRound() {
  const celeb = document.getElementById('celebration');
  document.getElementById('celebText').textContent = praises[randomInt(0, praises.length - 1)];
  document.getElementById('celebEmoji').textContent = emojis[randomInt(0, emojis.length - 1)];
  celeb.classList.add('active');
  spawnConfetti();
  document.getElementById('instructions').textContent = 'You completed the pattern!';

  currentRound++;

  setTimeout(() => {
    celeb.classList.remove('active');
    startRound();
  }, 2000);
}

function spawnConfetti() {
  const colors = ['#e07020','#f4a940','#4caf50','#2196f3','#9c27b0','#e91e63','#ff5722'];
  for (let i = 0; i < 35; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = randomInt(5, 95) + 'vw';
    piece.style.top = randomInt(-10, 10) + 'vh';
    piece.style.background = colors[randomInt(0, colors.length - 1)];
    piece.style.animationDelay = (Math.random() * 0.6) + 's';
    piece.style.animationDuration = (1.5 + Math.random()) + 's';
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 3000);
  }
}

function showGameComplete() {
  document.getElementById('finalScore').textContent = `Score: ${score} points!`;
  document.getElementById('gameComplete').classList.add('active');
  spawnConfetti();
}

function newGame() {
  document.getElementById('gameComplete').classList.remove('active');
  document.getElementById('celebration').classList.remove('active');
  currentRound = 0;
  score = 0;
  startRound();
}

newGame();
</script>
</body>
</html>
