<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-Level Synthesis Problems - A-Level Mathematics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary-blue: #2563eb;
            --primary-blue-light: #3b82f6;
            --primary-blue-dark: #1d4ed8;
            --primary-blue-pale: #dbeafe;
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #64748b;
            --border-color: #cbd5e1;
            --success: #16a34a;
            --success-pale: #dcfce7;
            --warning: #f59e0b;
            --warning-pale: #fef3c7;
            --danger: #dc2626;
            --danger-pale: #fee2e2;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
            --radius-sm: 6px; --radius-md: 8px; --radius-lg: 12px;
        }
        html { font-size: 16px; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary); color: var(--text-primary);
            line-height: 1.6; min-height: 100vh;
        }
        header {
            position: sticky; top: 0; z-index: 100;
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--primary-blue-light) 100%);
            color: white; padding: 1.25rem 2rem; text-align: center;
            box-shadow: var(--shadow-md);
        }
        header h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.15rem; }
        header p { font-size: 0.95rem; opacity: 0.9; }
        main { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
        .panel {
            background: var(--bg-secondary); border-radius: var(--radius-lg);
            border: 1px solid var(--border-color); box-shadow: var(--shadow-sm);
            padding: 1.5rem; margin-bottom: 1.25rem;
        }
        .panel h2 {
            font-size: 1rem; font-weight: 700; margin-bottom: 0.75rem;
            padding-bottom: 0.5rem; border-bottom: 2px solid var(--primary-blue-pale);
            color: var(--primary-blue-dark);
        }
        .score-bar {
            display: flex; gap: 1.5rem; align-items: center;
            padding: 0.75rem 1.25rem; background: var(--bg-secondary);
            border: 1px solid var(--border-color); border-radius: var(--radius-md);
            margin-bottom: 1.25rem; flex-wrap: wrap;
        }
        .score-item { font-size: 0.85rem; color: var(--text-secondary); }
        .score-item strong { color: var(--primary-blue); }
        .filter-bar {
            display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1.25rem; align-items: center;
        }
        .filter-btn {
            padding: 0.5rem 1rem; border: 1px solid var(--border-color);
            border-radius: 20px; background: var(--bg-secondary); cursor: pointer;
            font-size: 0.85rem; font-weight: 500; color: var(--text-secondary); transition: all 0.2s;
        }
        .filter-btn:hover { border-color: var(--primary-blue); color: var(--primary-blue); }
        .filter-btn.active { background: var(--primary-blue); color: white; border-color: var(--primary-blue); }
        .topic-filter-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.25rem; }
        .topic-chip {
            padding: 0.3rem 0.7rem; border: 1px solid var(--border-color);
            border-radius: 14px; font-size: 0.75rem; font-weight: 500;
            cursor: pointer; color: var(--text-muted); background: var(--bg-secondary); transition: all 0.2s;
        }
        .topic-chip:hover { border-color: var(--primary-blue-light); color: var(--primary-blue); }
        .topic-chip.active { background: var(--primary-blue-pale); border-color: var(--primary-blue); color: var(--primary-blue-dark); }
        .problem-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1rem; margin-bottom: 1.5rem;
        }
        .problem-card {
            background: var(--bg-secondary); border: 1px solid var(--border-color);
            border-radius: var(--radius-lg); padding: 1.25rem; cursor: pointer;
            transition: all 0.2s; position: relative;
        }
        .problem-card:hover { box-shadow: var(--shadow-md); border-color: var(--primary-blue-light); transform: translateY(-2px); }
        .problem-card.completed { border-left: 4px solid var(--success); }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem; }
        .card-title { font-size: 0.95rem; font-weight: 600; color: var(--text-primary); flex: 1; }
        .card-marks {
            font-size: 0.75rem; font-weight: 700; padding: 0.2rem 0.6rem;
            border-radius: 10px; white-space: nowrap; margin-left: 0.5rem;
        }
        .tier-1 .card-marks { background: var(--success-pale); color: var(--success); }
        .tier-2 .card-marks { background: var(--warning-pale); color: #92400e; }
        .tier-3 .card-marks { background: var(--danger-pale); color: var(--danger); }
        .card-desc {
            font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.75rem;
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
        }
        .card-topics { display: flex; gap: 0.35rem; flex-wrap: wrap; }
        .card-topic-tag {
            font-size: 0.7rem; padding: 0.15rem 0.45rem; border-radius: 8px;
            background: var(--primary-blue-pale); color: var(--primary-blue-dark); font-weight: 500;
        }
        .back-btn {
            display: inline-flex; align-items: center; gap: 0.4rem;
            padding: 0.5rem 1rem; border: 1px solid var(--border-color);
            border-radius: var(--radius-sm); background: var(--bg-secondary); cursor: pointer;
            font-size: 0.85rem; font-weight: 500; color: var(--text-secondary);
            margin-bottom: 1rem; transition: all 0.2s;
        }
        .back-btn:hover { border-color: var(--primary-blue); color: var(--primary-blue); }
        .problem-statement {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            border: 1px solid #bae6fd; border-radius: var(--radius-lg);
            padding: 1.5rem; margin-bottom: 1.25rem; font-size: 0.95rem; line-height: 1.7;
        }
        .problem-statement strong { color: var(--primary-blue-dark); }
        .btn {
            display: inline-flex; align-items: center; gap: 0.4rem;
            padding: 0.6rem 1.2rem; border: none; border-radius: var(--radius-sm);
            font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: inherit;
        }
        .btn-primary { background: var(--primary-blue); color: white; }
        .btn-primary:hover { background: var(--primary-blue-dark); }
        .btn-secondary { background: var(--bg-primary); color: var(--text-secondary); border: 1px solid var(--border-color); }
        .btn-secondary:hover { border-color: var(--primary-blue); color: var(--primary-blue); }
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { background: #15803d; }
        .btn-group { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; }
        .feedback {
            padding: 0.75rem 1rem; border-radius: var(--radius-sm);
            font-size: 0.85rem; margin-top: 0.75rem; display: none;
        }
        .feedback.correct { background: var(--success-pale); border: 1px solid #86efac; color: #166534; display: block; }
        .feedback.incorrect { background: var(--danger-pale); border: 1px solid #fca5a5; color: #991b1b; display: block; }
        .feedback.info { background: var(--primary-blue-pale); border: 1px solid #93c5fd; color: var(--primary-blue-dark); display: block; }
        .topic-web {
            display: flex; flex-wrap: wrap; gap: 0.5rem; padding: 1rem;
            background: var(--bg-primary); border-radius: var(--radius-md);
            border: 1px solid var(--border-color); margin-bottom: 1rem;
        }
        .topic-bubble {
            padding: 0.4rem 0.9rem; border-radius: 20px; font-size: 0.8rem;
            font-weight: 600; background: var(--primary-blue-pale); color: var(--primary-blue-dark);
            border: 2px solid var(--primary-blue-light);
        }
        .topic-bubble.connected {
            background: var(--primary-blue); color: white;
        }
        .topic-selector { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1rem; }
        .topic-select-btn {
            padding: 0.35rem 0.7rem; border: 1px solid var(--border-color);
            border-radius: 14px; font-size: 0.78rem; cursor: pointer;
            background: var(--bg-secondary); color: var(--text-secondary); transition: all 0.15s;
        }
        .topic-select-btn:hover { border-color: var(--primary-blue); }
        .topic-select-btn.selected { background: var(--primary-blue); color: white; border-color: var(--primary-blue); }
        .planner-step {
            display: flex; gap: 0.75rem; align-items: flex-start; margin-bottom: 0.75rem;
            padding: 0.75rem; background: var(--bg-primary); border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
        }
        .planner-num {
            width: 28px; height: 28px; border-radius: 50%;
            background: var(--primary-blue); color: white; display: flex;
            align-items: center; justify-content: center; font-size: 0.8rem;
            font-weight: 700; flex-shrink: 0;
        }
        .planner-input {
            flex: 1; padding: 0.5rem; border: 1px solid var(--border-color);
            border-radius: var(--radius-sm); font-size: 0.85rem; font-family: inherit;
        }
        .planner-input:focus { outline: none; border-color: var(--primary-blue); }
        .step-workspace {
            background: var(--bg-primary); border: 1px solid var(--border-color);
            border-radius: var(--radius-md); padding: 1rem; margin-bottom: 0.75rem;
        }
        .step-workspace .step-label {
            font-size: 0.85rem; font-weight: 600; color: var(--primary-blue); margin-bottom: 0.4rem;
        }
        .step-workspace textarea {
            width: 100%; padding: 0.5rem; border: 1px solid var(--border-color);
            border-radius: var(--radius-sm); font-family: 'Courier New', monospace;
            font-size: 0.9rem; min-height: 60px; resize: vertical;
        }
        .step-workspace textarea:focus { outline: none; border-color: var(--primary-blue); }
        .step-workspace input[type="text"] {
            width: 100%; padding: 0.5rem; border: 1px solid var(--border-color);
            border-radius: var(--radius-sm); font-family: 'Courier New', monospace; font-size: 0.9rem;
        }
        .step-workspace input:focus { outline: none; border-color: var(--primary-blue); }
        .mark-badge {
            display: inline-block; padding: 0.15rem 0.45rem; border-radius: 6px;
            font-size: 0.7rem; font-weight: 700; margin-left: 0.4rem;
        }
        .mark-M { background: var(--primary-blue-pale); color: var(--primary-blue-dark); }
        .mark-A { background: var(--success-pale); color: var(--success); }
        .mark-B { background: var(--warning-pale); color: #92400e; }
        .solution-panel {
            background: #fefce8; border: 1px solid #fde68a;
            border-radius: var(--radius-lg); padding: 1.5rem;
            margin-top: 1rem; display: none;
        }
        .solution-panel.visible { display: block; }
        .solution-panel h3 { color: #92400e; margin-bottom: 0.75rem; }
        .solution-step {
            padding: 0.6rem 0; border-bottom: 1px solid #fde68a;
            font-size: 0.9rem; line-height: 1.7;
        }
        .solution-step:last-child { border-bottom: none; }
        .alt-method {
            background: #f0fdf4; border: 1px solid #86efac;
            border-radius: var(--radius-md); padding: 1rem; margin-top: 0.75rem;
        }
        .alt-method h4 { font-size: 0.85rem; color: var(--success); margin-bottom: 0.4rem; }
        .timer-bar {
            display: flex; align-items: center; gap: 1rem; padding: 0.6rem 1rem;
            background: var(--bg-secondary); border: 1px solid var(--border-color);
            border-radius: var(--radius-md); margin-bottom: 1rem;
        }
        .timer-display {
            font-family: 'Courier New', monospace; font-size: 1.1rem; font-weight: 700;
            color: var(--primary-blue); min-width: 60px;
        }
        .timer-display.warning { color: var(--warning); }
        .timer-display.danger { color: var(--danger); }
        .workspace { display: none; }
        .workspace.active { display: block; }
        .problem-grid-container.hidden { display: none; }
        .section-label {
            font-size: 0.8rem; font-weight: 600; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.5rem;
        }
        @media (max-width: 768px) {
            header { padding: 1rem; }
            header h1 { font-size: 1.3rem; }
            main { padding: 1rem; }
            .problem-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <h1>A-Level Synthesis Problems</h1>
        <p>Extended problems requiring you to combine multiple A-level topics and plan your solution strategy</p>
    </header>
    <main>
        <div class="score-bar">
            <span class="score-item">Marks: <strong id="marksGained">0</strong> / <strong id="marksAvail">0</strong></span>
            <span class="score-item">Problems completed: <strong id="completedCount">0</strong></span>
            <span class="score-item">Tier: <strong id="currentTier">All</strong></span>
        </div>
        <div class="filter-bar" id="filterBar">
            <button class="filter-btn active" data-tier="all">All Tiers</button>
            <button class="filter-btn" data-tier="1">Tier 1 (5 marks)</button>
            <button class="filter-btn" data-tier="2">Tier 2 (6-7 marks)</button>
            <button class="filter-btn" data-tier="3">Tier 3 (8 marks)</button>
        </div>
        <div class="topic-filter-row" id="topicFilterRow"></div>
        <div class="problem-grid-container" id="gridContainer">
            <div class="problem-grid" id="problemGrid"></div>
        </div>
        <div class="workspace" id="workspace"></div>
    </main>
<script>
const ALL_TOPICS = [
    'Differentiation','Integration','Algebra','Trigonometry','Exponentials & Logs',
    'Sequences & Series','Vectors','Coordinate Geometry','Circle Equations',
    'Binomial Expansion','Parametric Equations','Numerical Methods','Proof',
    'Mechanics','Statistics'
];

const PROBLEMS = [
    // TIER 1
    {
        id:'t1_1', tier:1, marks:5,
        title:'Normal to a Curve',
        desc:'Find the equation of the normal to y = 3x\u00B2 \u2212 2x + 1 at x = 2, and find where this normal meets the curve again.',
        statement:'The curve C has equation <strong>y = 3x\u00B2 \u2212 2x + 1</strong>. Find the equation of the normal to C at the point where <strong>x = 2</strong>. Find the coordinates of the other point where this normal intersects C.',
        topics:['Differentiation','Coordinate Geometry','Algebra'],
        steps:[
            {label:'Find y when x = 2', mark:'B1', hint:'Substitute x = 2 into the curve equation', answer:'y = 3(4) \u2212 4 + 1 = 9. Point is (2, 9)', commentary:'A straightforward substitution to establish the point of tangency.'},
            {label:'Differentiate to find the gradient', mark:'M1', hint:'dy/dx = 6x \u2212 2', answer:'dy/dx = 6x \u2212 2. At x = 2: dy/dx = 10', commentary:'The derivative gives the gradient of the tangent at any point.'},
            {label:'Find the gradient of the normal', mark:'A1', hint:'Normal gradient = \u22121/(tangent gradient)', answer:'Gradient of normal = \u22121/10', commentary:'The normal is perpendicular to the tangent, so we use the negative reciprocal.'},
            {label:'Write the equation of the normal', mark:'A1', hint:'y \u2212 9 = \u22121/10(x \u2212 2)', answer:'y = \u2212x/10 + 46/5 or 10y + x = 92', commentary:'Using y \u2212 y\u2081 = m(x \u2212 x\u2081) with the point and normal gradient.'},
            {label:'Find where normal meets curve again', mark:'M1A1', hint:'Substitute y = \u2212x/10 + 46/5 into 3x\u00B2 \u2212 2x + 1', answer:'3x\u00B2 \u2212 2x + 1 = \u2212x/10 + 46/5; 30x\u00B2 \u2212 19x \u2212 87 = 0; (x\u22122)(30x+43.5)=0 giving x = \u221229/20, y = 4769/400 \u2248 11.92', commentary:'We solve simultaneously. Since x = 2 is one solution, we can factor it out or use the sum/product of roots.'}
        ],
        finalAnswer:'Normal: 10y + x = 92. Second intersection at x = \u221229/20, y = 4769/400.',
        altMethod:'Instead of solving the full quadratic, use the fact that x = 2 is a known root. If 30x\u00B2 \u2212 19x \u2212 87 = 0 and x = 2 is a root, then sum of roots = 19/30, so the other root = 19/30 \u2212 2 = \u221241/30.'
    },
    {
        id:'t1_2', tier:1, marks:5,
        title:'Harmonic Form',
        desc:'Express 3sin\u03B8 + 4cos\u03B8 in the form Rsin(\u03B8 + \u03B1) and solve 3sin\u03B8 + 4cos\u03B8 = 2.',
        statement:'Express <strong>3sin\u03B8 + 4cos\u03B8</strong> in the form <strong>Rsin(\u03B8 + \u03B1)</strong>, where R > 0 and 0 < \u03B1 < \u03C0/2. Hence solve <strong>3sin\u03B8 + 4cos\u03B8 = 2</strong> for 0 \u2264 \u03B8 < 2\u03C0.',
        topics:['Trigonometry','Algebra'],
        steps:[
            {label:'Expand Rsin(\u03B8 + \u03B1)', mark:'M1', hint:'Rsin\u03B8cos\u03B1 + Rcos\u03B8sin\u03B1', answer:'Rsin(\u03B8+\u03B1) = Rcos\u03B1 sin\u03B8 + Rsin\u03B1 cos\u03B8', commentary:'Expanding allows us to compare coefficients.'},
            {label:'Find R and \u03B1', mark:'A1A1', hint:'Rcos\u03B1 = 3, Rsin\u03B1 = 4; R\u00B2 = 9 + 16', answer:'R = 5, tan\u03B1 = 4/3, \u03B1 = arctan(4/3) \u2248 0.927 rad (53.13\u00B0)', commentary:'R is found from R\u00B2 = 3\u00B2 + 4\u00B2 = 25. The angle \u03B1 is found from the ratio of coefficients.'},
            {label:'Solve 5sin(\u03B8 + \u03B1) = 2', mark:'M1', hint:'sin(\u03B8 + \u03B1) = 2/5 = 0.4', answer:'sin(\u03B8 + 0.927) = 0.4', commentary:'The harmonic form reduces the equation to a single trig function.'},
            {label:'Find all solutions in range', mark:'A1', hint:'Use arcsin and symmetry of sine', answer:'\u03B8 + 0.927 = 0.4115 or \u03C0 \u2212 0.4115 = 2.7301; \u03B8 = \u22120.515 (add 2\u03C0) = 5.768 or \u03B8 = 1.803', commentary:'Remember sin is positive in Q1 and Q2, and check all solutions are in [0, 2\u03C0).'}
        ],
        finalAnswer:'R = 5, \u03B1 = arctan(4/3) \u2248 0.927. Solutions: \u03B8 \u2248 1.80 and \u03B8 \u2248 5.77 radians.',
        altMethod:'You could also write in the form Rcos(\u03B8 \u2212 \u03B2), but the question specifies sin form. The key insight is that R = 5 forms a 3-4-5 triangle.'
    },
    {
        id:'t1_3', tier:1, marks:5,
        title:'Binomial and Partial Fractions',
        desc:'Express a rational function in partial fractions, then expand each part using the binomial series.',
        statement:'Express <strong>5x + 1</strong> / <strong>(1 + x)(1 + 2x)</strong> in partial fractions. Hence find the expansion in ascending powers of x, up to and including the term in x\u00B3.',
        topics:['Algebra','Binomial Expansion'],
        steps:[
            {label:'Split into partial fractions', mark:'M1A1', hint:'A/(1+x) + B/(1+2x)', answer:'Let (5x+1)/((1+x)(1+2x)) = A/(1+x) + B/(1+2x). Put x=\u22121: \u22124/(\u22121) = A(\u22121), A = 4. Wait: \u22124 = A(\u22121), A = 4. Put x = \u22121/2: \u22123/2 / (1/2) = B(1). Hmm, let me redo: x=\u22121: (\u22125+1)/(1)(\u22121) = A/0 + ... Using cover-up: A = (5(\u22121)+1)/(1+2(\u22121)) = \u22124/(\u22121) = 4. B = (5(\u22121/2)+1)/(1+(\u22121/2)) = (\u22123/2)/(1/2) = \u22123. So 4/(1+x) \u2212 3/(1+2x).', commentary:'The cover-up rule gives partial fraction coefficients quickly.'},
            {label:'Expand 4/(1+x)', mark:'M1', hint:'4(1+x)\u207B\u00B9 = 4(1 \u2212 x + x\u00B2 \u2212 x\u00B3 + ...)', answer:'4(1 \u2212 x + x\u00B2 \u2212 x\u00B3 + ...)', commentary:'Standard binomial expansion of (1+x)\u207B\u00B9 valid for |x| < 1.'},
            {label:'Expand \u22123/(1+2x)', mark:'M1', hint:'\u22123(1+2x)\u207B\u00B9 = \u22123(1 \u2212 2x + 4x\u00B2 \u2212 8x\u00B3 + ...)', answer:'\u22123(1 \u2212 2x + 4x\u00B2 \u2212 8x\u00B3 + ...)', commentary:'Replace x with 2x in the standard expansion. Valid for |x| < 1/2.'},
            {label:'Combine terms', mark:'A1', hint:'Add corresponding powers of x', answer:'(4\u22123) + (\u22124+6)x + (4\u221212)x\u00B2 + (\u22124+24)x\u00B3 = 1 + 2x \u2212 8x\u00B2 + 20x\u00B3', commentary:'Collect like terms carefully. Valid for |x| < 1/2 (the more restrictive condition).'}
        ],
        finalAnswer:'4/(1+x) \u2212 3/(1+2x); expansion = 1 + 2x \u2212 8x\u00B2 + 20x\u00B3 + ..., valid for |x| < 1/2.',
        altMethod:'You could expand (5x+1)(1+x)\u207B\u00B9(1+2x)\u207B\u00B9 directly by multiplying series, but partial fractions is cleaner.'
    },
    {
        id:'t1_4', tier:1, marks:5,
        title:'Exponential Growth and Differentiation',
        desc:'Find the rate of change of a population model and determine when growth is fastest.',
        statement:'A population is modelled by <strong>P = 200e<sup>0.03t</sup></strong> where t is in years. Find: (a) the rate of growth when t = 10, (b) the time when the population reaches 1000, (c) the rate of growth at that time.',
        topics:['Exponentials & Logs','Differentiation'],
        steps:[
            {label:'Differentiate P', mark:'M1', hint:'d/dt of 200e^(0.03t)', answer:'dP/dt = 200 \u00d7 0.03 \u00d7 e^(0.03t) = 6e^(0.03t)', commentary:'The chain rule: d/dt[e^(kt)] = ke^(kt).'},
            {label:'Rate of growth at t = 10', mark:'A1', hint:'Substitute t = 10', answer:'dP/dt = 6e^(0.3) = 6 \u00d7 1.3499 = 8.10 people per year', commentary:'Straightforward substitution into the derivative.'},
            {label:'Find t when P = 1000', mark:'M1A1', hint:'1000 = 200e^(0.03t), take ln', answer:'e^(0.03t) = 5, 0.03t = ln5, t = ln5/0.03 = 53.6 years', commentary:'Isolate the exponential, then take natural logarithms of both sides.'},
            {label:'Rate of growth when P = 1000', mark:'A1', hint:'dP/dt = 0.03P', answer:'dP/dt = 0.03 \u00d7 1000 = 30 people per year', commentary:'Since dP/dt = 0.03P, we can use P directly. This is a key feature of exponential growth.'}
        ],
        finalAnswer:'(a) 8.10/year; (b) t = 53.6 years; (c) 30/year.',

        title:'Proof by Contradiction',
        desc:'Prove that \u221A2 is irrational, and use the result to prove \u221A2 + 3 is irrational.',
        statement:'(a) Prove by contradiction that <strong>\u221A2 is irrational</strong>. (b) Hence prove that <strong>3 + \u221A2 is irrational</strong>.',
        topics:['Proof','Algebra'],
        steps:[
            {label:'State the assumption', mark:'M1', hint:'Assume \u221A2 is rational', answer:'Assume \u221A2 = a/b where a,b are integers with no common factor (fully reduced).', commentary:'Proof by contradiction starts by assuming the negation of what we want to prove.'},
            {label:'Derive the consequence', mark:'M1A1', hint:'Square both sides', answer:'2 = a\u00B2/b\u00B2, so a\u00B2 = 2b\u00B2. Therefore a\u00B2 is even, so a is even. Write a = 2k. Then 4k\u00B2 = 2b\u00B2, so b\u00B2 = 2k\u00B2, so b is even.', commentary:'If a\u00B2 is even then a must be even (contrapositive of: a odd implies a\u00B2 odd).'},
            {label:'Identify the contradiction', mark:'A1', hint:'Both a and b are even', answer:'Both a and b are even, so they share factor 2. This contradicts our assumption that a/b was fully reduced. Therefore \u221A2 is irrational.', commentary:'The contradiction with our initial assumption completes the proof.'},
            {label:'Prove 3 + \u221A2 is irrational', mark:'M1A1', hint:'Assume 3 + \u221A2 is rational and derive a contradiction', answer:'Assume 3 + \u221A2 = p/q (rational). Then \u221A2 = p/q \u2212 3 = (p\u22123q)/q, which is rational. But we proved \u221A2 is irrational. Contradiction. Therefore 3 + \u221A2 is irrational.', commentary:'The difference of two rationals is rational, so if 3+\u221A2 were rational, \u221A2 would be rational.'}

        finalAnswer:'Proofs complete. Both \u221A2 and 3+\u221A2 are irrational.',
        altMethod:'Part (b) can also be proved by noting that rational numbers are closed under subtraction: if 3+\u221A2 and 3 are both rational, then their difference \u221A2 would be rational.'
    },

    {

        title:'Differential Equation: Separable',
        desc:'Solve a separable first-order differential equation arising from a population model.',
        statement:'The rate of growth of a population P is given by <strong>dP/dt = 0.02P(500 \u2212 P)</strong>. Initially P = 50. Find: (a) P as a function of t, (b) the population as t \u2192 \u221E, (c) when P first exceeds 400.',
        topics:['Integration','Exponentials & Logs','Algebra'],
        steps:[
            {label:'Separate variables', mark:'M1', hint:'\u222B dP/[P(500\u2212P)] = \u222B 0.02 dt', answer:'\u222B 1/[P(500\u2212P)] dP = \u222B 0.02 dt', commentary:'Separating variables puts P terms on one side and t on the other.'},
            {label:'Use partial fractions', mark:'M1A1', hint:'1/[P(500\u2212P)] = A/P + B/(500\u2212P)', answer:'A = 1/500, B = 1/500. So (1/500)[\u222B 1/P + 1/(500\u2212P) dP] = 0.02t + C', commentary:'Partial fractions decomposition. Note the negative sign when integrating 1/(500\u2212P).'},
            {label:'Integrate both sides', mark:'M1A1', hint:'ln terms with signs', answer:'(1/500)[ln P \u2212 ln(500\u2212P)] = 0.02t + C; ln[P/(500\u2212P)] = 10t + K', commentary:'Combining logarithms gives a single ln expression.'},
            {label:'Apply initial condition P(0) = 50', mark:'A1', hint:'Find K', answer:'ln[50/450] = K; K = ln(1/9) = \u2212ln9', commentary:'The initial condition determines the constant of integration.'},
            {label:'Solve for P', mark:'M1A1', hint:'Exponentiate and rearrange', answer:'P/(500\u2212P) = (1/9)e^(10t); 9P = (500\u2212P)e^(10t); P(9+e^(10t)) = 500e^(10t); P = 500e^(10t)/(9+e^(10t)) = 500/(1+9e^(\u221210t))', commentary:'This is the logistic growth curve. The population approaches 500 as t\u2192\u221E.'},
            {label:'Find t when P = 400', mark:'A1', hint:'400 = 500/(1+9e^(\u221210t))', answer:'1+9e^(\u221210t) = 500/400 = 5/4; 9e^(\u221210t) = 1/4; e^(\u221210t) = 1/36; t = ln36/10 \u2248 0.358', commentary:'Solving the logistic equation at a specific population level.'}
        ],
        finalAnswer:'P = 500/(1+9e^(\u221210t)); limit = 500 as t\u2192\u221E; P > 400 when t > ln36/10 \u2248 0.358.',
        altMethod:'The logistic equation dP/dt = kP(M\u2212P) has the standard solution P = M/(1+Ce^(\u2212kMt)). Recognising this form with M=500, k=0.02 gives the answer directly.'
    },
    {

        title:'Mechanics: Work-Energy with Variable Force',
        desc:'Calculate work done by a variable force using integration, and find the resulting speed.',
        statement:'A particle of mass 2 kg starts from rest at x = 0. A force <strong>F = 12 \u2212 3x</strong> newtons acts on it in the positive x-direction. Find: (a) the work done as the particle moves from x = 0 to x = 3, (b) the speed at x = 3, (c) the value of x where the particle first comes to rest again.',

            {label:'Evaluate the integral', mark:'M1A1', hint:'Integrate term by term', answer:'W = [12x \u2212 3x\u00B2/2]\u2080\u00B3 = 36 \u2212 13.5 = 22.5 J', commentary:'Standard polynomial integration, then substitute limits.'},
            {label:'Find speed at x = 3', mark:'M1A1', hint:'Work-energy theorem: W = \u00BDmv\u00B2', answer:'22.5 = \u00BD(2)v\u00B2; v\u00B2 = 22.5; v = \u221A22.5 \u2248 4.74 ms\u207B\u00B9', commentary:'All the work done converts to kinetic energy since the particle starts from rest.'},

        altMethod:'You could solve the equation of motion ma = 12\u22123x using energy methods: \u00BDmv\u00B2 = 12x \u2212 3x\u00B2/2 at any point, then set v = 0.'

    // TIER 3
    {
        id:'t3_1', tier:3, marks:8,
        title:'Parametric Curve: Tangent and Area',
        desc:'Find dy/dx for a parametric curve, the tangent at a given point, and the enclosed area.',
        statement:'A curve is defined parametrically by <strong>x = 2cos(t), y = 3sin(t)</strong> for 0 \u2264 t \u2264 2\u03C0. (a) Find dy/dx in terms of t. (b) Find the equation of the tangent at t = \u03C0/3. (c) Find where this tangent meets the x-axis. (d) Find the area enclosed by the curve.',
        topics:['Parametric Equations','Differentiation','Trigonometry','Integration'],
        steps:[
            {label:'Find dx/dt and dy/dt', mark:'M1', hint:'Differentiate each parametric equation', answer:'dx/dt = \u22122sin(t), dy/dt = 3cos(t)', commentary:'Differentiate each equation with respect to the parameter t.'},
            {label:'Find dy/dx', mark:'A1', hint:'dy/dx = (dy/dt)/(dx/dt)', answer:'dy/dx = 3cos(t)/(\u22122sin(t)) = \u22123cos(t)/(2sin(t))', commentary:'The chain rule in parametric form: divide the two derivatives.'},
            {label:'Evaluate at t = \u03C0/3', mark:'M1A1', hint:'Find coordinates and gradient', answer:'x = 2cos(\u03C0/3) = 1, y = 3sin(\u03C0/3) = 3\u221A3/2. dy/dx = \u22123(1/2)/(2(\u221A3/2)) = \u22123/(2\u221A3) = \u2212\u221A3/2', commentary:'Substitute t = \u03C0/3 into the parametric equations and the gradient formula.'},
            {label:'Write tangent equation', mark:'A1', hint:'y \u2212 y\u2081 = m(x \u2212 x\u2081)', answer:'y \u2212 3\u221A3/2 = \u2212\u221A3/2(x \u2212 1); y = \u2212\u221A3x/2 + \u221A3/2 + 3\u221A3/2 = \u2212\u221A3x/2 + 2\u221A3', commentary:'Using point-gradient form with the coordinates and gradient at t = \u03C0/3.'},
            {label:'Find x-axis crossing', mark:'A1', hint:'Set y = 0', answer:'0 = \u2212\u221A3x/2 + 2\u221A3; x = 4. Point is (4, 0).', commentary:'Setting y = 0 and solving for x.'},
            {label:'Set up area integral', mark:'M1', hint:'A = \u222B y dx = \u222B y(dx/dt)dt', answer:'A = \u222B\u2080\u00B2\u03C0 3sin(t) \u00d7 (\u22122sin(t)) dt = \u22126\u222B\u2080\u00B2\u03C0 sin\u00B2(t) dt', commentary:'For parametric curves, area = \u222B y(dx/dt)dt. The negative sign indicates we traverse anticlockwise.'},
            {label:'Evaluate the area integral', mark:'M1A1', hint:'Use sin\u00B2t = (1\u2212cos2t)/2', answer:'|A| = 6\u222B\u2080\u00B2\u03C0 (1\u2212cos2t)/2 dt = 3[t \u2212 sin2t/2]\u2080\u00B2\u03C0 = 3(2\u03C0) = 6\u03C0', commentary:'This is the area of an ellipse with semi-axes 2 and 3. The formula \u03C0ab = \u03C0(2)(3) = 6\u03C0 confirms.'}
        ],
        finalAnswer:'dy/dx = \u22123cos(t)/(2sin(t)). Tangent: y = \u2212\u221A3x/2 + 2\u221A3. Meets x-axis at (4,0). Area = 6\u03C0.',
        altMethod:'The curve is an ellipse x\u00B2/4 + y\u00B2/9 = 1 (verify by using cos\u00B2t + sin\u00B2t = 1). You could differentiate implicitly instead, and the area is \u03C0ab = 6\u03C0 directly.'
    },
    {
        id:'t3_2', tier:3, marks:8,
        title:'Integration by Parts Twice',
        desc:'Evaluate an integral requiring integration by parts twice, leading to a simultaneous equation for the integral.',
        statement:'Find the <strong>exact value</strong> of \u222B\u2080<sup>\u03C0</sup> e<sup>2x</sup>sin(3x) dx.',
        topics:['Integration','Exponentials & Logs','Trigonometry'],
        steps:[
            {label:'Apply integration by parts (first time)', mark:'M1', hint:'Let u = sin(3x), dv = e^(2x)dx', answer:'Let u = sin3x, dv = e^(2x)dx. Then du = 3cos3x dx, v = e^(2x)/2. I = [e^(2x)sin3x/2]\u2080\u03C0 \u2212 (3/2)\u222Be^(2x)cos3x dx', commentary:'Choose carefully: integrating e^(2x) is simpler than differentiating it here.'},
            {label:'Evaluate the boundary term', mark:'A1', hint:'sin(3\u03C0) = 0, sin(0) = 0', answer:'[e^(2x)sin3x/2]\u2080\u03C0 = e^(2\u03C0)(0)/2 \u2212 e\u2070(0)/2 = 0', commentary:'Both boundary terms vanish because sin(3\u03C0) = sin(0) = 0.'},
            {label:'Apply integration by parts (second time)', mark:'M1A1', hint:'u = cos3x, dv = e^(2x)dx for the new integral', answer:'\u222Be^(2x)cos3x dx = [e^(2x)cos3x/2] + (3/2)\u222Be^(2x)sin3x dx = [e^(2x)cos3x/2] + (3/2)I', commentary:'We get the original integral I appearing again, which is the key technique.'},
            {label:'Combine to form equation in I', mark:'M1A1', hint:'I = 0 \u2212 3/2([e^(2x)cos3x/2]\u2080\u03C0 + 3I/2)', answer:'I = \u22123/4[e^(2x)cos3x]\u2080\u03C0 \u2212 9I/4. So I + 9I/4 = \u22123/4[e^(2\u03C0)cos3\u03C0 \u2212 cos0]. 13I/4 = \u22123/4[\u2212e^(2\u03C0) \u2212 1] = 3(e^(2\u03C0)+1)/4', commentary:'Collecting the I terms on one side creates a solvable linear equation.'},
            {label:'Solve for I', mark:'M1', hint:'Multiply both sides by 4/13', answer:'I = 3(e^(2\u03C0)+1)/13', commentary:'The exact answer involves e^(2\u03C0), which is left in exponential form.'},
            {label:'State final answer', mark:'A1', hint:'Exact form', answer:'\u222B\u2080\u03C0 e^(2x)sin(3x) dx = 3(e^(2\u03C0)+1)/13', commentary:'Numerically this is approximately 124.0.'}
        ],
        finalAnswer:'\u222B\u2080\u03C0 e^(2x)sin(3x) dx = 3(e^(2\u03C0) + 1)/13.',
        altMethod:'The general formula is: \u222Be^(ax)sin(bx)dx = e^(ax)(asinbx \u2212 bcosbx)/(a\u00B2+b\u00B2). With a=2, b=3: e^(2x)(2sin3x \u2212 3cos3x)/13, evaluated from 0 to \u03C0.'
    },
    {
        id:'t3_3', tier:3, marks:8,
        title:'Coordinate Geometry: Locus Problem',
        desc:'Find the locus of a point equidistant from a fixed point and a fixed line, then identify the curve.',
        statement:'A point P(x, y) moves so that its distance from the point <strong>S(2, 0)</strong> is equal to its distance from the line <strong>x = \u22122</strong>. (a) Show that the locus of P is <strong>y\u00B2 = 8x</strong>. (b) The tangent to this parabola at Q(2t\u00B2, 4t) meets the x-axis at T. Find the coordinates of T. (c) Find the area of triangle SQT in terms of t.',
        topics:['Coordinate Geometry','Differentiation','Algebra','Proof'],
        steps:[
            {label:'Set up distance equations', mark:'M1', hint:'PS = distance from P to line x = \u22122', answer:'\u221A((x\u22122)\u00B2+y\u00B2) = |x+2|', commentary:'Distance from point to point equals distance from point to line.'},
            {label:'Square and simplify', mark:'M1A1', hint:'Expand both sides', answer:'(x\u22122)\u00B2+y\u00B2 = (x+2)\u00B2; x\u00B2\u22124x+4+y\u00B2 = x\u00B2+4x+4; y\u00B2 = 8x. QED.', commentary:'The x\u00B2 and constant terms cancel, leaving the parabola equation.'},
            {label:'Differentiate y\u00B2 = 8x', mark:'M1A1', hint:'Implicit differentiation or parametric', answer:'2y(dy/dx) = 8, dy/dx = 4/y. At Q(2t\u00B2,4t): dy/dx = 4/(4t) = 1/t', commentary:'The gradient at any point on the parabola depends only on the y-coordinate.'},
            {label:'Find tangent equation at Q', mark:'A1', hint:'y \u2212 4t = (1/t)(x \u2212 2t\u00B2)', answer:'ty \u2212 4t\u00B2 = x \u2212 2t\u00B2; x = ty \u2212 2t\u00B2. Or: y = x/t + 2t.', commentary:'Rearranging to the standard tangent form for this parabola.'},
            {label:'Find T (where tangent meets x-axis)', mark:'A1', hint:'Set y = 0', answer:'x = \u22122t\u00B2. So T = (\u22122t\u00B2, 0).', commentary:'The tangent meets the x-axis at the directrix-distance from the vertex.'},
            {label:'Find area of triangle SQT', mark:'M1A1', hint:'Use \u00BD|x\u2081(y\u2082\u2212y\u2083)+x\u2082(y\u2083\u2212y\u2081)+x\u2083(y\u2081\u2212y\u2082)|', answer:'S=(2,0), Q=(2t\u00B2,4t), T=(\u22122t\u00B2,0). Area = \u00BD|2(4t\u22120)+2t\u00B2(0\u22120)+(\u22122t\u00B2)(0\u22124t)| = \u00BD|8t+8t\u00B3| = 4|t|(1+t\u00B2)', commentary:'Using the coordinate geometry formula for triangle area with vertices.'}
        ],
        finalAnswer:'Locus: y\u00B2 = 8x (proved). T = (\u22122t\u00B2, 0). Area = 4|t|(1+t\u00B2).',
        altMethod:'For the area, you could use the \u00BD \u00d7 base \u00d7 height approach: base ST = 2+2t\u00B2 along the x-axis, height = 4|t| (y-coordinate of Q). Area = \u00BD(2+2t\u00B2)(4|t|) = 4|t|(1+t\u00B2).'
    },
    {
        id:'t3_4', tier:3, marks:8,
        title:'Trigonometric Proof and Equation',
        desc:'Prove a trigonometric identity then use it to solve a multi-step equation.',
        statement:'(a) Prove that <strong>cos3\u03B8 = 4cos\u00B3\u03B8 \u2212 3cos\u03B8</strong>. (b) Hence solve the equation <strong>8cos\u00B3\u03B8 \u2212 6cos\u03B8 + 1 = 0</strong> for 0 \u2264 \u03B8 < 2\u03C0. (c) Deduce the exact value of cos(2\u03C0/9).',
        topics:['Trigonometry','Proof','Algebra'],
        steps:[
            {label:'Expand cos(2\u03B8 + \u03B8)', mark:'M1', hint:'cos3\u03B8 = cos(2\u03B8)\u00B7cos\u03B8 \u2212 sin(2\u03B8)\u00B7sin\u03B8', answer:'cos3\u03B8 = (2cos\u00B2\u03B8\u22121)cos\u03B8 \u2212 (2sin\u03B8cos\u03B8)sin\u03B8', commentary:'Use the addition formula with A = 2\u03B8, B = \u03B8.'},
            {label:'Simplify using sin\u00B2\u03B8 = 1 \u2212 cos\u00B2\u03B8', mark:'M1A1', hint:'Replace sin\u00B2\u03B8', answer:'= 2cos\u00B3\u03B8 \u2212 cos\u03B8 \u2212 2cos\u03B8(1\u2212cos\u00B2\u03B8) = 2cos\u00B3\u03B8 \u2212 cos\u03B8 \u2212 2cos\u03B8 + 2cos\u00B3\u03B8 = 4cos\u00B3\u03B8 \u2212 3cos\u03B8. QED.', commentary:'Expanding and collecting terms completes the proof.'},
            {label:'Rewrite the equation', mark:'M1A1', hint:'Factor out 2 from first two terms', answer:'8cos\u00B3\u03B8 \u2212 6cos\u03B8 + 1 = 2(4cos\u00B3\u03B8 \u2212 3cos\u03B8) + 1 = 2cos3\u03B8 + 1 = 0', commentary:'Recognising the identity from part (a) transforms the cubic into a simple cosine equation.'},
            {label:'Solve cos3\u03B8 = \u22121/2', mark:'M1A1', hint:'3\u03B8 = 2\u03C0/3, 4\u03C0/3, 8\u03C0/3, 10\u03C0/3, 14\u03C0/3, 16\u03C0/3', answer:'3\u03B8 = 2\u03C0/3 + 2k\u03C0 or 4\u03C0/3 + 2k\u03C0; \u03B8 = 2\u03C0/9, 4\u03C0/9, 8\u03C0/9, 10\u03C0/9, 14\u03C0/9, 16\u03C0/9', commentary:'Dividing by 3 and finding all solutions in [0, 2\u03C0) gives 6 solutions.'},
            {label:'Deduce cos(2\u03C0/9)', mark:'A1', hint:'\u03B8 = 2\u03C0/9 is a solution, so cos(2\u03C0/9) satisfies the original equation', answer:'cos(2\u03C0/9) is a root of 8c\u00B3 \u2212 6c + 1 = 0. This cubic factorises as (2c\u22121)(4c\u00B2+2c\u22121) = 0, giving c = 1/2 or c = (\u22121\u00b1\u221A5)/4. Since cos(2\u03C0/9) \u2248 0.766, it equals (\u22121+\u221A5)/4... Actually cos(2\u03C0/9) is not one of these simple roots. The exact value is a root of the irreducible cubic.', commentary:'cos(2\u03C0/9) is an algebraic number but cannot be expressed with square roots alone (this is related to the impossibility of trisecting an angle with compass and straightedge).'}
        ],
        finalAnswer:'Identity proved. Solutions: \u03B8 = 2\u03C0/9, 4\u03C0/9, 8\u03C0/9, 10\u03C0/9, 14\u03C0/9, 16\u03C0/9. cos(2\u03C0/9) is a root of 8c\u00B3 \u2212 6c + 1 = 0.',
        altMethod:'De Moivre\'s theorem provides an alternative proof: (cos\u03B8 + isin\u03B8)\u00B3 = cos3\u03B8 + isin3\u03B8. Expanding the LHS and taking the real part gives the identity.'
    },
    {
        id:'t3_5', tier:3, marks:8,
        title:'Proof by Induction and Series',
        desc:'Prove a summation formula by induction, then use it to evaluate a related series.',
        statement:'(a) Prove by induction that <strong>\u2211(r=1 to n) r\u00B2 = n(n+1)(2n+1)/6</strong>. (b) Hence find <strong>\u2211(r=1 to n) r(r+1)</strong> in simplified form. (c) Evaluate \u2211(r=10 to 50) r(r+1).',
        topics:['Proof','Sequences & Series','Algebra'],
        steps:[
            {label:'Base case: n = 1', mark:'B1', hint:'Check LHS = RHS when n = 1', answer:'LHS = 1\u00B2 = 1. RHS = 1(2)(3)/6 = 1. True for n = 1.', commentary:'Always start proof by induction with the base case.'},
            {label:'Inductive step: assume true for n = k', mark:'M1', hint:'Assume \u2211(r=1 to k) r\u00B2 = k(k+1)(2k+1)/6', answer:'Assume \u2211(r=1 to k) r\u00B2 = k(k+1)(2k+1)/6. Need to show true for k+1.', commentary:'State the inductive hypothesis clearly.'},
            {label:'Prove for n = k + 1', mark:'M1A1A1', hint:'Add (k+1)\u00B2 to both sides', answer:'\u2211(r=1 to k+1) r\u00B2 = k(k+1)(2k+1)/6 + (k+1)\u00B2 = (k+1)[k(2k+1)/6 + (k+1)] = (k+1)[2k\u00B2+k+6k+6]/6 = (k+1)(2k\u00B2+7k+6)/6 = (k+1)(k+2)(2k+3)/6. This is the formula with n = k+1. QED.', commentary:'Factor out (k+1), find common denominator, then factorise the resulting quadratic.'},
            {label:'Find \u2211r(r+1)', mark:'M1A1', hint:'\u2211r(r+1) = \u2211r\u00B2 + \u2211r', answer:'\u2211r(r+1) = \u2211r\u00B2 + \u2211r = n(n+1)(2n+1)/6 + n(n+1)/2 = n(n+1)[(2n+1)/6 + 1/2] = n(n+1)(2n+4)/6 = n(n+1)(n+2)/3', commentary:'Split and use known summation formulae, then simplify.'},
            {label:'Evaluate for r = 10 to 50', mark:'M1A1', hint:'\u2211(10 to 50) = \u2211(1 to 50) \u2212 \u2211(1 to 9)', answer:'\u2211(1 to 50) = 50(51)(52)/3 = 44200. \u2211(1 to 9) = 9(10)(11)/3 = 330. Answer = 44200 \u2212 330 = 43870.', commentary:'Use the difference of two complete sums to find a partial sum.'}
        ],
        finalAnswer:'Induction proof complete. \u2211r(r+1) = n(n+1)(n+2)/3. \u2211(10 to 50) = 43870.',
        altMethod:'For part (b), note that r(r+1) = r\u00B2+r can also be written as the number of ways to choose 2 items from r+1 (multiplied by 2), linking to combinatorics.'
    },
    {

        title:'Connected Rates and Optimisation',
        desc:'A box of fixed surface area: find dimensions for maximum volume using connected rates.',
        statement:'A closed rectangular box has a square base of side x cm and height h cm. The total surface area is <strong>150 cm\u00B2</strong>. (a) Show that h = (75 \u2212 x\u00B2)/(2x). (b) Find V in terms of x. (c) Find the maximum volume and the dimensions. (d) Find dV/dt when x is increasing at 0.1 cm/s at the instant when x = 3.',
        topics:['Differentiation','Algebra','Coordinate Geometry'],
        steps:[
            {label:'Write surface area equation', mark:'M1', hint:'SA = 2x\u00B2 + 4xh = 150', answer:'2x\u00B2 + 4xh = 150. Rearranging: 4xh = 150 \u2212 2x\u00B2, h = (150\u22122x\u00B2)/(4x) = (75\u2212x\u00B2)/(2x). QED.', commentary:'Surface area of a cuboid: two square faces plus four rectangular faces.'},
            {label:'Find V in terms of x', mark:'M1A1', hint:'V = x\u00B2h', answer:'V = x\u00B2 \u00d7 (75\u2212x\u00B2)/(2x) = x(75\u2212x\u00B2)/2 = (75x\u2212x\u00B3)/2', commentary:'Substituting the expression for h into the volume formula.'},
            {label:'Differentiate and find stationary point', mark:'M1A1', hint:'dV/dx = (75\u22123x\u00B2)/2', answer:'dV/dx = (75\u22123x\u00B2)/2 = 0 when x\u00B2 = 25, x = 5 (positive)', commentary:'Setting the derivative to zero and solving for x.'},
            {label:'Verify maximum and find dimensions', mark:'A1', hint:'Second derivative test', answer:'d\u00B2V/dx\u00B2 = \u22123x < 0 at x=5, confirmed maximum. h = (75\u221225)/10 = 5. V = 5\u00B2\u00d75 = 125 cm\u00B3. The box is a cube!', commentary:'The box is a 5\u00d75\u00d75 cube. This is a well-known result: among cuboids of fixed surface area, the cube has maximum volume.'},
            {label:'Find dV/dt when dx/dt = 0.1, x = 3', mark:'M1A1', hint:'dV/dt = (dV/dx)(dx/dt)', answer:'At x=3: dV/dx = (75\u221227)/2 = 24. dV/dt = 24 \u00d7 0.1 = 2.4 cm\u00B3/s.', commentary:'Connected rates of change: chain rule linking V, x, and t.'}
        ],
        finalAnswer:'h = (75\u2212x\u00B2)/(2x). V_max = 125 cm\u00B3 when x = h = 5 (a cube). dV/dt = 2.4 cm\u00B3/s.',
        altMethod:'You could use Lagrange multipliers (university level) or the AM-GM inequality to show that the cube is optimal among all cuboids of fixed surface area.'

    {

        title:'Binomial Expansion and Approximation',
        desc:'Use the binomial expansion to find a series, determine its validity, and use it to approximate a surd.',
        statement:'(a) Find the first 4 terms of the binomial expansion of <strong>(1 + 3x)<sup>1/2</sup></strong>. (b) State the range of validity. (c) By choosing a suitable value of x, show that <strong>\u221A10 \u2248 3.16228</strong>. (d) Find the percentage error in this approximation.',
        topics:['Binomial Expansion','Algebra','Proof'],
        steps:[
            {label:'Apply the generalised binomial theorem', mark:'M1A1', hint:'(1+u)^n = 1 + nu + n(n\u22121)u\u00B2/2! + ...', answer:'(1+3x)^(1/2) = 1 + (1/2)(3x) + (1/2)(\u22121/2)(3x)\u00B2/2! + (1/2)(\u22121/2)(\u22123/2)(3x)\u00B3/3!', commentary:'The generalised binomial theorem works for non-integer exponents when |3x| < 1.'},
            {label:'Simplify each term', mark:'A1', hint:'Calculate the coefficients', answer:'= 1 + 3x/2 \u2212 9x\u00B2/8 + 27x\u00B3/16 \u2212 ...', commentary:'Be very careful with signs and fractions at each stage.'},
            {label:'State range of validity', mark:'A1', hint:'|3x| < 1', answer:'Valid for |x| < 1/3', commentary:'The series converges when the absolute value of the inner expression is less than 1.'},
            {label:'Choose x to approximate \u221A10', mark:'M1A1', hint:'Need 1+3x = 10, but also 1+3x = 10/k\u00B2 for some convenient k', answer:'Let x = 1/3: (1+1)^(1/2) = \u221A2. Not helpful directly. Better: we need \u221A(1+3x) = \u221A10/k. Try 1+3x = 10/9, so x = 1/27. Then (10/9)^(1/2) = \u221A10/3. So \u221A10 = 3(1+1/9)^(1/2) = 3[1 + 1/18 \u2212 1/648 + 1/11664 \u2212 ...] \u2248 3.16228.', commentary:'The key trick is to write \u221A10 = 3\u221A(10/9) = 3(1+1/9)^(1/2) so that the expansion converges rapidly with x = 1/27.'},
            {label:'Calculate the approximation', mark:'A1', hint:'Substitute x = 1/27 and multiply by 3', answer:'\u221A10 \u2248 3[1 + 1/18 \u2212 1/648 + 1/11664] = 3[1 + 0.05556 \u2212 0.00154 + 0.0000857] = 3 \u00d7 1.05410 = 3.16231. Alternatively using more precision: 3.16228.', commentary:'The series converges quickly because x = 1/27 is small.'},
            {label:'Find percentage error', mark:'M1A1', hint:'True value: \u221A10 = 3.16227766...', answer:'Error = |3.16228 \u2212 3.16227766|/3.16227766 \u00d7 100 \u2248 0.000007%. Essentially exact to 5 decimal places.', commentary:'The rapid convergence means even 4 terms give extraordinary accuracy.'}
        ],
        finalAnswer:'(1+3x)^(1/2) \u2248 1 + 3x/2 \u2212 9x\u00B2/8 + 27x\u00B3/16. Valid for |x| < 1/3. \u221A10 \u2248 3.16228 (error < 0.00001%).',
        altMethod:'You could use x = 1/3 to find \u221A2, then compute \u221A10 = \u221A2 \u00d7 \u221A5, but you would need another expansion for \u221A5.'
    },
    {
        id:'t3_8', tier:3, marks:8,
        title:'Statistics: Hypothesis Test with Normal Approximation',
        desc:'Conduct a hypothesis test using the normal approximation to the binomial, and find the critical region.',
        statement:'A manufacturer claims that <strong>85% of their products pass quality inspection</strong>. An inspector tests <strong>200 items</strong> and finds that <strong>160 pass</strong>. (a) Using a suitable approximation, test at the <strong>5% significance level</strong> whether the pass rate is lower than claimed. (b) Find the critical region. (c) What is the smallest sample size for which observing 80% passing would lead to rejection of H\u2080?',
        topics:['Statistics','Algebra'],
        steps:[
            {label:'State hypotheses and model', mark:'B1', hint:'One-tailed test', answer:'H\u2080: p = 0.85, H\u2081: p < 0.85. X ~ B(200, 0.85). Since np = 170 and n(1\u2212p) = 30, both > 5, use N(170, 25.5) approximation.', commentary:'The normal approximation to the binomial requires np and n(1\u2212p) both to be at least 5.'},
            {label:'Calculate the test statistic', mark:'M1A1', hint:'Z = (X \u2212 \u03BC)/\u03C3, with continuity correction', answer:'With continuity correction: Z = (160.5 \u2212 170)/\u221A25.5 = \u22129.5/5.05 = \u22121.881', commentary:'The continuity correction adds 0.5 towards the mean because we are approximating a discrete distribution with a continuous one.'},
            {label:'Compare with critical value', mark:'M1A1', hint:'For 5% one-tailed: z = \u22121.6449', answer:'|Z| = 1.881 > 1.6449. Reject H\u2080. There is significant evidence at 5% that the pass rate is below 85%.', commentary:'Since our test statistic falls in the critical region, we reject the null hypothesis.'},
            {label:'Find the critical region', mark:'M1A1', hint:'X < 170 \u2212 1.6449\u221A25.5', answer:'Reject H\u2080 when X \u2264 170 \u2212 1.6449(5.05) \u2212 0.5 = 170 \u2212 8.31 \u2212 0.5 = 161.19. So reject when X \u2264 161 (i.e. 161 or fewer pass).', commentary:'The critical region is the set of outcomes that lead to rejection of H\u2080.'},
            {label:'Find minimum sample size for 80% observation', mark:'M1A1', hint:'Need (0.80n \u2212 0.85n)/\u221A(0.85\u00d70.15\u00d7n) < \u22121.6449', answer:'\u22120.05\u221An/\u221A0.1275 < \u22121.6449; 0.05\u221An/0.3571 > 1.6449; \u221An > 11.74; n > 137.8. So n \u2265 138.', commentary:'We need the observed proportion of 80% to fall in the critical region.'}
        ],
        finalAnswer:'Reject H\u2080: evidence pass rate is below 85% (Z = \u22121.88). Critical region: X \u2264 161. Minimum n = 138.',
        altMethod:'Without the continuity correction, Z = (160\u2212170)/5.05 = \u22121.98, which also leads to rejection. The continuity correction gives a more accurate result.'
    }
];

// State
let state = {
    filter: 'all',
    topicFilter: null,
    completed: new Set(),
    marksGained: 0,
    marksAttempted: 0,
    currentProblem: null,
    timerInterval: null,
    timerSeconds: 0,
    timerRunning: false,
    selectedTopics: new Set()
};

function renderTopicFilters() {
    const row = document.getElementById('topicFilterRow');
    row.innerHTML = ALL_TOPICS.map(t =>
        `<span class="topic-chip${state.topicFilter === t ? ' active' : ''}" onclick="toggleTopicFilter('${t}')">${t}</span>`
    ).join('');
}

function toggleTopicFilter(topic) {
    state.topicFilter = state.topicFilter === topic ? null : topic;
    renderTopicFilters();
    renderGrid();
}

function renderGrid() {
    const grid = document.getElementById('problemGrid');
    let filtered = PROBLEMS;
    if (state.filter !== 'all') filtered = filtered.filter(p => p.tier === parseInt(state.filter));
    if (state.topicFilter) filtered = filtered.filter(p => p.topics.includes(state.topicFilter));

    grid.innerHTML = filtered.map(p => {
        const tierClass = `tier-${p.tier}`;
        const completed = state.completed.has(p.id);
        return `<div class="problem-card ${tierClass}${completed ? ' completed' : ''}" onclick="openProblem('${p.id}')">
            <div class="card-header">
                <span class="card-title">${p.title}</span>
                <span class="card-marks">${p.marks} marks</span>
            </div>
            <div class="card-desc">${p.desc}</div>
            <div class="card-topics">${p.topics.map(t => `<span class="card-topic-tag">${t}</span>`).join('')}</div>
            ${completed ? '<div style="position:absolute;top:8px;left:8px;color:var(--success);font-size:1.1rem;">\u2713</div>' : ''}
        </div>`;
    }).join('');
}

function updateScores() {
    document.getElementById('marksGained').textContent = state.marksGained;
    document.getElementById('marksAvail').textContent = state.marksAttempted;
    document.getElementById('completedCount').textContent = state.completed.size;
    document.getElementById('currentTier').textContent = state.filter === 'all' ? 'All' : `Tier ${state.filter}`;
}

function openProblem(id) {
    const p = PROBLEMS.find(pr => pr.id === id);
    if (!p) return;
    state.currentProblem = p;
    state.selectedTopics = new Set();
    stopTimer();

    document.getElementById('gridContainer').classList.add('hidden');
    document.getElementById('filterBar').style.display = 'none';
    document.getElementById('topicFilterRow').style.display = 'none';
    const ws = document.getElementById('workspace');
    ws.classList.add('active');

    ws.innerHTML = `
        <button class="back-btn" onclick="closeProblem()">\u2190 Back to Problems</button>

        <div class="timer-bar">
            <span style="font-size:0.85rem;font-weight:600;color:var(--text-secondary);">Timer:</span>
            <span class="timer-display" id="timerDisplay">00:00</span>
            <button class="btn btn-secondary" onclick="toggleTimer()" id="timerBtn" style="font-size:0.8rem;">Start</button>
            <button class="btn btn-secondary" onclick="resetTimer()" style="font-size:0.8rem;">Reset</button>
            <span style="font-size:0.78rem;color:var(--text-muted);margin-left:auto;">Suggested: ${p.marks * 1.2} min</span>
        </div>

        <div class="problem-statement">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;">
                <strong style="font-size:1.05rem;">${p.title}</strong>
                <span class="card-marks" style="background:${p.tier===1?'var(--success-pale)':p.tier===2?'var(--warning-pale)':'var(--danger-pale)'};color:${p.tier===1?'var(--success)':p.tier===2?'#92400e':'var(--danger)'};">Tier ${p.tier} \u2014 ${p.marks} marks</span>
            </div>
            ${p.statement}
        </div>

        <!-- Topic Identification -->
        <div class="panel" id="topicIdentPanel">
            <h2>What Topics Are Involved?</h2>
            <p style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:0.75rem;">Select the A-level topics you think this problem requires:</p>
            <div class="topic-selector" id="topicSelector">
                ${ALL_TOPICS.map(t => `<button class="topic-select-btn" data-topic="${t}" onclick="toggleTopic(this)">${t}</button>`).join('')}
            </div>
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="checkTopics()">Check Topics</button>
            </div>
            <div id="topicFeedback" class="feedback"></div>
            <div class="topic-web" id="topicWeb" style="display:none;">
                <div class="section-label">Topic connections for this problem:</div>
            </div>
        </div>

        <!-- Solution Planner -->
        <div class="panel" id="plannerPanel">
            <h2>Plan Your Approach</h2>
            <p style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:0.75rem;">Outline your strategy before solving. What technique will you use at each step?</p>
            <div id="plannerSteps">
                ${[1,2,3,4].map(i => `
                    <div class="planner-step">
                        <div class="planner-num">${i}</div>
                        <input class="planner-input" type="text" placeholder="Step ${i}: describe your approach..." id="plan_${i}">
                    </div>
                `).join('')}
            </div>
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="addPlannerStep()">+ Add Step</button>
                <button class="btn btn-primary" onclick="showSolver()">Start Solving \u2192</button>
            </div>
        </div>

        <!-- Step-by-Step Solver -->
        <div class="panel" id="solverPanel" style="display:none;">
            <h2>Step-by-Step Working</h2>
            ${p.steps.map((s, i) => `
                <div class="step-workspace" id="solveStep_${i}">
                    <div class="step-label">
                        ${s.label}
                        <span class="mark-badge mark-${s.mark.charAt(0)}">${s.mark}</span>
                    </div>
                    <textarea id="work_${i}" placeholder="Show your working..." rows="2"></textarea>
                    <div style="margin-top:0.5rem;">
                        <label style="font-size:0.8rem;font-weight:600;color:var(--text-secondary);">Your answer:</label>
                        <input type="text" id="ans_${i}" placeholder="Enter answer for this step" style="font-family:'Courier New',monospace;margin-top:0.25rem;">
                    </div>
                    <div class="btn-group" style="margin-top:0.5rem;">
                        <button class="btn btn-secondary" onclick="showStepHint(${i})" style="font-size:0.8rem;">Hint</button>
                        <button class="btn btn-primary" onclick="checkStepAnswer(${i})" style="font-size:0.8rem;">Check</button>
                    </div>
                    <div id="hint_${i}" class="feedback"></div>
                    <div id="stepFb_${i}" class="feedback"></div>
                </div>
            `).join('')}
        </div>

        <!-- Review -->
        <div class="panel" id="reviewPanel" style="display:none;">
            <div class="btn-group" style="margin-top:0;">
                <button class="btn btn-secondary" onclick="showWorkedSolution()">Show Full Worked Solution</button>
                <button class="btn btn-success" onclick="completeProblem()">Mark as Complete \u2713</button>
            </div>
        </div>

        <div class="solution-panel" id="solutionPanel">
            <h3>Full Worked Solution with Mark Scheme</h3>
            ${p.steps.map(s => `
                <div class="solution-step">
                    <strong>${s.label}</strong> <span class="mark-badge mark-${s.mark.charAt(0)}">${s.mark}</span><br>
                    ${s.answer}
                    <div style="font-size:0.8rem;color:var(--text-muted);margin-top:0.3rem;font-style:italic;">${s.commentary}</div>
                </div>
            `).join('')}
            <div class="solution-step" style="font-weight:700;color:var(--success);border-top:2px solid #fde68a;padding-top:0.75rem;">
                Final answer: ${p.finalAnswer}
            </div>
            ${p.altMethod ? `<div class="alt-method"><h4>Alternative Method</h4><p style="font-size:0.85rem;">${p.altMethod}</p></div>` : ''}
        </div>
    `;
}

function closeProblem() {
    state.currentProblem = null;
    stopTimer();
    document.getElementById('gridContainer').classList.remove('hidden');
    document.getElementById('filterBar').style.display = 'flex';
    document.getElementById('topicFilterRow').style.display = 'flex';
    const ws = document.getElementById('workspace');
    ws.classList.remove('active');
    ws.innerHTML = '';
    renderGrid();
}

let planStepCount = 4;
function addPlannerStep() {
    planStepCount++;
    const div = document.createElement('div');
    div.className = 'planner-step';
    div.innerHTML = `<div class="planner-num">${planStepCount}</div><input class="planner-input" type="text" placeholder="Step ${planStepCount}: describe your approach..." id="plan_${planStepCount}">`;
    document.getElementById('plannerSteps').appendChild(div);
}

function toggleTopic(btn) {
    const t = btn.dataset.topic;
    btn.classList.toggle('selected');
    if (state.selectedTopics.has(t)) state.selectedTopics.delete(t);
    else state.selectedTopics.add(t);
}

function checkTopics() {
    const p = state.currentProblem;
    const fb = document.getElementById('topicFeedback');
    const correct = p.topics.filter(t => state.selectedTopics.has(t));
    const missed = p.topics.filter(t => !state.selectedTopics.has(t));
    const extra = [...state.selectedTopics].filter(t => !p.topics.includes(t));

    let msg = `${correct.length}/${p.topics.length} correct topics identified.`;
    if (missed.length) msg += ` Missed: ${missed.join(', ')}.`;
    if (extra.length) msg += ` Not needed: ${extra.join(', ')}.`;

    fb.className = correct.length === p.topics.length && extra.length === 0 ? 'feedback correct' : 'feedback info';
    fb.textContent = msg;

    // Show topic web
    const web = document.getElementById('topicWeb');
    web.style.display = 'flex';
    web.innerHTML = '<div class="section-label" style="width:100%;">Topic connections for this problem:</div>' +
        p.topics.map(t => `<span class="topic-bubble connected">${t}</span>`).join('') +
        [...state.selectedTopics].filter(t => !p.topics.includes(t)).map(t => `<span class="topic-bubble">${t}</span>`).join('');
}

function showSolver() {
    document.getElementById('solverPanel').style.display = 'block';
    document.getElementById('reviewPanel').style.display = 'block';
    document.getElementById('solverPanel').scrollIntoView({ behavior: 'smooth' });
}

function showStepHint(i) {
    const p = state.currentProblem;
    const el = document.getElementById(`hint_${i}`);
    el.className = 'feedback info';
    el.textContent = 'Hint: ' + p.steps[i].hint;
}

function checkStepAnswer(i) {
    const p = state.currentProblem;
    const fb = document.getElementById(`stepFb_${i}`);
    const userAns = document.getElementById(`ans_${i}`).value.trim();
    if (!userAns) {
        fb.className = 'feedback incorrect';
        fb.textContent = 'Please enter your answer.';
        return;
    }
    fb.className = 'feedback info';
    fb.innerHTML = `<strong>Expected (${p.steps[i].mark}):</strong> ${p.steps[i].answer}`;
}

function showWorkedSolution() {
    document.getElementById('solutionPanel').classList.add('visible');
    document.getElementById('solutionPanel').scrollIntoView({ behavior: 'smooth' });
}

function completeProblem() {
    const p = state.currentProblem;
    if (!state.completed.has(p.id)) {
        state.completed.add(p.id);
        state.marksAttempted += p.marks;
        state.marksGained += p.marks;
    }
    updateScores();
    stopTimer();
    const btn = event.target;
    btn.textContent = 'Completed!';
    btn.style.background = '#15803d';
    setTimeout(() => closeProblem(), 800);
}

// Timer
function toggleTimer() {
    if (state.timerRunning) stopTimer();
    else startTimer();
}
function startTimer() {
    state.timerRunning = true;
    document.getElementById('timerBtn').textContent = 'Pause';
    state.timerInterval = setInterval(() => {
        state.timerSeconds++;
        updateTimerDisplay();
    }, 1000);
}
function stopTimer() {
    state.timerRunning = false;
    if (state.timerInterval) clearInterval(state.timerInterval);
    state.timerInterval = null;
    const btn = document.getElementById('timerBtn');
    if (btn) btn.textContent = 'Start';
}
function resetTimer() {
    stopTimer();
    state.timerSeconds = 0;
    updateTimerDisplay();
}
function updateTimerDisplay() {
    const el = document.getElementById('timerDisplay');
    if (!el) return;
    const m = Math.floor(state.timerSeconds / 60);
    const s = state.timerSeconds % 60;
    el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    const p = state.currentProblem;
    if (p) {
        const suggested = p.marks * 1.2 * 60;
        el.className = 'timer-display' + (state.timerSeconds > suggested * 1.5 ? ' danger' : state.timerSeconds > suggested ? ' warning' : '');
    }
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.filter = btn.dataset.tier;
        updateScores();
        renderGrid();
    });
});

// Init
renderTopicFilters();
renderGrid();
updateScores();
</script>
</body>
</html>
