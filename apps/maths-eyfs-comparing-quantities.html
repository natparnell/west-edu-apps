<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>More or Fewer?</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #faf7f2;
  color: #3d2e1f;
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  user-select: none;
  -webkit-user-select: none;
  overflow-x: hidden;
}

/* Title Bar */
.title-bar {
  width: 100%;
  background: #e07020;
  color: #fff;
  text-align: center;
  padding: 16px 20px;
  font-size: 1.6rem;
  font-weight: 800;
  letter-spacing: 0.5px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.12);
}

/* Instructions */
.instructions {
  font-size: 1.15rem;
  font-weight: 600;
  color: #3d2e1f;
  text-align: center;
  margin: 14px 10px 6px;
  line-height: 1.4;
}

/* Score & controls row */
.controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  flex-wrap: wrap;
  margin: 8px 10px 10px;
}

.score-badge {
  background: #3d2e1f;
  color: #fff;
  font-weight: 700;
  font-size: 1rem;
  padding: 8px 18px;
  border-radius: 30px;
}

.btn {
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  border: none;
  border-radius: 14px;
  padding: 10px 22px;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 3px 8px rgba(0,0,0,0.13);
}
.btn:active { transform: scale(0.95); }

.btn-mode {
  background: #e07020;
  color: #fff;
}
.btn-reset {
  background: #fff;
  color: #e07020;
  border: 2.5px solid #e07020;
}

/* Main game area */
.game-area {
  display: flex;
  align-items: stretch;
  justify-content: center;
  gap: 20px;
  width: 100%;
  max-width: 820px;
  padding: 10px 16px;
  flex: 1;
}

.group-card {
  flex: 1;
  background: #fff;
  border-radius: 22px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 18px 12px 14px;
  cursor: pointer;
  border: 4px solid transparent;
  transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
  min-height: 220px;
  position: relative;
}
.group-card:hover {
  border-color: #e07020;
}
.group-card:active {
  transform: scale(0.97);
}

.group-card.correct {
  border-color: #3bb54a;
  box-shadow: 0 0 24px rgba(59,181,74,0.35);
}
.group-card.wrong {
  border-color: #e04040;
  box-shadow: 0 0 18px rgba(224,64,64,0.25);
}

.group-label {
  font-weight: 800;
  font-size: 1.1rem;
  color: #e07020;
  margin-bottom: 8px;
}

.emoji-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
  gap: 6px;
  max-width: 260px;
}
.emoji-item {
  font-size: 2.4rem;
  transition: transform 0.3s;
  line-height: 1.1;
}

/* Equal button */
.equal-btn-wrap {
  display: flex;
  justify-content: center;
  margin: 0 0 12px;
}
.btn-equal {
  background: #6b4ead;
  color: #fff;
  font-size: 1.1rem;
  padding: 14px 34px;
  border-radius: 18px;
}

/* Bounce animation on winning group */
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  30% { transform: translateY(-12px); }
  50% { transform: translateY(-6px); }
  70% { transform: translateY(-10px); }
}
.group-card.correct .emoji-item {
  animation: bounce 0.6s ease;
}

/* Shake on wrong */
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-6px); }
  80% { transform: translateX(4px); }
}
.group-card.wrong {
  animation: shake 0.45s ease;
}

/* Feedback toast */
.feedback {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  font-size: 2.6rem;
  font-weight: 800;
  padding: 20px 40px;
  border-radius: 22px;
  color: #fff;
  z-index: 100;
  pointer-events: none;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
  opacity: 0;
}
.feedback.show {
  transform: translate(-50%, -50%) scale(1);
  opacity: 1;
}
.feedback.good { background: #3bb54a; }
.feedback.bad { background: #e04040; }

/* Round indicator */
.round-info {
  font-size: 0.95rem;
  font-weight: 600;
  color: #9a7b5a;
  margin-bottom: 10px;
}

/* Responsive */
@media (max-width: 560px) {
  .title-bar { font-size: 1.25rem; padding: 13px 14px; }
  .emoji-item { font-size: 2rem; }
  .game-area { gap: 10px; padding: 8px 8px; }
  .group-card { padding: 14px 8px 12px; border-radius: 16px; min-height: 170px; }
  .instructions { font-size: 1rem; }
  .feedback { font-size: 1.8rem; padding: 14px 28px; }
}
</style>
</head>
<body>

<div class="title-bar">More or Fewer?</div>

<p class="instructions" id="instructions">Tap the group that has <strong>more</strong>!</p>

<div class="controls">
  <span class="score-badge" id="scoreBadge">Score: 0 / 0</span>
  <button class="btn btn-mode" id="modeBtn" onclick="toggleMode()">Mode: More</button>
  <button class="btn btn-reset" onclick="newGame()">New Game</button>
</div>

<div class="round-info" id="roundInfo">Round 1 of 10</div>

<div class="game-area">
  <div class="group-card" id="groupA" onclick="pick('A')">
    <div class="group-label" id="labelA">Group A</div>
    <div class="emoji-grid" id="gridA"></div>
  </div>
  <div class="group-card" id="groupB" onclick="pick('B')">
    <div class="group-label" id="labelB">Group B</div>
    <div class="emoji-grid" id="gridB"></div>
  </div>
</div>

<div class="equal-btn-wrap">
  <button class="btn btn-equal" id="equalBtn" onclick="pick('equal')">They're Equal!</button>
</div>

<div class="feedback" id="feedback"></div>

<script>
const EMOJIS = [
  ['рЯНО','рЯНП','рЯНР','рЯНК','рЯНЛ','рЯНМ','рЯНЙ','рЯНЗ','рЯНУ','рЯЂР'],
  ['рЯМЯ','в≠Р','рЯМЩ','вШАпЄП','рЯМИ','рЯТЂ','вЬ®','рЯФ•','рЯТО','рЯОИ'],
  ['рЯРґ','рЯР±','рЯР∞','рЯРї','рЯ¶К','рЯРЄ','рЯРµ','рЯРЈ','рЯРЃ','рЯРФ'],
  ['рЯЪЧ','рЯЪХ','рЯЪМ','рЯЪТ','вЬИпЄП','рЯЪА','вЫµ','рЯЪ≤','рЯЫі','рЯПОпЄП'],
  ['рЯМї','рЯМє','рЯМЈ','рЯМЄ','рЯТР','рЯМЇ','рЯ™ї','рЯМЉ','рЯ™Ј','рЯМµ']
];

let mode = 'more'; // 'more' or 'fewer'
let countA = 0, countB = 0;
let score = 0, total = 0, round = 0;
const TOTAL_ROUNDS = 10;
let answered = false;

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function pickEmojis() {
  const set = EMOJIS[randInt(0, EMOJIS.length - 1)];
  return set[randInt(0, set.length - 1)];
}

function generateRound() {
  answered = false;
  round++;
  document.getElementById('roundInfo').textContent = 'Round ' + round + ' of ' + TOTAL_ROUNDS;

  // ~20% chance of equal quantities
  const makeEqual = Math.random() < 0.2;
  if (makeEqual) {
    countA = randInt(1, 10);
    countB = countA;
  } else {
    countA = randInt(1, 10);
    do { countB = randInt(1, 10); } while (countB === countA);
  }

  const emojiChar = pickEmojis();

  const gridA = document.getElementById('gridA');
  const gridB = document.getElementById('gridB');
  gridA.innerHTML = '';
  gridB.innerHTML = '';

  for (let i = 0; i < countA; i++) {
    const span = document.createElement('span');
    span.className = 'emoji-item';
    span.textContent = emojiChar;
    gridA.appendChild(span);
  }
  for (let i = 0; i < countB; i++) {
    const span = document.createElement('span');
    span.className = 'emoji-item';
    span.textContent = emojiChar;
    gridB.appendChild(span);
  }

  // Reset card styles
  document.getElementById('groupA').className = 'group-card';
  document.getElementById('groupB').className = 'group-card';
}

function pick(choice) {
  if (answered) return;
  if (round > TOTAL_ROUNDS) return;
  answered = true;
  total++;

  let correctChoice;
  if (countA === countB) {
    correctChoice = 'equal';
  } else if (mode === 'more') {
    correctChoice = countA > countB ? 'A' : 'B';
  } else {
    correctChoice = countA < countB ? 'A' : 'B';
  }

  const isCorrect = choice === correctChoice;
  if (isCorrect) score++;

  document.getElementById('scoreBadge').textContent = 'Score: ' + score + ' / ' + total;

  // Visual feedback on cards
  if (correctChoice === 'equal') {
    document.getElementById('groupA').classList.add(isCorrect ? 'correct' : 'wrong');
    document.getElementById('groupB').classList.add(isCorrect ? 'correct' : 'wrong');
  } else {
    const correctCard = document.getElementById(correctChoice === 'A' ? 'groupA' : 'groupB');
    correctCard.classList.add('correct');
    if (!isCorrect) {
      const wrongCard = document.getElementById(choice === 'A' ? 'groupA' : (choice === 'B' ? 'groupB' : ''));
      if (wrongCard) wrongCard.classList.add('wrong');
    }
  }

  showFeedback(isCorrect);

  setTimeout(() => {
    if (round < TOTAL_ROUNDS) {
      generateRound();
    } else {
      showFinalScore();
    }
  }, 1400);
}

function showFeedback(correct) {
  const fb = document.getElementById('feedback');
  fb.textContent = correct ? 'Well Done!' : 'Try Again!';
  fb.className = 'feedback ' + (correct ? 'good' : 'bad') + ' show';
  setTimeout(() => { fb.className = 'feedback'; }, 1100);
}

function showFinalScore() {
  const fb = document.getElementById('feedback');
  fb.textContent = score + ' out of ' + TOTAL_ROUNDS + '!';
  fb.className = 'feedback good show';
  document.getElementById('roundInfo').textContent = 'All done! Great job!';
  setTimeout(() => { fb.className = 'feedback'; }, 2500);
}

function toggleMode() {
  mode = mode === 'more' ? 'fewer' : 'more';
  document.getElementById('modeBtn').textContent = 'Mode: ' + (mode === 'more' ? 'More' : 'Fewer');
  document.getElementById('instructions').innerHTML =
    'Tap the group that has <strong>' + mode + '</strong>!';
  newGame();
}

function newGame() {
  score = 0;
  total = 0;
  round = 0;
  document.getElementById('scoreBadge').textContent = 'Score: 0 / 0';
  generateRound();
}

newGame();
</script>
</body>
</html>
