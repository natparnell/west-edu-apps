<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coin Counter</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#faf7f2;color:#3d2e1f;min-height:100vh;display:flex;flex-direction:column;align-items:center}
.title-bar{width:100%;background:#2563eb;color:#fff;text-align:center;padding:16px;font-size:1.6rem;font-weight:800;letter-spacing:1px;box-shadow:0 2px 8px rgba(37,99,235,.3)}
.subtitle{font-size:.85rem;font-weight:400;opacity:.85;margin-top:4px}
.container{max-width:900px;width:100%;padding:20px}
.top-bar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:16px}
.score-box{background:#fff;border:2px solid #2563eb;border-radius:12px;padding:8px 18px;font-weight:700;font-size:1rem;color:#2563eb}
.mode-btns{display:flex;gap:6px;flex-wrap:wrap}
.mode-btn{padding:7px 14px;border:2px solid #2563eb;border-radius:8px;background:#fff;color:#2563eb;font-family:'Inter',sans-serif;font-weight:600;font-size:.85rem;cursor:pointer;transition:all .2s}
.mode-btn.active,.mode-btn:hover{background:#2563eb;color:#fff}
.instructions{background:#fff;border-radius:12px;padding:14px 20px;margin-bottom:16px;font-size:1.1rem;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06);font-weight:600;min-height:52px;display:flex;align-items:center;justify-content:center}
.coin-tray{background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.07);margin-bottom:16px}
.coin-tray h3{text-align:center;color:#2563eb;margin-bottom:12px;font-size:1rem}
.coin-row{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.coin{width:68px;height:68px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;cursor:pointer;user-select:none;transition:transform .15s,box-shadow .15s;position:relative;border:3px solid rgba(0,0,0,.15);text-align:center;line-height:1.1}
.coin:hover{transform:scale(1.1);box-shadow:0 4px 16px rgba(0,0,0,.2)}
.coin:active{transform:scale(.95)}
.coin-1p,.coin-2p{background:linear-gradient(145deg,#d97706,#b45309);color:#fff;font-size:.95rem}
.coin-5p,.coin-10p,.coin-20p,.coin-50p{background:linear-gradient(145deg,#d1d5db,#9ca3af);color:#374151;font-size:.9rem}
.coin-100p,.coin-200p{background:linear-gradient(145deg,#fbbf24,#d97706);color:#3d2e1f;font-size:.85rem}
.coin-1p{width:52px;height:52px;font-size:.85rem}
.coin-2p{width:60px;height:60px}
.coin-5p{width:48px;height:48px;font-size:.8rem}
.coin-10p{width:58px;height:58px}
.coin-20p{width:56px;height:56px;border-radius:0;clip-path:polygon(50% 2%,90% 22%,98% 60%,75% 95%,25% 95%,2% 60%,10% 22%);border:none;box-shadow:0 0 0 3px rgba(0,0,0,.15)}
.coin-50p{width:66px;height:66px;border-radius:0;clip-path:polygon(50% 2%,90% 22%,98% 60%,75% 95%,25% 95%,2% 60%,10% 22%);border:none;box-shadow:0 0 0 3px rgba(0,0,0,.15)}
.coin-100p{width:62px;height:62px}
.coin-200p{width:70px;height:70px}
.purse{background:#fff;border:4px dashed #2563eb;border-radius:20px;min-height:160px;padding:20px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:8px;align-content:flex-start;justify-content:center;transition:background .2s,border-color .2s;position:relative}
.purse.drag-over{background:#eff6ff;border-color:#1d4ed8}
.purse-label{position:absolute;top:8px;left:50%;transform:translateX(-50%);font-size:.8rem;color:#94a3b8;font-weight:600}
.purse .coin{animation:dropCoin .3s ease}
@keyframes dropCoin{from{transform:scale(0) rotate(-180deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.total-display{text-align:center;background:#eff6ff;border-radius:14px;padding:16px;margin-bottom:16px}
.total-display .amount{font-size:2.6rem;font-weight:800;color:#2563eb;letter-spacing:2px}
.total-display .label{font-size:.85rem;color:#64748b;font-weight:600;margin-bottom:4px}
.answer-area{text-align:center;margin-bottom:12px}
.answer-area input{font-family:'Inter',sans-serif;font-size:1.8rem;font-weight:700;text-align:center;width:140px;padding:10px;border:3px solid #cbd5e1;border-radius:12px;color:#2563eb;outline:none;transition:border-color .2s}
.answer-area input:focus{border-color:#2563eb}
.answer-area .unit{font-size:1.4rem;font-weight:700;color:#64748b;margin-left:6px}
.btn-row{text-align:center;margin-bottom:12px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.check-btn,.new-btn,.clear-btn{font-family:'Inter',sans-serif;padding:10px 24px;border:none;border-radius:10px;font-weight:700;font-size:1rem;cursor:pointer;transition:all .2s}
.check-btn{background:#2563eb;color:#fff}
.check-btn:hover{background:#1d4ed8}
.new-btn{background:#f59e0b;color:#fff}
.new-btn:hover{background:#d97706}
.clear-btn{background:#94a3b8;color:#fff}
.clear-btn:hover{background:#64748b}
.feedback{text-align:center;font-size:1.2rem;font-weight:700;min-height:32px}
.feedback.correct{color:#16a34a}
.feedback.wrong{color:#dc2626}
.coin-ghost{position:fixed;pointer-events:none;z-index:999;opacity:.85}
@media(max-width:640px){.coin{transform:scale(.9)}.total-display .amount{font-size:2rem}}
</style>
</head>
<body>
<div class="title-bar">Coin Counter<div class="subtitle">UK Coins - Count and Make Amounts</div></div>
<div class="container">
  <div class="top-bar">
    <div class="score-box">Score: <span id="score">0</span> / <span id="total">0</span></div>
    <div class="mode-btns">
      <button class="mode-btn active" data-mode="make" onclick="setMode('make')">Make Amount</button>
      <button class="mode-btn" data-mode="count" onclick="setMode('count')">Count Coins</button>
      <button class="mode-btn" data-mode="free" onclick="setMode('free')">Free Play</button>
    </div>
  </div>
  <div class="instructions" id="instructions">Click coins to add them to your purse!</div>

  <div class="coin-tray" id="coinTray">
    <h3>Coins</h3>
    <div class="coin-row" id="coinRow"></div>
  </div>

  <div class="purse" id="purse">
    <span class="purse-label">Your Purse - click coins above to add, click here to remove</span>
  </div>

  <div class="total-display">
    <div class="label">Total in purse</div>
    <div class="amount" id="totalAmount">0p</div>
  </div>

  <div class="answer-area" id="answerArea" style="display:none">
    <input type="number" id="answerInput" min="0" max="999" placeholder="?">
    <span class="unit">p</span>
  </div>

  <div class="btn-row">
    <button class="check-btn" onclick="checkAnswer()">Check!</button>
    <button class="new-btn" onclick="newQuestion()">New Question</button>
    <button class="clear-btn" onclick="clearPurse()">Clear Purse</button>
  </div>
  <div class="feedback" id="feedback"></div>
</div>

<script>
const coins=[
  {value:1,label:'1p',cls:'coin-1p'},
  {value:2,label:'2p',cls:'coin-2p'},
  {value:5,label:'5p',cls:'coin-5p'},
  {value:10,label:'10p',cls:'coin-10p'},
  {value:20,label:'20p',cls:'coin-20p'},
  {value:50,label:'50p',cls:'coin-50p'},
  {value:100,label:'\u00a31',cls:'coin-100p'},
  {value:200,label:'\u00a32',cls:'coin-200p'}
];

let mode='make',score=0,totalQ=0,targetAmount=0,purseCoins=[];
const purse=document.getElementById('purse');
const feedback=document.getElementById('feedback');
const instructions=document.getElementById('instructions');
const totalAmountEl=document.getElementById('totalAmount');
const answerArea=document.getElementById('answerArea');
const answerInput=document.getElementById('answerInput');
const coinRow=document.getElementById('coinRow');

function buildCoinTray(){
  coinRow.innerHTML='';
  coins.forEach(c=>{
    const el=document.createElement('div');
    el.className='coin '+c.cls;
    el.textContent=c.label;
    el.addEventListener('click',()=>addToPurse(c));
    coinRow.appendChild(el);
  });
}

function addToPurse(c){
  if(mode==='count') return; // can't add in count mode
  purseCoins.push(c.value);
  renderPurse();
  updateTotal();
}

function renderPurse(){
  // keep label
  purse.innerHTML='<span class="purse-label">Your Purse - click coins above to add, click here to remove</span>';
  purseCoins.forEach((v,idx)=>{
    const c=coins.find(x=>x.value===v);
    const el=document.createElement('div');
    el.className='coin '+c.cls;
    el.textContent=c.label;
    el.style.cursor='pointer';
    el.title='Click to remove';
    el.addEventListener('click',()=>{
      if(mode==='count') return;
      purseCoins.splice(idx,1);
      renderPurse();
      updateTotal();
    });
    purse.appendChild(el);
  });
}

function updateTotal(){
  const t=purseCoins.reduce((a,b)=>a+b,0);
  if(t>=100){
    const pounds=Math.floor(t/100);
    const pence=t%100;
    totalAmountEl.textContent=pence>0?`\u00a3${pounds}.${String(pence).padStart(2,'0')}`:`\u00a3${pounds}.00`;
  } else {
    totalAmountEl.textContent=t+'p';
  }
  if(mode==='count'){
    totalAmountEl.style.visibility='hidden';
  } else {
    totalAmountEl.style.visibility='visible';
  }
}

function formatAmount(p){
  if(p>=100){
    const pounds=Math.floor(p/100),pence=p%100;
    return pence>0?`\u00a3${pounds}.${String(pence).padStart(2,'0')}`:`\u00a3${pounds}`;
  }
  return p+'p';
}

function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===m));
  clearPurse();
  feedback.textContent='';
  if(m==='free'){
    instructions.textContent='Free play! Click coins to explore adding and counting.';
    answerArea.style.display='none';
    document.getElementById('coinTray').style.display='block';
    totalAmountEl.style.visibility='visible';
  } else {
    newQuestion();
  }
}

function generateTarget(){
  // difficulty based on score
  const diff=Math.min(Math.floor(totalQ/3),4);
  let maxVal,coinTypes;
  if(diff===0){maxVal=10;coinTypes=[1,2,5];}
  else if(diff===1){maxVal=20;coinTypes=[1,2,5,10];}
  else if(diff===2){maxVal=50;coinTypes=[1,2,5,10,20];}
  else if(diff===3){maxVal=100;coinTypes=[1,2,5,10,20,50];}
  else{maxVal=200;coinTypes=[1,2,5,10,20,50,100,200];}

  // generate a reachable amount
  let amount=0;
  const numCoins=Math.floor(Math.random()*4)+2;
  const selectedCoins=[];
  for(let i=0;i<numCoins;i++){
    const c=coinTypes[Math.floor(Math.random()*coinTypes.length)];
    if(amount+c<=maxVal){
      amount+=c;
      selectedCoins.push(c);
    }
  }
  if(amount===0){amount=coinTypes[0];selectedCoins.push(coinTypes[0]);}
  return{amount,selectedCoins};
}

function newQuestion(){
  clearPurse();
  feedback.textContent='';
  const q=generateTarget();
  targetAmount=q.amount;

  if(mode==='make'){
    instructions.textContent=`Make ${formatAmount(targetAmount)} using coins!`;
    answerArea.style.display='none';
    document.getElementById('coinTray').style.display='block';
    totalAmountEl.style.visibility='visible';
  } else if(mode==='count'){
    // show coins in purse, hide total, ask to type answer
    purseCoins=q.selectedCoins.slice();
    renderPurse();
    totalAmountEl.style.visibility='hidden';
    instructions.textContent='How much money is in the purse? Count the coins!';
    answerArea.style.display='block';
    answerInput.value='';
    answerInput.focus();
    document.getElementById('coinTray').style.display='none';
  }
}

function checkAnswer(){
  totalQ++;
  if(mode==='make'){
    const t=purseCoins.reduce((a,b)=>a+b,0);
    if(t===targetAmount){
      score++;
      feedback.className='feedback correct';
      feedback.textContent=`Brilliant! You made ${formatAmount(targetAmount)}!`;
    } else {
      feedback.className='feedback wrong';
      feedback.textContent=`Not quite! You made ${formatAmount(t)}, but the target was ${formatAmount(targetAmount)}.`;
    }
  } else if(mode==='count'){
    const v=parseInt(answerInput.value)||0;
    if(v===targetAmount){
      score++;
      feedback.className='feedback correct';
      feedback.textContent=`Well done! It is ${formatAmount(targetAmount)}!`;
      totalAmountEl.style.visibility='visible';
      updateTotal();
    } else {
      feedback.className='feedback wrong';
      feedback.textContent=`Not quite! The answer is ${formatAmount(targetAmount)}.`;
      totalAmountEl.style.visibility='visible';
      updateTotal();
    }
  } else {
    // free play - just show total
    const t=purseCoins.reduce((a,b)=>a+b,0);
    feedback.className='feedback correct';
    feedback.textContent=`You have ${formatAmount(t)} in your purse!`;
    totalQ--;
  }
  document.getElementById('score').textContent=score;
  document.getElementById('total').textContent=totalQ;
}

function clearPurse(){
  purseCoins=[];
  renderPurse();
  updateTotal();
}

buildCoinTray();
setMode('make');
newQuestion();
</script>
</body>
</html>
