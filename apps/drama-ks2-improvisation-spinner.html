<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Improvisation Spinner</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
    --brown-50: #fdf8f1;
    --brown-100: #f5e6d0;
    --brown-200: #e8cfa8;
    --brown-300: #d4a96e;
    --brown-400: #c48a47;
    --brown-500: #a06c30;
    --brown-600: #7c5427;
    --brown-700: #5c3d1e;
    --orange-50: #fff7ed;
    --orange-100: #ffedd5;
    --orange-200: #fed7aa;
    --orange-300: #fdba74;
    --orange-400: #fb923c;
    --orange-500: #f97316;
    --orange-600: #ea580c;
    --orange-700: #c2410c;
    --cream: #fffbf5;
    --cream-dark: #f5efe6;
    --text: #3d2e1f;
    --text-light: #7a6652;
    --card-bg: #ffffff;
    --border: #e8ddd0;
    --shadow: 0 2px 8px rgba(60,40,10,0.08);
    --shadow-lg: 0 8px 24px rgba(60,40,10,0.12);
    --radius: 14px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--cream); color: var(--text); line-height: 1.6; min-height: 100vh; }

.header {
    background: linear-gradient(135deg, var(--brown-600), var(--brown-500), var(--orange-600));
    color: white; padding: 16px 24px; box-shadow: var(--shadow-lg);
    position: sticky; top: 0; z-index: 100;
}
.header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 14px; }
.header-icon { font-size: 1.8rem; }
.header h1 { font-size: 1.35rem; font-weight: 800; letter-spacing: -0.02em; }
.header p { font-size: 0.8rem; opacity: 0.9; margin-top: 2px; }

.main { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }

.spinners-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-bottom: 24px;
}

.spinner-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    padding: 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
}
.spinner-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
}
.spinner-card.character::before { background: linear-gradient(90deg, #e74c3c, #e67e22); }
.spinner-card.location::before { background: linear-gradient(90deg, #2ecc71, #27ae60); }
.spinner-card.situation::before { background: linear-gradient(90deg, #3498db, #9b59b6); }

.spinner-label {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 12px;
}
.character .spinner-label { color: #e74c3c; }
.location .spinner-label { color: #27ae60; }
.situation .spinner-label { color: #3498db; }

.wheel-container {
    position: relative;
    width: 200px;
    height: 200px;
    margin: 0 auto 16px;
}

.wheel-canvas {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    cursor: pointer;
    transition: filter 0.3s;
}
.wheel-canvas:hover { filter: brightness(1.05); }

.wheel-pointer {
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-top: 18px solid var(--brown-700);
    z-index: 2;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.2));
}

.result-display {
    min-height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px 14px;
    background: var(--cream);
    border-radius: 10px;
    font-weight: 700;
    font-size: 1rem;
    border: 2px dashed var(--border);
    transition: all 0.3s;
}
.result-display.has-result {
    border-style: solid;
    background: var(--orange-50);
    border-color: var(--orange-300);
}

.spin-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 12px;
    padding: 8px 18px;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    color: white;
}
.character .spin-btn { background: #e74c3c; }
.character .spin-btn:hover { background: #c0392b; }
.location .spin-btn { background: #27ae60; }
.location .spin-btn:hover { background: #1e8449; }
.situation .spin-btn { background: #3498db; }
.situation .spin-btn:hover { background: #2980b9; }

.controls-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 24px;
}

.btn-primary {
    padding: 12px 28px;
    background: linear-gradient(135deg, var(--orange-500), var(--orange-600));
    color: white;
    border: none;
    border-radius: 10px;
    font-family: inherit;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(249,115,22,0.3);
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(249,115,22,0.4); }
.btn-primary:active { transform: translateY(0); }

.btn-secondary {
    padding: 12px 28px;
    background: var(--card-bg);
    color: var(--brown-600);
    border: 2px solid var(--brown-200);
    border-radius: 10px;
    font-family: inherit;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
}
.btn-secondary:hover { background: var(--brown-50); border-color: var(--brown-400); }

/* Timer Section */
.timer-section {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    padding: 24px;
    margin-bottom: 24px;
    text-align: center;
}
.timer-section h2 {
    font-size: 1rem;
    font-weight: 700;
    color: var(--brown-600);
    margin-bottom: 16px;
}

.timer-presets {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
}
.timer-preset {
    padding: 8px 16px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: var(--cream);
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text);
}
.timer-preset:hover { border-color: var(--orange-400); background: var(--orange-50); }
.timer-preset.active { border-color: var(--orange-500); background: var(--orange-100); color: var(--orange-700); }

.timer-display {
    font-size: 3.5rem;
    font-weight: 800;
    color: var(--brown-700);
    font-variant-numeric: tabular-nums;
    margin-bottom: 16px;
    letter-spacing: -0.02em;
    transition: color 0.3s;
}
.timer-display.warning { color: var(--orange-500); }
.timer-display.critical { color: #e74c3c; animation: pulse 1s ease-in-out infinite; }

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}

.timer-controls {
    display: flex;
    gap: 10px;
    justify-content: center;
}

.timer-btn {
    padding: 10px 24px;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
}
.timer-btn.start { background: #27ae60; color: white; }
.timer-btn.start:hover { background: #1e8449; }
.timer-btn.pause { background: var(--orange-500); color: white; }
.timer-btn.pause:hover { background: var(--orange-600); }
.timer-btn.reset { background: var(--cream-dark); color: var(--text); }
.timer-btn.reset:hover { background: var(--brown-100); }

/* Progress bar */
.timer-progress {
    width: 100%;
    height: 8px;
    background: var(--cream-dark);
    border-radius: 4px;
    margin-bottom: 16px;
    overflow: hidden;
}
.timer-progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--orange-400), var(--orange-500));
    border-radius: 4px;
    transition: width 0.5s linear;
    width: 100%;
}
.timer-progress-bar.warning { background: linear-gradient(90deg, #f39c12, #e67e22); }
.timer-progress-bar.critical { background: linear-gradient(90deg, #e74c3c, #c0392b); }

/* Challenge Display */
.challenge-card {
    background: linear-gradient(135deg, var(--orange-50), var(--brown-50));
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 2px solid var(--orange-200);
    padding: 24px;
    margin-bottom: 24px;
    text-align: center;
    display: none;
}
.challenge-card.visible { display: block; animation: fadeSlide 0.4s ease; }
.challenge-card h3 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--orange-600); margin-bottom: 12px; }
.challenge-text {
    font-size: 1.15rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1.5;
}
.challenge-text span {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 6px;
    font-weight: 700;
    margin: 0 2px;
}
.challenge-text .char { background: #fde8e8; color: #c0392b; }
.challenge-text .loc { background: #d5f5e3; color: #1e8449; }
.challenge-text .sit { background: #d6eaf8; color: #2471a3; }

@keyframes fadeSlide {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* History */
.history-section {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    padding: 20px;
}
.history-section h2 {
    font-size: 1rem;
    font-weight: 700;
    color: var(--brown-600);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
}
.history-list { list-style: none; }
.history-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 8px;
    margin-bottom: 6px;
    background: var(--cream);
    font-size: 0.85rem;
    animation: fadeSlide 0.3s ease;
}
.history-num {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--brown-200);
    color: var(--brown-700);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.75rem;
    flex-shrink: 0;
}
.history-text { flex: 1; }
.history-text .tag {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 4px;
    font-size: 0.78rem;
    font-weight: 600;
    margin-right: 3px;
}
.history-text .tag.char { background: #fde8e8; color: #c0392b; }
.history-text .tag.loc { background: #d5f5e3; color: #1e8449; }
.history-text .tag.sit { background: #d6eaf8; color: #2471a3; }
.history-empty {
    text-align: center;
    color: var(--text-light);
    font-size: 0.85rem;
    padding: 20px;
    font-style: italic;
}
.clear-history {
    font-size: 0.78rem;
    color: var(--text-light);
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    text-decoration: underline;
    margin-left: auto;
}
.clear-history:hover { color: var(--orange-600); }

/* Responsive */
@media (max-width: 900px) {
    .spinners-grid { grid-template-columns: 1fr; max-width: 360px; margin-left: auto; margin-right: auto; }
    .wheel-container { width: 180px; height: 180px; }
    .wheel-canvas { width: 180px; height: 180px; }
}
@media (max-width: 600px) {
    .header { padding: 12px 16px; }
    .header h1 { font-size: 1.15rem; }
    .main { padding: 16px 12px; }
    .timer-display { font-size: 2.5rem; }
}
</style>
</head>
<body>

<header class="header">
    <div class="header-inner">
        <span class="header-icon">🎭</span>
        <div>
            <h1>Improvisation Spinner</h1>
            <p>Spin the wheels and create your drama challenge!</p>
        </div>
    </div>
</header>

<main class="main">
    <div class="spinners-grid">
        <div class="spinner-card character">
            <div class="spinner-label">Character</div>
            <div class="wheel-container">
                <div class="wheel-pointer"></div>
                <canvas class="wheel-canvas" id="wheelCharacter" width="400" height="400"></canvas>
            </div>
            <div class="result-display" id="resultCharacter">Spin to choose!</div>
            <button class="spin-btn" onclick="spinWheel('character')">&#9654; Spin</button>
        </div>

        <div class="spinner-card location">
            <div class="spinner-label">Location</div>
            <div class="wheel-container">
                <div class="wheel-pointer"></div>
                <canvas class="wheel-canvas" id="wheelLocation" width="400" height="400"></canvas>
            </div>
            <div class="result-display" id="resultLocation">Spin to choose!</div>
            <button class="spin-btn" onclick="spinWheel('location')">&#9654; Spin</button>
        </div>

        <div class="spinner-card situation">
            <div class="spinner-label">Situation</div>
            <div class="wheel-container">
                <div class="wheel-pointer"></div>
                <canvas class="wheel-canvas" id="wheelSituation" width="400" height="400"></canvas>
            </div>
            <div class="result-display" id="resultSituation">Spin to choose!</div>
            <button class="spin-btn" onclick="spinWheel('situation')">&#9654; Spin</button>
        </div>
    </div>

    <div class="controls-row">
        <button class="btn-primary" onclick="spinAll()">🎲 Spin All Wheels</button>
        <button class="btn-secondary" onclick="newChallenge()">✨ New Challenge</button>
    </div>

    <div class="challenge-card" id="challengeCard">
        <h3>Your Improvisation Challenge</h3>
        <p class="challenge-text" id="challengeText"></p>
    </div>

    <div class="timer-section">
        <h2>⏱ Performance Timer</h2>
        <div class="timer-presets">
            <button class="timer-preset" data-seconds="30" onclick="setTimer(30, this)">30s</button>
            <button class="timer-preset active" data-seconds="60" onclick="setTimer(60, this)">1 min</button>
            <button class="timer-preset" data-seconds="120" onclick="setTimer(120, this)">2 min</button>
            <button class="timer-preset" data-seconds="300" onclick="setTimer(300, this)">5 min</button>
        </div>
        <div class="timer-progress"><div class="timer-progress-bar" id="timerProgress"></div></div>
        <div class="timer-display" id="timerDisplay">1:00</div>
        <div class="timer-controls">
            <button class="timer-btn start" id="timerStartBtn" onclick="toggleTimer()">&#9654; Start</button>
            <button class="timer-btn reset" onclick="resetTimer()">↺ Reset</button>
        </div>
    </div>

    <div class="history-section">
        <h2>
            <span>📋 Spin History</span>
            <button class="clear-history" id="clearHistoryBtn" onclick="clearHistory()" style="display:none;">Clear all</button>
        </h2>
        <ul class="history-list" id="historyList">
            <li class="history-empty">No spins yet — give the wheels a go!</li>
        </ul>
    </div>
</main>

<script>
const DATA = {
    character: {
        items: ['Detective', 'Pirate', 'Alien', 'Teacher', 'Superhero', 'Chef', 'Wizard', 'Robot', 'Explorer', 'Inventor'],
        colors: ['#e74c3c','#c0392b','#e67e22','#d35400','#e74c3c','#c0392b','#e67e22','#d35400','#e74c3c','#c0392b'],
        emoji: '🎭'
    },
    location: {
        items: ['Desert Island', 'Space Station', 'Haunted House', 'School', 'Underwater', 'Jungle', 'Castle', 'Moon Base', 'Pirate Ship', 'Magic Forest'],
        colors: ['#27ae60','#1e8449','#2ecc71','#16a085','#27ae60','#1e8449','#2ecc71','#16a085','#27ae60','#1e8449'],
        emoji: '📍'
    },
    situation: {
        items: ['Something is missing', 'A storm is coming', 'A stranger arrives', 'Time is running out', 'A secret is revealed', 'The lights go out', 'A map is found', 'Someone is lost', 'A contest begins', 'A door won\'t open'],
        colors: ['#3498db','#2980b9','#9b59b6','#8e44ad','#3498db','#2980b9','#9b59b6','#8e44ad','#3498db','#2980b9'],
        emoji: '⚡'
    }
};

const state = {
    wheels: {},
    results: { character: null, location: null, situation: null },
    history: [],
    timer: { duration: 60, remaining: 60, interval: null, running: false }
};

function drawWheel(type) {
    const canvas = document.getElementById('wheel' + type.charAt(0).toUpperCase() + type.slice(1));
    const ctx = canvas.getContext('2d');
    const data = DATA[type];
    const n = data.items.length;
    const cx = 200, cy = 200, r = 190;
    const anglePerSlice = (2 * Math.PI) / n;
    const rotation = state.wheels[type] || 0;

    ctx.clearRect(0, 0, 400, 400);

    // Draw shadow
    ctx.beginPath();
    ctx.arc(cx + 2, cy + 2, r, 0, 2 * Math.PI);
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    ctx.fill();

    for (let i = 0; i < n; i++) {
        const startAngle = rotation + i * anglePerSlice - Math.PI / 2;
        const endAngle = startAngle + anglePerSlice;

        // Slice
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, startAngle, endAngle);
        ctx.closePath();
        ctx.fillStyle = data.colors[i];
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Text
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(startAngle + anglePerSlice / 2);
        ctx.textAlign = 'center';
        ctx.fillStyle = 'white';
        ctx.font = 'bold 13px Inter, sans-serif';
        ctx.shadowColor = 'rgba(0,0,0,0.3)';
        ctx.shadowBlur = 3;

        const text = data.items[i];
        const words = text.split(' ');
        if (words.length > 1 && text.length > 10) {
            ctx.font = 'bold 11px Inter, sans-serif';
            ctx.fillText(words[0], r * 0.62, -5);
            ctx.fillText(words.slice(1).join(' '), r * 0.62, 9);
        } else {
            ctx.fillText(text, r * 0.62, 4);
        }
        ctx.restore();
    }

    // Center circle
    ctx.beginPath();
    ctx.arc(cx, cy, 28, 0, 2 * Math.PI);
    ctx.fillStyle = '#ffffff';
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.1)';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.font = '18px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowBlur = 0;
    ctx.fillText(data.emoji, cx, cy);
}

function getSelectedItem(type) {
    const data = DATA[type];
    const n = data.items.length;
    const anglePerSlice = (2 * Math.PI) / n;
    const rotation = state.wheels[type] || 0;
    // Pointer is at top (-PI/2), so we find which slice is there
    const normalizedAngle = ((2 * Math.PI) - (rotation % (2 * Math.PI)) + (2 * Math.PI)) % (2 * Math.PI);
    const index = Math.floor(normalizedAngle / anglePerSlice) % n;
    return data.items[index];
}

function spinWheel(type, callback) {
    const data = DATA[type];
    const startRotation = state.wheels[type] || 0;
    const spinAmount = Math.PI * 8 + Math.random() * Math.PI * 6; // 4-7 full rotations
    const endRotation = startRotation + spinAmount;
    const duration = 3000 + Math.random() * 1000;
    const startTime = performance.now();

    // Play a click sound effect via oscillator
    function tick(freq) {
        try {
            const actx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = actx.createOscillator();
            const gain = actx.createGain();
            osc.connect(gain);
            gain.connect(actx.destination);
            osc.frequency.value = freq;
            osc.type = 'triangle';
            gain.gain.value = 0.05;
            gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.08);
            osc.start();
            osc.stop(actx.currentTime + 0.08);
        } catch(e) {}
    }

    let lastSlice = -1;

    function animate(now) {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / duration, 1);
        // Easing: cubic out
        const ease = 1 - Math.pow(1 - progress, 3);
        const currentRotation = startRotation + spinAmount * ease;
        state.wheels[type] = currentRotation;

        // Tick sound on slice change
        const n = data.items.length;
        const anglePerSlice = (2 * Math.PI) / n;
        const normalizedAngle = ((2 * Math.PI) - (currentRotation % (2 * Math.PI)) + (2 * Math.PI)) % (2 * Math.PI);
        const currentSlice = Math.floor(normalizedAngle / anglePerSlice) % n;
        if (currentSlice !== lastSlice && progress < 0.95) {
            tick(600 + Math.random() * 400);
            lastSlice = currentSlice;
        }

        drawWheel(type);

        if (progress < 1) {
            requestAnimationFrame(animate);
        } else {
            state.wheels[type] = endRotation;
            drawWheel(type);
            const result = getSelectedItem(type);
            state.results[type] = result;
            const display = document.getElementById('result' + type.charAt(0).toUpperCase() + type.slice(1));
            display.textContent = result;
            display.classList.add('has-result');

            // Final chime
            tick(880);
            setTimeout(() => tick(1100), 80);

            updateChallenge();
            if (callback) callback();
        }
    }

    requestAnimationFrame(animate);
}

function spinAll() {
    let completed = 0;
    const types = ['character', 'location', 'situation'];
    types.forEach((type, i) => {
        setTimeout(() => {
            spinWheel(type, () => {
                completed++;
                if (completed === 3) addToHistory();
            });
        }, i * 200);
    });
}

function newChallenge() {
    // Reset results
    state.results = { character: null, location: null, situation: null };
    document.getElementById('challengeCard').classList.remove('visible');
    ['Character','Location','Situation'].forEach(t => {
        const el = document.getElementById('result' + t);
        el.textContent = 'Spin to choose!';
        el.classList.remove('has-result');
    });
    spinAll();
}

function updateChallenge() {
    const { character, location, situation } = state.results;
    if (character && location && situation) {
        const card = document.getElementById('challengeCard');
        const text = document.getElementById('challengeText');
        text.innerHTML = `You are a <span class="char">${character}</span> at a <span class="loc">${location}</span> and <span class="sit">${situation.toLowerCase()}</span>!`;
        card.classList.add('visible');
    }
}

function addToHistory() {
    const { character, location, situation } = state.results;
    if (!character || !location || !situation) return;
    state.history.unshift({ character, location, situation });
    if (state.history.length > 20) state.history.pop();
    renderHistory();
}

function renderHistory() {
    const list = document.getElementById('historyList');
    const clearBtn = document.getElementById('clearHistoryBtn');
    if (state.history.length === 0) {
        list.innerHTML = '<li class="history-empty">No spins yet — give the wheels a go!</li>';
        clearBtn.style.display = 'none';
        return;
    }
    clearBtn.style.display = 'inline';
    list.innerHTML = state.history.map((h, i) =>
        `<li class="history-item">
            <span class="history-num">${i + 1}</span>
            <span class="history-text">
                <span class="tag char">${h.character}</span>
                <span class="tag loc">${h.location}</span>
                <span class="tag sit">${h.situation}</span>
            </span>
        </li>`
    ).join('');
}

function clearHistory() {
    state.history = [];
    renderHistory();
}

// Timer
function setTimer(seconds, btn) {
    document.querySelectorAll('.timer-preset').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (state.timer.running) {
        clearInterval(state.timer.interval);
        state.timer.running = false;
    }
    state.timer.duration = seconds;
    state.timer.remaining = seconds;
    updateTimerDisplay();
    const startBtn = document.getElementById('timerStartBtn');
    startBtn.innerHTML = '&#9654; Start';
    startBtn.className = 'timer-btn start';
}

function updateTimerDisplay() {
    const { remaining, duration } = state.timer;
    const mins = Math.floor(remaining / 60);
    const secs = remaining % 60;
    const display = document.getElementById('timerDisplay');
    display.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;

    const pct = (remaining / duration) * 100;
    const bar = document.getElementById('timerProgress');
    bar.style.width = pct + '%';

    display.className = 'timer-display';
    bar.className = 'timer-progress-bar';
    if (pct <= 20) {
        display.classList.add('critical');
        bar.classList.add('critical');
    } else if (pct <= 40) {
        display.classList.add('warning');
        bar.classList.add('warning');
    }
}

function toggleTimer() {
    const btn = document.getElementById('timerStartBtn');
    if (state.timer.running) {
        clearInterval(state.timer.interval);
        state.timer.running = false;
        btn.innerHTML = '&#9654; Resume';
        btn.className = 'timer-btn start';
    } else {
        if (state.timer.remaining <= 0) {
            state.timer.remaining = state.timer.duration;
        }
        state.timer.running = true;
        btn.innerHTML = '⏸ Pause';
        btn.className = 'timer-btn pause';
        state.timer.interval = setInterval(() => {
            state.timer.remaining--;
            updateTimerDisplay();
            if (state.timer.remaining <= 0) {
                clearInterval(state.timer.interval);
                state.timer.running = false;
                btn.innerHTML = '&#9654; Start';
                btn.className = 'timer-btn start';
                // End chime
                try {
                    const actx = new (window.AudioContext || window.webkitAudioContext)();
                    [523, 659, 784].forEach((f, i) => {
                        const osc = actx.createOscillator();
                        const gain = actx.createGain();
                        osc.connect(gain); gain.connect(actx.destination);
                        osc.frequency.value = f; osc.type = 'sine';
                        gain.gain.value = 0.15;
                        gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.3 + i * 0.15);
                        osc.start(actx.currentTime + i * 0.15);
                        osc.stop(actx.currentTime + 0.3 + i * 0.15);
                    });
                } catch(e) {}
            }
        }, 1000);
    }
}

function resetTimer() {
    clearInterval(state.timer.interval);
    state.timer.running = false;
    state.timer.remaining = state.timer.duration;
    updateTimerDisplay();
    const btn = document.getElementById('timerStartBtn');
    btn.innerHTML = '&#9654; Start';
    btn.className = 'timer-btn start';
}

// Initialize
['character', 'location', 'situation'].forEach(type => {
    state.wheels[type] = Math.random() * Math.PI * 2;
    drawWheel(type);
});
updateTimerDisplay();
</script>
