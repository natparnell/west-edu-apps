<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What's Missing? | EYFS Maths</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', sans-serif;
  background: #faf7f2;
  color: #3d2e1f;
  min-height: 100vh;
  user-select: none;
  -webkit-user-select: none;
  overflow-x: hidden;
}

.title-bar {
  background: #e07020;
  color: #fff;
  text-align: center;
  padding: 18px 16px;
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.5px;
}

.instructions-bar {
  background: #fff4e8;
  color: #5a4630;
  text-align: center;
  padding: 12px 16px;
  font-size: 16px;
  font-weight: 600;
  line-height: 1.4;
}

.container {
  max-width: 700px;
  margin: 0 auto;
  padding: 20px 16px 40px;
}

/* Level selector */
.level-selector {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 24px;
}
.level-btn {
  background: #fff;
  border: 3px solid #e8ddd0;
  border-radius: 14px;
  padding: 12px 22px;
  font-family: 'Inter', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: #5a4630;
  cursor: pointer;
  transition: all 0.2s;
  min-width: 48px;
  min-height: 48px;
}
.level-btn:hover { border-color: #e07020; }
.level-btn.active {
  background: #e07020;
  color: #fff;
  border-color: #e07020;
}

/* Progress dots */
.progress-dots {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-bottom: 28px;
}
.dot {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #e8ddd0;
  transition: background 0.3s, transform 0.3s;
}
.dot.done { background: #4caf50; }
.dot.current { background: #e07020; animation: pulse 1.2s infinite; }
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.35); }
}

/* Pattern display */
.pattern-area {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  min-height: 120px;
  background: #fff;
  border-radius: 20px;
  padding: 24px 16px;
  margin-bottom: 28px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.pattern-item {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 80px;
  height: 80px;
  transition: transform 0.3s;
}
.pattern-item.missing-slot {
  background: #fff4e8;
  border: 3px dashed #e07020;
  border-radius: 16px;
  font-size: 36px;
  font-weight: 800;
  color: #e07020;
  animation: pulse 1.5s infinite;
}

/* Shapes */
.shape {
  display: flex;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
  gap: 2px;
}
.shape-circle {
  border-radius: 50%;
}
.shape-square {
  border-radius: 6px;
}
.shape-triangle {
  width: 0 !important;
  height: 0 !important;
  background: transparent !important;
  border-left: 26px solid transparent;
  border-right: 26px solid transparent;
  border-bottom: 46px solid currentColor;
}
.shape-star {
  font-size: 42px;
  line-height: 1;
}

/* Answer choices */
.choices {
  display: flex;
  justify-content: center;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 28px;
}
.choice-card {
  background: #fff;
  border: 3px solid #e8ddd0;
  border-radius: 18px;
  padding: 16px;
  min-width: 100px;
  min-height: 100px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
}
.choice-card:hover { border-color: #e07020; transform: translateY(-2px); }
.choice-card:active { transform: scale(0.96); }
.choice-card.correct {
  border-color: #4caf50;
  background: #e8f5e9;
  animation: bounceCorrect 0.6s;
}
.choice-card.wrong {
  border-color: #e74c3c;
  animation: shake 0.5s;
}
@keyframes bounceCorrect {
  0% { transform: scale(1); }
  30% { transform: scale(1.15); }
  50% { transform: scale(0.95); }
  70% { transform: scale(1.05); }
  100% { transform: scale(1); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-6px); }
  80% { transform: translateX(6px); }
}

/* Feedback */
.feedback {
  text-align: center;
  font-size: 24px;
  font-weight: 800;
  min-height: 40px;
  margin-bottom: 16px;
  transition: opacity 0.3s;
}
.feedback.correct-msg { color: #4caf50; }
.feedback.wrong-msg { color: #e74c3c; }

/* Celebration overlay */
.celebration {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 100;
}
.confetti {
  position: absolute;
  width: 10px;
  height: 10px;
  border-radius: 2px;
  animation: confettiFall 1.5s forwards;
}
@keyframes confettiFall {
  0% { opacity: 1; transform: translateY(0) rotate(0deg); }
  100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
}

/* Score screen */
.score-screen {
  text-align: center;
  padding: 40px 20px;
}
.score-screen h2 {
  font-size: 32px;
  font-weight: 800;
  color: #e07020;
  margin-bottom: 12px;
}
.score-screen .score-number {
  font-size: 64px;
  font-weight: 800;
  color: #4caf50;
  margin: 20px 0;
}
.score-screen .score-label {
  font-size: 20px;
  color: #5a4630;
  margin-bottom: 30px;
}
.new-game-btn {
  background: #e07020;
  color: #fff;
  border: none;
  border-radius: 16px;
  padding: 16px 40px;
  font-family: 'Inter', sans-serif;
  font-size: 20px;
  font-weight: 700;
  cursor: pointer;
  min-height: 56px;
  transition: background 0.2s;
}
.new-game-btn:hover { background: #c55e15; }

.hidden { display: none !important; }
</style>
</head>
<body>

<div class="title-bar">What's Missing?</div>
<div class="instructions-bar">Find the missing piece to complete the pattern!</div>

<div class="container">
  <div class="level-selector" id="levelSelector">
    <button class="level-btn active" data-level="1" onclick="selectLevel(1)">Level 1</button>
    <button class="level-btn" data-level="2" onclick="selectLevel(2)">Level 2</button>
    <button class="level-btn" data-level="3" onclick="selectLevel(3)">Level 3</button>
  </div>

  <div class="progress-dots" id="progressDots"></div>

  <div id="gameArea">
    <div class="pattern-area" id="patternArea"></div>
    <div class="feedback" id="feedback"></div>
    <div class="choices" id="choices"></div>
  </div>

  <div id="scoreScreen" class="score-screen hidden"></div>
</div>

<div class="celebration" id="celebration"></div>

<script>
const COLORS = [
  { name: 'red', hex: '#e74c3c' },
  { name: 'blue', hex: '#3498db' },
  { name: 'green', hex: '#27ae60' },
  { name: 'purple', hex: '#9b59b6' },
  { name: 'orange', hex: '#e07020' },
  { name: 'pink', hex: '#e91e8a' }
];
const SHAPES = ['circle', 'square', 'triangle', 'star'];
const STAR_EMOJI = '\u2B50';
const TOTAL_QUESTIONS = 10;

let currentLevel = 1;
let currentQuestion = 0;
let score = 0;
let correctIndex = -1;
let answered = false;

function rand(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}
function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderShape(shape, color, size) {
  size = size || 52;
  if (shape === 'star') {
    return `<span class="shape shape-star" style="font-size:${size}px">${STAR_EMOJI}</span>`;
  }
  if (shape === 'triangle') {
    const s = Math.round(size * 0.55);
    const h = Math.round(size * 0.9);
    return `<span style="display:inline-block;width:0;height:0;border-left:${s}px solid transparent;border-right:${s}px solid transparent;border-bottom:${h}px solid ${color.hex}"></span>`;
  }
  const r = shape === 'circle' ? '50%' : '6px';
  return `<span style="display:inline-block;width:${size}px;height:${size}px;background:${color.hex};border-radius:${r}"></span>`;
}

function renderMultiShapes(shape, color, count, size) {
  size = size || 32;
  let html = '<span class="shape" style="display:flex;flex-wrap:wrap;gap:4px;align-items:center;justify-content:center;max-width:80px">';
  for (let i = 0; i < count; i++) {
    html += renderShape(shape, color, size);
  }
  html += '</span>';
  return html;
}

function itemsEqual(a, b) {
  return JSON.stringify(a) === JSON.stringify(b);
}

function generateLevel1() {
  const color = pick(COLORS);
  const shape = pick(SHAPES);
  const item = { shape, color };
  const patternLength = rand(4, 5);
  const missingIdx = rand(0, patternLength - 1);
  const pattern = [];
  for (let i = 0; i < patternLength; i++) {
    pattern.push(i === missingIdx ? null : { ...item });
  }

  // Distractors: different shape or color
  const distractors = [];
  const otherColors = COLORS.filter(c => c.name !== color.name);
  const otherShapes = SHAPES.filter(s => s !== shape);
  distractors.push({ shape: pick(otherShapes), color });
  distractors.push({ shape, color: pick(otherColors) });

  return { pattern, answer: item, distractors, missingIdx };
}

function generateLevel2() {
  // AB pattern with two different items
  const c1 = pick(COLORS);
  let c2 = pick(COLORS);
  while (c2.name === c1.name) c2 = pick(COLORS);
  const s1 = pick(SHAPES);
  let s2 = pick(SHAPES);
  while (s2 === s1) s2 = pick(SHAPES);

  const itemA = { shape: s1, color: c1 };
  const itemB = { shape: s2, color: c2 };
  const base = [itemA, itemB];
  const patternLength = rand(4, 6);
  const pattern = [];
  for (let i = 0; i < patternLength; i++) {
    pattern.push({ ...base[i % 2] });
  }
  const missingIdx = rand(0, patternLength - 1);
  const answer = { ...pattern[missingIdx] };
  pattern[missingIdx] = null;

  // Distractors
  const otherColors = COLORS.filter(c => c.name !== c1.name && c.name !== c2.name);
  const otherShapes = SHAPES.filter(s => s !== s1 && s !== s2);
  const d1 = { shape: otherShapes.length ? pick(otherShapes) : s1, color: otherColors.length ? pick(otherColors) : c1 };
  // Second distractor is the wrong item from the pattern
  const d2 = itemsEqual(answer, itemA) ? { ...itemB } : { ...itemA };

  // Make sure d1 is not equal to answer or d2
  const distractors = [d2, d1].filter(d => !itemsEqual(d, answer));
  while (distractors.length < 2) {
    const oc = pick(COLORS);
    const os = pick(SHAPES);
    const nd = { shape: os, color: oc };
    if (!itemsEqual(nd, answer) && !distractors.some(d => itemsEqual(d, nd))) {
      distractors.push(nd);
    }
  }

  return { pattern, answer, distractors: distractors.slice(0, 2), missingIdx };
}

function generateLevel3() {
  // Growing pattern: 1, 2, 3, ? (answer: 4)
  const color = pick(COLORS);
  const shape = pick(SHAPES);
  const start = rand(1, 2);
  const length = rand(3, 4);
  const pattern = [];
  for (let i = 0; i < length; i++) {
    pattern.push({ shape, color, count: start + i });
  }
  const missingIdx = length - 1; // always last for growing
  const answer = { ...pattern[missingIdx] };
  pattern[missingIdx] = null;

  // Distractors: wrong counts
  const correctCount = answer.count;
  const d1Count = correctCount + 1;
  const d2Count = Math.max(1, correctCount - 1);
  const distractors = [
    { shape, color, count: d1Count },
    { shape, color, count: d2Count }
  ];

  return { pattern, answer, distractors, missingIdx, isGrowing: true };
}

function generateQuestion() {
  if (currentLevel === 1) return generateLevel1();
  if (currentLevel === 2) return generateLevel2();
  return generateLevel3();
}

function renderPatternItem(item, isGrowing) {
  if (isGrowing && item.count) {
    return renderMultiShapes(item.shape, item.color, item.count, item.count > 3 ? 24 : 32);
  }
  return renderShape(item.shape, item.color, 52);
}

function renderChoiceItem(item, isGrowing) {
  if (isGrowing && item.count) {
    return renderMultiShapes(item.shape, item.color, item.count, item.count > 4 ? 20 : 28);
  }
  return renderShape(item.shape, item.color, 48);
}

function displayQuestion() {
  answered = false;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';

  const q = generateQuestion();
  const patternArea = document.getElementById('patternArea');
  const choicesEl = document.getElementById('choices');

  // Render pattern
  let patternHTML = '';
  q.pattern.forEach((item, i) => {
    if (item === null) {
      patternHTML += '<div class="pattern-item missing-slot">?</div>';
    } else {
      patternHTML += `<div class="pattern-item">${renderPatternItem(item, q.isGrowing)}</div>`;
    }
  });
  patternArea.innerHTML = patternHTML;

  // Shuffle choices
  const allChoices = [q.answer, ...q.distractors];
  const shuffled = shuffle(allChoices);
  correctIndex = shuffled.findIndex(c => itemsEqual(c, q.answer));

  let choicesHTML = '';
  shuffled.forEach((item, i) => {
    choicesHTML += `<div class="choice-card" data-index="${i}" onclick="handleChoice(${i})">${renderChoiceItem(item, q.isGrowing)}</div>`;
  });
  choicesEl.innerHTML = choicesHTML;

  updateDots();
}

function handleChoice(idx) {
  if (answered) return;
  answered = true;
  const cards = document.querySelectorAll('.choice-card');
  const fb = document.getElementById('feedback');

  if (idx === correctIndex) {
    score++;
    cards[idx].classList.add('correct');
    fb.textContent = 'Well done!';
    fb.className = 'feedback correct-msg';
    showCelebration();
    setTimeout(nextQuestion, 1200);
  } else {
    cards[idx].classList.add('wrong');
    fb.textContent = 'Try again!';
    fb.className = 'feedback wrong-msg';
    // Allow retry
    answered = false;
    setTimeout(() => {
      cards[idx].classList.remove('wrong');
      cards[idx].style.opacity = '0.4';
      cards[idx].style.pointerEvents = 'none';
    }, 500);
  }
}

function nextQuestion() {
  currentQuestion++;
  if (currentQuestion >= TOTAL_QUESTIONS) {
    showScore();
  } else {
    displayQuestion();
  }
}

function updateDots() {
  const dotsEl = document.getElementById('progressDots');
  let html = '';
  for (let i = 0; i < TOTAL_QUESTIONS; i++) {
    let cls = 'dot';
    if (i < currentQuestion) cls += ' done';
    else if (i === currentQuestion) cls += ' current';
    html += `<div class="${cls}"></div>`;
  }
  dotsEl.innerHTML = html;
}

function showCelebration() {
  const cel = document.getElementById('celebration');
  cel.innerHTML = '';
  const colors = ['#e74c3c','#3498db','#27ae60','#f1c40f','#9b59b6','#e07020'];
  for (let i = 0; i < 30; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + '%';
    c.style.top = '-10px';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDelay = (Math.random() * 0.5) + 's';
    c.style.width = rand(6, 12) + 'px';
    c.style.height = rand(6, 12) + 'px';
    cel.appendChild(c);
  }
  setTimeout(() => { cel.innerHTML = ''; }, 2000);
}

function showScore() {
  document.getElementById('gameArea').classList.add('hidden');
  document.getElementById('progressDots').classList.add('hidden');
  document.getElementById('levelSelector').classList.add('hidden');
  const screen = document.getElementById('scoreScreen');
  screen.classList.remove('hidden');

  let msg = '';
  if (score === TOTAL_QUESTIONS) msg = 'Perfect score! Amazing!';
  else if (score >= 8) msg = 'Brilliant work!';
  else if (score >= 5) msg = 'Good effort! Keep practising!';
  else msg = 'Nice try! Have another go!';

  screen.innerHTML = `
    <h2>Round Complete!</h2>
    <div class="score-number">${score}/${TOTAL_QUESTIONS}</div>
    <div class="score-label">${msg}</div>
    <button class="new-game-btn" onclick="startGame()">New Game</button>
  `;
  showCelebration();
}

function selectLevel(level) {
  currentLevel = level;
  document.querySelectorAll('.level-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.level) === level);
  });
  startGame();
}

function startGame() {
  currentQuestion = 0;
  score = 0;
  answered = false;
  document.getElementById('gameArea').classList.remove('hidden');
  document.getElementById('progressDots').classList.remove('hidden');
  document.getElementById('levelSelector').classList.remove('hidden');
  document.getElementById('scoreScreen').classList.add('hidden');
  displayQuestion();
}

startGame();
</script>
</body>
</html>
