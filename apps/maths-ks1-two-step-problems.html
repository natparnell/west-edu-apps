<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Two-Step Word Problems</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', sans-serif;
  background: #faf7f2;
  color: #3d2e1f;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  user-select: none;
  -webkit-user-select: none;
  overflow-x: hidden;
}
.title-bar {
  background: #e07020;
  color: #fff;
  text-align: center;
  padding: 16px 20px;
  font-size: 28px;
  font-weight: 800;
  letter-spacing: 0.5px;
  box-shadow: 0 3px 10px rgba(224,112,32,0.3);
  position: relative;
  z-index: 10;
}
.instructions {
  text-align: center;
  font-size: 18px;
  font-weight: 600;
  padding: 12px 16px;
  color: #5a4630;
  background: #fff4e8;
  border-bottom: 2px solid #f0dcc4;
}
.progress-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 10px 20px;
  background: #fff;
  border-bottom: 2px solid #f0dcc4;
}
.progress-bar span { font-weight: 700; font-size: 18px; }
.progress-dots { display: flex; gap: 8px; }
.progress-dot {
  width: 20px; height: 20px;
  border-radius: 50%;
  background: #e8ddd0;
  transition: background 0.3s;
}
.progress-dot.done { background: #4caf50; }
.progress-dot.current { background: #e07020; animation: pulse-dot 1s infinite; }
@keyframes pulse-dot { 0%,100% { transform: scale(1); } 50% { transform: scale(1.3); } }
.container { max-width: 700px; width: 100%; margin: 0 auto; padding: 16px; flex: 1; }
.level-btns { display: flex; gap: 8px; justify-content: center; margin-bottom: 16px; flex-wrap: wrap; }
.level-btn {
  padding: 10px 20px;
  border: 3px solid #e07020;
  border-radius: 12px;
  background: #fff;
  color: #e07020;
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.2s;
  min-width: 100px;
}
.level-btn.active, .level-btn:hover { background: #e07020; color: #fff; }
.problem-card {
  background: #fff;
  border-radius: 16px;
  padding: 24px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  margin-bottom: 16px;
  text-align: center;
}
.problem-text {
  font-size: 1.3rem;
  font-weight: 600;
  line-height: 1.6;
  margin-bottom: 8px;
}
.problem-text .num { color: #e07020; font-weight: 800; font-size: 1.5rem; }
.step-card {
  background: #fff;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  margin-bottom: 16px;
  text-align: center;
  border: 3px solid #e8ddd0;
  transition: border-color 0.3s;
}
.step-card.active { border-color: #e07020; }
.step-card.completed { border-color: #4caf50; background: #f0faf0; }
.step-label {
  font-size: 0.9rem;
  font-weight: 700;
  color: #e07020;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.step-card.completed .step-label { color: #4caf50; }
.step-question { font-size: 1.1rem; font-weight: 600; margin-bottom: 12px; }
.op-btns { display: flex; gap: 10px; justify-content: center; margin-bottom: 12px; flex-wrap: wrap; }
.op-btn {
  width: 64px; height: 64px;
  border: 3px solid #e8ddd0;
  border-radius: 14px;
  background: #fff;
  font-family: 'Inter', sans-serif;
  font-size: 1.8rem;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.2s;
  color: #3d2e1f;
  display: flex;
  align-items: center;
  justify-content: center;
}
.op-btn:hover { border-color: #e07020; background: #fff4e8; }
.op-btn.selected { border-color: #e07020; background: #e07020; color: #fff; }
.op-btn:disabled { opacity: 0.4; cursor: default; }
.num-inputs { display: flex; gap: 10px; align-items: center; justify-content: center; margin-bottom: 12px; flex-wrap: wrap; }
.num-input {
  width: 80px; height: 56px;
  border: 3px solid #e8ddd0;
  border-radius: 12px;
  font-family: 'Inter', sans-serif;
  font-size: 1.5rem;
  font-weight: 700;
  text-align: center;
  color: #3d2e1f;
  outline: none;
  transition: border-color 0.2s;
}
.num-input:focus { border-color: #e07020; }
.num-input:disabled { background: #f5f0ea; color: #999; }
.op-display {
  font-size: 1.8rem;
  font-weight: 800;
  color: #e07020;
  min-width: 40px;
  text-align: center;
}
.eq-display { font-size: 1.5rem; font-weight: 800; color: #3d2e1f; }
.go-btn {
  padding: 12px 32px;
  border: none;
  border-radius: 12px;
  background: #e07020;
  color: #fff;
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: 1.1rem;
  cursor: pointer;
  transition: all 0.2s;
  min-height: 48px;
}
.go-btn:hover { background: #c55e18; }
.go-btn:disabled { opacity: 0.4; cursor: default; }
.counters-area {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
  margin: 12px 0;
  min-height: 40px;
}
.counter {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: #e07020;
  animation: popCounter 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-weight: 700;
  font-size: 0.75rem;
}
.counter.removed {
  background: #ccc;
  text-decoration: line-through;
  opacity: 0.4;
}
.counter.added { background: #4caf50; }
.counter.multiply { background: #2563eb; }
@keyframes popCounter { from { transform: scale(0); } to { transform: scale(1); } }
.step-result {
  font-size: 1.4rem;
  font-weight: 800;
  color: #4caf50;
  margin-top: 8px;
}
.final-area { text-align: center; margin-top: 12px; }
.final-answer-display {
  font-size: 2rem;
  font-weight: 800;
  color: #e07020;
  margin: 8px 0;
}
.feedback {
  text-align: center;
  font-size: 1.2rem;
  font-weight: 700;
  min-height: 30px;
  margin-top: 8px;
}
.feedback.correct { color: #4caf50; }
.feedback.wrong { color: #dc2626; }
.celebration {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 100;
}
.confetti {
  position: absolute;
  width: 10px; height: 10px;
  border-radius: 2px;
  animation: confettiFall 1.2s ease-out forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}
.summary-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
}
.summary-card {
  background: #fff;
  border-radius: 24px;
  padding: 36px 32px;
  max-width: 400px;
  width: 90%;
  text-align: center;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  animation: popIn 0.4s ease;
}
@keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.summary-card h2 { font-size: 1.6rem; color: #e07020; margin-bottom: 8px; }
.summary-score { font-size: 3rem; font-weight: 800; color: #3d2e1f; margin: 12px 0; }
.stars { font-size: 2.5rem; margin: 12px 0; }
.star { color: #e8ddd0; transition: color 0.3s; }
.star.filled { color: #f59e0b; }
.play-again-btn {
  padding: 14px 36px;
  border: none;
  border-radius: 14px;
  background: #e07020;
  color: #fff;
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: 1.1rem;
  cursor: pointer;
  margin-top: 16px;
  transition: all 0.2s;
}
.play-again-btn:hover { background: #c55e18; }
.hidden { display: none !important; }
@media(max-width: 500px) {
  .problem-text { font-size: 1.1rem; }
  .num-input { width: 64px; height: 48px; font-size: 1.2rem; }
  .op-btn { width: 54px; height: 54px; font-size: 1.5rem; }
}
</style>
</head>
<body>
<div class="title-bar">Two-Step Word Problems</div>
<div class="instructions" id="instrBar">Solve word problems step by step. Choose the right operation each time!</div>
<div class="progress-bar">
  <span>Question <span id="qNum">1</span>/8</span>
  <div class="progress-dots" id="dots"></div>
</div>

<div class="container" id="gameArea">
  <div class="level-btns" id="levelBtns">
    <button class="level-btn active" data-level="easy" onclick="setLevel('easy')">Easy</button>
    <button class="level-btn" data-level="medium" onclick="setLevel('medium')">Medium</button>
    <button class="level-btn" data-level="hard" onclick="setLevel('hard')">Hard</button>
  </div>

  <div class="problem-card" id="problemCard">
    <div class="problem-text" id="problemText"></div>
  </div>

  <!-- Step 1 -->
  <div class="step-card active" id="step1Card">
    <div class="step-label">Step 1</div>
    <div class="step-question" id="step1Q">What do we do first?</div>
    <div class="op-btns" id="step1Ops"></div>
    <div class="num-inputs" id="step1Nums" style="display:none">
      <input class="num-input" id="s1a" type="number" min="0" max="100">
      <div class="op-display" id="s1op"></div>
      <input class="num-input" id="s1b" type="number" min="0" max="100">
      <span class="eq-display">=</span>
      <input class="num-input" id="s1ans" type="number" min="0" max="100">
    </div>
    <div class="counters-area" id="step1Counters"></div>
    <button class="go-btn" id="step1Go" style="display:none" onclick="checkStep1()">Check Step 1</button>
    <div class="step-result" id="step1Result"></div>
    <div class="feedback" id="step1Feedback"></div>
  </div>

  <!-- Step 2 -->
  <div class="step-card" id="step2Card" style="opacity:0.4; pointer-events:none;">
    <div class="step-label">Step 2</div>
    <div class="step-question" id="step2Q">What do we do next?</div>
    <div class="op-btns" id="step2Ops"></div>
    <div class="num-inputs" id="step2Nums" style="display:none">
      <input class="num-input" id="s2a" type="number" min="0" max="100">
      <div class="op-display" id="s2op"></div>
      <input class="num-input" id="s2b" type="number" min="0" max="100">
      <span class="eq-display">=</span>
      <input class="num-input" id="s2ans" type="number" min="0" max="100">
    </div>
    <div class="counters-area" id="step2Counters"></div>
    <button class="go-btn" id="step2Go" style="display:none" onclick="checkStep2()">Check Step 2</button>
    <div class="step-result" id="step2Result"></div>
    <div class="feedback" id="step2Feedback"></div>
  </div>

  <div class="final-area hidden" id="finalArea">
    <div style="font-weight:700; font-size:1.1rem;">The answer is:</div>
    <div class="final-answer-display" id="finalAnswer"></div>
    <button class="go-btn" onclick="nextQuestion()">Next Question</button>
  </div>
</div>

<div class="summary-overlay hidden" id="summaryOverlay">
  <div class="summary-card">
    <h2>Round Complete!</h2>
    <div class="summary-score"><span id="finalScore">0</span> / 8</div>
    <div class="stars" id="stars"></div>
    <div id="summaryMsg" style="font-weight:600;margin-top:8px;"></div>
    <button class="play-again-btn" onclick="startRound()">Play Again</button>
  </div>
</div>

<script>
const PROBLEMS = {
  easy: [
    { text: "Tom has {a} sweets. Mum gives him {b} more. Then Dad gives him {c}. How many now?", gen: ()=>{ const a=rn(2,5),b=rn(2,5),c=rn(1,4); return {a,b,c, s1:{op:'+',x:a,y:b,r:a+b}, s2:{op:'+',x:a+b,y:c,r:a+b+c}}; }},
    { text: "There are {a} red balloons and {b} blue balloons. Then {c} green balloons arrive. How many altogether?", gen: ()=>{ const a=rn(2,6),b=rn(2,6),c=rn(1,5); return {a,b,c, s1:{op:'+',x:a,y:b,r:a+b}, s2:{op:'+',x:a+b,y:c,r:a+b+c}}; }},
    { text: "Lily picks {a} flowers. She picks {b} more. Then she picks another {c}. How many flowers?", gen: ()=>{ const a=rn(3,7),b=rn(2,5),c=rn(1,4); return {a,b,c, s1:{op:'+',x:a,y:b,r:a+b}, s2:{op:'+',x:a+b,y:c,r:a+b+c}}; }},
    { text: "There are {a} children in a room. {b} more arrive, then {c} more come in. How many now?", gen: ()=>{ const a=rn(3,8),b=rn(2,5),c=rn(1,4); return {a,b,c, s1:{op:'+',x:a,y:b,r:a+b}, s2:{op:'+',x:a+b,y:c,r:a+b+c}}; }},
    { text: "A shop has {a} apples and {b} pears. Someone buys {c} more oranges. How much fruit altogether?", gen: ()=>{ const a=rn(2,6),b=rn(3,6),c=rn(2,5); return {a,b,c, s1:{op:'+',x:a,y:b,r:a+b}, s2:{op:'+',x:a+b,y:c,r:a+b+c}}; }},
    { text: "Jack has {a} toy cars. He gets {b} for his birthday and {c} from Grandma. How many now?", gen: ()=>{ const a=rn(2,5),b=rn(3,6),c=rn(1,4); return {a,b,c, s1:{op:'+',x:a,y:b,r:a+b}, s2:{op:'+',x:a+b,y:c,r:a+b+c}}; }},
    { text: "There are {a} bees on a flower. {b} more land on it, then {c} more arrive. How many bees?", gen: ()=>{ const a=rn(1,4),b=rn(2,5),c=rn(2,5); return {a,b,c, s1:{op:'+',x:a,y:b,r:a+b}, s2:{op:'+',x:a+b,y:c,r:a+b+c}}; }},
    { text: "Mia has {a} stickers. She finds {b} more on the floor, then wins {c} in a game. How many?", gen: ()=>{ const a=rn(3,7),b=rn(2,4),c=rn(1,5); return {a,b,c, s1:{op:'+',x:a,y:b,r:a+b}, s2:{op:'+',x:a+b,y:c,r:a+b+c}}; }},
    { text: "A farmer has {a} sheep. He buys {b} more, then {c} lambs are born. How many sheep now?", gen: ()=>{ const a=rn(4,8),b=rn(2,5),c=rn(1,4); return {a,b,c, s1:{op:'+',x:a,y:b,r:a+b}, s2:{op:'+',x:a+b,y:c,r:a+b+c}}; }},
    { text: "There are {a} books on a shelf. Someone puts {b} more, then adds {c} more. How many books?", gen: ()=>{ const a=rn(3,7),b=rn(2,5),c=rn(2,4); return {a,b,c, s1:{op:'+',x:a,y:b,r:a+b}, s2:{op:'+',x:a+b,y:c,r:a+b+c}}; }}
  ],
  medium: [
    { text: "There are {a} birds on a fence. {b} fly away. Then {c} more land. How many now?", gen: ()=>{ const a=rn(6,12),b=rn(2,5),c=rn(3,6); return {a,b,c, s1:{op:'-',x:a,y:b,r:a-b}, s2:{op:'+',x:a-b,y:c,r:a-b+c}}; }},
    { text: "Sam has {a} marbles. He gives {b} to his friend. Then he finds {c} more. How many now?", gen: ()=>{ const a=rn(8,14),b=rn(2,5),c=rn(1,5); return {a,b,c, s1:{op:'-',x:a,y:b,r:a-b}, s2:{op:'+',x:a-b,y:c,r:a-b+c}}; }},
    { text: "A bus has {a} people. {b} more get on, then {c} get off. How many on the bus?", gen: ()=>{ const a=rn(5,10),b=rn(3,6),c=rn(2,5); return {a,b,c, s1:{op:'+',x:a,y:b,r:a+b}, s2:{op:'-',x:a+b,y:c,r:a+b-c}}; }},
    { text: "There are {a} sweets in a jar. Mum adds {b} more. Then Tom eats {c}. How many left?", gen: ()=>{ const a=rn(5,10),b=rn(3,6),c=rn(2,5); return {a,b,c, s1:{op:'+',x:a,y:b,r:a+b}, s2:{op:'-',x:a+b,y:c,r:a+b-c}}; }},
    { text: "A pond has {a} ducks. {b} swim away. Then {c} come back. How many ducks?", gen: ()=>{ const a=rn(8,14),b=rn(3,6),c=rn(2,5); return {a,b,c, s1:{op:'-',x:a,y:b,r:a-b}, s2:{op:'+',x:a-b,y:c,r:a-b+c}}; }},
    { text: "Ella has {a} crayons. She loses {b}, then her friend gives her {c}. How many now?", gen: ()=>{ const a=rn(7,12),b=rn(2,5),c=rn(3,6); return {a,b,c, s1:{op:'-',x:a,y:b,r:a-b}, s2:{op:'+',x:a-b,y:c,r:a-b+c}}; }},
    { text: "There are {a} children playing. {b} more join in. Then {c} go home. How many playing now?", gen: ()=>{ const a=rn(5,9),b=rn(3,6),c=rn(2,5); return {a,b,c, s1:{op:'+',x:a,y:b,r:a+b}, s2:{op:'-',x:a+b,y:c,r:a+b-c}}; }},
    { text: "Ben has {a} football cards. He trades away {b}, then buys {c} new ones. How many now?", gen: ()=>{ const a=rn(8,15),b=rn(3,6),c=rn(2,5); return {a,b,c, s1:{op:'-',x:a,y:b,r:a-b}, s2:{op:'+',x:a-b,y:c,r:a-b+c}}; }},
    { text: "A dog has {a} biscuits. It eats {b}, then finds {c} more under the sofa. How many now?", gen: ()=>{ const a=rn(6,10),b=rn(2,4),c=rn(1,5); return {a,b,c, s1:{op:'-',x:a,y:b,r:a-b}, s2:{op:'+',x:a-b,y:c,r:a-b+c}}; }},
    { text: "There are {a} fish in a tank. You add {b} new fish, then {c} hide behind a rock. How many can you see?", gen: ()=>{ const a=rn(4,8),b=rn(3,6),c=rn(2,4); return {a,b,c, s1:{op:'+',x:a,y:b,r:a+b}, s2:{op:'-',x:a+b,y:c,r:a+b-c}}; }}
  ],
  hard: [
    { text: "There are {a} bags with {b} apples each. Sam eats {c} apple. How many apples left?", gen: ()=>{ const a=rn(2,5),b=rn(2,5),c=rn(1,3); return {a,b,c, s1:{op:'x',x:a,y:b,r:a*b}, s2:{op:'-',x:a*b,y:c,r:a*b-c}}; }},
    { text: "There are {a} teams with {b} players each. Then {c} more players join. How many altogether?", gen: ()=>{ const a=rn(2,4),b=rn(2,5),c=rn(2,5); return {a,b,c, s1:{op:'x',x:a,y:b,r:a*b}, s2:{op:'+',x:a*b,y:c,r:a*b+c}}; }},
    { text: "Mum buys {a} packs of {b} biscuits. The family eats {c}. How many biscuits left?", gen: ()=>{ const a=rn(2,5),b=rn(2,5),c=rn(1,4); return {a,b,c, s1:{op:'x',x:a,y:b,r:a*b}, s2:{op:'-',x:a*b,y:c,r:a*b-c}}; }},
    { text: "There are {a} rows of {b} chairs. Someone adds {c} extra chairs. How many chairs now?", gen: ()=>{ const a=rn(2,4),b=rn(3,5),c=rn(2,5); return {a,b,c, s1:{op:'x',x:a,y:b,r:a*b}, s2:{op:'+',x:a*b,y:c,r:a*b+c}}; }},
    { text: "A toy box has {a} shelves with {b} toys on each. {c} toys fall off. How many still on shelves?", gen: ()=>{ const a=rn(2,4),b=rn(2,5),c=rn(1,3); return {a,b,c, s1:{op:'x',x:a,y:b,r:a*b}, s2:{op:'-',x:a*b,y:c,r:a*b-c}}; }},
    { text: "There are {a} plates with {b} strawberries each. Then Mum adds {c} more. How many strawberries?", gen: ()=>{ const a=rn(2,4),b=rn(2,5),c=rn(3,6); return {a,b,c, s1:{op:'x',x:a,y:b,r:a*b}, s2:{op:'+',x:a*b,y:c,r:a*b+c}}; }},
    { text: "Dad gives {a} children {b} sweets each. One child drops {c}. How many sweets are there now?", gen: ()=>{ const a=rn(2,5),b=rn(2,4),c=rn(1,3); return {a,b,c, s1:{op:'x',x:a,y:b,r:a*b}, s2:{op:'-',x:a*b,y:c,r:a*b-c}}; }},
    { text: "There are {a} nests with {b} eggs in each. {c} more eggs are laid. How many eggs now?", gen: ()=>{ const a=rn(2,4),b=rn(2,5),c=rn(2,4); return {a,b,c, s1:{op:'x',x:a,y:b,r:a*b}, s2:{op:'+',x:a*b,y:c,r:a*b+c}}; }},
    { text: "A baker makes {a} trays of {b} cakes. He sells {c}. How many cakes left?", gen: ()=>{ const a=rn(2,4),b=rn(3,5),c=rn(2,4); return {a,b,c, s1:{op:'x',x:a,y:b,r:a*b}, s2:{op:'-',x:a*b,y:c,r:a*b-c}}; }},
    { text: "There are {a} tanks with {b} fish each. Then {c} more fish are added. How many fish altogether?", gen: ()=>{ const a=rn(2,4),b=rn(2,5),c=rn(2,5); return {a,b,c, s1:{op:'x',x:a,y:b,r:a*b}, s2:{op:'+',x:a*b,y:c,r:a*b+c}}; }}
  ]
};

function rn(min, max) { return Math.floor(Math.random()*(max-min+1))+min; }
function shuffle(arr) { for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];} return arr; }

let level='easy', qIndex=0, score=0, questions=[], current=null;
let step1Done=false, step2Done=false;
const TOTAL=8;

function setLevel(lv) {
  level = lv;
  document.querySelectorAll('.level-btn').forEach(b => b.classList.toggle('active', b.dataset.level===lv));
  startRound();
}

function buildDots() {
  const d = document.getElementById('dots');
  d.innerHTML = '';
  for(let i=0;i<TOTAL;i++) {
    const dot = document.createElement('div');
    dot.className = 'progress-dot';
    d.appendChild(dot);
  }
}

function updateDots() {
  const dots = document.querySelectorAll('.progress-dot');
  dots.forEach((d,i) => {
    d.className = 'progress-dot';
    if(i < qIndex) d.classList.add('done');
    else if(i === qIndex) d.classList.add('current');
  });
  document.getElementById('qNum').textContent = Math.min(qIndex+1, TOTAL);
}

function startRound() {
  document.getElementById('summaryOverlay').classList.add('hidden');
  score = 0;
  qIndex = 0;
  const pool = PROBLEMS[level];
  questions = shuffle([...Array(pool.length).keys()]).slice(0, TOTAL);
  buildDots();
  loadQuestion();
}

function loadQuestion() {
  if(qIndex >= TOTAL) { showSummary(); return; }
  updateDots();
  step1Done = false;
  step2Done = false;

  const pool = PROBLEMS[level];
  const tmpl = pool[questions[qIndex] % pool.length];
  const data = tmpl.gen();
  current = { ...data, template: tmpl.text };

  // Render problem text with highlighted numbers
  let txt = tmpl.text.replace(/\{a\}/g, `<span class="num">${data.a}</span>`)
                      .replace(/\{b\}/g, `<span class="num">${data.b}</span>`)
                      .replace(/\{c\}/g, `<span class="num">${data.c}</span>`);
  document.getElementById('problemText').innerHTML = txt;

  // Reset step cards
  resetStep('step1');
  resetStep('step2');
  document.getElementById('step1Card').className = 'step-card active';
  document.getElementById('step2Card').className = 'step-card';
  document.getElementById('step2Card').style.opacity = '0.4';
  document.getElementById('step2Card').style.pointerEvents = 'none';
  document.getElementById('finalArea').classList.add('hidden');
  document.getElementById('levelBtns').style.display = qIndex===0?'flex':'none';

  // Build step 1 operation buttons
  buildOpButtons('step1Ops', 1);
}

function resetStep(prefix) {
  document.getElementById(prefix+'Ops').innerHTML = '';
  document.getElementById(prefix+'Nums').style.display = 'none';
  document.getElementById(prefix+'Go').style.display = 'none';
  document.getElementById(prefix+'Counters').innerHTML = '';
  document.getElementById(prefix+'Result').textContent = '';
  document.getElementById(prefix+'Feedback').textContent = '';
  document.getElementById(prefix+'Feedback').className = 'feedback';
}

function buildOpButtons(containerId, stepNum) {
  const c = document.getElementById(containerId);
  c.innerHTML = '';
  const ops = level==='hard' ? ['+','-','x'] : ['+','-'];
  ops.forEach(op => {
    const btn = document.createElement('button');
    btn.className = 'op-btn';
    btn.textContent = op;
    btn.onclick = () => selectOp(stepNum, op, btn);
    c.appendChild(btn);
  });
}

function selectOp(stepNum, op, btn) {
  const container = btn.parentElement;
  container.querySelectorAll('.op-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');

  const prefix = stepNum===1 ? 's1' : 's2';
  document.getElementById(prefix+'op').textContent = op;
  document.getElementById('step'+stepNum+'Nums').style.display = 'flex';
  document.getElementById('step'+stepNum+'Go').style.display = 'inline-block';

  // Clear inputs
  document.getElementById(prefix+'a').value = '';
  document.getElementById(prefix+'b').value = '';
  document.getElementById(prefix+'ans').value = '';
  document.getElementById(prefix+'a').disabled = false;
  document.getElementById(prefix+'b').disabled = false;
  document.getElementById(prefix+'ans').disabled = false;
  document.getElementById(prefix+'a').focus();
}

function checkStep1() {
  const step = current.s1;
  const selOp = document.getElementById('s1op').textContent;
  const a = parseInt(document.getElementById('s1a').value);
  const b = parseInt(document.getElementById('s1b').value);
  const ans = parseInt(document.getElementById('s1ans').value);
  const fb = document.getElementById('step1Feedback');

  if(isNaN(a)||isNaN(b)||isNaN(ans)) { fb.textContent='Fill in all the boxes!'; fb.className='feedback wrong'; return; }

  // Check operation
  if(selOp !== step.op) {
    fb.textContent = 'Try a different operation for this step!';
    fb.className = 'feedback wrong';
    return;
  }

  // Check numbers (either order for + and x)
  let numsOk = false;
  if(step.op === '+' || step.op === 'x') {
    numsOk = (a===step.x && b===step.y) || (a===step.y && b===step.x);
  } else {
    numsOk = (a===step.x && b===step.y);
  }
  if(!numsOk) {
    fb.textContent = 'Check which numbers go in this step!';
    fb.className = 'feedback wrong';
    return;
  }

  if(ans !== step.r) {
    fb.textContent = 'Nearly! Check your calculation.';
    fb.className = 'feedback wrong';
    return;
  }

  // Correct
  step1Done = true;
  fb.textContent = 'Correct!';
  fb.className = 'feedback correct';
  document.getElementById('step1Card').className = 'step-card completed';
  document.getElementById('step1Result').textContent = `${step.x} ${step.op === 'x' ? '\u00d7' : step.op} ${step.y} = ${step.r}`;
  document.getElementById('step1Go').style.display = 'none';
  disableInputs('s1');
  disableOps('step1Ops');

  // Animate counters
  animateCounters('step1Counters', step);

  // Unlock step 2
  setTimeout(() => {
    document.getElementById('step2Card').className = 'step-card active';
    document.getElementById('step2Card').style.opacity = '1';
    document.getElementById('step2Card').style.pointerEvents = 'auto';
    buildOpButtons('step2Ops', 2);
  }, 600);
}

function checkStep2() {
  const step = current.s2;
  const selOp = document.getElementById('s2op').textContent;
  const a = parseInt(document.getElementById('s2a').value);
  const b = parseInt(document.getElementById('s2b').value);
  const ans = parseInt(document.getElementById('s2ans').value);
  const fb = document.getElementById('step2Feedback');

  if(isNaN(a)||isNaN(b)||isNaN(ans)) { fb.textContent='Fill in all the boxes!'; fb.className='feedback wrong'; return; }

  if(selOp !== step.op) {
    fb.textContent = 'Try a different operation for this step!';
    fb.className = 'feedback wrong';
    return;
  }

  let numsOk = false;
  if(step.op === '+' || step.op === 'x') {
    numsOk = (a===step.x && b===step.y) || (a===step.y && b===step.x);
  } else {
    numsOk = (a===step.x && b===step.y);
  }
  if(!numsOk) {
    fb.textContent = 'Check which numbers go in this step!';
    fb.className = 'feedback wrong';
    return;
  }

  if(ans !== step.r) {
    fb.textContent = 'Nearly! Check your calculation.';
    fb.className = 'feedback wrong';
    return;
  }

  step2Done = true;
  fb.textContent = 'Correct!';
  fb.className = 'feedback correct';
  document.getElementById('step2Card').className = 'step-card completed';
  document.getElementById('step2Result').textContent = `${step.x} ${step.op === 'x' ? '\u00d7' : step.op} ${step.y} = ${step.r}`;
  document.getElementById('step2Go').style.display = 'none';
  disableInputs('s2');
  disableOps('step2Ops');
  animateCounters('step2Counters', step);

  score++;
  celebrate();

  setTimeout(() => {
    document.getElementById('finalArea').classList.remove('hidden');
    document.getElementById('finalAnswer').textContent = step.r;
  }, 500);
}

function disableInputs(prefix) {
  document.getElementById(prefix+'a').disabled = true;
  document.getElementById(prefix+'b').disabled = true;
  document.getElementById(prefix+'ans').disabled = true;
}

function disableOps(containerId) {
  document.querySelectorAll('#'+containerId+' .op-btn').forEach(b => b.disabled = true);
}

function animateCounters(containerId, step) {
  const c = document.getElementById(containerId);
  c.innerHTML = '';

  if(step.op === '+') {
    for(let i=0; i<step.x; i++) {
      setTimeout(() => {
        const d = document.createElement('div');
        d.className = 'counter';
        d.textContent = i+1;
        c.appendChild(d);
      }, i*80);
    }
    setTimeout(() => {
      for(let i=0; i<step.y; i++) {
        setTimeout(() => {
          const d = document.createElement('div');
          d.className = 'counter added';
          d.textContent = step.x+i+1;
          c.appendChild(d);
        }, i*80);
      }
    }, step.x*80 + 200);
  } else if(step.op === '-') {
    for(let i=0; i<step.x; i++) {
      setTimeout(() => {
        const d = document.createElement('div');
        d.className = 'counter';
        d.textContent = i+1;
        c.appendChild(d);
      }, i*60);
    }
    setTimeout(() => {
      const counters = c.querySelectorAll('.counter');
      for(let i=0; i<step.y; i++) {
        setTimeout(() => {
          if(counters[step.x-1-i]) counters[step.x-1-i].classList.add('removed');
        }, i*100);
      }
    }, step.x*60 + 300);
  } else if(step.op === 'x') {
    let count = 0;
    for(let g=0; g<step.x; g++) {
      setTimeout(() => {
        for(let i=0; i<step.y; i++) {
          setTimeout(() => {
            const d = document.createElement('div');
            d.className = 'counter multiply';
            count++;
            d.textContent = count;
            c.appendChild(d);
          }, i*80);
        }
      }, g*(step.y*80+150));
    }
  }
}

function nextQuestion() {
  qIndex++;
  loadQuestion();
}

function celebrate() {
  const overlay = document.createElement('div');
  overlay.className = 'celebration';
  document.body.appendChild(overlay);
  const colors = ['#e07020','#4caf50','#2563eb','#f59e0b','#e91e63'];
  for(let i=0;i<30;i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random()*100+'%';
    c.style.top = '-10px';
    c.style.background = colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDelay = Math.random()*0.5+'s';
    c.style.width = (6+Math.random()*8)+'px';
    c.style.height = (6+Math.random()*8)+'px';
    overlay.appendChild(c);
  }
  setTimeout(() => overlay.remove(), 1500);
}

function showSummary() {
  updateDots();
  const pct = score/TOTAL;
  let starCount = pct>=0.9?3:pct>=0.6?2:pct>=0.3?1:0;
  let msg = starCount===3?'Amazing work!':starCount===2?'Great job!':starCount===1?'Good try!':'Keep practising!';

  document.getElementById('finalScore').textContent = score;
  document.getElementById('summaryMsg').textContent = msg;
  document.getElementById('stars').innerHTML = [1,2,3].map(i=>`<span class="star ${i<=starCount?'filled':''}">\u2605</span>`).join('');
  document.getElementById('summaryOverlay').classList.remove('hidden');
}

startRound();
</script>
