<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emotion Masks</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #fef9f0;
    --card-bg: #ffffff;
    --text: #2d1b4e;
    --text-light: #7c6f8a;
    --border: #f0e6f6;
    --shadow: 0 4px 16px rgba(80,40,120,0.10);
    --shadow-lg: 0 8px 32px rgba(80,40,120,0.15);
    --radius: 20px;
    --happy: #FFD93D;
    --sad: #6EC6FF;
    --angry: #FF6B6B;
    --surprised: #FF9FF3;
    --scared: #A29BFE;
    --excited: #FECA57;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    overflow-x: hidden;
    user-select: none;
    -webkit-user-select: none;
}

/* Header */
.header {
    background: linear-gradient(135deg, #FF6B6B, #FF9FF3, #FECA57);
    color: white;
    padding: 16px 20px;
    text-align: center;
    box-shadow: var(--shadow);
    position: relative;
    z-index: 10;
}
.header h1 { font-size: 1.6rem; font-weight: 900; text-shadow: 2px 2px 0 rgba(0,0,0,0.1); letter-spacing: -0.5px; }
.header p { font-size: 0.85rem; opacity: 0.9; font-weight: 600; margin-top: 2px; }

/* Main layout */
.main { max-width: 700px; margin: 0 auto; padding: 16px; }

/* Emotion picker */
.picker-title {
    text-align: center;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
    margin: 12px 0 10px;
}
.emotion-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 16px;
}
.emotion-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 16px 8px;
    border: 4px solid transparent;
    border-radius: 20px;
    background: var(--card-bg);
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: all 0.25s ease;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
}
.emotion-btn:hover, .emotion-btn:focus { transform: scale(1.06); }
.emotion-btn.active { border-color: var(--text); transform: scale(1.08); box-shadow: var(--shadow-lg); }
.emotion-btn .face { font-size: 2.8rem; line-height: 1; }
.emotion-btn .label { font-size: 0.85rem; font-weight: 700; color: var(--text); }

/* Mask area */
.mask-area {
    display: none;
    flex-direction: column;
    align-items: center;
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    padding: 24px 16px 20px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
}
.mask-area.visible { display: flex; animation: popIn 0.45s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes popIn { from { opacity: 0; transform: scale(0.7); } to { opacity: 1; transform: scale(1); } }

.mask-bg {
    position: absolute;
    inset: 0;
    opacity: 0.10;
    border-radius: var(--radius);
    transition: background 0.5s;
}

.mask-svg-wrap {
    position: relative;
    z-index: 2;
    width: 220px;
    height: 220px;
    margin-bottom: 12px;
}

/* Body-part buttons */
.part-buttons {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    position: relative;
    z-index: 2;
    margin-bottom: 12px;
}
.part-btn {
    padding: 10px 20px;
    border: 3px solid var(--border);
    border-radius: 50px;
    background: var(--card-bg);
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    color: var(--text);
}
.part-btn:hover, .part-btn.active { background: var(--text); color: white; border-color: var(--text); transform: scale(1.08); }

.part-info {
    position: relative;
    z-index: 2;
    text-align: center;
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
    min-height: 28px;
    transition: all 0.3s;
}

/* Mirror mode */
.mirror-btn {
    display: block;
    margin: 0 auto 20px;
    padding: 14px 32px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #a29bfe, #6c5ce7);
    color: white;
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: all 0.25s;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
}
.mirror-btn:hover { transform: scale(1.06); box-shadow: var(--shadow-lg); }
.mirror-btn.on { background: linear-gradient(135deg, #e17055, #d63031); }

/* Celebration overlay */
.celebration {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1000;
}
.confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    animation: confettiFall linear forwards;
}
@keyframes confettiFall {
    0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg) scale(0.3); }
}
.star-burst {
    position: absolute;
    font-size: 2rem;
    animation: starPop 0.8s ease forwards;
    pointer-events: none;
}
@keyframes starPop {
    0% { opacity: 1; transform: scale(0) rotate(0deg); }
    50% { opacity: 1; transform: scale(1.3) rotate(180deg); }
    100% { opacity: 0; transform: scale(0.5) rotate(360deg) translateY(-60px); }
}

/* Highlight pulse on mask part */
@keyframes highlightPulse {
    0%, 100% { filter: drop-shadow(0 0 0px transparent); }
    50% { filter: drop-shadow(0 0 12px rgba(255,200,0,0.8)); }
}
.highlight-part { animation: highlightPulse 0.6s ease 3; }

/* Mirror breathing */
@keyframes mirrorBreathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.06); }
}
.mirror-active .mask-svg-wrap { animation: mirrorBreathe 2s ease-in-out infinite; }

/* Responsive */
@media (max-width: 400px) {
    .emotion-grid { grid-template-columns: repeat(2, 1fr); }
    .emotion-btn .face { font-size: 2.2rem; }
    .mask-svg-wrap { width: 180px; height: 180px; }
}
</style>
</head>
<body>

<div class="header">
    <h1>Emotion Masks</h1>
    <p>Tap a face to explore emotions!</p>
</div>

<div class="main">
    <div class="picker-title">How does the face feel?</div>

    <div class="emotion-grid" id="emotionGrid"></div>

    <div class="mask-area" id="maskArea">
        <div class="mask-bg" id="maskBg"></div>
        <div class="mask-svg-wrap" id="maskSvgWrap"></div>
        <div class="part-buttons" id="partButtons">
            <button class="part-btn" data-part="eyes">Eyes</button>
            <button class="part-btn" data-part="mouth">Mouth</button>
            <button class="part-btn" data-part="eyebrows">Eyebrows</button>
        </div>
        <div class="part-info" id="partInfo"></div>
    </div>

    <button class="mirror-btn" id="mirrorBtn">Mirror Mode</button>
</div>

<div class="celebration" id="celebration"></div>

<script>
const EMOTIONS = {
    happy: {
        emoji: '\u{1F60A}', label: 'Happy', color: '#FFD93D', bgColor: '#fff8e1',
        eyes: { shape: 'happy', desc: 'Eyes squeeze up into little curves!' },
        mouth: { shape: 'bigSmile', desc: 'A big wide smile spreads across the face!' },
        eyebrows: { shape: 'raised', desc: 'Eyebrows lift up gently!' }
    },
    sad: {
        emoji: '\u{1F622}', label: 'Sad', color: '#6EC6FF', bgColor: '#e3f2fd',
        eyes: { shape: 'sad', desc: 'Eyes droop down with tears forming.' },
        mouth: { shape: 'frown', desc: 'The mouth turns down at the corners.' },
        eyebrows: { shape: 'worried', desc: 'Eyebrows push together and tilt up.' }
    },
    angry: {
        emoji: '\u{1F620}', label: 'Angry', color: '#FF6B6B', bgColor: '#ffebee',
        eyes: { shape: 'angry', desc: 'Eyes go narrow and tight!' },
        mouth: { shape: 'grr', desc: 'Mouth presses together firmly!' },
        eyebrows: { shape: 'angry', desc: 'Eyebrows push down and scrunch!' }
    },
    surprised: {
        emoji: '\u{1F632}', label: 'Surprised', color: '#FF9FF3', bgColor: '#fce4ec',
        eyes: { shape: 'wide', desc: 'Eyes go really big and round!' },
        mouth: { shape: 'ooh', desc: 'Mouth opens into a big round O!' },
        eyebrows: { shape: 'highUp', desc: 'Eyebrows jump way up high!' }
    },
    scared: {
        emoji: '\u{1F628}', label: 'Scared', color: '#A29BFE', bgColor: '#ede7f6',
        eyes: { shape: 'scared', desc: 'Eyes go wide and look around quickly!' },
        mouth: { shape: 'wavy', desc: 'Mouth goes wobbly and wavy!' },
        eyebrows: { shape: 'highUp', desc: 'Eyebrows shoot up really high!' }
    },
    excited: {
        emoji: '\u{1F929}', label: 'Excited', color: '#FECA57', bgColor: '#fff9c4',
        eyes: { shape: 'stars', desc: 'Eyes light up like stars!' },
        mouth: { shape: 'openSmile', desc: 'A huge open smile with joy!' },
        eyebrows: { shape: 'highUp', desc: 'Eyebrows bounce up with energy!' }
    }
};

let currentEmotion = null;
let currentPart = null;
let mirrorMode = false;
let mirrorInterval = null;

// Build emotion picker buttons
const grid = document.getElementById('emotionGrid');
Object.entries(EMOTIONS).forEach(([key, em]) => {
    const btn = document.createElement('button');
    btn.className = 'emotion-btn';
    btn.dataset.emotion = key;
    btn.innerHTML = `<span class="face">${em.emoji}</span><span class="label">${em.label}</span>`;
    btn.style.background = `linear-gradient(135deg, ${em.bgColor}, #ffffff)`;
    btn.addEventListener('click', () => selectEmotion(key));
    grid.appendChild(btn);
});

// Part buttons
document.querySelectorAll('.part-btn').forEach(btn => {
    btn.addEventListener('click', () => selectPart(btn.dataset.part));
});

// Mirror button
const mirrorBtn = document.getElementById('mirrorBtn');
mirrorBtn.addEventListener('click', toggleMirror);

function selectEmotion(key) {
    if (mirrorMode) toggleMirror();
    currentEmotion = key;
    currentPart = null;

    // Update active button
    document.querySelectorAll('.emotion-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`[data-emotion="${key}"]`).classList.add('active');

    // Show mask area
    const area = document.getElementById('maskArea');
    area.classList.remove('visible');
    void area.offsetWidth; // reflow
    area.classList.add('visible');

    // Background
    document.getElementById('maskBg').style.background = EMOTIONS[key].color;

    // Clear part highlight
    document.querySelectorAll('.part-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('partInfo').textContent = '';

    renderMask(key);
    celebrate();
}

function selectPart(part) {
    if (!currentEmotion) return;
    currentPart = part;
    document.querySelectorAll('.part-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`[data-part="${part}"]`).classList.add('active');

    const info = EMOTIONS[currentEmotion][part];
    document.getElementById('partInfo').textContent = info.desc;

    // Highlight the part on the SVG
    highlightMaskPart(part);
    spawnStars(3);
}

function renderMask(emotionKey, highlightPart) {
    const em = EMOTIONS[emotionKey];
    const wrap = document.getElementById('maskSvgWrap');
    const size = 220;
    const cx = size / 2, cy = size / 2;

    let svg = `<svg viewBox="0 0 ${size} ${size}" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">`;

    // Face circle
    svg += `<circle cx="${cx}" cy="${cy}" r="95" fill="${em.color}" stroke="#333" stroke-width="3"/>`;
    // Cheeks
    svg += `<circle cx="${cx - 55}" cy="${cy + 25}" r="16" fill="rgba(255,150,150,0.35)"/>`;
    svg += `<circle cx="${cx + 55}" cy="${cy + 25}" r="16" fill="rgba(255,150,150,0.35)"/>`;

    const hlEyes = highlightPart === 'eyes' ? ' class="highlight-part"' : '';
    const hlMouth = highlightPart === 'mouth' ? ' class="highlight-part"' : '';
    const hlBrows = highlightPart === 'eyebrows' ? ' class="highlight-part"' : '';

    // Eyebrows
    svg += `<g id="svg-eyebrows"${hlBrows}>`;
    svg += renderEyebrows(em.eyebrows.shape, cx, cy);
    svg += `</g>`;

    // Eyes
    svg += `<g id="svg-eyes"${hlEyes}>`;
    svg += renderEyes(em.eyes.shape, cx, cy);
    svg += `</g>`;

    // Mouth
    svg += `<g id="svg-mouth"${hlMouth}>`;
    svg += renderMouth(em.mouth.shape, cx, cy);
    svg += `</g>`;

    svg += `</svg>`;
    wrap.innerHTML = svg;
}

function renderEyes(shape, cx, cy) {
    const lx = cx - 32, rx = cx + 32, ey = cy - 12;
    switch (shape) {
        case 'happy':
            return `<path d="M${lx-14},${ey} Q${lx},${ey-16} ${lx+14},${ey}" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"/>
                    <path d="M${rx-14},${ey} Q${rx},${ey-16} ${rx+14},${ey}" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"/>`;
        case 'sad':
            return `<ellipse cx="${lx}" cy="${ey}" rx="12" ry="14" fill="white" stroke="#333" stroke-width="3"/>
                    <circle cx="${lx}" cy="${ey+3}" r="6" fill="#333"/>
                    <ellipse cx="${rx}" cy="${ey}" rx="12" ry="14" fill="white" stroke="#333" stroke-width="3"/>
                    <circle cx="${rx}" cy="${ey+3}" r="6" fill="#333"/>
                    <circle cx="${lx+10}" cy="${ey+18}" r="4" fill="#6EC6FF" opacity="0.7"/>
                    <circle cx="${rx+10}" cy="${ey+18}" r="4" fill="#6EC6FF" opacity="0.7"/>`;
        case 'angry':
            return `<ellipse cx="${lx}" cy="${ey}" rx="11" ry="9" fill="white" stroke="#333" stroke-width="3"/>
                    <circle cx="${lx}" cy="${ey}" r="5" fill="#333"/>
                    <ellipse cx="${rx}" cy="${ey}" rx="11" ry="9" fill="white" stroke="#333" stroke-width="3"/>
                    <circle cx="${rx}" cy="${ey}" r="5" fill="#333"/>`;
        case 'wide':
            return `<ellipse cx="${lx}" cy="${ey}" rx="16" ry="18" fill="white" stroke="#333" stroke-width="3"/>
                    <circle cx="${lx}" cy="${ey}" r="8" fill="#333"/>
                    <circle cx="${lx+3}" cy="${ey-3}" r="3" fill="white"/>
                    <ellipse cx="${rx}" cy="${ey}" rx="16" ry="18" fill="white" stroke="#333" stroke-width="3"/>
                    <circle cx="${rx}" cy="${ey}" r="8" fill="#333"/>
                    <circle cx="${rx+3}" cy="${ey-3}" r="3" fill="white"/>`;
        case 'scared':
            return `<ellipse cx="${lx}" cy="${ey}" rx="14" ry="17" fill="white" stroke="#333" stroke-width="3"/>
                    <circle cx="${lx-3}" cy="${ey}" r="7" fill="#333"/>
                    <circle cx="${lx-1}" cy="${ey-2}" r="2.5" fill="white"/>
                    <ellipse cx="${rx}" cy="${ey}" rx="14" ry="17" fill="white" stroke="#333" stroke-width="3"/>
                    <circle cx="${rx+3}" cy="${ey}" r="7" fill="#333"/>
                    <circle cx="${rx+5}" cy="${ey-2}" r="2.5" fill="white"/>`;
        case 'stars':
            return `${starShape(lx, ey, 16, '#333')}${starShape(rx, ey, 16, '#333')}`;
        default:
            return `<circle cx="${lx}" cy="${ey}" r="8" fill="#333"/><circle cx="${rx}" cy="${ey}" r="8" fill="#333"/>`;
    }
}

function starShape(cx, cy, size, fill) {
    const r = size / 2, ir = r * 0.4;
    let pts = '';
    for (let i = 0; i < 5; i++) {
        const angle1 = (i * 72 - 90) * Math.PI / 180;
        const angle2 = ((i * 72) + 36 - 90) * Math.PI / 180;
        pts += `${cx + r * Math.cos(angle1)},${cy + r * Math.sin(angle1)} `;
        pts += `${cx + ir * Math.cos(angle2)},${cy + ir * Math.sin(angle2)} `;
    }
    return `<polygon points="${pts}" fill="${fill}"/>`;
}

function renderMouth(shape, cx, cy) {
    const my = cy + 32;
    switch (shape) {
        case 'bigSmile':
            return `<path d="M${cx-35},${my} Q${cx},${my+35} ${cx+35},${my}" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"/>`;
        case 'frown':
            return `<path d="M${cx-30},${my+12} Q${cx},${my-14} ${cx+30},${my+12}" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"/>`;
        case 'grr':
            return `<line x1="${cx-25}" y1="${my+4}" x2="${cx+25}" y2="${my+4}" stroke="#333" stroke-width="5" stroke-linecap="round"/>
                    <line x1="${cx-15}" y1="${my+4}" x2="${cx-15}" y2="${my+12}" stroke="#333" stroke-width="2"/>
                    <line x1="${cx}" y1="${my+4}" x2="${cx}" y2="${my+12}" stroke="#333" stroke-width="2"/>
                    <line x1="${cx+15}" y1="${my+4}" x2="${cx+15}" y2="${my+12}" stroke="#333" stroke-width="2"/>`;
        case 'ooh':
            return `<ellipse cx="${cx}" cy="${my+6}" rx="18" ry="22" fill="#333" stroke="#333" stroke-width="2"/>
                    <ellipse cx="${cx}" cy="${my+2}" rx="12" ry="12" fill="#ff8a8a"/>`;
        case 'wavy':
            return `<path d="M${cx-28},${my+4} Q${cx-14},${my-8} ${cx},${my+6} Q${cx+14},${my+18} ${cx+28},${my+2}" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"/>`;
        case 'openSmile':
            return `<path d="M${cx-32},${my-2} Q${cx},${my+38} ${cx+32},${my-2}" stroke="#333" stroke-width="3" fill="#ff8a8a"/>
                    <path d="M${cx-32},${my-2} Q${cx},${my+8} ${cx+32},${my-2}" fill="white"/>`;
        default:
            return `<line x1="${cx-20}" y1="${my+5}" x2="${cx+20}" y2="${my+5}" stroke="#333" stroke-width="4" stroke-linecap="round"/>`;
    }
}

function renderEyebrows(shape, cx, cy) {
    const lx = cx - 32, rx = cx + 32, by = cy - 38;
    switch (shape) {
        case 'raised':
            return `<path d="M${lx-16},${by} Q${lx},${by-8} ${lx+16},${by}" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"/>
                    <path d="M${rx-16},${by} Q${rx},${by-8} ${rx+16},${by}" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"/>`;
        case 'worried':
            return `<path d="M${lx-16},${by-6} Q${lx},${by+4} ${lx+16},${by-2}" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"/>
                    <path d="M${rx-16},${by-2} Q${rx},${by+4} ${rx+16},${by-6}" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"/>`;
        case 'angry':
            return `<path d="M${lx-16},${by-4} Q${lx},${by+6} ${lx+16},${by+4}" stroke="#333" stroke-width="5" fill="none" stroke-linecap="round"/>
                    <path d="M${rx-16},${by+4} Q${rx},${by+6} ${rx+16},${by-4}" stroke="#333" stroke-width="5" fill="none" stroke-linecap="round"/>`;
        case 'highUp':
            return `<path d="M${lx-16},${by-2} Q${lx},${by-16} ${lx+16},${by-2}" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"/>
                    <path d="M${rx-16},${by-2} Q${rx},${by-16} ${rx+16},${by-2}" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"/>`;
        default:
            return `<line x1="${lx-14}" y1="${by}" x2="${lx+14}" y2="${by}" stroke="#333" stroke-width="4" stroke-linecap="round"/>
                    <line x1="${rx-14}" y1="${by}" x2="${rx+14}" y2="${by}" stroke="#333" stroke-width="4" stroke-linecap="round"/>`;
    }
}

function highlightMaskPart(part) {
    if (!currentEmotion) return;
    renderMask(currentEmotion, part);
}

function toggleMirror() {
    mirrorMode = !mirrorMode;
    mirrorBtn.textContent = mirrorMode ? 'Stop Mirror' : 'Mirror Mode';
    mirrorBtn.classList.toggle('on', mirrorMode);
    document.getElementById('maskArea').classList.toggle('mirror-active', mirrorMode);

    if (mirrorMode) {
        const keys = Object.keys(EMOTIONS);
        let idx = 0;
        // Show mask area if hidden
        if (!currentEmotion) {
            currentEmotion = keys[0];
            document.getElementById('maskArea').classList.add('visible');
        }
        mirrorInterval = setInterval(() => {
            idx = (idx + 1) % keys.length;
            currentEmotion = keys[idx];
            document.querySelectorAll('.emotion-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`[data-emotion="${keys[idx]}"]`).classList.add('active');
            document.getElementById('maskBg').style.background = EMOTIONS[keys[idx]].color;
            renderMask(keys[idx]);
            document.getElementById('partInfo').textContent = `${EMOTIONS[keys[idx]].label}!`;
        }, 1800);
    } else {
        clearInterval(mirrorInterval);
        mirrorInterval = null;
        document.getElementById('maskArea').classList.remove('mirror-active');
    }
}

// Celebrations
function celebrate() {
    spawnConfetti(25);
    spawnStars(5);
}

function spawnConfetti(count) {
    const container = document.getElementById('celebration');
    const colours = ['#FFD93D', '#FF6B6B', '#6EC6FF', '#A29BFE', '#FF9FF3', '#FECA57', '#00d2d3', '#ff9f43'];
    for (let i = 0; i < count; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.left = Math.random() * 100 + 'vw';
        el.style.top = '-12px';
        el.style.background = colours[Math.floor(Math.random() * colours.length)];
        el.style.width = (6 + Math.random() * 8) + 'px';
        el.style.height = (6 + Math.random() * 8) + 'px';
        el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
        el.style.animationDelay = (Math.random() * 0.5) + 's';
        container.appendChild(el);
        setTimeout(() => el.remove(), 4000);
    }
}

function spawnStars(count) {
    const container = document.getElementById('celebration');
    const symbols = ['\u2B50', '\u2728', '\u{1F31F}'];
    for (let i = 0; i < count; i++) {
        const el = document.createElement('div');
        el.className = 'star-burst';
        el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
        el.style.left = (20 + Math.random() * 60) + 'vw';
        el.style.top = (20 + Math.random() * 40) + 'vh';
        el.style.animationDelay = (Math.random() * 0.3) + 's';
        container.appendChild(el);
        setTimeout(() => el.remove(), 1200);
    }
}
</script>
</body>
</html>
