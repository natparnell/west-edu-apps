<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Counting Adventure</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: #faf7f2;
    color: #3d2e1f;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    user-select: none;
    -webkit-user-select: none;
    overflow-x: hidden;
  }

  /* Title Bar */
  .title-bar {
    background: #e07020;
    color: #fff;
    text-align: center;
    padding: 16px 20px;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 0.5px;
    box-shadow: 0 3px 10px rgba(224,112,32,0.3);
    position: relative;
    z-index: 10;
  }

  /* Instructions */
  .instructions {
    text-align: center;
    font-size: 20px;
    font-weight: 600;
    padding: 12px 16px;
    color: #5a4630;
    background: #fff4e8;
    border-bottom: 2px solid #f0dcc4;
  }

  /* Progress bar */
  .progress-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 10px 20px;
    background: #fff;
    border-bottom: 2px solid #f0dcc4;
  }
  .progress-bar span { font-weight: 700; font-size: 18px; }
  .progress-dots {
    display: flex;
    gap: 8px;
  }
  .progress-dot {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: #e8ddd0;
    transition: background 0.3s;
  }
  .progress-dot.done { background: #4caf50; }
  .progress-dot.current { background: #e07020; animation: pulse-dot 1s infinite; }
  @keyframes pulse-dot { 0%,100% { transform: scale(1); } 50% { transform: scale(1.3); } }

  /* Count display */
  .count-display {
    text-align: center;
    padding: 14px;
    font-size: 48px;
    font-weight: 800;
    color: #e07020;
    min-height: 80px;
    transition: transform 0.2s;
  }
  .count-display.pop { animation: pop 0.35s ease; }
  @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.4); } 100% { transform: scale(1); } }

  /* Object grid */
  .object-grid {
    flex: 1;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-content: center;
    gap: 16px;
    padding: 20px;
    max-width: 700px;
    margin: 0 auto;
    width: 100%;
  }

  .object-item {
    width: 90px; height: 90px;
    font-size: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 18px;
    background: #fff;
    border: 4px solid #e8ddd0;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s, background 0.2s, box-shadow 0.2s;
    position: relative;
  }
  .object-item:hover { transform: scale(1.08); }
  .object-item:active { transform: scale(0.95); }
  .object-item.tapped {
    border-color: #e07020;
    background: #fff4e8;
    box-shadow: 0 0 16px rgba(224,112,32,0.35);
    animation: wiggle 0.4s ease;
  }
  .object-item.tapped::after {
    content: attr(data-num);
    position: absolute;
    top: -10px; right: -10px;
    background: #e07020;
    color: #fff;
    font-size: 16px;
    font-weight: 800;
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  @keyframes wiggle {
    0% { transform: rotate(0); }
    25% { transform: rotate(-8deg) scale(1.1); }
    50% { transform: rotate(8deg) scale(1.1); }
    75% { transform: rotate(-4deg); }
    100% { transform: rotate(0); }
  }

  /* Buttons */
  .btn {
    display: inline-block;
    padding: 14px 32px;
    font-size: 20px;
    font-weight: 700;
    font-family: 'Inter', sans-serif;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn:hover { transform: scale(1.05); }
  .btn:active { transform: scale(0.96); }
  .btn-primary {
    background: #e07020;
    color: #fff;
    box-shadow: 0 4px 12px rgba(224,112,32,0.35);
  }
  .btn-secondary {
    background: #fff;
    color: #e07020;
    border: 3px solid #e07020;
  }

  .bottom-bar {
    display: flex;
    justify-content: center;
    gap: 14px;
    padding: 16px;
    background: #fff;
    border-top: 2px solid #f0dcc4;
  }

  /* Celebration overlay */
  .celebration {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(250,247,242,0.92);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }
  .celebration.active { display: flex; }
  .celebration .big-text {
    font-size: 48px;
    font-weight: 800;
    color: #e07020;
    animation: pop 0.6s ease;
  }
  .celebration .stars {
    font-size: 60px;
    animation: spin-stars 1.5s ease;
  }
  @keyframes spin-stars {
    0% { transform: scale(0) rotate(-180deg); opacity: 0; }
    60% { transform: scale(1.3) rotate(10deg); opacity: 1; }
    100% { transform: scale(1) rotate(0); }
  }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 12px; height: 12px;
    border-radius: 3px;
    z-index: 101;
    animation: confetti-fall 2.5s ease forwards;
    pointer-events: none;
  }
  @keyframes confetti-fall {
    0% { opacity: 1; transform: translateY(0) rotate(0deg); }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
  }

  /* Game complete */
  .game-complete {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(250,247,242,0.95);
    z-index: 200;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }
  .game-complete.active { display: flex; }
  .game-complete .trophy { font-size: 80px; animation: pop 0.8s ease; }
  .game-complete .score-text { font-size: 32px; font-weight: 800; color: #e07020; }
  .game-complete .msg { font-size: 22px; font-weight: 600; color: #5a4630; }

  @media (max-width: 500px) {
    .title-bar { font-size: 22px; padding: 12px 16px; }
    .instructions { font-size: 17px; }
    .object-item { width: 72px; height: 72px; font-size: 40px; }
    .count-display { font-size: 40px; }
  }
</style>
</head>
<body>

<div class="title-bar">Counting Adventure</div>
<div class="instructions" id="instructions">Tap each object to count them!</div>

<div class="progress-bar">
  <span>Round:</span>
  <div class="progress-dots" id="progressDots"></div>
</div>

<div class="count-display" id="countDisplay">0</div>

<div class="object-grid" id="objectGrid"></div>

<div class="bottom-bar">
  <button class="btn btn-secondary" onclick="newGame()">New Game</button>
</div>

<div class="celebration" id="celebration">
  <div class="stars" id="celebStars"></div>
  <div class="big-text" id="celebText"></div>
</div>

<div class="game-complete" id="gameComplete">
  <div class="trophy">🏆</div>
  <div class="score-text" id="finalScore"></div>
  <div class="msg">You're a counting superstar!</div>
  <button class="btn btn-primary" onclick="newGame()" style="margin-top:10px;">Play Again</button>
</div>

<script>
const TOTAL_ROUNDS = 8;
const OBJECT_SETS = [
  ['🐶','🐱','🐰','🐸','🐵','🐻','🦊','🐧','🐥','🦋','🐞','🐢','🐬','🦄','🐝','🐠','🦀','🐙','🦑','🐘'],
  ['⭐','🌟','💫','✨','🌙','☀️','🌈','💎','🔔','🎈','🎀','🎁','🎊','🎉','💖','💜','💙','💚','💛','🧡'],
  ['🍎','🍊','🍋','🍇','🍓','🍌','🍉','🍒','🥝','🍑','🫐','🥭','🍍','🥥','🍐','🥑','🍏','🥕','🌽','🍅']
];

let currentRound = 0;
let tappedCount = 0;
let targetCount = 0;
let tappedSet = new Set();
let roundsCompleted = 0;

function randomInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = randomInt(0, i);
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function buildProgressDots() {
  const el = document.getElementById('progressDots');
  el.innerHTML = '';
  for (let i = 0; i < TOTAL_ROUNDS; i++) {
    const dot = document.createElement('div');
    dot.className = 'progress-dot' + (i < roundsCompleted ? ' done' : '') + (i === currentRound ? ' current' : '');
    el.appendChild(dot);
  }
}

function startRound() {
  if (currentRound >= TOTAL_ROUNDS) {
    showGameComplete();
    return;
  }

  tappedCount = 0;
  tappedSet.clear();

  // Scale quantity with round: rounds 0-1 → 1-5, rounds 2-3 → 3-8, rounds 4-5 → 5-12, rounds 6-7 → 8-20
  const brackets = [[1,5],[3,8],[5,12],[8,20]];
  const bracket = brackets[Math.min(Math.floor(currentRound / 2), brackets.length - 1)];
  targetCount = randomInt(bracket[0], bracket[1]);

  const setIndex = randomInt(0, OBJECT_SETS.length - 1);
  const emoji = OBJECT_SETS[setIndex][randomInt(0, OBJECT_SETS[setIndex].length - 1)];

  const grid = document.getElementById('objectGrid');
  grid.innerHTML = '';

  for (let i = 0; i < targetCount; i++) {
    const item = document.createElement('div');
    item.className = 'object-item';
    item.textContent = emoji;
    item.dataset.index = i;
    item.addEventListener('click', () => tapObject(item, i));
    // stagger entrance
    item.style.opacity = '0';
    item.style.transform = 'scale(0)';
    setTimeout(() => {
      item.style.transition = 'opacity 0.3s, transform 0.3s';
      item.style.opacity = '1';
      item.style.transform = 'scale(1)';
    }, i * 60);
    grid.appendChild(item);
  }

  document.getElementById('countDisplay').textContent = '0';
  document.getElementById('instructions').textContent = 'Tap each object to count them!';
  buildProgressDots();
}

function tapObject(el, index) {
  if (tappedSet.has(index)) return;
  tappedSet.add(index);
  tappedCount++;

  el.classList.add('tapped');
  el.dataset.num = tappedCount;

  const display = document.getElementById('countDisplay');
  display.textContent = tappedCount;
  display.classList.remove('pop');
  void display.offsetWidth;
  display.classList.add('pop');

  if (tappedCount === targetCount) {
    setTimeout(celebrate, 350);
  }
}

const praises = ['Amazing!', 'Great job!', 'Well done!', 'Fantastic!', 'Super!', 'Brilliant!', 'Wonderful!', 'You did it!'];
const starSets = ['⭐⭐⭐', '🌟🌟🌟', '🎉🎉🎉', '💖💖💖'];

function celebrate() {
  document.getElementById('instructions').textContent = `Yes! There are ${targetCount}!`;
  const celeb = document.getElementById('celebration');
  document.getElementById('celebText').textContent = praises[randomInt(0, praises.length - 1)];
  document.getElementById('celebStars').textContent = starSets[randomInt(0, starSets.length - 1)];
  celeb.classList.add('active');
  spawnConfetti();

  roundsCompleted++;
  currentRound++;

  setTimeout(() => {
    celeb.classList.remove('active');
    startRound();
  }, 2200);
}

function spawnConfetti() {
  const colors = ['#e07020','#f4a940','#4caf50','#2196f3','#9c27b0','#e91e63','#ff5722'];
  for (let i = 0; i < 40; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = randomInt(5, 95) + 'vw';
    piece.style.top = randomInt(-10, 10) + 'vh';
    piece.style.background = colors[randomInt(0, colors.length - 1)];
    piece.style.animationDelay = (Math.random() * 0.6) + 's';
    piece.style.animationDuration = (1.5 + Math.random()) + 's';
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 3000);
  }
}

function showGameComplete() {
  document.getElementById('finalScore').textContent = `You counted ${TOTAL_ROUNDS} rounds!`;
  document.getElementById('gameComplete').classList.add('active');
  spawnConfetti();
}

function newGame() {
  document.getElementById('gameComplete').classList.remove('active');
  document.getElementById('celebration').classList.remove('active');
  currentRound = 0;
  roundsCompleted = 0;
  startRound();
}

newGame();
</script>
</body>
</html>
