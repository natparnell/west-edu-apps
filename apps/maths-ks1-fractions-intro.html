<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fraction Explorers</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', sans-serif;
  background: #faf7f2;
  color: #3d2e1f;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.title-bar {
  width: 100%;
  background: #2563eb;
  color: #fff;
  text-align: center;
  padding: 16px 20px;
  font-size: 1.5rem;
  font-weight: 800;
  letter-spacing: 0.5px;
  box-shadow: 0 2px 8px rgba(37,99,235,0.15);
}
.progress-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 12px 20px;
  font-size: 1rem;
  font-weight: 600;
  background: #f0edea;
  width: 100%;
}
.progress-bar .score { color: #2563eb; }
.progress-bar .level { color: #3d2e1f; }
.instructions {
  text-align: center;
  padding: 14px 20px;
  font-size: 1.05rem;
  font-weight: 600;
  color: #5a4633;
  max-width: 640px;
  line-height: 1.5;
}
.main-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px 20px 30px;
  width: 100%;
  max-width: 700px;
}
/* Mode selector */
.mode-selector {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 14px;
}
.mode-btn {
  padding: 10px 18px;
  border: 2px solid #2563eb;
  background: #fff;
  color: #2563eb;
  font-family: inherit;
  font-weight: 700;
  font-size: 0.95rem;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
}
.mode-btn.active, .mode-btn:hover {
  background: #2563eb;
  color: #fff;
}
/* Shape canvas */
.shape-container {
  position: relative;
  width: 280px;
  height: 280px;
  margin: 10px auto;
}
.shape-container svg {
  width: 100%;
  height: 100%;
}
svg .segment {
  cursor: pointer;
  transition: fill 0.3s, opacity 0.3s;
  stroke: #3d2e1f;
  stroke-width: 2;
}
svg .segment.shaded {
  fill: #2563eb;
}
svg .segment.unshaded {
  fill: #e8e3dc;
}
svg .segment:hover {
  opacity: 0.8;
}
svg .split-line {
  stroke: #3d2e1f;
  stroke-width: 2.5;
  stroke-linecap: round;
}
/* Fraction display */
.fraction-display {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  margin: 12px 0;
}
.fraction {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  font-weight: 800;
  font-size: 1.6rem;
  color: #2563eb;
  line-height: 1;
}
.fraction .num { padding-bottom: 4px; }
.fraction .line {
  width: 36px;
  height: 3px;
  background: #2563eb;
  border-radius: 2px;
}
.fraction .den { padding-top: 4px; }
.fraction.large { font-size: 2.2rem; }
.fraction.large .line { width: 48px; }
/* Answer options */
.options {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
  margin: 12px 0;
}
.opt-btn {
  padding: 12px 20px;
  border: 3px solid #d4cfc8;
  background: #fff;
  font-family: inherit;
  font-weight: 700;
  font-size: 1.1rem;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.25s;
  min-width: 80px;
  text-align: center;
}
.opt-btn:hover { border-color: #2563eb; background: #eef4ff; }
.opt-btn.correct {
  border-color: #16a34a;
  background: #dcfce7;
  animation: pop 0.4s;
}
.opt-btn.wrong {
  border-color: #dc2626;
  background: #fee2e2;
  animation: shake 0.4s;
}
/* Split choice buttons */
.split-choices {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
  margin: 10px 0;
}
.split-btn {
  padding: 10px 22px;
  border: 3px solid #d4cfc8;
  background: #fff;
  font-family: inherit;
  font-weight: 700;
  font-size: 1rem;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.25s;
}
.split-btn:hover { border-color: #2563eb; }
.split-btn.active { border-color: #2563eb; background: #eef4ff; }
/* Equivalence display */
.equiv-area {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin: 10px 0;
  flex-wrap: wrap;
}
.equiv-shape {
  width: 140px;
  height: 140px;
}
.equals-sign {
  font-size: 2.5rem;
  font-weight: 800;
  color: #2563eb;
  animation: fadeIn 0.6s;
}
/* Buttons */
.action-btn {
  padding: 12px 28px;
  background: #2563eb;
  color: #fff;
  border: none;
  font-family: inherit;
  font-weight: 700;
  font-size: 1rem;
  border-radius: 12px;
  cursor: pointer;
  margin-top: 10px;
  transition: background 0.2s;
}
.action-btn:hover { background: #1d4ed8; }
.action-btn.secondary {
  background: #fff;
  color: #2563eb;
  border: 2px solid #2563eb;
}
.action-btn.secondary:hover { background: #eef4ff; }
/* Feedback */
.feedback {
  font-size: 1.2rem;
  font-weight: 700;
  text-align: center;
  min-height: 36px;
  margin: 8px 0;
  transition: opacity 0.3s;
}
.feedback.success { color: #16a34a; }
.feedback.error { color: #dc2626; }
/* Animations */
@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.12); }
  100% { transform: scale(1); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}
@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.7); }
  to { opacity: 1; transform: scale(1); }
}
@keyframes splitAnim {
  from { opacity: 0; }
  to { opacity: 1; }
}
.segment-anim {
  animation: splitAnim 0.5s ease-out forwards;
}
/* Responsive */
@media (max-width: 500px) {
  .title-bar { font-size: 1.2rem; padding: 12px 14px; }
  .shape-container { width: 220px; height: 220px; }
  .equiv-shape { width: 110px; height: 110px; }
  .fraction { font-size: 1.3rem; }
  .fraction.large { font-size: 1.7rem; }
}
</style>
</head>
<body>
<div class="title-bar">Fraction Explorers</div>
<div class="progress-bar">
  <span class="score" id="scoreDisplay">Score: 0</span>
  <span class="level" id="levelDisplay">Level: 1</span>
</div>
<div class="instructions" id="instructions">Choose a mode to start exploring fractions!</div>
<div class="main-area" id="mainArea">
  <div class="mode-selector" id="modeSelector">
    <button class="mode-btn" data-mode="split" onclick="setMode('split')">Split Shapes</button>
    <button class="mode-btn" data-mode="shade" onclick="setMode('shade')">Shade a Fraction</button>
    <button class="mode-btn" data-mode="name" onclick="setMode('name')">Name the Fraction</button>
    <button class="mode-btn" data-mode="equiv" onclick="setMode('equiv')">Equivalence</button>
  </div>
  <div id="gameContent"></div>
</div>

<script>
const SHAPES = ['circle', 'rectangle', 'square'];
const DIVISIONS = [2, 3, 4];
const FRACTIONS_EASY = [
  {n:1,d:2},{n:1,d:4},{n:2,d:4},{n:3,d:4}
];
const FRACTIONS_MED = [
  {n:1,d:2},{n:1,d:3},{n:2,d:3},{n:1,d:4},{n:2,d:4},{n:3,d:4}
];
const EQUIV_PAIRS = [
  {a:{n:1,d:2}, b:{n:2,d:4}},
  {a:{n:2,d:4}, b:{n:1,d:2}},
  {a:{n:2,d:2}, b:{n:4,d:4}},
];

let state = {
  mode: null,
  score: 0,
  level: 1,
  questionsAnswered: 0,
  currentShape: null,
  currentDivision: null,
  targetFraction: null,
  shadedSegments: new Set(),
  answered: false,
};

function setMode(mode) {
  state.mode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
  newQuestion();
}

function updateUI() {
  document.getElementById('scoreDisplay').textContent = `Score: ${state.score}`;
  document.getElementById('levelDisplay').textContent = `Level: ${state.level}`;
}

function pickRandom(arr) { return arr[Math.floor(Math.random()*arr.length)]; }
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function fracStr(f) { return `${f.n}/${f.d}`; }
function fracHTML(f, cls='') {
  return `<span class="fraction ${cls}"><span class="num">${f.n}</span><span class="line"></span><span class="den">${f.d}</span></span>`;
}

/* SVG shape generators */
function circleSegments(div, size, shadedSet, interactive, idPrefix='seg') {
  const cx = size/2, cy = size/2, r = size/2 - 6;
  let paths = [];
  for (let i = 0; i < div; i++) {
    const a1 = (2*Math.PI*i/div) - Math.PI/2;
    const a2 = (2*Math.PI*(i+1)/div) - Math.PI/2;
    const largeArc = (a2-a1) > Math.PI ? 1 : 0;
    const x1 = cx + r*Math.cos(a1), y1 = cy + r*Math.sin(a1);
    const x2 = cx + r*Math.cos(a2), y2 = cy + r*Math.sin(a2);
    const d = `M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${largeArc} 1 ${x2},${y2} Z`;
    const shaded = shadedSet && shadedSet.has(i);
    const cls = `segment segment-anim ${shaded ? 'shaded' : 'unshaded'}`;
    const click = interactive ? `onclick="toggleSegment(${i})"` : '';
    paths.push(`<path d="${d}" class="${cls}" id="${idPrefix}${i}" ${click} style="animation-delay:${i*0.1}s"/>`);
  }
  // split lines
  let lines = [];
  for (let i = 0; i < div; i++) {
    const a = (2*Math.PI*i/div) - Math.PI/2;
    const x = cx + r*Math.cos(a), y = cy + r*Math.sin(a);
    lines.push(`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" class="split-line segment-anim" style="animation-delay:${i*0.1+0.1}s"/>`);
  }
  return `<svg viewBox="0 0 ${size} ${size}">${paths.join('')}${lines.join('')}</svg>`;
}

function rectSegments(div, w, h, shadedSet, interactive, idPrefix='seg', isSquare=false) {
  const pad = 6;
  const rw = w - pad*2, rh = h - pad*2;
  let rects = [];
  // split horizontally for 2, vertically for 3, grid for 4
  let cols, rows;
  if (div === 2) { cols = 2; rows = 1; }
  else if (div === 3) { cols = 3; rows = 1; }
  else { cols = 2; rows = 2; }
  const cw = rw / cols, ch = rh / rows;
  let idx = 0;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const x = pad + c*cw, y = pad + r*ch;
      const shaded = shadedSet && shadedSet.has(idx);
      const cls = `segment segment-anim ${shaded ? 'shaded' : 'unshaded'}`;
      const click = interactive ? `onclick="toggleSegment(${idx})"` : '';
      rects.push(`<rect x="${x}" y="${y}" width="${cw}" height="${ch}" rx="3" class="${cls}" id="${idPrefix}${idx}" ${click} style="animation-delay:${idx*0.1}s"/>`);
      idx++;
    }
  }
  return `<svg viewBox="0 0 ${w} ${h}">${rects.join('')}</svg>`;
}

function drawShape(shape, div, size, shadedSet, interactive, idPrefix='seg') {
  if (shape === 'circle') return circleSegments(div, size, shadedSet, interactive, idPrefix);
  if (shape === 'square') return rectSegments(div, size, size, shadedSet, interactive, idPrefix, true);
  return rectSegments(div, size, size*0.65, shadedSet, interactive, idPrefix, false);
}

/* MODES */
function newQuestion() {
  state.answered = false;
  state.shadedSegments = new Set();
  const content = document.getElementById('gameContent');

  if (state.mode === 'split') setupSplit(content);
  else if (state.mode === 'shade') setupShade(content);
  else if (state.mode === 'name') setupName(content);
  else if (state.mode === 'equiv') setupEquiv(content);
  updateUI();
}

/* MODE: Split */
function setupSplit(el) {
  state.currentShape = pickRandom(SHAPES);
  document.getElementById('instructions').textContent = `Split this ${state.currentShape} into equal parts! Choose how many parts.`;
  el.innerHTML = `
    <div class="shape-container" id="shapeBox">${drawShape(state.currentShape, 1, 280, null, false)}</div>
    <div class="split-choices">
      <button class="split-btn" onclick="doSplit(2)">Halves (2)</button>
      <button class="split-btn" onclick="doSplit(3)">Thirds (3)</button>
      <button class="split-btn" onclick="doSplit(4)">Quarters (4)</button>
    </div>
    <div class="feedback" id="feedback"></div>
    <button class="action-btn secondary" onclick="newQuestion()">New Shape</button>
  `;
}

function doSplit(div) {
  state.currentDivision = div;
  const box = document.getElementById('shapeBox');
  box.innerHTML = drawShape(state.currentShape, div, 280, null, false);
  const names = {2:'halves',3:'thirds',4:'quarters'};
  const fb = document.getElementById('feedback');
  fb.className = 'feedback success';
  fb.textContent = `Split into ${div} equal parts — ${names[div]}! Each part is 1/${div}.`;
  state.score++;
  state.questionsAnswered++;
  checkLevel();
  updateUI();
}

function drawUnsplitShape(shape, size) {
  if (shape === 'circle') {
    const cx = size/2, cy = size/2, r = size/2 - 6;
    return `<svg viewBox="0 0 ${size} ${size}"><circle cx="${cx}" cy="${cy}" r="${r}" class="segment unshaded"/></svg>`;
  }
  const pad = 6;
  const w = size - pad*2, h = shape === 'rectangle' ? size*0.65 - pad*2 : size - pad*2;
  return `<svg viewBox="0 0 ${size} ${shape==='rectangle'?size*0.65:size}"><rect x="${pad}" y="${pad}" width="${w}" height="${h}" rx="6" class="segment unshaded"/></svg>`;
}

/* MODE: Shade */
function setupShade(el) {
  const fracs = state.level >= 3 ? FRACTIONS_MED : FRACTIONS_EASY;
  state.targetFraction = pickRandom(fracs);
  state.currentShape = pickRandom(SHAPES);
  state.currentDivision = state.targetFraction.d;
  state.shadedSegments = new Set();
  document.getElementById('instructions').innerHTML = `Shade ${fracHTML(state.targetFraction)} of this ${state.currentShape}. Tap the parts to shade them!`;
  el.innerHTML = `
    <div class="shape-container" id="shapeBox">${drawShape(state.currentShape, state.currentDivision, 280, state.shadedSegments, true)}</div>
    <div class="fraction-display">${fracHTML(state.targetFraction, 'large')}</div>
    <div class="feedback" id="feedback"></div>
    <button class="action-btn" onclick="checkShade()">Check</button>
    <button class="action-btn secondary" onclick="newQuestion()" style="margin-left:8px">New Question</button>
  `;
}

window.toggleSegment = function(i) {
  if (state.answered) return;
  if (state.shadedSegments.has(i)) state.shadedSegments.delete(i);
  else state.shadedSegments.add(i);
  const box = document.getElementById('shapeBox');
  box.innerHTML = drawShape(state.currentShape, state.currentDivision, 280, state.shadedSegments, true);
};

window.checkShade = function() {
  if (state.answered) return;
  const fb = document.getElementById('feedback');
  if (state.shadedSegments.size === state.targetFraction.n) {
    fb.className = 'feedback success';
    fb.textContent = `Well done! You shaded ${state.targetFraction.n} out of ${state.targetFraction.d} parts!`;
    state.score++;
    state.answered = true;
  } else {
    fb.className = 'feedback error';
    fb.textContent = `Not quite — you need to shade exactly ${state.targetFraction.n} part${state.targetFraction.n>1?'s':''}.`;
  }
  state.questionsAnswered++;
  checkLevel();
  updateUI();
};

/* MODE: Name */
function setupName(el) {
  const fracs = state.level >= 3 ? FRACTIONS_MED : FRACTIONS_EASY;
  state.targetFraction = pickRandom(fracs);
  state.currentShape = pickRandom(SHAPES);
  state.currentDivision = state.targetFraction.d;
  state.shadedSegments = new Set();
  for (let i = 0; i < state.targetFraction.n; i++) state.shadedSegments.add(i);

  // Build wrong options
  let options = [fracStr(state.targetFraction)];
  while (options.length < 4) {
    const f = pickRandom(FRACTIONS_MED);
    const s = fracStr(f);
    if (!options.includes(s)) options.push(s);
  }
  options = shuffle(options);

  document.getElementById('instructions').textContent = 'What fraction of the shape is shaded blue?';
  el.innerHTML = `
    <div class="shape-container" id="shapeBox">${drawShape(state.currentShape, state.currentDivision, 280, state.shadedSegments, false)}</div>
    <div class="options" id="optionsArea">
      ${options.map(o => {
        const [n,d] = o.split('/');
        return `<button class="opt-btn" data-val="${o}" onclick="checkName(this,'${o}')">${fracHTML({n,d})}</button>`;
      }).join('')}
    </div>
    <div class="feedback" id="feedback"></div>
    <button class="action-btn secondary" onclick="newQuestion()">New Question</button>
  `;
}

window.checkName = function(btn, val) {
  if (state.answered) return;
  state.answered = true;
  const correct = fracStr(state.targetFraction);
  const fb = document.getElementById('feedback');
  if (val === correct) {
    btn.classList.add('correct');
    fb.className = 'feedback success';
    fb.textContent = `Correct! The fraction is ${correct}.`;
    state.score++;
  } else {
    btn.classList.add('wrong');
    document.querySelector(`.opt-btn[data-val="${correct}"]`).classList.add('correct');
    fb.className = 'feedback error';
    fb.textContent = `The answer is ${correct}.`;
  }
  state.questionsAnswered++;
  checkLevel();
  updateUI();
};

/* MODE: Equivalence */
function setupEquiv(el) {
  const pair = pickRandom(EQUIV_PAIRS);
  const shapeA = pickRandom(SHAPES), shapeB = pickRandom(SHAPES);
  const shadedA = new Set(); for (let i=0;i<pair.a.n;i++) shadedA.add(i);
  const shadedB = new Set(); for (let i=0;i<pair.b.n;i++) shadedB.add(i);

  document.getElementById('instructions').textContent = 'Look! These two fractions are the same amount!';
  el.innerHTML = `
    <div class="equiv-area">
      <div>
        <div class="equiv-shape">${drawShape(shapeA, pair.a.d, 140, shadedA, false, 'eA')}</div>
        <div class="fraction-display">${fracHTML(pair.a)}</div>
      </div>
      <span class="equals-sign">=</span>
      <div>
        <div class="equiv-shape">${drawShape(shapeB, pair.b.d, 140, shadedB, false, 'eB')}</div>
        <div class="fraction-display">${fracHTML(pair.b)}</div>
      </div>
    </div>
    <div class="feedback success" id="feedback">${fracStr(pair.a)} is the same as ${fracStr(pair.b)}!</div>
    <button class="action-btn" onclick="equivQuiz()">Quiz Me!</button>
    <button class="action-btn secondary" onclick="newQuestion()" style="margin-left:8px">Show Another</button>
  `;
}

window.equivQuiz = function() {
  const pair = pickRandom(EQUIV_PAIRS);
  const shape = pickRandom(SHAPES);
  const shaded = new Set(); for (let i=0;i<pair.a.n;i++) shaded.add(i);

  let options = [fracStr(pair.b)];
  while (options.length < 3) {
    const f = pickRandom(FRACTIONS_MED);
    const s = fracStr(f);
    if (!options.includes(s) && s !== fracStr(pair.a)) options.push(s);
  }
  options = shuffle(options);

  const content = document.getElementById('gameContent');
  document.getElementById('instructions').innerHTML = `Which fraction is equal to ${fracHTML(pair.a)}?`;
  content.innerHTML = `
    <div class="shape-container" id="shapeBox">${drawShape(shape, pair.a.d, 280, shaded, false)}</div>
    <div class="fraction-display">${fracHTML(pair.a, 'large')}</div>
    <div class="options">
      ${options.map(o => {
        const [n,d] = o.split('/');
        return `<button class="opt-btn" data-val="${o}" onclick="checkEquiv(this,'${o}','${fracStr(pair.b)}')">${fracHTML({n,d})}</button>`;
      }).join('')}
    </div>
    <div class="feedback" id="feedback"></div>
    <button class="action-btn secondary" onclick="newQuestion()">New Question</button>
  `;
};

window.checkEquiv = function(btn, val, correct) {
  if (state.answered) return;
  state.answered = true;
  const fb = document.getElementById('feedback');
  if (val === correct) {
    btn.classList.add('correct');
    fb.className = 'feedback success';
    fb.textContent = `Yes! They are equal!`;
    state.score++;
  } else {
    btn.classList.add('wrong');
    document.querySelector(`.opt-btn[data-val="${correct}"]`).classList.add('correct');
    fb.className = 'feedback error';
    fb.textContent = `The answer is ${correct}.`;
  }
  state.questionsAnswered++;
  checkLevel();
  updateUI();
};

function checkLevel() {
  if (state.questionsAnswered > 0 && state.questionsAnswered % 5 === 0 && state.level < 5) {
    state.level++;
  }
}

// Draw unsplit shape for initial split mode display
const origDrawShape = drawShape;
// Override for single-part display
function drawShapeSingle(shape, size) {
  if (shape === 'circle') {
    const cx = size/2, cy = size/2, r = size/2-6;
    return `<svg viewBox="0 0 ${size} ${size}"><circle cx="${cx}" cy="${cy}" r="${r}" fill="#e8e3dc" stroke="#3d2e1f" stroke-width="2"/></svg>`;
  }
  const pad = 6;
  const h = shape === 'rectangle' ? size*0.65 : size;
  return `<svg viewBox="0 0 ${size} ${h}"><rect x="${pad}" y="${pad}" width="${size-pad*2}" height="${h-pad*2}" rx="6" fill="#e8e3dc" stroke="#3d2e1f" stroke-width="2"/></svg>`;
}

// Patch drawShape for div=1
const _origDraw = window.drawShape;
(function(){
  const orig = drawShape;
  window.drawShapePatched = function(shape, div, size, shaded, inter, pfx) {
    if (div === 1) return drawShapeSingle(shape, size);
    return orig(shape, div, size, shaded, inter, pfx);
  };
})();

// Re-patch setupSplit to use single shape
const origSetupSplit = setupSplit;
function setupSplitPatched(el) {
  state.currentShape = pickRandom(SHAPES);
  document.getElementById('instructions').textContent = `Split this ${state.currentShape} into equal parts! Choose how many parts.`;
  el.innerHTML = `
    <div class="shape-container" id="shapeBox">${drawShapeSingle(state.currentShape, 280)}</div>
    <div class="split-choices">
      <button class="split-btn" onclick="doSplit(2)">Halves (2)</button>
      <button class="split-btn" onclick="doSplit(3)">Thirds (3)</button>
      <button class="split-btn" onclick="doSplit(4)">Quarters (4)</button>
    </div>
    <div class="feedback" id="feedback"></div>
    <button class="action-btn secondary" onclick="newQuestion()">New Shape</button>
  `;
}

// Apply patches
(function() {
  const origSetMode = setMode;
  window.setMode = function(mode) {
    state.mode = mode;
    document.querySelectorAll('.mode-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.mode === mode);
    });
    newQuestion();
  };
  window.newQuestion = function() {
    state.answered = false;
    state.shadedSegments = new Set();
    const content = document.getElementById('gameContent');
    if (state.mode === 'split') setupSplitPatched(content);
    else if (state.mode === 'shade') setupShade(content);
    else if (state.mode === 'name') setupName(content);
    else if (state.mode === 'equiv') setupEquiv(content);
    updateUI();
  };
})();
</script>
</body>
</html>
