<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Story Stage</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #fef6f0;
    --card-bg: #ffffff;
    --text: #2d1b4e;
    --text-light: #7c6f8a;
    --border: #f0e6f6;
    --shadow: 0 4px 16px rgba(80,40,120,0.10);
    --shadow-lg: 0 8px 32px rgba(80,40,120,0.15);
    --radius: 20px;
    --curtain: #c0392b;
    --curtain-dark: #922b21;
    --stage-floor: #8B5E3C;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    overflow-x: hidden;
    user-select: none;
    -webkit-user-select: none;
}

/* Header */
.header {
    background: linear-gradient(135deg, #e74c3c, #f39c12, #9b59b6);
    color: white;
    padding: 14px 20px;
    text-align: center;
    box-shadow: var(--shadow);
    position: relative;
    z-index: 200;
}
.header h1 { font-size: 1.6rem; font-weight: 900; text-shadow: 2px 2px 0 rgba(0,0,0,0.12); }
.header p { font-size: 0.82rem; opacity: 0.9; font-weight: 600; margin-top: 2px; }

.main { max-width: 750px; margin: 0 auto; padding: 12px; }

/* Scene picker */
.scene-picker {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin: 10px 0;
    flex-wrap: wrap;
}
.scene-btn {
    padding: 10px 18px;
    border: 3px solid transparent;
    border-radius: 50px;
    background: var(--card-bg);
    box-shadow: var(--shadow);
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 6px;
}
.scene-btn:hover { transform: scale(1.06); }
.scene-btn.active { border-color: var(--text); background: #f8f0ff; }

/* Stage container */
.stage-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow-lg);
    margin: 12px 0;
    border: 4px solid #5c3d2e;
    background: #222;
}

/* Stage top frame */
.stage-frame-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 24px;
    background: linear-gradient(180deg, #5c3d2e, #8B5E3C);
    z-index: 60;
    display: flex;
    align-items: center;
    justify-content: center;
}
.stage-frame-top::after {
    content: '';
    width: 60%;
    height: 6px;
    background: #d4a862;
    border-radius: 3px;
}

/* Scene backgrounds */
.scene {
    position: absolute;
    inset: 0;
    top: 24px;
    transition: opacity 0.5s;
}

.scene-forest {
    background: linear-gradient(180deg, #87CEEB 0%, #87CEEB 35%, #228B22 35%, #228B22 55%, #2E7D32 55%, #2E7D32 75%, #5D4037 75%);
}
.scene-forest::before {
    content: '';
    position: absolute;
    bottom: 25%;
    left: 10%;
    width: 0; height: 0;
    border-left: 35px solid transparent;
    border-right: 35px solid transparent;
    border-bottom: 70px solid #1B5E20;
    filter: drop-shadow(2px 0 0 #145218);
}
.scene-forest::after {
    content: '';
    position: absolute;
    bottom: 25%;
    right: 15%;
    width: 0; height: 0;
    border-left: 28px solid transparent;
    border-right: 28px solid transparent;
    border-bottom: 55px solid #1B5E20;
}

.scene-castle {
    background: linear-gradient(180deg, #4a69bd 0%, #6a89cc 40%, #82ccdd 40%, #82ccdd 45%, #b8b8b8 45%, #b8b8b8 75%, #8B7355 75%);
}
.scene-castle::before {
    content: '';
    position: absolute;
    bottom: 25%;
    left: 50%;
    transform: translateX(-50%);
    width: 100px;
    height: 90px;
    background: #95a5a6;
    border-top: 8px solid transparent;
    border-image: repeating-linear-gradient(90deg, #7f8c8d 0 12px, transparent 12px 24px) 8;
}
.scene-castle::after {
    content: '';
    position: absolute;
    bottom: calc(25% + 90px);
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 55px solid transparent;
    border-right: 55px solid transparent;
    border-bottom: 40px solid #d35400;
}

.scene-beach {
    background: linear-gradient(180deg, #74b9ff 0%, #74b9ff 40%, #0984e3 40%, #0984e3 55%, #fdcb6e 55%, #fdcb6e 75%, #e17055 75%);
}
.scene-beach::before {
    content: '';
    position: absolute;
    top: 8%;
    right: 12%;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    background: #ffeaa7;
    box-shadow: 0 0 20px #ffeaa7;
}

/* Stage floor */
.stage-floor {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 25%;
    z-index: 5;
}

/* Curtains */
.curtain {
    position: absolute;
    top: 24px;
    bottom: 0;
    width: 52%;
    z-index: 50;
    transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    overflow: hidden;
}
.curtain-left {
    left: 0;
    transform: translateX(0);
    background: linear-gradient(90deg,
        var(--curtain-dark) 0%,
        var(--curtain) 15%,
        var(--curtain-dark) 30%,
        var(--curtain) 50%,
        var(--curtain-dark) 70%,
        var(--curtain) 85%,
        var(--curtain-dark) 100%
    );
    border-right: 3px solid #7f1d1d;
}
.curtain-right {
    right: 0;
    transform: translateX(0);
    background: linear-gradient(90deg,
        var(--curtain-dark) 0%,
        var(--curtain) 15%,
        var(--curtain-dark) 30%,
        var(--curtain) 50%,
        var(--curtain-dark) 70%,
        var(--curtain) 85%,
        var(--curtain-dark) 100%
    );
    border-left: 3px solid #7f1d1d;
}
.curtain::after {
    content: '';
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 30px;
    background: linear-gradient(180deg, transparent, rgba(0,0,0,0.2));
}
.curtains-open .curtain-left { transform: translateX(-92%); }
.curtains-open .curtain-right { transform: translateX(92%); }

/* Curtain valance */
.valance {
    position: absolute;
    top: 24px;
    left: 0;
    right: 0;
    height: 35px;
    z-index: 55;
    background: var(--curtain);
    clip-path: polygon(0 0, 100% 0, 100% 60%, 95% 100%, 85% 60%, 75% 100%, 65% 60%, 55% 100%, 45% 60%, 35% 100%, 25% 60%, 15% 100%, 5% 60%, 0 100%);
}

/* Drop zone (the stage surface where characters can be placed) */
.drop-zone {
    position: absolute;
    inset: 0;
    top: 24px;
    z-index: 10;
}

/* Characters on stage */
.stage-character {
    position: absolute;
    z-index: 15;
    cursor: grab;
    touch-action: none;
    transition: filter 0.2s;
    filter: drop-shadow(2px 3px 3px rgba(0,0,0,0.3));
}
.stage-character:active { cursor: grabbing; filter: drop-shadow(3px 5px 6px rgba(0,0,0,0.4)) brightness(1.1); }

/* Speech bubbles */
.speech-bubble {
    position: absolute;
    z-index: 20;
    background: white;
    border-radius: 18px;
    padding: 8px 14px;
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--text);
    box-shadow: var(--shadow);
    animation: bubblePop 0.4s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
    max-width: 140px;
    text-align: center;
    white-space: nowrap;
}
.speech-bubble::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-top: 10px solid white;
}
@keyframes bubblePop {
    from { opacity: 0; transform: scale(0.5) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
}
@keyframes bubbleFade {
    from { opacity: 1; }
    to { opacity: 0; transform: translateY(-10px); }
}

/* Character tray */
.tray {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 12px;
    margin-bottom: 12px;
}
.tray-title {
    text-align: center;
    font-size: 0.9rem;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--text-light);
}
.tray-chars {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
}
.tray-char {
    width: 64px;
    height: 72px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    background: #f8f0ff;
    border: 3px dashed #d5c4e0;
    border-radius: 14px;
    cursor: grab;
    touch-action: none;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
}
.tray-char:hover { transform: scale(1.08); border-color: #9b59b6; }
.tray-char:active { cursor: grabbing; }
.tray-char .char-icon { font-size: 1.8rem; line-height: 1; pointer-events: none; }
.tray-char .char-label { font-size: 0.6rem; font-weight: 700; color: var(--text-light); pointer-events: none; }
.tray-char.on-stage { opacity: 0.35; border-style: solid; }

/* Curtain button */
.controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin: 10px 0 6px;
    flex-wrap: wrap;
}
.ctrl-btn {
    padding: 12px 24px;
    border: none;
    border-radius: 50px;
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    font-weight: 800;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: all 0.25s;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    align-items: center;
    gap: 8px;
}
.ctrl-btn:hover { transform: scale(1.06); }
.curtain-btn { background: linear-gradient(135deg, #c0392b, #e74c3c); color: white; }
.curtain-btn.open { background: linear-gradient(135deg, #27ae60, #2ecc71); }
.clear-btn { background: linear-gradient(135deg, #7f8c8d, #95a5a6); color: white; }

/* Celebration */
.celebration {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1000;
}
.confetti-piece {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    animation: confettiFall linear forwards;
}
@keyframes confettiFall {
    0% { opacity: 1; transform: translateY(0) rotate(0deg); }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
}

/* Ghost drag element */
.drag-ghost {
    position: fixed;
    z-index: 9999;
    pointer-events: none;
    opacity: 0.85;
    transform: scale(1.2);
    filter: drop-shadow(3px 5px 8px rgba(0,0,0,0.3));
    font-size: 2.8rem;
    line-height: 1;
}

@media (max-width: 500px) {
    .stage-wrapper { aspect-ratio: 3/2.8; }
    .tray-char { width: 56px; height: 62px; }
    .tray-char .char-icon { font-size: 1.5rem; }
    .scene-btn { font-size: 0.78rem; padding: 8px 14px; }
}
</style>
</head>
<body>

<div class="header">
    <h1>Story Stage</h1>
    <p>Drag characters onto the stage!</p>
</div>

<div class="main">
    <div class="scene-picker" id="scenePicker">
        <button class="scene-btn active" data-scene="forest"><span>🌲</span> Forest</button>
        <button class="scene-btn" data-scene="castle"><span>🏰</span> Castle</button>
        <button class="scene-btn" data-scene="beach"><span>🏖️</span> Beach</button>
    </div>

    <div class="stage-wrapper" id="stageWrapper">
        <div class="stage-frame-top"></div>
        <div class="scene scene-forest" id="sceneForest"></div>
        <div class="scene scene-castle" id="sceneCastle" style="opacity:0"></div>
        <div class="scene scene-beach" id="sceneBeach" style="opacity:0"></div>
        <div class="valance"></div>
        <div class="curtain curtain-left"></div>
        <div class="curtain curtain-right"></div>
        <div class="drop-zone" id="dropZone"></div>
    </div>

    <div class="controls">
        <button class="ctrl-btn curtain-btn" id="curtainBtn"><span>🎭</span> Open Curtains</button>
        <button class="ctrl-btn clear-btn" id="clearBtn"><span>🧹</span> Clear Stage</button>
    </div>

    <div class="tray" id="tray">
        <div class="tray-title">Characters - drag me onto the stage!</div>
        <div class="tray-chars" id="trayChars"></div>
    </div>
</div>

<div class="celebration" id="celebration"></div>

<script>
const CHARACTERS = [
    { id: 'princess', icon: '👸', label: 'Princess', color: '#FF69B4' },
    { id: 'knight', icon: '🤺', label: 'Knight', color: '#4a69bd' },
    { id: 'dragon', icon: '🐉', label: 'Dragon', color: '#e74c3c' },
    { id: 'bear', icon: '🐻', label: 'Bear', color: '#8B5E3C' },
    { id: 'fairy', icon: '🧚', label: 'Fairy', color: '#9b59b6' }
];

const PROMPTS = [
    "Hello!", "Let's go on an adventure!", "Oh no!", "Come with me!",
    "Look over there!", "I'm so happy!", "What's that?!", "Let's be friends!",
    "Hooray!", "Follow me!", "Watch out!", "Wow, amazing!"
];

let curtainsOpen = false;
let stageChars = []; // { id, element, x, y }
let dragState = null;
let currentScene = 'forest';
let bubbleTimeout = null;

// Build tray
const trayContainer = document.getElementById('trayChars');
CHARACTERS.forEach(ch => {
    const el = document.createElement('div');
    el.className = 'tray-char';
    el.dataset.charId = ch.id;
    el.innerHTML = `<span class="char-icon">${ch.icon}</span><span class="char-label">${ch.label}</span>`;
    trayContainer.appendChild(el);

    // Pointer events for drag
    el.addEventListener('pointerdown', e => startDragFromTray(e, ch));
});

// Scene picker
document.querySelectorAll('.scene-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        currentScene = btn.dataset.scene;
        document.querySelectorAll('.scene-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.scene').forEach(s => s.style.opacity = '0');
        const target = document.getElementById('scene' + currentScene.charAt(0).toUpperCase() + currentScene.slice(1));
        if (target) target.style.opacity = '1';
    });
});

// Curtain button
const curtainBtn = document.getElementById('curtainBtn');
curtainBtn.addEventListener('click', () => {
    curtainsOpen = !curtainsOpen;
    document.getElementById('stageWrapper').classList.toggle('curtains-open', curtainsOpen);
    curtainBtn.innerHTML = curtainsOpen
        ? '<span>🎭</span> Close Curtains'
        : '<span>🎭</span> Open Curtains';
    curtainBtn.classList.toggle('open', curtainsOpen);
    if (curtainsOpen) spawnConfetti(20);
});

// Clear button
document.getElementById('clearBtn').addEventListener('click', () => {
    stageChars.forEach(sc => sc.element.remove());
    stageChars = [];
    document.querySelectorAll('.speech-bubble').forEach(b => b.remove());
    document.querySelectorAll('.tray-char').forEach(t => t.classList.remove('on-stage'));
});

// Drag from tray
function startDragFromTray(e, charData) {
    // Check if already on stage
    if (stageChars.find(sc => sc.id === charData.id)) return;

    e.preventDefault();
    const trayEl = e.currentTarget;
    trayEl.classList.add('on-stage');

    // Create ghost
    const ghost = document.createElement('div');
    ghost.className = 'drag-ghost';
    ghost.textContent = charData.icon;
    document.body.appendChild(ghost);

    dragState = {
        charData,
        ghost,
        startX: e.clientX,
        startY: e.clientY
    };

    positionGhost(e.clientX, e.clientY);

    document.addEventListener('pointermove', onDragMove);
    document.addEventListener('pointerup', onDragEnd);
}

function positionGhost(x, y) {
    if (!dragState) return;
    dragState.ghost.style.left = (x - 24) + 'px';
    dragState.ghost.style.top = (y - 24) + 'px';
}

function onDragMove(e) {
    if (!dragState) return;
    e.preventDefault();
    positionGhost(e.clientX, e.clientY);
}

function onDragEnd(e) {
    if (!dragState) return;
    document.removeEventListener('pointermove', onDragMove);
    document.removeEventListener('pointerup', onDragEnd);

    const { charData, ghost } = dragState;
    ghost.remove();

    // Check if dropped on stage
    const dropZone = document.getElementById('dropZone');
    const rect = dropZone.getBoundingClientRect();
    const x = e.clientX, y = e.clientY;

    if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
        // Place character on stage
        const relX = ((x - rect.left) / rect.width) * 100;
        const relY = ((y - rect.top) / rect.height) * 100;
        placeCharacter(charData, Math.max(5, Math.min(90, relX)), Math.max(15, Math.min(85, relY)));
    } else {
        // Return to tray
        const trayEl = document.querySelector(`.tray-char[data-char-id="${charData.id}"]`);
        if (trayEl) trayEl.classList.remove('on-stage');
    }

    dragState = null;
}

function placeCharacter(charData, xPct, yPct) {
    const dropZone = document.getElementById('dropZone');

    const el = document.createElement('div');
    el.className = 'stage-character';
    el.style.left = xPct + '%';
    el.style.top = yPct + '%';
    el.style.fontSize = '2.8rem';
    el.style.transform = 'translate(-50%, -50%)';
    el.textContent = charData.icon;
    el.dataset.charId = charData.id;
    dropZone.appendChild(el);

    const sc = { id: charData.id, element: el, x: xPct, y: yPct };
    stageChars.push(sc);

    // Make draggable on stage
    el.addEventListener('pointerdown', e2 => startDragOnStage(e2, sc));

    // Check proximity to other characters
    checkProximity(sc);

    // Pop animation
    el.style.animation = 'bubblePop 0.4s cubic-bezier(0.34,1.56,0.64,1)';
}

function startDragOnStage(e, sc) {
    e.preventDefault();
    e.stopPropagation();

    const dropZone = document.getElementById('dropZone');
    const rect = dropZone.getBoundingClientRect();
    const el = sc.element;

    const onMove = ev => {
        ev.preventDefault();
        const relX = ((ev.clientX - rect.left) / rect.width) * 100;
        const relY = ((ev.clientY - rect.top) / rect.height) * 100;
        const cx = Math.max(5, Math.min(95, relX));
        const cy = Math.max(10, Math.min(90, relY));
        el.style.left = cx + '%';
        el.style.top = cy + '%';
        sc.x = cx;
        sc.y = cy;
    };

    const onUp = () => {
        document.removeEventListener('pointermove', onMove);
        document.removeEventListener('pointerup', onUp);
        checkProximity(sc);
    };

    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
}

function checkProximity(movedChar) {
    const threshold = 22; // percentage distance
    stageChars.forEach(other => {
        if (other.id === movedChar.id) return;
        const dist = Math.sqrt(Math.pow(movedChar.x - other.x, 2) + Math.pow(movedChar.y - other.y, 2));
        if (dist < threshold) {
            showSpeechBubble(movedChar);
            showSpeechBubble(other);
        }
    });
}

function showSpeechBubble(sc) {
    // Remove existing bubble for this char
    const existing = document.querySelector(`.speech-bubble[data-for="${sc.id}"]`);
    if (existing) existing.remove();

    const dropZone = document.getElementById('dropZone');
    const bubble = document.createElement('div');
    bubble.className = 'speech-bubble';
    bubble.dataset.for = sc.id;
    bubble.textContent = PROMPTS[Math.floor(Math.random() * PROMPTS.length)];
    bubble.style.left = sc.x + '%';
    bubble.style.top = (sc.y - 16) + '%';
    bubble.style.transform = 'translateX(-50%)';
    dropZone.appendChild(bubble);

    // Remove after delay
    setTimeout(() => {
        bubble.style.animation = 'bubbleFade 0.4s ease forwards';
        setTimeout(() => bubble.remove(), 400);
    }, 2800);
}

function spawnConfetti(count) {
    const container = document.getElementById('celebration');
    const colours = ['#FFD93D', '#FF6B6B', '#6EC6FF', '#A29BFE', '#FF9FF3', '#FECA57', '#00d2d3', '#ff9f43'];
    for (let i = 0; i < count; i++) {
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.left = Math.random() * 100 + 'vw';
        el.style.top = '-12px';
        el.style.background = colours[Math.floor(Math.random() * colours.length)];
        el.style.width = (6 + Math.random() * 8) + 'px';
        el.style.height = (6 + Math.random() * 8) + 'px';
        el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
        el.style.animationDelay = (Math.random() * 0.5) + 's';
        container.appendChild(el);
        setTimeout(() => el.remove(), 4000);
    }
}

// Open curtains on load for a nice welcome
setTimeout(() => {
    curtainsOpen = true;
    document.getElementById('stageWrapper').classList.add('curtains-open');
    curtainBtn.innerHTML = '<span>🎭</span> Close Curtains';
    curtainBtn.classList.add('open');
    spawnConfetti(15);
}, 600);
</script>
</body>
</html>
