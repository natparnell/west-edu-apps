<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shape Sorter</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: #faf7f2;
    color: #3d2e1f;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    user-select: none;
    -webkit-user-select: none;
    overflow-x: hidden;
  }

  .title-bar {
    background: #e07020;
    color: #fff;
    text-align: center;
    padding: 16px 20px;
    font-size: 28px;
    font-weight: 800;
    box-shadow: 0 3px 10px rgba(224,112,32,0.3);
    position: relative;
    z-index: 10;
  }

  .instructions {
    text-align: center;
    font-size: 20px;
    font-weight: 600;
    padding: 12px 16px;
    color: #5a4630;
    background: #fff4e8;
    border-bottom: 2px solid #f0dcc4;
  }

  .progress-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 10px 20px;
    background: #fff;
    border-bottom: 2px solid #f0dcc4;
  }
  .progress-bar span { font-weight: 700; font-size: 18px; }
  .level-badge {
    background: #e07020;
    color: #fff;
    padding: 4px 16px;
    border-radius: 20px;
    font-weight: 700;
    font-size: 16px;
  }
  .score-text { font-weight: 700; font-size: 18px; }

  .game-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    gap: 30px;
    max-width: 800px;
    margin: 0 auto;
    width: 100%;
  }

  /* Target holes area */
  .targets-area {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    padding: 20px;
    background: #fff;
    border-radius: 20px;
    border: 3px dashed #d4c4b0;
    width: 100%;
  }
  .target-slot {
    width: 110px;
    height: 110px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 16px;
    background: #f5efe6;
    border: 4px dashed #d4c4b0;
    transition: border-color 0.3s, background 0.3s, transform 0.2s;
    position: relative;
  }
  .target-slot.highlight {
    border-color: #e07020;
    background: #fff4e8;
    transform: scale(1.08);
  }
  .target-slot.filled {
    border-style: solid;
    border-color: #4caf50;
    background: #e8f5e9;
    animation: slot-fill 0.5s ease;
  }
  @keyframes slot-fill {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }
  .target-slot .shape-name {
    font-size: 13px;
    font-weight: 700;
    color: #8a7560;
    margin-top: 6px;
  }
  .target-slot.filled .shape-name {
    color: #4caf50;
    font-size: 15px;
  }

  /* Draggable shapes */
  .shapes-tray {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 16px;
    padding: 20px;
    background: #fff;
    border-radius: 20px;
    border: 3px solid #f0dcc4;
    width: 100%;
  }
  .draggable-shape {
    width: 100px;
    height: 100px;
    cursor: grab;
    transition: transform 0.2s, box-shadow 0.2s, opacity 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 14px;
    background: #fff;
    border: 3px solid #e8ddd0;
    position: relative;
  }
  .draggable-shape:hover { transform: scale(1.08); box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
  .draggable-shape:active { cursor: grabbing; }
  .draggable-shape.dragging {
    opacity: 0.7;
    transform: scale(1.12);
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    z-index: 50;
  }
  .draggable-shape.placed {
    opacity: 0.3;
    pointer-events: none;
    transform: scale(0.8);
  }

  /* SVG shapes */
  .shape-svg { width: 70px; height: 70px; }
  .target-svg { width: 55px; height: 55px; opacity: 0.3; }
  .target-slot.filled .target-svg { opacity: 1; }

  .btn {
    display: inline-block;
    padding: 14px 32px;
    font-size: 20px;
    font-weight: 700;
    font-family: 'Inter', sans-serif;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn:hover { transform: scale(1.05); }
  .btn:active { transform: scale(0.96); }
  .btn-primary {
    background: #e07020;
    color: #fff;
    box-shadow: 0 4px 12px rgba(224,112,32,0.35);
  }
  .btn-secondary {
    background: #fff;
    color: #e07020;
    border: 3px solid #e07020;
  }

  .bottom-bar {
    display: flex;
    justify-content: center;
    gap: 14px;
    padding: 16px;
    background: #fff;
    border-top: 2px solid #f0dcc4;
  }

  /* Celebration */
  .celebration {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(250,247,242,0.92);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }
  .celebration.active { display: flex; }
  .celebration .big-text {
    font-size: 44px;
    font-weight: 800;
    color: #e07020;
    animation: pop 0.6s ease;
  }
  .celebration .big-emoji {
    font-size: 60px;
    animation: spin-stars 1.2s ease;
  }
  @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.4); } 100% { transform: scale(1); } }
  @keyframes spin-stars { 0% { transform: scale(0) rotate(-180deg); opacity: 0; } 60% { transform: scale(1.3) rotate(10deg); opacity: 1; } 100% { transform: scale(1) rotate(0); } }

  .confetti-piece {
    position: fixed;
    width: 12px; height: 12px;
    border-radius: 3px;
    z-index: 101;
    animation: confetti-fall 2.5s ease forwards;
    pointer-events: none;
  }
  @keyframes confetti-fall {
    0% { opacity: 1; transform: translateY(0) rotate(0deg); }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
  }

  .game-complete {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(250,247,242,0.95);
    z-index: 200;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }
  .game-complete.active { display: flex; }
  .game-complete .trophy { font-size: 80px; animation: pop 0.8s ease; }
  .game-complete .score-text { font-size: 32px; font-weight: 800; color: #e07020; }
  .game-complete .msg { font-size: 22px; font-weight: 600; color: #5a4630; text-align: center; }

  /* Shape label toast */
  .shape-toast {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: #e07020;
    color: #fff;
    padding: 16px 32px;
    border-radius: 16px;
    font-size: 28px;
    font-weight: 800;
    z-index: 90;
    pointer-events: none;
    transition: transform 0.3s ease, opacity 0.3s ease;
    opacity: 0;
  }
  .shape-toast.show {
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
  }

  @media (max-width: 500px) {
    .title-bar { font-size: 22px; padding: 12px 16px; }
    .instructions { font-size: 17px; }
    .target-slot { width: 90px; height: 90px; }
    .draggable-shape { width: 80px; height: 80px; }
    .shape-svg { width: 55px; height: 55px; }
    .target-svg { width: 42px; height: 42px; }
  }
</style>
</head>
<body>

<div class="title-bar">Shape Sorter</div>
<div class="instructions" id="instructions">Drag each shape to its matching hole!</div>

<div class="progress-bar">
  <span class="level-badge" id="levelBadge">Level 1</span>
  <span class="score-text" id="scoreText">Sorted: 0</span>
</div>

<div class="game-area" id="gameArea">
  <div class="targets-area" id="targetsArea"></div>
  <div class="shapes-tray" id="shapesTray"></div>
</div>

<div class="bottom-bar">
  <button class="btn btn-secondary" onclick="newGame()">New Game</button>
</div>

<div class="shape-toast" id="shapeToast"></div>

<div class="celebration" id="celebration">
  <div class="big-emoji" id="celebEmoji"></div>
  <div class="big-text" id="celebText"></div>
</div>

<div class="game-complete" id="gameComplete">
  <div class="trophy">🏆</div>
  <div class="score-text" id="finalScore"></div>
  <div class="msg">You know all your shapes!</div>
  <button class="btn btn-primary" onclick="newGame()" style="margin-top:10px;">Play Again</button>
</div>

<script>
const SHAPES = [
  {
    name: 'Circle',
    color: '#e53935',
    svg: (size, fill) => `<svg class="${fill ? 'shape-svg' : 'target-svg'}" viewBox="0 0 100 100"><circle cx="50" cy="50" r="42" fill="${fill || 'currentColor'}" stroke="${fill ? '#b71c1c' : '#999'}" stroke-width="4"/></svg>`
  },
  {
    name: 'Square',
    color: '#1e88e5',
    svg: (size, fill) => `<svg class="${fill ? 'shape-svg' : 'target-svg'}" viewBox="0 0 100 100"><rect x="12" y="12" width="76" height="76" rx="6" fill="${fill || 'currentColor'}" stroke="${fill ? '#1565c0' : '#999'}" stroke-width="4"/></svg>`
  },
  {
    name: 'Triangle',
    color: '#43a047',
    svg: (size, fill) => `<svg class="${fill ? 'shape-svg' : 'target-svg'}" viewBox="0 0 100 100"><polygon points="50,10 90,88 10,88" fill="${fill || 'currentColor'}" stroke="${fill ? '#2e7d32' : '#999'}" stroke-width="4"/></svg>`
  },
  {
    name: 'Rectangle',
    color: '#8e24aa',
    svg: (size, fill) => `<svg class="${fill ? 'shape-svg' : 'target-svg'}" viewBox="0 0 120 80"><rect x="6" y="6" width="108" height="68" rx="6" fill="${fill || 'currentColor'}" stroke="${fill ? '#6a1b9a' : '#999'}" stroke-width="4"/></svg>`
  },
  {
    name: 'Star',
    color: '#fdd835',
    svg: (size, fill) => `<svg class="${fill ? 'shape-svg' : 'target-svg'}" viewBox="0 0 100 100"><polygon points="50,5 61,38 97,38 68,58 79,92 50,72 21,92 32,58 3,38 39,38" fill="${fill || 'currentColor'}" stroke="${fill ? '#f9a825' : '#999'}" stroke-width="3"/></svg>`
  },
  {
    name: 'Hexagon',
    color: '#00acc1',
    svg: (size, fill) => `<svg class="${fill ? 'shape-svg' : 'target-svg'}" viewBox="0 0 100 100"><polygon points="50,5 93,27 93,73 50,95 7,73 7,27" fill="${fill || 'currentColor'}" stroke="${fill ? '#00838f' : '#999'}" stroke-width="4"/></svg>`
  }
];

let level = 1;
let totalSorted = 0;
let shapesInRound = [];
let sortedInRound = 0;
let draggedShape = null;
let dragOffsetX = 0, dragOffsetY = 0;
let dragClone = null;

function randomInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = randomInt(0, i); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }

function getShapeCount() {
  if (level <= 2) return 3;
  if (level <= 4) return 4;
  if (level <= 6) return 5;
  return 6;
}

function startRound() {
  sortedInRound = 0;
  const count = getShapeCount();
  shapesInRound = shuffle([...SHAPES]).slice(0, count);

  document.getElementById('levelBadge').textContent = `Level ${level}`;
  document.getElementById('scoreText').textContent = `Sorted: ${totalSorted}`;
  document.getElementById('instructions').textContent = 'Drag each shape to its matching hole!';

  const targetsArea = document.getElementById('targetsArea');
  const shapesTray = document.getElementById('shapesTray');
  targetsArea.innerHTML = '';
  shapesTray.innerHTML = '';

  // Create target slots
  shapesInRound.forEach((shape, i) => {
    const slot = document.createElement('div');
    slot.className = 'target-slot';
    slot.dataset.shapeName = shape.name;
    slot.innerHTML = shape.svg(55, null) + `<span class="shape-name">${shape.name}</span>`;
    targetsArea.appendChild(slot);
  });

  // Create draggable shapes (shuffled order)
  const shuffled = shuffle([...shapesInRound]);
  shuffled.forEach((shape, i) => {
    const el = document.createElement('div');
    el.className = 'draggable-shape';
    el.dataset.shapeName = shape.name;
    el.innerHTML = shape.svg(70, shape.color);
    el.style.opacity = '0';
    el.style.transform = 'scale(0)';
    setTimeout(() => {
      el.style.transition = 'opacity 0.3s, transform 0.3s';
      el.style.opacity = '1';
      el.style.transform = 'scale(1)';
    }, i * 100);

    // Touch and mouse drag
    el.addEventListener('mousedown', (e) => startDrag(e, el, shape));
    el.addEventListener('touchstart', (e) => startDrag(e, el, shape), { passive: false });
    shapesTray.appendChild(el);
  });
}

function startDrag(e, el, shape) {
  e.preventDefault();
  if (el.classList.contains('placed')) return;

  draggedShape = { el, shape };

  const rect = el.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;

  // Create a clone for dragging
  dragClone = el.cloneNode(true);
  dragClone.style.position = 'fixed';
  dragClone.style.width = rect.width + 'px';
  dragClone.style.height = rect.height + 'px';
  dragClone.style.zIndex = '50';
  dragClone.style.pointerEvents = 'none';
  dragClone.style.transition = 'none';
  dragClone.style.opacity = '0.85';
  dragClone.style.transform = 'scale(1.1)';
  dragClone.style.boxShadow = '0 8px 24px rgba(0,0,0,0.2)';
  document.body.appendChild(dragClone);

  dragOffsetX = clientX - rect.left;
  dragOffsetY = clientY - rect.top;
  moveDragClone(clientX, clientY);

  el.style.opacity = '0.4';

  document.addEventListener('mousemove', onDrag);
  document.addEventListener('mouseup', endDrag);
  document.addEventListener('touchmove', onDrag, { passive: false });
  document.addEventListener('touchend', endDrag);
}

function moveDragClone(x, y) {
  if (!dragClone) return;
  dragClone.style.left = (x - dragOffsetX) + 'px';
  dragClone.style.top = (y - dragOffsetY) + 'px';
}

function onDrag(e) {
  e.preventDefault();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  moveDragClone(clientX, clientY);

  // Highlight matching slot
  document.querySelectorAll('.target-slot').forEach(slot => {
    slot.classList.remove('highlight');
    const r = slot.getBoundingClientRect();
    if (clientX >= r.left && clientX <= r.right && clientY >= r.top && clientY <= r.bottom) {
      if (!slot.classList.contains('filled')) {
        slot.classList.add('highlight');
      }
    }
  });
}

function endDrag(e) {
  document.removeEventListener('mousemove', onDrag);
  document.removeEventListener('mouseup', endDrag);
  document.removeEventListener('touchmove', onDrag);
  document.removeEventListener('touchend', endDrag);

  if (!draggedShape || !dragClone) return;

  const clientX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
  const clientY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;

  let matched = false;
  document.querySelectorAll('.target-slot').forEach(slot => {
    slot.classList.remove('highlight');
    const r = slot.getBoundingClientRect();
    if (clientX >= r.left && clientX <= r.right && clientY >= r.top && clientY <= r.bottom) {
      if (slot.dataset.shapeName === draggedShape.shape.name && !slot.classList.contains('filled')) {
        // Correct match
        matched = true;
        slot.classList.add('filled');
        slot.innerHTML = draggedShape.shape.svg(55, draggedShape.shape.color) + `<span class="shape-name">${draggedShape.shape.name}</span>`;
        draggedShape.el.classList.add('placed');
        sortedInRound++;
        totalSorted++;
        document.getElementById('scoreText').textContent = `Sorted: ${totalSorted}`;

        showShapeToast(draggedShape.shape.name);

        if (sortedInRound === shapesInRound.length) {
          setTimeout(celebrateRound, 600);
        }
      }
    }
  });

  if (!matched) {
    draggedShape.el.style.opacity = '1';
    // Shake effect
    draggedShape.el.style.animation = 'none';
    void draggedShape.el.offsetWidth;
    draggedShape.el.style.animation = 'shake 0.4s ease';
  }

  dragClone.remove();
  dragClone = null;
  draggedShape = null;
}

function showShapeToast(name) {
  const toast = document.getElementById('shapeToast');
  toast.textContent = name + '!';
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1200);
}

const praises = ['Amazing!', 'Great job!', 'Well done!', 'Fantastic!', 'Super!', 'Brilliant!'];
const emojis = ['🌟', '🎉', '💖', '⭐', '🎊', '✨'];

function celebrateRound() {
  const celeb = document.getElementById('celebration');
  document.getElementById('celebText').textContent = praises[randomInt(0, praises.length - 1)];
  document.getElementById('celebEmoji').textContent = emojis[randomInt(0, emojis.length - 1)];
  celeb.classList.add('active');
  spawnConfetti();

  level++;
  if (level > 8) {
    setTimeout(() => {
      celeb.classList.remove('active');
      showGameComplete();
    }, 2000);
  } else {
    setTimeout(() => {
      celeb.classList.remove('active');
      startRound();
    }, 2000);
  }
}

function spawnConfetti() {
  const colors = ['#e07020','#f4a940','#4caf50','#2196f3','#9c27b0','#e91e63','#ff5722'];
  for (let i = 0; i < 40; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = randomInt(5, 95) + 'vw';
    piece.style.top = randomInt(-10, 10) + 'vh';
    piece.style.background = colors[randomInt(0, colors.length - 1)];
    piece.style.animationDelay = (Math.random() * 0.6) + 's';
    piece.style.animationDuration = (1.5 + Math.random()) + 's';
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 3000);
  }
}

function showGameComplete() {
  document.getElementById('finalScore').textContent = `You sorted ${totalSorted} shapes!`;
  document.getElementById('gameComplete').classList.add('active');
  spawnConfetti();
}

function newGame() {
  document.getElementById('gameComplete').classList.remove('active');
  document.getElementById('celebration').classList.remove('active');
  level = 1;
  totalSorted = 0;
  startRound();
}

// Add shake keyframe dynamically
const style = document.createElement('style');
style.textContent = `@keyframes shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-10px); } 40% { transform: translateX(10px); } 60% { transform: translateX(-6px); } 80% { transform: translateX(6px); } }`;
document.head.appendChild(style);

newGame();
</script>
</body>
</html>
